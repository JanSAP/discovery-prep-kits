ent Frameworks. Die richtige Wahl wenn Ihre Prozesse genuinely komplex und differenzierend sind und Standardisierung Wettbewerbsvorteil kosten wuerde."}, "pain": {"en": ["Heavy regulatory or industry-specific requirements that cannot be met with standard ERP processes out of the box", "Thousands of custom objects (Z-code, enhancements, BAdIs) that represent decades of business logic investment - cannot be discarded overnight", "Infrastructure management consuming significant IT budget and capacity but executive mandate to move to cloud", "Need guaranteed performance SLAs and dedicated resources - cannot share infrastructure with other tenants for compliance reasons", "Want innovation and cloud benefits but fear losing the process control that runs the business today", "Running large landscape with complex integrations to shop floor, manufacturing execution, and industry-specific systems", "Multiple upgrade postponements - running on very old support packages with growing technical debt"], "de": ["Starke regulatorische/branchenspezifische Anforderungen die mit Standard-ERP nicht erfuellbar sind", "Tausende Custom-Objekte die Jahrzehnte Geschaeftslogik-Investition repraesentieren", "Infrastrukturmanagement belastet IT-Budget aber Cloud-Mandat vom Vorstand", "Garantierte Performance-SLAs und dedizierte Ressourcen noetig - Compliance verbietet Shared Infrastructure", "Will Innovation und Cloud-Vorteile aber fuerchtet Verlust der Prozesskontrolle", "Grosse Landschaft mit komplexen Integrationen zu Shopfloor und Branchensystemen", "Mehrfach verschobene Upgrades - sehr alte Support Packages mit wachsender technischer Schuld"]}, "questions": {"en": [{"t": "Customization depth", "q": "Can you walk me through the most business-critical customizations in your landscape? Which ones give you genuine competitive advantage vs. which ones exist because 'that is how it was always done'?"}, {"t": "Compliance", "q": "Are there specific regulatory requirements (GxP, ITAR, data residency, sector-specific) that mandate a dedicated, isolated environment?"}, {"t": "Upgrade history", "q": "When was your last technical upgrade? How many support packages behind are you, and what is preventing upgrades from happening regularly?"}, {"t": "Integration complexity", "q": "What systems are directly integrated with SAP today? Manufacturing execution, shop floor, PLM, external platforms - how many interfaces would be affected by a move?"}, {"t": "Operational burden", "q": "How many FTEs are dedicated to SAP basis operations today - and what would you do with that capacity if it were freed up?"}, {"t": "Timeline flexibility", "q": "Is there pressure to migrate by a specific date, or does the business want to take a phased, lower-risk approach over 2-3 years?"}, {"t": "Clean core aspiration", "q": "Is there appetite to gradually reduce customizations over time (clean core journey), or do you expect the custom footprint to remain permanently?"}], "de": [{"t": "Anpassungstiefe", "q": "Koennen Sie die geschaeftskritischsten Anpassungen durchgehen? Welche geben echten Wettbewerbsvorteil vs. existieren weil 'war schon immer so'?"}, {"t": "Compliance", "q": "Spezifische regulatorische Anforderungen (GxP, ITAR, Datenresidenz) die dedizierte isolierte Umgebung erfordern?"}, {"t": "Upgrade-Historie", "q": "Wann war das letzte technische Upgrade? Wie viele Support Packages zurueck? Was verhindert regelmaessige Upgrades?"}, {"t": "Integrationen", "q": "Welche Systeme sind direkt mit SAP integriert? MES, Shopfloor, PLM, externe Plattformen - wie viele Schnittstellen betroffen?"}, {"t": "Betriebslast", "q": "Wie viele FTEs sind heute fuer SAP-Basis dediziert - und was wuerden Sie mit der Kapazitaet machen wenn sie frei waere?"}, {"t": "Zeitflexibilitaet", "q": "Migrationsdruck zu bestimmtem Datum oder phasenweiser Ansatz ueber 2-3 Jahre?"}, {"t": "Clean Core", "q": "Appetit Custom Code schrittweise zu reduzieren oder bleibt Custom-Footprint dauerhaft?"}]}, "diff": {"en": ["Full custom code preservation: all your Z-code, enhancements, BAdIs, and modifications run as-is on day one - no forced refactoring", "Dedicated single-tenant infrastructure: your own instance, not shared - meeting strict compliance and performance requirements", "SAP-managed operations with guaranteed SLAs: patching, monitoring, security, disaster recovery - all handled by SAP", "Controlled upgrade cycles: you decide when to take upgrades within defined windows - not forced quarterly like Public Edition", "Hyperscaler flexibility: choose AWS, Azure, or GCP based on your existing cloud strategy and data residency requirements", "Clean core journey support: gradual path to move extensions to BTP side-by-side - at your pace, not a forced timeline"], "de": ["Voller Custom-Code-Erhalt: Z-Code, Enhancements, BAdIs laufen ab Tag 1 unveraendert", "Dedizierte Single-Tenant-Infrastruktur: eigene Instanz, nicht geteilt - strenge Compliance/Performance", "SAP-Managed Operations mit SLA-Garantie: Patching, Monitoring, Security, Disaster Recovery", "Kontrollierte Upgrade-Zyklen: Sie entscheiden wann - nicht erzwungen wie bei Public Edition", "Hyperscaler-Flexibilitaet: AWS, Azure oder GCP je nach Cloud-Strategie und Datenresidenz", "Clean-Core-Journey: Schrittweiser Pfad Extensions auf BTP zu verschieben - Ihr Tempo"]}, "talk": {"en": [{"p": "Open", "l": "I understand your landscape has significant custom code that represents years of business investment. The question is: how do you get to cloud without sacrificing what makes your operations unique?"}, {"p": "Pain", "l": "What I see in organizations with your complexity level is that the operational burden of managing infrastructure is consuming budget and talent that should be driving business value - but you cannot just standardize everything without losing competitive advantage."}, {"p": "Vision", "l": "Private Edition gives you the best of both worlds: SAP takes over all infrastructure and technical operations - patching, monitoring, DR - while you keep full control over your custom processes. You choose when to upgrade. And over time, you can gradually move extensions to BTP at your own pace."}, {"p": "Proof", "l": "[Reference customer] migrated with 3,000+ custom objects, went live without business disruption, and reduced their basis team from 8 to 2 FTEs. They redirect that savings into BTP innovation now."}, {"p": "Next Step", "l": "The right starting point is a custom code analysis. We run the SAP custom code migration tool against your landscape and get a factual picture: how many objects, what needs adaptation, what can lift directly. Takes one week, no commitment beyond that."}], "de": [{"p": "Eroeffnung", "l": "Ihre Landschaft hat signifikanten Custom Code der Jahre an Geschaeftsinvestition repraesentiert. Die Frage ist: Wie in die Cloud ohne zu verlieren was Ihre Operationen einzigartig macht?"}, {"p": "Schmerz", "l": "Was ich bei Organisationen Ihres Komplexitaetsgrades sehe: Betriebslast frisst Budget und Talent das Geschaeftswert treiben sollte - aber man kann nicht einfach alles standardisieren."}, {"p": "Vision", "l": "Private Edition: SAP uebernimmt alle Infrastruktur und technischen Betrieb - Sie behalten volle Kontrolle ueber Custom-Prozesse. Sie bestimmen Upgrade-Zeitpunkt. Schrittweiser BTP-Weg in Ihrem Tempo."}, {"p": "Beweis", "l": "[Referenzkunde] migrierte mit 3000+ Custom-Objekten, ohne Geschaeftsunterbrechung, Basis-Team von 8 auf 2 reduziert. Einsparung fliesst jetzt in BTP-Innovation."}, {"p": "Naechster Schritt", "l": "Richtiger Start: Custom-Code-Analyse. SAP-Tool gegen Ihre Landschaft - faktisches Bild: wie viele Objekte, was braucht Anpassung, was hebt direkt. Eine Woche, keine Verpflichtung."}]}, "comp": {"en": [{"v": "Self-managed on Hyperscaler", "d": "You save operations overhead and get guaranteed SLAs. Most companies find that 'just lifting' to AWS/Azure still requires 80% of the same operations effort. Private Edition eliminates that."}, {"v": "Oracle Cloud@Customer", "d": "SAP Private Edition is truly cloud-managed with full SAP SLA responsibility. Oracle Cloud@Customer often still requires significant customer involvement in operations."}, {"v": "Rimini Street (third-party support)", "d": "Keeps you on old releases without innovation access, no cloud path, no new capabilities. Saves money short-term but creates larger technical debt. Not a transformation strategy."}, {"v": "Public Edition", "d": "If you genuinely have heavy customization needs and cannot adopt standard processes, Private Edition is correct. If you could standardize - Public Edition is faster and lower maintenance."}], "de": [{"v": "Selbstverwaltet auf Hyperscaler", "d": "Sie sparen Betriebsaufwand und bekommen SLA-Garantie. Die meisten finden dass 'einfach liften' immer noch 80% gleicher Aufwand ist."}, {"v": "Oracle Cloud@Customer", "d": "SAP Private Edition ist wirklich Cloud-gemanagt mit voller SAP-SLA-Verantwortung. Oracle erfordert oft noch signifikante Kundenbeteiligung."}, {"v": "Rimini Street", "d": "Haelt auf alten Releases ohne Innovation. Spart kurzfristig aber erzeugt groessere technische Schuld. Keine Transformationsstrategie."}, {"v": "Public Edition", "d": "Bei echter Custom-Code-Tiefe ist Private Edition richtig. Wenn standardisierbar - Public Edition ist schneller und wartungsaermer."}]}, "dont": {"en": ["Do not position as 'just hosting' - it is a managed cloud service with transformation tooling, not a server relocation", "Never imply customs will have to be removed for migration - they are preserved on day one. Clean core is a gradual journey", "Do not confuse with IaaS - SAP manages the full stack, not just infrastructure. Patching, upgrades, monitoring included", "Avoid suggesting 'unlimited customization forever' - the strategic direction is clean core. Private Edition supports the journey, not avoids it", "Do not undersell the required effort - migration still requires testing, cutover planning, and organizational readiness"], "de": ["Nicht als 'nur Hosting' positionieren - Managed Cloud Service mit Transformationstools", "Nie implizieren Anpassungen muessen fuer Migration entfernt werden - sie werden am Tag 1 bewahrt", "Nicht mit IaaS verwechseln - SAP managt den vollen Stack", "Nicht 'unbegrenzte Anpassung fuer immer' suggerieren - strategische Richtung ist Clean Core", "Migrationsaufwand nicht unterschaetzen - Testing, Cutover-Planung und Readiness bleiben erforderlich"]}, "qual": {"en": ["Large custom code footprint (1000+ objects) representing genuine business differentiation", "Regulatory requirements mandating dedicated infrastructure (GxP, ITAR, financial services)", "Current on-premise SAP with high operational burden and board-level cloud mandate", "Complex industry solutions (IS-U, IS-Oil, IS-Retail) that are not available in Public Edition", "Multiple postponed upgrades with growing technical debt but business cannot afford disruption", "IT operations consuming 60-80% of SAP team capacity - need to flip that ratio"], "de": ["Grosser Custom-Code-Footprint (1000+ Objekte) mit echter Differenzierung", "Regulatorik erfordert dedizierte Infrastruktur (GxP, ITAR, Finanzdienstleister)", "On-Premise SAP mit hoher Betriebslast und Cloud-Mandat", "Komplexe Branchenloesungen (IS-U, IS-Oil, IS-Retail) nicht in Public Edition verfuegbar", "Mehrfach verschobene Upgrades mit wachsender Schuld", "IT-Operations 60-80% der SAP-Team-Kapazitaet - muss umgekehrt werden"]}, "indDiff": {"en": [{"i": "Chemicals & Process Industries", "p": "Recipe management, batch traceability, REACH compliance, hazardous materials handling. Heavy IS-Chemical usage with decades of custom EH&S development.", "f": "Private Edition preserves all IS-Chemical functionality including recipe management, batch genealogy, EH&S extensions. No forced standardization of safety-critical processes. Migration maintains full traceability chain."}, {"i": "Defense & Aerospace", "p": "ITAR/EAR compliance, data sovereignty requirements, program-based accounting, complex project structures. Cannot use shared infrastructure for classified or controlled data.", "f": "Dedicated infrastructure with data residency guarantees. All defense-specific extensions preserved. Program management, earned value, and complex milestone billing maintained. Government-cloud deployment options."}, {"i": "Mining & Natural Resources", "p": "Asset-intensive operations with custom maintenance planning, remote operations management, environmental compliance. IS-Mining extensions critical to daily operations.", "f": "All mining-specific functionality preserved. Remote operations monitoring, asset lifecycle management, environmental reporting extensions maintained. Can operate in regions with limited connectivity."}], "de": [{"i": "Chemie & Prozessindustrie", "p": "Rezepturmanagement, Chargenrueckverfolgung, REACH, Gefahrstoffe. Schwere IS-Chemical-Nutzung mit Jahrzehnten Custom-EH&S.", "f": "Private Edition bewahrt alle IS-Chemical-Funktionen. Keine erzwungene Standardisierung sicherheitskritischer Prozesse."}, {"i": "Verteidigung & Luft-/Raumfahrt", "p": "ITAR/EAR-Compliance, Datensouveraenitaet, Programm-Accounting, komplexe Projektstrukturen. Shared Infrastructure nicht moeglich.", "f": "Dedizierte Infrastruktur mit Datenresidenz-Garantie. Alle Defense-Extensions erhalten. Government-Cloud-Optionen."}, {"i": "Bergbau & Rohstoffe", "p": "Asset-intensive Operationen mit Custom-Wartungsplanung, Remote Operations, Umwelt-Compliance.", "f": "Alle Mining-Funktionen erhalten. Remote-Monitoring, Asset-Lifecycle, Umweltreporting beibehalten."}]}, "inds": ["Chemicals", "Defense & Aerospace", "Oil Gas & Energy", "Utilities", "Life Sciences", "Mining", "Large Enterprise Manufacturing", "Financial Services"], "obj": {"en": [{"o": "What is the difference vs. on-premise S/4HANA?", "r": "Same S/4HANA code base, but SAP manages infrastructure, patching, monitoring. You keep full customization control. Think managed private cloud - your system, our operations."}, {"o": "We lose control in private cloud", "r": "You retain full access to configuration, custom code, and transport management. SAP handles infra, backups, and technical operations. More control than any third-party hoster."}, {"o": "Our data cannot leave our country", "r": "Private Edition runs on hyperscaler data centers. Available in Germany (Frankfurt), Switzerland, and other EU regions. Data residency is configurable."}, {"o": "We just renewed our hardware contract", "r": "Plan the transition for next cycle. Start with Signavio process analysis now, so you are migration-ready when hardware expires. No rush, but start planning."}, {"o": "Managed cloud is more expensive than self-hosted", "r": "Factor in: FTE ops cost, hardware depreciation, downtime cost, upgrade project cost, security incidents. Managed typically equals or beats self-hosted TCO within 2-3 years."}], "de": [{"o": "Unterschied zu On-Premise S/4HANA?", "r": "Gleiche Codebasis, SAP betreibt Infrastruktur. Volle Anpassungskontrolle bleibt."}, {"o": "Wir verlieren Kontrolle", "r": "Voller Zugriff auf Konfiguration und Custom Code. SAP managt Technik."}, {"o": "Daten duerfen Land nicht verlassen", "r": "Hyperscaler-Rechenzentren in Frankfurt, Schweiz, EU. Datenresidenz konfigurierbar."}, {"o": "Hardware-Vertrag gerade erneuert", "r": "Transition fuer naechsten Zyklus planen. Jetzt mit Signavio starten."}, {"o": "Managed Cloud teurer als selbst gehostet", "r": "FTE, Hardware, Downtime, Upgrades, Security einrechnen. TCO gleich in 2-3 Jahren."}]}, "persona": {"en": [{"role": "CIO", "msg": "Keep customization flexibility while eliminating infrastructure management burden", "prio": "Primary"}, {"role": "VP IT Operations / Basis", "msg": "No more weekend upgrades, 24/7 monitoring included, focus team on business projects", "prio": "Primary"}, {"role": "CFO", "msg": "Predictable annual cost, eliminate hardware refresh cycles, shift CapEx to OpEx", "prio": "Influencer"}, {"role": "CISO", "msg": "SAP-managed security patching, compliance certifications (ISO, SOC), hyperscaler security", "prio": "Technical"}], "de": [{"role": "CIO", "msg": "Anpassungsflexibilitaet behalten, Infrastruktur-Last eliminieren", "prio": "Primaer"}, {"role": "VP IT Ops / Basis", "msg": "Keine Upgrade-Wochenenden, 24/7-Monitoring, Team auf Business", "prio": "Primaer"}, {"role": "CFO", "msg": "Vorhersagbare Kosten, Hardware-Zyklen eliminieren", "prio": "Beeinflusser"}, {"role": "CISO", "msg": "SAP-managed Patching, Compliance-Zertifikate", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "System size (SAPS), FUE, storage", "range": "Typically 200K-800K EUR/year for mid-large, 1M+ for large multi-system", "includes": "Managed infrastructure, S/4HANA license, technical operations, disaster recovery, security patches"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Systemgroesse (SAPS), FUE, Speicher", "range": "Typisch 200K-800K EUR/Jahr, 1M+ Grossunternehmen", "includes": "Managed Infrastruktur, Lizenz, Betrieb, DR, Security Patches"}}, "crossSell": {"en": [{"trigger": "Customer has heavy custom code", "solution": "SAP BTP (ABAP Environment)", "why": "Move custom code to clean core side-by-side on BTP"}, {"trigger": "Integration landscape also needs migration", "solution": "SAP Integration Suite", "why": "PI/PO migration alongside PE migration"}, {"trigger": "Multiple systems (Dev/QA/Prod)", "solution": "SAP ALM / Cloud ALM", "why": "Lifecycle management across managed environments"}, {"trigger": "Analytics still on BW", "solution": "SAP BW Bridge", "why": "Migrate BW alongside ERP for single transformation"}], "de": [{"trigger": "Viel Custom Code", "solution": "SAP BTP (ABAP Environment)", "why": "Custom Code auf BTP verlagern"}, {"trigger": "Integrationslandschaft muss auch migrieren", "solution": "SAP Integration Suite", "why": "PI/PO parallel migrieren"}, {"trigger": "Mehrere Systeme (Dev/QA/Prod)", "solution": "SAP Cloud ALM", "why": "Lifecycle-Management"}, {"trigger": "Analytics noch auf BW", "solution": "SAP BW Bridge", "why": "BW parallel zum ERP migrieren"}]}, "refs": {"en": [{"industry": "Discrete Manufacturing", "country": "Germany", "outcome": "3-system landscape (Dev/QA/Prod) migrated to Private Edition. Basis team from 8 FTE to 3, remainder on innovation."}, {"industry": "Pharmaceuticals", "country": "Switzerland", "outcome": "GxP-validated S/4HANA on Private Edition. Data residency in Switzerland. Audit compliance maintained."}, {"industry": "Energy", "country": "Austria", "outcome": "IS-U environment on Private Edition. 35% infrastructure cost reduction. Zero unplanned downtime in 18 months."}], "de": [{"industry": "Diskrete Fertigung", "country": "Deutschland", "outcome": "3-System-Landschaft migriert. Basis von 8 auf 3 FTE, Rest auf Innovation."}, {"industry": "Pharma", "country": "Schweiz", "outcome": "GxP-validiertes S/4HANA auf PE. Datenresidenz Schweiz. Audit-Compliance erhalten."}, {"industry": "Energie", "country": "Oesterreich", "outcome": "IS-U auf PE. 35% Infrastruktur-Reduktion. Null ungeplante Ausfaelle in 18 Monaten."}]}, "roi": {"en": ["30-40% reduction in infrastructure and operations cost", "70-80% less effort for technical upgrades (SAP-managed)", "99.7% availability SLA with financial penalties", "50% reduction in basis/operations FTE required", "Zero unplanned downtime target with DR included"], "de": ["30-40% Infrastruktur- und Ops-Kosten-Reduktion", "70-80% weniger Upgrade-Aufwand (SAP-managed)", "99,7% Verfuegbarkeits-SLA mit Poenalen", "50% weniger Basis-FTE benoetigt", "Null ungeplante Ausfaelle mit DR inklusive"]}, "meeComp": {"en": [{"competitor": "Third-party hosters (T-Systems, Atos, Rackspace)", "strength": "Established relationships, bundled with other infra services", "counter": "SAP PE: deeper SAP expertise, guaranteed SLAs, included in RISE bundle, roadmap alignment. Hosters just run infra, SAP optimizes the application."}, {"competitor": "Self-managed on hyperscaler (AWS/Azure)", "strength": "Maximum control, existing cloud skills", "counter": "DIY means you own patching, DR, optimization. PE provides same hyperscaler + SAP operations expertise. Compare your ops cost honestly."}, {"competitor": "Oracle Exadata Cloud@Customer", "strength": "On-prem feel with cloud economics for Oracle workloads", "counter": "PE: S/4HANA native optimization, SAP application expertise, BTP integration. Exadata only solves DB hosting."}], "de": [{"competitor": "Drittanbieter-Hoster (T-Systems, Atos)", "strength": "Bestehende Beziehungen, Bundle mit Infra", "counter": "SAP PE: tiefere SAP-Expertise, garantierte SLAs, RISE-Bundle."}, {"competitor": "Selbst auf Hyperscaler (AWS/Azure)", "strength": "Maximale Kontrolle", "counter": "DIY = eigenes Patching, DR. PE bietet Hyperscaler + SAP-Ops."}, {"competitor": "Oracle Exadata Cloud@Customer", "strength": "On-Prem-Gefuehl mit Cloud", "counter": "PE: S/4HANA-optimiert, BTP-Integration."}]}}, {"name": "S/4HANA Cloud Public Edition", "sub": {"en": "Full SaaS - Standard Processes, Automatic Innovation, Zero Upgrades", "de": "Volles SaaS - Standardprozesse, Automatische Innovation, Null Upgrades"}, "elev": {"en": "S/4HANA Cloud Public Edition is SAP's full SaaS ERP - multi-tenant, automatically updated every quarter, running on SAP's pre-configured best-practice processes. This is the core technology behind GROW with SAP. It is designed for companies ready to embrace standard processes and gain the benefits of continuous innovation without any upgrade effort. Every quarter, new AI capabilities, automation features, and functional enhancements are delivered automatically. Extensions happen side-by-side on BTP, keeping the core clean and always upgradeable. The right choice when speed, simplicity, and perpetual innovation matter more than custom process control.", "de": "S/4HANA Cloud Public Edition ist SAPs volles SaaS-ERP - Multi-Tenant, automatisch quartalsweise aktualisiert, auf vorkonfigurierten Best-Practice-Prozessen. Die Kern-Technologie hinter GROW with SAP. Fuer Unternehmen bereit Standardprozesse zu uebernehmen und kontinuierliche Innovation ohne Upgrade-Aufwand zu gewinnen. Jedes Quartal neue KI-Faehigkeiten, Automatisierung und funktionale Erweiterungen automatisch geliefert. Erweiterungen Side-by-Side auf BTP, Core bleibt sauber und upgrade-faehig."}, "pain": {"en": ["Tired of endless upgrade projects that take months and millions - want a system that updates itself", "Need to standardize processes across multiple entities or countries - consistency is more valuable than customization", "Want embedded AI and automation but current system cannot deliver it without major version upgrades", "IT costs growing every year for maintenance with no corresponding innovation return", "Business users frustrated with outdated UX - want modern, intuitive interfaces like consumer applications", "Need real-time analytics embedded in processes - not separate BI tools requiring data extraction and manual reporting"], "de": ["Muede von endlosen Upgrade-Projekten die Monate und Millionen kosten - System das sich selbst aktualisiert", "Prozesse ueber Entities/Laender standardisieren - Konsistenz wertvoller als Anpassung", "Eingebettete KI und Automatisierung aber aktuelles System kann es nicht ohne Major-Upgrades", "IT-Kosten steigen jaehrlich fuer Wartung ohne Innovationsertrag", "Business-User frustriert mit veraltetem UX - wollen moderne intuitive Oberflaechen", "Echtzeit-Analytics in Prozessen - nicht separate BI-Tools mit Datenextraktion"]}, "questions": {"en": [{"t": "Readiness", "q": "How ready is your organization to adopt standard processes? What is the executive appetite for changing how things work vs. keeping them exactly as they are?"}, {"t": "Innovation hunger", "q": "Which specific capabilities would change your business if they appeared automatically every quarter - AI-driven forecasting, automated matching, intelligent recommendations?"}, {"t": "Upgrade fatigue", "q": "How much did your last major upgrade cost in time and money? How old is your current version?"}, {"t": "Multi-entity", "q": "Do you have multiple legal entities or countries that need a standardized approach? How inconsistent are processes across locations today?"}, {"t": "Extension needs", "q": "Are there any processes that absolutely must work differently than an industry standard? Can you describe what makes them unique?"}, {"t": "User experience", "q": "How much time do your business users lose on workarounds because the system is unintuitive or outdated?"}], "de": [{"t": "Bereitschaft", "q": "Wie bereit ist die Organisation Standardprozesse zu uebernehmen? Executive-Appetit fuer Veraenderung?"}, {"t": "Innovation", "q": "Welche Faehigkeiten wuerden Ihr Geschaeft veraendern wenn sie quartalsweise automatisch kaemen?"}, {"t": "Upgrade-Muedigkeit", "q": "Was kostete das letzte Upgrade an Zeit und Geld? Wie alt ist die aktuelle Version?"}, {"t": "Multi-Entity", "q": "Mehrere Entitaeten/Laender mit Standardisierungsbedarf? Wie inkonsistent sind Prozesse?"}, {"t": "Erweiterungen", "q": "Prozesse die unbedingt anders als Branchenstandard funktionieren muessen? Was macht sie einzigartig?"}, {"t": "User Experience", "q": "Wie viel Zeit verlieren Business-User durch Workarounds wegen unintuitivem/veralteten System?"}]}, "diff": {"en": ["Quarterly automatic innovation: new features, AI capabilities, and process improvements every quarter without any upgrade project or effort from your side", "True cloud-native architecture: multi-tenant with instant scalability, no infrastructure concerns, always on the latest release", "Embedded AI (Joule): intelligent recommendations, automated journal entries, predictive analytics built directly into business processes - not a separate add-on", "Clean core by design: all extensions on BTP side-by-side, your core stays perpetually upgradeable. Never accumulate technical debt again", "Pre-configured best practices based on thousands of implementations: you start with proven processes, not blank configuration", "Fiori UX with role-based apps: modern, intuitive interface that business users actually want to use"], "de": ["Quartalsweise automatische Innovation ohne Upgrade-Projekte", "Cloud-nativ: Multi-Tenant, sofortige Skalierung, keine Infrastruktur-Sorgen", "Eingebettete KI (Joule): intelligente Empfehlungen, automatisierte Buchungen, Predictive Analytics direkt in Prozessen", "Clean Core by Design: Extensions auf BTP, Core bleibt dauerhaft upgrade-faehig", "Vorkonfigurierte Best Practices aus tausenden Implementierungen", "Fiori UX mit rollenbasierten Apps: modern, intuitiv, nutzerfreundlich"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you something: how much does your organization spend every year just keeping ERP current - upgrades, patches, regression testing? And what does it get in return for that spend?"}, {"p": "Pain", "l": "The reality for most companies on older releases is that they pay increasing maintenance fees but get zero innovation return. Meanwhile, their competitors on modern cloud ERP are getting new AI capabilities automatically every 90 days."}, {"p": "Vision", "l": "What if your ERP updated itself every quarter with new capabilities - AI-driven automation, predictive analytics, improved UX - and your team spent zero effort on upgrades? That is Public Edition: always current, always innovating, always clean."}, {"p": "Proof", "l": "[Reference customer] stopped spending EUR X annually on upgrades. Instead, they get quarterly innovation automatically. Their finance team uses AI-assisted journal entry matching that saved them 2 days per month-end close."}, {"p": "Next Step", "l": "Let us run a fit-to-standard assessment: we map your top 10 processes against SAP standard and show you exactly where the fit is perfect, where configuration bridges the gap, and where a small BTP extension would be needed. Typically 2-3 days."}], "de": [{"p": "Eroeffnung", "l": "Wie viel gibt Ihre Organisation jaehrlich nur fuers Aktuellhalten des ERP aus - Upgrades, Patches, Regressionstests? Und was bekommt sie dafuer zurueck?"}, {"p": "Schmerz", "l": "Realitaet fuer die meisten auf alten Releases: steigende Wartungsgebuehren ohne Innovationsertrag. Wettbewerber auf modernem Cloud-ERP bekommen alle 90 Tage neue KI-Faehigkeiten automatisch."}, {"p": "Vision", "l": "Was wenn Ihr ERP sich quartalsweise selbst aktualisiert - KI-Automatisierung, Predictive Analytics, besseres UX - und Null Upgrade-Aufwand? Public Edition: immer aktuell, immer innovierend, immer sauber."}, {"p": "Beweis", "l": "[Referenzkunde] spart EUR X jaehrlich an Upgrades. Quartalsinnovation automatisch. Finance nutzt KI-Buchungsvorschlaege die 2 Tage pro Abschluss sparen."}, {"p": "Naechster Schritt", "l": "Fit-to-Standard-Assessment: Top-10-Prozesse gegen SAP-Standard abbilden. Zeigt genau wo Fit perfekt ist, wo Konfiguration reicht, wo BTP-Extension noetig. 2-3 Tage."}]}, "comp": {"en": [{"v": "Workday (Finance)", "d": "Workday Finance is limited to financial management. S/4HANA Public Edition covers full ERP: finance, procurement, manufacturing, supply chain, sales in one system. No integration gaps between modules."}, {"v": "Oracle Fusion Cloud", "d": "Both are full SaaS ERP. SAP differentiates with deeper industry processes, stronger manufacturing/supply chain, embedded Business Network, and 50+ years of enterprise process depth. Oracle requires more customization for complex scenarios."}, {"v": "Private Edition", "d": "If you genuinely cannot adopt standard processes due to regulatory or competitive differentiation reasons - Private Edition is better. But if you can standardize, Public Edition delivers faster innovation and lower TCO."}], "de": [{"v": "Workday (Finance)", "d": "Workday auf Finanzmanagement begrenzt. S/4HANA Public deckt volles ERP ab: Finance, Einkauf, Fertigung, SC, Vertrieb in einem."}, {"v": "Oracle Fusion Cloud", "d": "Beide volles SaaS-ERP. SAP differenziert mit tieferen Branchenprozessen, staerker in Fertigung/SC, Business Network, 50+ Jahre Prozesstiefe."}, {"v": "Private Edition", "d": "Wenn Standard genuinely nicht geht wegen Regulatorik/Differenzierung - Private Edition besser. Wenn standardisierbar - Public ist schneller und guenstiger."}]}, "dont": {"en": ["Never promise unlimited customization - Public Edition is standard-first with BTP extensions for gaps, not a custom development platform", "Do not oversell as 'works for everyone' - companies with heavy industry solutions or thousands of custom objects need Private Edition", "Avoid comparing on feature-by-feature against on-premise - the value is the continuous innovation model, not a point-in-time feature list", "Do not dismiss extension complexity - some BTP extensions require real development effort. Be honest about what goes beyond configuration"], "de": ["Nie unbegrenzte Anpassung versprechen - Public ist Standard-first mit BTP-Extensions", "Nicht als 'passt fuer alle' ueberverkaufen - schwere Branchenloesungen brauchen Private Edition", "Feature-by-Feature-Vergleich mit On-Premise vermeiden - Wert liegt im kontinuierlichen Innovationsmodell", "Extension-Komplexitaet nicht abtun - manche BTP-Extensions brauchen echte Entwicklung"]}, "qual": {"en": ["Organization ready and willing to adopt standard processes - executive buy-in for fit-to-standard approach", "No heavy industry solutions (IS-U, IS-Oil) or massive custom code footprint that cannot be moved to BTP", "Desire for zero-upgrade operations and continuous automatic innovation", "Multi-entity organizations wanting consistency across countries/business units", "Companies frustrated with stale, outdated ERP that never gets new capabilities", "Greenfield deployments where there is no legacy to preserve"], "de": ["Organisation bereit Standardprozesse zu uebernehmen - Executive Buy-in", "Keine schweren Branchenloesungen oder massiver Custom Code", "Wunsch nach Null-Upgrade-Betrieb und kontinuierlicher Innovation", "Multi-Entity mit Konsistenzwunsch ueber Laender", "Unternehmen frustriert von veraltetem ERP ohne neue Faehigkeiten", "Greenfield ohne Legacy"]}, "indDiff": {"en": [{"i": "Retail & Consumer Products", "p": "High-volume transactions, seasonal peaks, need for real-time inventory and demand sensing. Speed to market for new processes critical.", "f": "Auto-scaling handles peak seasons. Quarterly updates bring latest demand sensing and inventory optimization AI. Standard retail processes proven across thousands of implementations."}, {"i": "Technology & SaaS Companies", "p": "Fast-growing, cloud-first culture, subscription revenue models, need agile finance and billing. Cannot justify legacy ERP operational overhead.", "f": "Modern cloud-native ERP matching the company's own cloud philosophy. Subscription billing support, project accounting for R&D, real-time revenue recognition. Zero operational overhead."}], "de": [{"i": "Handel & Konsumgueter", "p": "Hohes Transaktionsvolumen, saisonale Spitzen, Echtzeit-Bestand und Demand Sensing. Time-to-Market fuer neue Prozesse kritisch.", "f": "Auto-Scaling fuer Spitzen. Quartals-Updates mit neuester KI fuer Demand Sensing und Bestandsoptimierung."}, {"i": "Technologie & SaaS", "p": "Schnellwachsend, Cloud-first-Kultur, Abo-Modelle, agile Finance. Legacy-ERP-Betrieb nicht rechtfertigbar.", "f": "Cloud-natives ERP passend zur eigenen Philosophie. Abo-Billing, Projekt-Accounting, Echtzeit-Revenue-Recognition. Null operativer Overhead."}]}, "inds": ["Retail", "Consumer Products", "Technology", "Professional Services", "Wholesale Distribution", "Midmarket", "Fast-growth companies", "Subsidiaries"], "obj": {"en": [{"o": "Public cloud means we share infrastructure with others", "r": "Multi-tenant architecture with strict data isolation. SOC2, ISO27001 certified. Your data is encrypted and separated. Same model as Salesforce, Workday - industry standard."}, {"o": "Quarterly updates will disrupt our operations", "r": "Updates are backward-compatible. Extensibility framework ensures your configurations survive. You get a sandbox to test 4 weeks before production. Companies report <1 day effort per update."}, {"o": "We cannot customize anything", "r": "Key User Extensibility covers 80% of needs: custom fields, logic, UIs. BTP side-by-side handles the remaining 20%. What specific customization concerns you?"}, {"o": "Our industry is too specialized", "r": "Public Edition has industry-specific best practices built in. If truly specialized, Private Edition exists. But let us first check what standard covers - often more than expected."}, {"o": "We need on-premise for regulatory reasons", "r": "Public Edition runs in EU data centers (Germany available). Most regulations require data residency, not physical hardware ownership. Let us validate your specific requirements."}], "de": [{"o": "Public Cloud heisst geteilte Infrastruktur", "r": "Strikte Datenisolierung, SOC2/ISO27001. Wie Salesforce, Workday - Industriestandard."}, {"o": "Quartalsweise Updates stoeren Betrieb", "r": "Rueckwaertskompatibel. Sandbox 4 Wochen vorher. <1 Tag Aufwand pro Update."}, {"o": "Keine Anpassungen moeglich", "r": "Key-User-Extensibility fuer 80%. BTP fuer restliche 20%."}, {"o": "Branche zu spezialisiert", "r": "Branchenspezifische Best Practices enthalten. Erst pruefen was Standard abdeckt."}, {"o": "On-Premise aus regulatorischen Gruenden", "r": "EU-Rechenzentren (Deutschland). Regulierung fordert meist Datenresidenz, nicht eigene Hardware."}]}, "persona": {"en": [{"role": "CFO", "msg": "Lowest TCO, predictable per-user cost, always-current functionality, no upgrade projects", "prio": "Primary"}, {"role": "CIO", "msg": "Zero maintenance burden, automatic innovation, modern architecture, API-first", "prio": "Primary"}, {"role": "Business Process Owner", "msg": "Best-practice processes, quarterly new features, self-service configuration", "prio": "Champion"}, {"role": "IT Manager", "msg": "No infrastructure, no patching, no upgrades - focus on business enablement", "prio": "Technical"}], "de": [{"role": "CFO", "msg": "Niedrigster TCO, vorhersagbar pro User, keine Upgrade-Projekte", "prio": "Primaer"}, {"role": "CIO", "msg": "Null Wartung, automatische Innovation, API-first", "prio": "Primaer"}, {"role": "Prozesseigner", "msg": "Best Practices, quartalsweise neue Features, Self-Service", "prio": "Champion"}, {"role": "IT-Manager", "msg": "Keine Infrastruktur, kein Patching - Business Enablement", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Subscription (annual, per-user)", "metric": "Full-Use Users + Self-Service Users", "range": "Similar to GROW pricing. Full users ~100-180 EUR/user/month depending on volume.", "includes": "License, infrastructure, quarterly updates, support, BTP starter credits"}, "de": {"model": "Subskription (jaehrlich, pro Nutzer)", "metric": "Full-Use + Self-Service Users", "range": "Full Users ~100-180 EUR/User/Monat nach Volumen", "includes": "Lizenz, Infrastruktur, quartalsweise Updates, Support, BTP-Credits"}}, "crossSell": {"en": [{"trigger": "Growing company will eventually need more", "solution": "Clear path to Private Edition", "why": "Start public, grow to private when complexity requires it"}, {"trigger": "Need expense management", "solution": "SAP Concur", "why": "Cloud-native T&E integrated with Public Edition finance"}, {"trigger": "Hiring and HR processes needed", "solution": "SAP SuccessFactors", "why": "End-to-end hire-to-retire alongside cloud ERP"}, {"trigger": "Want embedded planning", "solution": "SAP Analytics Cloud", "why": "Planning and analytics natively integrated"}], "de": [{"trigger": "Wachsende Firma braucht mehr", "solution": "Pfad zu Private Edition", "why": "Public starten, Private bei Komplexitaet"}, {"trigger": "Reisekosten noetig", "solution": "SAP Concur", "why": "Cloud-T&E mit Public Edition Finance"}, {"trigger": "HR-Prozesse noetig", "solution": "SAP SuccessFactors", "why": "Hire-to-Retire neben Cloud-ERP"}, {"trigger": "Planung gewuenscht", "solution": "SAP Analytics Cloud", "why": "Nativ integriert"}]}, "refs": {"en": [{"industry": "Professional Services", "country": "Germany", "outcome": "200-user deployment in 12 weeks. Finance + procurement + project management. Zero IT infrastructure."}, {"industry": "Wholesale Distribution", "country": "Poland", "outcome": "Public Edition for 3 distribution entities. Quarterly updates adopted with <4 hours effort each."}, {"industry": "Technology Company", "country": "Austria", "outcome": "Scale-up from 50 to 300 users in 18 months. No re-implementation needed. Per-user model scaled linearly."}], "de": [{"industry": "Professional Services", "country": "Deutschland", "outcome": "200 User in 12 Wochen. Finance + Procurement + PM. Null Infrastruktur."}, {"industry": "Grosshandel", "country": "Polen", "outcome": "3 Einheiten. Quartalsweise Updates mit <4 Stunden Aufwand."}, {"industry": "Technologieunternehmen", "country": "Oesterreich", "outcome": "Skalierung von 50 auf 300 User in 18 Monaten ohne Re-Implementierung."}]}, "roi": {"en": ["60-80% lower TCO vs. on-premise deployment over 5 years", "Zero upgrade project cost (automatic quarterly updates)", "8-16 weeks implementation vs. 12-18 months traditional", "100% infrastructure cost eliminated", "Quarterly access to new innovations without additional project"], "de": ["60-80% niedrigerer TCO vs. On-Premise ueber 5 Jahre", "Null Upgrade-Projektkosten (automatisch quartalsweise)", "8-16 Wochen vs. 12-18 Monate traditionell", "100% Infrastrukturkosten eliminiert", "Quartalsweise Innovationen ohne Zusatzprojekt"]}, "meeComp": {"en": [{"competitor": "Microsoft Dynamics 365 Finance & SCM", "strength": "Tight Office 365 integration, familiar UX for business users", "counter": "Public Edition: deeper financial processes, real S/4HANA underneath with path to enterprise scale. D365 lacks manufacturing depth."}, {"competitor": "Oracle NetSuite", "strength": "Long cloud-native track record, good mid-market finance", "counter": "Public Edition: SAP industry content, global localization (70+ countries), path to Private Edition."}, {"competitor": "Workday (Finance)", "strength": "Modern UX, HR+Finance bundle", "counter": "Public Edition: full ERP (not just finance), supply chain, manufacturing, procurement integrated."}], "de": [{"competitor": "Microsoft Dynamics 365", "strength": "Office-Integration, bekannte UX", "counter": "Public Edition: tiefere Finanzprozesse, Pfad zu Enterprise."}, {"competitor": "Oracle NetSuite", "strength": "Lang Cloud-nativ, gutes Mid-Market Finance", "counter": "SAP-Branchencontent, 70+ Laender, Pfad zu Private."}, {"competitor": "Workday Finance", "strength": "Moderne UX, HR+Finance Bundle", "counter": "Public Edition: volles ERP, Supply Chain, Fertigung."}]}}], "Supply Chain": [{"name": "SAP Integrated Business Planning (IBP)", "sub": {"en": "Real-Time Supply Chain Planning - Demand, Supply, Inventory, S&OP in One Platform", "de": "Echtzeit-Supply-Chain-Planung - Demand, Supply, Inventory, S&OP auf einer Plattform"}, "elev": {"en": "SAP IBP is a cloud-native planning platform that unifies demand planning, supply planning, inventory optimization, sales & operations planning (S&OP), and response & supply into a single real-time environment. It replaces fragmented planning tools and spreadsheet-driven processes with machine-learning-powered forecasting, scenario simulation, and collaborative planning across the entire supply chain. Built on SAP HANA Cloud, it processes massive datasets in real-time, enabling planners to model disruptions, test alternatives, and make decisions in minutes rather than days. For organizations with complex multi-echelon supply chains, IBP is the strategic planning brain that connects demand signals to supply reality.", "de": "SAP IBP ist eine cloud-native Planungsplattform die Demand Planning, Supply Planning, Bestandsoptimierung, S&OP und Response & Supply in einer Echtzeit-Umgebung vereint. Ersetzt fragmentierte Planungstools und Spreadsheet-Prozesse durch ML-gestuetzte Prognosen, Szenariosimulation und kollaborative Planung ueber die gesamte Supply Chain. Auf SAP HANA Cloud gebaut, verarbeitet es massive Datenmengen in Echtzeit - Planer koennen Disruptionen modellieren und in Minuten statt Tagen entscheiden."}, "pain": {"en": ["Demand forecasting accuracy below 70% - constantly over-producing or stock-outing because the models are too simple or based on outdated assumptions", "S&OP process is a monthly PowerPoint exercise with no real-time data connection - decisions made on 3-week-old information", "Planning still heavily dependent on Excel: key person risk, no audit trail, no scenario comparison, impossible to scale", "Cannot sense and respond to disruptions fast enough - by the time plans are adjusted, the impact has already materialized", "Inventory tied up across the network is too high (working capital problem) but service levels are still suffering - the classic paradox", "Multiple disconnected planning tools across demand, supply, and production - no single integrated planning view", "Supply planning cannot see real-time demand changes - batch updates mean plans are always slightly wrong", "New product introduction planning is guesswork - no way to model cannibalization, ramp curves, or substitution effects"], "de": ["Demand-Forecast-Genauigkeit unter 70% - staendig Ueberproduktion oder Fehlbestaende", "S&OP-Prozess ist monatliche PowerPoint ohne Echtzeit-Datenanbindung - Entscheidungen auf 3 Wochen alten Daten", "Planung stark Excel-abhaengig: Personenrisiko, kein Audit Trail, keine Szenarienvergleiche, nicht skalierbar", "Disruptions nicht schnell genug erkennen/reagieren - Auswirkungen materialisieren bevor Plaene angepasst", "Zu viel Bestand im Netzwerk (Working Capital) bei gleichzeitig leidenden Service Levels", "Mehrere getrennte Planungstools ohne integrierte Sicht", "Supply Planning sieht Demand-Aenderungen nicht in Echtzeit", "NPI-Planung ist Ratespiel - keine Modellierung von Kannibalisierung oder Ramp-Kurven"]}, "questions": {"en": [{"t": "Forecast accuracy", "q": "What is your current demand forecast accuracy (MAPE or bias)? And how much does that cost you in excess inventory or lost sales?"}, {"t": "Planning process", "q": "Walk me through your S&OP process today. How often do you meet, who is in the room, what data do they look at, and how long does it take to reach consensus?"}, {"t": "Tool landscape", "q": "How many different tools or spreadsheets are involved in your planning process today? Is demand planning disconnected from supply planning and production scheduling?"}, {"t": "Disruption response", "q": "When a major disruption hits - a supplier failure, a demand spike, a logistics bottleneck - how long does it take your organization to model the impact and adjust plans?"}, {"t": "Inventory challenge", "q": "What is your current inventory days of supply? Is leadership pressuring you to reduce working capital while maintaining or improving service levels?"}, {"t": "Scenario planning", "q": "Can you currently run what-if scenarios - like 'what happens if this supplier goes down' or 'what if demand grows 20% in Q4' - and get answers in real-time?"}, {"t": "Planning horizon", "q": "What planning horizons matter most - short-term (weeks), tactical (months), or strategic (12-36 months)? Where are the biggest gaps?"}, {"t": "Data freshness", "q": "How current is the data your planners work with? Real-time, daily batch, or worse?"}], "de": [{"t": "Forecast-Genauigkeit", "q": "Aktuelle Demand-Forecast-Genauigkeit (MAPE/Bias)? Und was kostet das an Ueberbestand oder entgangenen Umsaetzen?"}, {"t": "Planungsprozess", "q": "Beschreiben Sie Ihren S&OP-Prozess: Wie oft, wer im Raum, welche Daten, wie lange bis Konsens?"}, {"t": "Tool-Landschaft", "q": "Wie viele Tools/Spreadsheets im Planungsprozess? Demand von Supply von Produktion getrennt?"}, {"t": "Disruption-Reaktion", "q": "Bei Disruption (Lieferantenausfall, Demand-Spike, Logistik-Engpass) - wie lange bis Impact modelliert und Plaene angepasst?"}, {"t": "Bestandsherausforderung", "q": "Aktuelle Bestandsreichweite? Druck Working Capital zu senken bei gleichbleibenden Service Levels?"}, {"t": "Szenarien", "q": "Koennen Sie Was-Wenn-Szenarien in Echtzeit durchspielen?"}, {"t": "Planungshorizont", "q": "Welche Horizonte am wichtigsten - kurzfristig (Wochen), taktisch (Monate) oder strategisch (12-36 Monate)?"}, {"t": "Datenaktualitaet", "q": "Wie aktuell sind die Daten Ihrer Planer? Echtzeit, Tages-Batch, oder schlechter?"}]}, "diff": {"en": ["Unified platform: demand, supply, inventory, S&OP, and response in one environment - no data latency between planning domains", "Machine learning forecasting: automatically detects patterns, seasonality, trend changes. Learns from actuals and continuously improves without manual model tuning", "Real-time scenario simulation: model disruptions, test alternatives, compare outcomes side-by-side in seconds, not days", "Excel-native interface: planners work in familiar Excel environment connected live to IBP backend - no retraining required", "Multi-echelon inventory optimization: mathematically optimizes safety stock across all network levels simultaneously, balancing cost and service", "SAP integration: native connection to S/4HANA, ECC, Ariba, TM - plans based on actual execution data, not copies", "Demand sensing: short-term forecast correction using recent actuals and external signals - dramatically improves near-term accuracy"], "de": ["Einheitliche Plattform: Demand, Supply, Inventory, S&OP, Response in einer Umgebung ohne Datenlatenz", "ML-Forecasting: erkennt automatisch Muster, Saisonalitaet, Trendaenderungen. Lernt aus Actuals und verbessert sich", "Echtzeit-Szenariosimulation: Disruptionen modellieren, Alternativen testen, Ergebnisse in Sekunden vergleichen", "Excel-native Interface: Planer arbeiten in gewohntem Excel verbunden mit IBP-Backend", "Multi-Echelon-Bestandsoptimierung: mathematisch optimierte Safety Stocks ueber alle Netzwerkebenen", "SAP-Integration: native Verbindung zu S/4HANA, ECC, Ariba, TM - Plaene auf echten Ausfuehrungsdaten", "Demand Sensing: kurzfristige Forecast-Korrektur mit aktuellen Actuals und externen Signalen"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you this: if you could improve your forecast accuracy by even 5-10 percentage points, what would that be worth in reduced excess inventory and fewer stock-outs? Most companies in your industry tell me it is millions per year."}, {"p": "Pain", "l": "What I consistently see is that planning teams are drowning in spreadsheets, running last month's data through manual models, and by the time they have a plan, reality has already moved. Meanwhile, every disruption turns into a fire drill because there is no way to quickly model the impact."}, {"p": "Vision", "l": "Imagine your planning team has one platform where demand, supply, and inventory data converge in real-time. They can run 10 disruption scenarios before lunch. ML improves forecasts automatically. And S&OP becomes a data-driven decision meeting instead of a political negotiation over stale numbers."}, {"p": "Proof", "l": "[Reference customer] improved forecast accuracy from 65% to 82%, reduced safety stock by 15% while improving service levels by 3 points. Their S&OP cycle went from 3 weeks to 4 days. Planners now spend time on exceptions, not data wrangling."}, {"p": "Next Step", "l": "The most impactful starting point is a planning maturity assessment. We evaluate your current planning capabilities across the five IBP modules and identify where the biggest value sits - usually demand sensing or inventory optimization generates quick wins within 3-6 months."}], "de": [{"p": "Eroeffnung", "l": "Wenn Sie Forecast-Genauigkeit um 5-10 Prozentpunkte verbessern koennten - was waere das wert an weniger Ueberbestand und weniger Fehlbestaenden? Die meisten sagen: Millionen pro Jahr."}, {"p": "Schmerz", "l": "Planungsteams ertrinken in Spreadsheets, nutzen letzte Monatsdaten in manuellen Modellen, und wenn der Plan steht hat sich die Realitaet laengst bewegt. Jede Disruption wird zur Feuerwehruebung."}, {"p": "Vision", "l": "Stellen Sie sich vor: Eine Plattform wo Demand, Supply und Bestandsdaten in Echtzeit zusammenlaufen. 10 Szenarien vor dem Mittag. ML verbessert Forecasts automatisch. S&OP wird datengetriebene Entscheidung statt politische Verhandlung."}, {"p": "Beweis", "l": "[Referenzkunde] verbesserte Forecast von 65% auf 82%, senkte Safety Stock um 15% bei 3 Punkten besserem Service Level. S&OP-Zyklus von 3 Wochen auf 4 Tage."}, {"p": "Naechster Schritt", "l": "Wirkungsvollster Start: Planning Maturity Assessment. Bewertung der Planungsfaehigkeiten ueber alle 5 IBP-Module - identifiziert wo der groesste Wert liegt. Typisch Demand Sensing oder Inventory Optimization fuer Quick Wins in 3-6 Monaten."}]}, "comp": {"en": [{"v": "Kinaxis RapidResponse", "d": "Kinaxis is strong in concurrent planning and what-if scenarios. IBP differentiates with native SAP integration (zero-latency to execution), built-in ML forecasting, and unified platform covering demand through S&OP. Kinaxis requires separate integration layer and is weaker on demand planning side."}, {"v": "o9 Solutions", "d": "o9 is a newer entrant with strong AI messaging. IBP has proven scalability at enterprise scale (think billions of planning records), deeper SAP ecosystem integration, and a larger implementation partner network. o9 requires significant configuration and lacks native ERP connectivity."}, {"v": "Blue Yonder (JDA)", "d": "Blue Yonder is established in retail/CPG demand planning. IBP is stronger in manufacturing, multi-echelon optimization, and provides seamless integration with SAP execution systems. Blue Yonder requires middleware for SAP connectivity."}, {"v": "Spreadsheets / Legacy APO", "d": "APO is end-of-maintenance. Spreadsheets cannot scale, have key person risk, no audit trail, no scenario simulation. IBP delivers everything APO did plus cloud scalability, ML, and a modern UX."}], "de": [{"v": "Kinaxis RapidResponse", "d": "Kinaxis stark in Concurrent Planning. IBP differenziert mit nativer SAP-Integration, eingebautem ML-Forecasting und einheitlicher Plattform. Kinaxis braucht separate Integration."}, {"v": "o9 Solutions", "d": "o9 neuer mit starkem KI-Marketing. IBP hat bewiesene Enterprise-Skalierung, tiefere SAP-Integration und groesseres Partner-Netzwerk."}, {"v": "Blue Yonder", "d": "Blue Yonder etabliert in Retail/CPG Demand. IBP staerker in Fertigung, Multi-Echelon und nahtloser SAP-Integration."}, {"v": "Spreadsheets / Legacy APO", "d": "APO End-of-Maintenance. Spreadsheets skalieren nicht, kein Audit Trail, keine Szenarien. IBP liefert alles was APO konnte plus Cloud, ML und modernes UX."}]}, "dont": {"en": ["Do not over-promise ML accuracy out of the box - ML models need 2-3 cycles of learning. Initial value comes from process improvement and scenario capability", "Never position as 'rip and replace everything' - IBP can be deployed module by module. Start with the biggest pain (usually demand or inventory)", "Avoid technical jargon overload - planners care about outcomes (accuracy, speed, inventory reduction), not architecture", "Do not underestimate change management - the tool is powerful but planners need to trust it. Budget for adoption and training", "Never claim it eliminates the need for planners - it augments them. Planners shift from data wrangling to decision-making"], "de": ["ML-Genauigkeit nicht ueberversprechen - Modelle brauchen 2-3 Lernzyklen. Initialer Wert aus Prozessverbesserung", "Nicht als 'alles ersetzen' positionieren - Modul fuer Modul moeglich. Mit groesstem Schmerz starten", "Technischen Jargon vermeiden - Planer interessiert Ergebnis, nicht Architektur", "Change Management nicht unterschaetzen - Tool ist maechtig aber Planer muessen vertrauen", "Nie behaupten es ersetzt Planer - es unterstuetzt sie. Shift von Datenarbeit zu Entscheidungen"]}, "qual": {"en": ["Complex multi-echelon supply chain with 50+ locations/SKUs in the thousands", "Current forecast accuracy below 75% with significant cost of error (excess inventory or stock-outs exceeding 1-2M annually)", "S&OP process exists but is ineffective, spreadsheet-driven, or takes too long", "Legacy APO customer facing end-of-maintenance migration requirement", "Running disconnected planning tools across demand, supply, and production", "Executive mandate to reduce inventory (working capital initiative) while maintaining service levels", "Recent supply chain disruptions exposed planning gaps and lack of agility"], "de": ["Komplexe Multi-Echelon-SC mit 50+ Standorten/tausende SKUs", "Forecast-Genauigkeit unter 75% mit signifikanten Fehlerkosten", "S&OP existiert aber ineffektiv, Spreadsheet-getrieben, dauert zu lange", "Legacy-APO-Kunde mit Migrationsbedarf", "Getrennte Planungstools ueber Demand, Supply, Produktion", "Executive-Mandat Working Capital zu senken bei Service Level", "Juengste Disruptionen haben Planungsluecken offengelegt"]}, "indDiff": {"en": [{"i": "Automotive", "p": "Tiered supply chains with JIT/JIS requirements, model-year transitions, semiconductor volatility. Planning must account for supplier capacity constraints across multiple tiers.", "f": "Multi-tier supply visibility, constraint-based planning accounting for supplier capacity, model transition planning with cannibalization modeling. Demand sensing incorporates dealer orders and build-to-order signals."}, {"i": "Consumer Products / CPG", "p": "High SKU count, promotional demand spikes, short shelf life, retail customer concentration. Forecast accuracy directly impacts shelf availability and waste.", "f": "Promotion planning with uplift modeling, demand sensing for short-term accuracy, shelf-life-aware inventory optimization, retailer collaboration integration. ML excels at CPG pattern recognition."}, {"i": "Chemicals", "p": "Batch production with campaign sequencing, co-product/by-product allocation, tank farm constraints. Supply planning must account for reaction times and capacity switching costs.", "f": "Campaign-aware supply planning, co-product allocation optimization, constraint-based scheduling that accounts for tank farms and reaction sequences. Integration with process manufacturing execution."}, {"i": "High Tech / Electronics", "p": "Extreme demand volatility, short product lifecycles, component allocation challenges. New product introduction happens quarterly with rapid ramp/phase-out.", "f": "Lifecycle planning with cannibalization modeling, component allocation optimization across finished goods, rapid NPI ramp curve learning, demand sensing using POS and channel data."}], "de": [{"i": "Automobil", "p": "Mehrstufige Supply Chain mit JIT/JIS, Modellwechsel, Halbleiter-Volatilitaet. Planung muss Lieferantenkapazitaeten ueber Stufen beruecksichtigen.", "f": "Multi-Tier-Sichtbarkeit, Constraint-basierte Planung, Modellwechsel mit Kannibalisierung. Demand Sensing mit Haendler/Build-to-Order-Signalen."}, {"i": "Konsumgueter / CPG", "p": "Hohe SKU-Zahl, Promotions, kurze Haltbarkeit, Retail-Konzentration. Forecast-Genauigkeit bestimmt Regalverfuegbarkeit und Waste.", "f": "Promotionsplanung mit Uplift, Demand Sensing, haltbarkeitsoptimierte Bestaende, Retail-Kollaboration. ML exzellent bei CPG-Muster."}, {"i": "Chemie", "p": "Batchproduktion mit Kampagnensequenzierung, Ko-/Nebenproduktallokation, Tankfarm-Constraints.", "f": "Kampagnen-aware Supply Planning, Ko-Produkt-Optimierung, Constraint-basiertes Scheduling fuer Tankfarmen."}, {"i": "High Tech", "p": "Extreme Volatilitaet, kurze Lebenszyklen, Komponentenallokation. NPI quartalsweise mit schnellem Ramp/Phase-Out.", "f": "Lifecycle-Planung mit Kannibalisierung, Komponentenallokation, schnelles NPI-Ramp-Lernen, Demand Sensing mit POS-Daten."}]}, "inds": ["Automotive", "Consumer Products", "Chemicals", "High Tech", "Life Sciences", "Industrial Manufacturing", "Retail", "Aerospace & Defense"], "obj": {"en": [{"o": "We already have APO - why change?", "r": "APO is end-of-life 2027. IBP provides real-time planning, ML-based demand sensing, and scenario planning APO cannot match. Start transition planning now to avoid forced migration."}, {"o": "IBP is too complex for our planning maturity", "r": "IBP is modular. Start with Demand Planning only, then add S&OP, Response & Supply. Match deployment to your maturity. No need to go big-bang."}, {"o": "Excel is working fine for us", "r": "Excel does not scale: no real-time data, no collaboration, no exception-based planning, no ML forecasts. Ask: how many hours per week does your team spend reconciling spreadsheets?"}, {"o": "Implementation takes too long", "r": "Rapid deployment packages exist for single-module go-live in 12-16 weeks. Start with demand planning, show value fast, then expand."}, {"o": "Our demand is too volatile to forecast", "r": "That is exactly when you need IBP most. Demand sensing uses ML on short-term signals. Scenario planning lets you pre-plan responses. Volatility is the use case, not the exception."}], "de": [{"o": "Wir haben APO - warum wechseln?", "r": "APO End-of-Life 2027. IBP bietet Echtzeit, ML-Demand-Sensing, Szenarien."}, {"o": "IBP zu komplex fuer unsere Planungsreife", "r": "Modular starten: nur Demand Planning, dann S&OP erweitern."}, {"o": "Excel funktioniert fuer uns", "r": "Excel skaliert nicht: keine Echtzeit, keine Kollaboration, kein ML."}, {"o": "Implementierung dauert zu lang", "r": "Rapid Deployment in 12-16 Wochen fuer ein Modul."}, {"o": "Nachfrage zu volatil zum Prognostizieren", "r": "Genau dann braucht man IBP: Demand Sensing, Szenarien, ML."}]}, "persona": {"en": [{"role": "VP Supply Chain / CSO", "msg": "End-to-end visibility, better forecast accuracy, scenario-based decision making, reduce inventory", "prio": "Primary"}, {"role": "Head of Demand Planning", "msg": "ML-based forecasting, exception-based workflow, collaborative planning across markets", "prio": "Primary"}, {"role": "S&OP Leader", "msg": "Cross-functional alignment in one platform, consensus-based planning, what-if scenarios", "prio": "Champion"}, {"role": "CFO", "msg": "Working capital reduction through better inventory, revenue protection via availability", "prio": "Influencer"}, {"role": "CIO", "msg": "Replace APO before end-of-life, cloud-native, reduce integration complexity", "prio": "Technical"}], "de": [{"role": "VP Supply Chain", "msg": "E2E-Sichtbarkeit, bessere Prognosegenauigkeit, Szenarien, Bestandsreduktion", "prio": "Primaer"}, {"role": "Demand Planning Leiter", "msg": "ML-Prognosen, Ausnahme-Workflow, kollaborative Planung", "prio": "Primaer"}, {"role": "S&OP-Leiter", "msg": "Cross-funktionale Abstimmung, Konsensplanung, What-If", "prio": "Champion"}, {"role": "CFO", "msg": "Working-Capital-Reduktion, Umsatzsicherung", "prio": "Beeinflusser"}, {"role": "CIO", "msg": "APO ersetzen vor End-of-Life, Cloud-nativ", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Planning users + data volume (planning objects)", "range": "200K-500K EUR/year mid-market, 500K-2M+ large enterprise (depends on modules)", "includes": "IBP platform, selected modules (Demand, S&OP, Response, Inventory), SAP support"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Planungsuser + Datenvolumen", "range": "200K-500K EUR/Jahr Mittelstand, 500K-2M+ Grossunternehmen", "includes": "IBP-Plattform, Module, Support"}}, "crossSell": {"en": [{"trigger": "Customer also needs supply chain visibility", "solution": "SAP Supply Chain Control Tower", "why": "Real-time execution visibility feeds back into IBP planning"}, {"trigger": "Analytics on planning data needed", "solution": "SAP Analytics Cloud", "why": "SAC natively integrated for planning analytics and executive dashboards"}, {"trigger": "Manufacturing scheduling also needed", "solution": "SAP Digital Manufacturing", "why": "Plan-to-produce integration from IBP to shop floor"}, {"trigger": "Logistics planning alongside demand", "solution": "SAP Transportation Management", "why": "Integrated logistics planning with demand/supply decisions"}], "de": [{"trigger": "Supply-Chain-Sichtbarkeit auch noetig", "solution": "SAP Supply Chain Control Tower", "why": "Echtzeit-Ausfuehrung fuettert IBP-Planung"}, {"trigger": "Analytics auf Planungsdaten", "solution": "SAP Analytics Cloud", "why": "Nativ integriert fuer Planning-Analytics"}, {"trigger": "Fertigungsplanung auch noetig", "solution": "SAP Digital Manufacturing", "why": "Plan-to-Produce-Integration"}, {"trigger": "Logistikplanung neben Demand", "solution": "SAP TM", "why": "Integrierte Logistikplanung"}]}, "refs": {"en": [{"industry": "Consumer Goods", "country": "Germany", "outcome": "Replaced APO with IBP Demand + S&OP. Forecast accuracy improved 22%. Inventory reduced by 15% in first year."}, {"industry": "Automotive", "country": "Czech Republic", "outcome": "IBP Response & Supply for 6 plants. Supply allocation decisions reduced from 3 days to 4 hours."}, {"industry": "Life Sciences", "country": "Switzerland", "outcome": "IBP Demand Planning for 40 markets. ML-based demand sensing reduced forecast error from 38% to 21%."}], "de": [{"industry": "Konsumgueter", "country": "Deutschland", "outcome": "APO durch IBP ersetzt. Prognosegenauigkeit +22%. Bestand -15% im ersten Jahr."}, {"industry": "Automotive", "country": "Tschechien", "outcome": "IBP Response & Supply fuer 6 Werke. Allokation von 3 Tagen auf 4 Stunden."}, {"industry": "Life Sciences", "country": "Schweiz", "outcome": "IBP Demand fuer 40 Maerkte. Forecast Error von 38% auf 21%."}]}, "roi": {"en": ["15-25% improvement in forecast accuracy (ML-based demand sensing)", "10-20% inventory reduction through better planning", "5-10% revenue uplift through improved product availability", "60-80% reduction in planning cycle time (from weeks to days)", "30-40% reduction in excess and obsolete stock"], "de": ["15-25% bessere Prognosegenauigkeit (ML-basiert)", "10-20% Bestandsreduktion", "5-10% Umsatzsteigerung durch Verfuegbarkeit", "60-80% kuerzere Planungszyklen", "30-40% weniger Ueberschuss und Obsoletes"]}, "meeComp": {"en": [{"competitor": "Kinaxis RapidResponse", "strength": "Fast concurrent planning, good UX, strong in complex manufacturing", "counter": "IBP: native S/4HANA integration, broader supply chain suite, SAP data foundation. Kinaxis requires significant integration effort."}, {"competitor": "o9 Solutions", "strength": "AI-first, modern UX, strong marketing in digital planning", "counter": "IBP: proven at scale (500+ enterprise deployments), SAP data backbone, integrated S&OP to execution."}, {"competitor": "Blue Yonder (Panasonic)", "strength": "Deep ML for retail/CPG demand planning", "counter": "IBP: cross-industry, integrated planning-to-execution, no middleware needed with S/4HANA."}], "de": [{"competitor": "Kinaxis RapidResponse", "strength": "Schnelle Planung, gute UX", "counter": "IBP: native S/4HANA-Integration, breitere Suite."}, {"competitor": "o9 Solutions", "strength": "AI-first, modernes UX", "counter": "IBP: proven at scale, SAP-Datenbasis, integriert."}, {"competitor": "Blue Yonder", "strength": "ML fuer Retail/CPG", "counter": "IBP: branchenuebergreifend, integriert ohne Middleware."}]}}, {"name": "SAP Digital Manufacturing", "sub": {"en": "Smart Factory Execution - From Shop Floor to Top Floor in Real-Time", "de": "Smart Factory Execution - Vom Shopfloor zum Topfloor in Echtzeit"}, "elev": {"en": "SAP Digital Manufacturing (DM) is a cloud-based manufacturing execution system that connects shop floor operations to enterprise planning in real-time. It provides digital work instructions, production operator dashboards, quality management integration, IoT-driven machine monitoring, and real-time OEE tracking - all while feeding execution data back to S/4HANA for integrated planning and costing. It replaces legacy MES solutions and paper-based shop floor processes with a modern, scalable, analytics-rich execution platform that gives production managers and operators full visibility and control.", "de": "SAP Digital Manufacturing ist ein cloud-basiertes Manufacturing Execution System das Shopfloor-Operationen in Echtzeit mit Enterprise-Planung verbindet. Digitale Arbeitsanweisungen, Operator-Dashboards, QM-Integration, IoT-Maschinenueberwachung und Echtzeit-OEE - alles bei gleichzeitigem Feedback an S/4HANA fuer integrierte Planung und Kostenrechnung."}, "pain": {"en": ["No real-time visibility into what is actually happening on the shop floor - production status based on shift-end manual reporting or next-day batch uploads", "Paper-based work instructions and quality checklists that cannot adapt, cannot track compliance, and create traceability gaps", "Legacy MES that is expensive to maintain, difficult to scale across plants, and disconnected from ERP planning and costing", "Cannot calculate true production costs in real-time - cost variances discovered days or weeks after production", "Quality issues caught too late in the process - no inline quality gates or automatic containment rules", "OEE measurement is manual or unreliable - no consistent methodology across plants", "Machine data (IoT/sensors) collected but not connected to production context - data lake without actionable insight"], "de": ["Keine Echtzeit-Sicht auf Shopfloor - Status basiert auf Schichtend-Meldungen oder naechster-Tag-Batch", "Papierbasierte Arbeitsanweisungen und QM-Checklisten ohne Adaptierbarkeit, Tracking oder Rueckverfolgbarkeit", "Legacy-MES teuer, schwer skalierbar, getrennt von ERP-Planung und Kostenrechnung", "Echte Produktionskosten nicht in Echtzeit berechenbar - Abweichungen erst Tage spaeter entdeckt", "Qualitaetsprobleme zu spaet erkannt - keine Inline-Quality-Gates oder automatische Sperrregeln", "OEE-Messung manuell oder unzuverlaessig - keine konsistente Methodik ueber Werke", "Maschinendaten gesammelt aber nicht mit Produktionskontext verbunden"]}, "questions": {"en": [{"t": "Visibility gap", "q": "Right now, if I asked your plant manager what is happening on Line 3 at this very moment - production rate, quality yield, actual vs. planned - how quickly could they answer accurately?"}, {"t": "Quality cost", "q": "What does poor quality cost you annually? Think about scrap, rework, customer returns, and containment actions. What percentage could be prevented with earlier detection?"}, {"t": "MES landscape", "q": "What are you using for manufacturing execution today - legacy MES, homegrown systems, spreadsheets, or paper? How many plants, and is it consistent across sites?"}, {"t": "Scale challenge", "q": "If a new plant or production line is added, how long does it take to replicate manufacturing processes and systems? Days, weeks, or months?"}, {"t": "IoT maturity", "q": "Are you collecting machine data today? If so, is it connected to production orders and quality records, or is it in a separate silo?"}, {"t": "Operator experience", "q": "How do operators on the floor get their work instructions and report completions today? Paper, old terminals, or something else?"}, {"t": "ERP integration", "q": "How does production confirmation data get back into SAP today? Manual entry, batch upload, or real-time integration? What is the delay?"}], "de": [{"t": "Sichtbarkeitsluecke", "q": "Wenn ich Ihren Werkleiter frage was jetzt auf Linie 3 passiert - Rate, Qualitaet, Plan vs. Ist - wie schnell kann er genau antworten?"}, {"t": "Qualitaetskosten", "q": "Was kostet schlechte Qualitaet jaehrlich? Ausschuss, Nacharbeit, Retouren, Sperrungen. Was waere mit frueherer Erkennung vermeidbar?"}, {"t": "MES-Landschaft", "q": "Was nutzen Sie fuer Manufacturing Execution - Legacy-MES, Eigenentwicklung, Spreadsheets, Papier? Wie viele Werke, konsistent?"}, {"t": "Skalierung", "q": "Wenn ein neues Werk oder Linie dazukommt - wie lange dauert es Fertigungsprozesse und Systeme zu replizieren?"}, {"t": "IoT-Reife", "q": "Sammeln Sie Maschinendaten? Wenn ja, verbunden mit Fertigungsauftraegen und QM-Saetzen oder separater Silo?"}, {"t": "Operator-Erlebnis", "q": "Wie bekommen Bediener ihre Arbeitsanweisungen und melden Fertigstellungen? Papier, alte Terminals?"}, {"t": "ERP-Integration", "q": "Wie kommen Rueckmeldungen in SAP? Manuell, Batch, Echtzeit? Welche Verzoegerung?"}]}, "diff": {"en": ["Cloud-native MES: deploy to new plants in weeks, not months. No on-premise servers to manage per site", "Real-time ERP integration: production confirmations, material consumption, and quality results flow to S/4HANA continuously - no batch delays", "Digital work instructions: step-by-step operator guidance with multimedia content, adaptive to product variant and operator skill level", "Integrated quality management: inline quality checks, automatic containment rules, SPC charts, and direct connection to SAP QM", "IoT edge integration: connect PLCs, sensors, and machines through SAP Edge services - contextualize machine data with production orders", "OEE analytics: real-time availability, performance, and quality metrics calculated automatically from machine and operator data", "Multi-plant scalability: one platform, standardized execution across all sites while allowing local process variants where needed"], "de": ["Cloud-natives MES: neue Werke in Wochen, nicht Monaten. Keine On-Premise-Server pro Standort", "Echtzeit-ERP-Integration: Rueckmeldungen, Materialverbrauch, QM-Ergebnisse fliessen kontinuierlich in S/4HANA", "Digitale Arbeitsanweisungen: Schritt-fuer-Schritt mit Multimedia, adaptiv nach Variante und Operator-Level", "Integriertes QM: Inline-Checks, automatische Sperrregeln, SPC-Charts, direkte SAP-QM-Verbindung", "IoT-Edge: PLCs, Sensoren, Maschinen verbinden - Maschinendaten mit Fertigungsauftraegen kontextualisieren", "OEE-Analytics: Echtzeit Verfuegbarkeit, Leistung, Qualitaet automatisch berechnet", "Multi-Plant-Skalierbarkeit: eine Plattform, standardisierte Ausfuehrung, lokale Varianten moeglich"]}, "talk": {"en": [{"p": "Open", "l": "When I talk to production leaders, the number one frustration is the gap between what they think is happening on the floor and what is actually happening. That gap costs money every single day - in quality, efficiency, and delayed decisions."}, {"p": "Pain", "l": "Most manufacturers I work with have some combination of paper processes, legacy MES that is expensive and rigid, and a significant delay before production data appears in ERP for costing and planning. That means decisions are always reactive, never proactive."}, {"p": "Vision", "l": "What if every operator had digital, adaptive work instructions on their screen, every machine was feeding performance data into a unified dashboard, quality checks were enforced inline, and all of that flowed into S/4HANA in real-time for accurate costing and responsive planning? That is Digital Manufacturing."}, {"p": "Proof", "l": "[Reference manufacturer] deployed DM across 4 plants in 6 months. They reduced quality escapes by 35%, improved OEE by 8 points, and eliminated a 2-day lag in production reporting to ERP. Their CFO now has accurate production costs the same day."}, {"p": "Next Step", "l": "The best starting point is a pilot on one production line in one plant. We deploy digital work instructions and real-time reporting, connect 2-3 critical machines, and demonstrate the value within 8-12 weeks. Then scale from there."}], "de": [{"p": "Eroeffnung", "l": "Die Nummer-eins-Frustration von Produktionsleitern: die Luecke zwischen dem was sie glauben was passiert und was wirklich passiert. Diese Luecke kostet taeglich Geld."}, {"p": "Schmerz", "l": "Papier, Legacy-MES und signifikante Verzoegerung bevor Produktionsdaten im ERP landen. Entscheidungen immer reaktiv, nie proaktiv."}, {"p": "Vision", "l": "Digitale Arbeitsanweisungen fuer jeden Bediener, jede Maschine liefert Performance-Daten, QM inline erzwungen, alles in Echtzeit in S/4HANA. Das ist Digital Manufacturing."}, {"p": "Beweis", "l": "[Referenz] 4 Werke in 6 Monaten. Qualitaetsprobleme -35%, OEE +8 Punkte, 2-Tage-Reporting-Lag eliminiert."}, {"p": "Naechster Schritt", "l": "Pilot auf einer Linie in einem Werk: digitale Anweisungen, Echtzeit-Reporting, 2-3 Maschinen anbinden. Wert in 8-12 Wochen demonstrieren."}]}, "comp": {"en": [{"v": "Siemens Opcenter (Camstar)", "d": "Siemens is strong in discrete manufacturing MES. SAP DM differentiates with native ERP integration - no middleware, real-time costing and planning feedback. Also cloud-native vs. Siemens' largely on-premise architecture."}, {"v": "Rockwell Plex / DELMIA", "d": "Point solutions with strong shop floor capabilities but poor enterprise integration. SAP DM connects execution to planning, finance, quality, and supply chain natively. One vendor for full stack."}, {"v": "Homegrown MES", "d": "Built for specific needs 10-15 years ago. Now expensive to maintain, impossible to scale to new plants, key-person dependent, no innovation roadmap. DM replaces with standard, scalable, cloud-native platform."}, {"v": "Paper + ERP only", "d": "Many still run production on paper and enter results into ERP manually at shift end. DM digitizes execution, provides real-time traceability, and eliminates the reporting delay that makes planning inaccurate."}], "de": [{"v": "Siemens Opcenter", "d": "Siemens stark in Discrete MES. SAP DM differenziert mit nativer ERP-Integration - kein Middleware, Echtzeit-Costing. Cloud-nativ vs. weitgehend On-Premise."}, {"v": "Rockwell Plex / DELMIA", "d": "Punktloesungen mit guter Shopfloor-Faehigkeit aber schlechter Enterprise-Integration. SAP DM verbindet nativ mit Planung, Finance, QM, SC."}, {"v": "Eigenentwickelte MES", "d": "Vor 10-15 Jahren gebaut, teuer, nicht skalierbar, personenabhaengig, keine Roadmap. DM ersetzt mit Standard-Cloud-Plattform."}, {"v": "Papier + ERP", "d": "Viele fahren Produktion auf Papier mit manueller ERP-Eingabe am Schichtende. DM digitalisiert, gibt Echtzeit-Rueckverfolgbarkeit, eliminiert Reporting-Delay."}]}, "dont": {"en": ["Do not position as 'just another MES' - it is a cloud-native execution platform with native ERP integration. The integration story is the killer differentiator", "Never underestimate the change management effort on the shop floor - operators need training, motivation, and involvement in design", "Do not promise full MES feature parity with 20-year-old specialized systems on day one - focus on the 80/20 and the integration value", "Avoid leading with technology (IoT, cloud, edge) - lead with outcomes: visibility, quality, OEE, real-time costing", "Do not ignore the existing MES vendor relationship - understand the pain with it before proposing replacement"], "de": ["Nicht als 'noch ein MES' positionieren - Cloud-native mit nativer ERP-Integration ist der Differenzierer", "Change Management am Shopfloor nicht unterschaetzen - Bediener brauchen Training und Einbindung", "Nicht volle Feature-Paritaet mit 20-Jahre-altem MES am Tag 1 versprechen - 80/20 und Integrationswert", "Nicht mit Technologie fuehren (IoT, Cloud) - mit Ergebnissen: Sichtbarkeit, Qualitaet, OEE", "Bestehende MES-Vendor-Beziehung nicht ignorieren - Pain verstehen bevor Ersatz vorschlagen"]}, "qual": {"en": ["Existing SAP ERP/S/4HANA customer wanting to close the shop-floor-to-ERP gap", "Legacy MES approaching end-of-life or too expensive/rigid to scale", "Multiple plants with inconsistent execution processes - standardization mandate", "Paper-based shop floor processes creating quality traceability gaps (audit findings)", "IoT investments made but not connected to production context or business value", "Quality cost (scrap, rework, escapes) identified as top-5 operational issue"], "de": ["SAP-ERP-Kunde der Shopfloor-ERP-Luecke schliessen will", "Legacy-MES am Lebensende oder zu teuer/starr zum Skalieren", "Mehrere Werke mit inkonsistenten Prozessen - Standardisierungsmandat", "Papierbasierter Shopfloor mit Rueckverfolgbarkeitsluecken", "IoT-Investitionen ohne Produktionskontext", "Qualitaetskosten als Top-5-Operationsthema identifiziert"]}, "indDiff": {"en": [{"i": "Automotive (OEM & Tier-1)", "p": "Track & trace requirements for every component, error-proofing (poka-yoke), model-mix lines, JIS sequencing, and IATF 16949 audit requirements. Zero-defect targets with full traceability.", "f": "Genealogy tracking at serial/batch level, digital poka-yoke with guided assembly, model-mix support on single lines, traceability reports for IATF audits. Quality gates prevent progression of non-conforming parts."}, {"i": "Pharma / Medical Devices", "p": "Batch record execution (eBR), 21 CFR Part 11 compliance, deviation management, environmental monitoring during production. Manual paper records create compliance risk.", "f": "Electronic batch records with enforced execution sequence, digital signatures (21 CFR Part 11), integrated deviation/CAPA workflow, environmental parameter recording linked to batch context."}, {"i": "Industrial Machinery & Components", "p": "Complex assembly with many variants, long cycle times, engineer-to-order processes. Each unit may be slightly different. Need to track as-built configuration.", "f": "Variant-driven work instructions that adapt to specific order configuration, as-built documentation capture, complex BOM resolution at execution time, operator skill-level matching to task complexity."}], "de": [{"i": "Automobil (OEM & Tier-1)", "p": "Track & Trace fuer jedes Bauteil, Poka-Yoke, Modell-Mix-Linien, JIS-Sequenzierung, IATF 16949.", "f": "Genealogie auf Serien-/Chargen-Ebene, digitales Poka-Yoke, Modell-Mix, Rueckverfolgbarkeitsberichte fuer IATF-Audits."}, {"i": "Pharma / Medizinprodukte", "p": "eBR-Ausfuehrung, 21 CFR Part 11, Abweichungsmanagement, Umgebungsmonitoring. Papierbasierte Aufzeichnungen als Compliance-Risiko.", "f": "Elektronische Chargenprotokoll
