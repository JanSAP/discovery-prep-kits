P-Commerce, Omnichannel. Klaviyo-Limit bei 1M+."}]}}, {"name": "SAP Customer Data Cloud (CIAM)", "sub": {"en": "Customer Identity, Consent & Profile Management - Trust-Based Personalization at Scale", "de": "Kunden-Identity, Consent & Profilmanagement - Vertrauensbasierte Personalisierung"}, "elev": {"en": "SAP Customer Data Cloud (formerly Gigya) provides Customer Identity and Access Management (CIAM), consent and preference management, and unified customer profile capabilities. In an era of GDPR, ePrivacy, and increasing consumer privacy awareness, CDC enables companies to build trust-based relationships: customers control their data and consent, while businesses get richer, compliant profiles for personalization. It handles registration, login (social, passwordless, SSO), progressive profiling, consent capture, preference centers, and unified identity across touchpoints - all while maintaining regulatory compliance automatically.", "de": "SAP Customer Data Cloud bietet Customer Identity and Access Management (CIAM), Consent/Preference Management und einheitliches Kundenprofil. In der GDPR/ePrivacy-Aera ermoeglicht CDC vertrauensbasierte Beziehungen: Kunden kontrollieren Daten und Consent, Unternehmen erhalten reichere compliant Profile fuer Personalisierung."}, "pain": {"en": ["GDPR/privacy compliance is a manual nightmare - consent records inconsistent, no central audit trail, risk of regulatory fines", "Customer registration is a conversion killer: long forms, forced account creation, no social login options - dropping 60%+ of potential registrants", "No unified customer identity: same person has 5 different profiles across websites, apps, and systems - cannot recognize or personalize", "Cannot prove consent compliance when regulators ask - consent was captured somewhere but there is no single system of record", "Marketing data becoming unreliable as cookies die - need first-party data strategy but no infrastructure to capture and manage it", "Login experience poor: password fatigue, no single sign-on across properties, no progressive profiling to enrich data over time", "Preference management does not exist - customers cannot easily control their communication preferences, leading to opt-outs and complaints"], "de": ["GDPR-Compliance manuell - Consent-Records inkonsistent, kein Audit Trail, Bussgeldsrisiko", "Registrierung toetet Conversion: lange Formulare, erzwungene Accounts, kein Social Login", "Keine einheitliche Kunden-Identity: 5 verschiedene Profile ueber Websites/Apps/Systeme", "Consent-Compliance bei Regulierer-Anfrage nicht beweisbar", "Marketing-Daten unzuverlaessig bei Cookie-Tod - braucht First-Party-Strategie ohne Infrastruktur", "Login-Erlebnis schlecht: Passwort-Muedigkeit, kein SSO, kein Progressive Profiling", "Praeferenzmanagement existiert nicht - Kunden koennen Kommunikation nicht steuern"]}, "questions": {"en": [{"t": "Privacy compliance", "q": "How confident are you that you could prove GDPR consent compliance for every customer record if a regulator asked today? Is there a single system of record for consent?"}, {"t": "Registration/login", "q": "What is your current registration conversion rate? And what login methods do you offer - just email/password, or also social login, passwordless, SSO?"}, {"t": "Identity unification", "q": "Can you recognize the same customer across your website, mobile app, in-store, and customer service? Or do they have separate profiles in each channel?"}, {"t": "First-party data", "q": "With third-party cookies disappearing, what is your strategy for building first-party customer data? How do you incentivize customers to share information?"}, {"t": "Personalization foundation", "q": "What data feeds your personalization engine today? And how much richer could it be if you had a complete, consented customer profile?"}, {"t": "Scale", "q": "How many customer identities do you manage? Across how many digital properties (websites, apps, portals)?"}, {"t": "Preference management", "q": "Can customers currently manage their own communication preferences in a self-service center? Or is it all-or-nothing email opt-out?"}], "de": [{"t": "Privacy-Compliance", "q": "Wie sicher koennten Sie GDPR-Consent fuer jeden Datensatz beweisen? Gibt es ein System of Record?"}, {"t": "Registrierung/Login", "q": "Aktuelle Registrierungs-Conversion? Welche Login-Methoden - nur Email/Passwort oder auch Social, Passwordless, SSO?"}, {"t": "Identity-Vereinheitlichung", "q": "Erkennen Sie denselben Kunden ueber Website, App, Store und Service? Oder separate Profile?"}, {"t": "First-Party-Daten", "q": "Strategie fuer First-Party-Daten bei Cookie-Verlust? Wie Anreize zum Datenteilen?"}, {"t": "Personalisierung", "q": "Welche Daten speisen Personalisierung? Wie viel reicher mit vollstaendigem consented Profil?"}, {"t": "Skalierung", "q": "Wie viele Kunden-Identities? Ueber wie viele digitale Properties?"}, {"t": "Praeferenzen", "q": "Koennen Kunden Kommunikations-Praeferenzen selbst steuern? Oder nur Alles-oder-Nichts?"}]}, "diff": {"en": ["Enterprise CIAM scale: handles billions of identities with sub-second response times - built for consumer scale, not employee IAM retrofitted", "Consent-as-a-service: complete consent lifecycle management with version history, regulatory templates (GDPR, CCPA, LGPD), and automatic enforcement across systems", "Social and passwordless login: reduce registration friction with 30+ social identity providers, biometric login, magic links, and progressive profiling", "Unified customer profile: identity resolution across touchpoints creates a single golden record enriched over time through every interaction", "Preference center: self-service customer preference management for channel, frequency, content type, and interests - building trust and reducing opt-outs", "First-party data platform: infrastructure to capture, manage, and activate consented customer data as cookies disappear", "SAP ecosystem integration: feeds enriched, compliant customer profiles directly into Emarsys (marketing), Commerce Cloud (personalization), and Sales/Service Cloud"], "de": ["Enterprise CIAM: Milliarden Identities mit Sub-Sekunden-Antwort - fuer Consumer gebaut", "Consent-as-a-Service: vollstaendiger Lifecycle mit Versionierung, regulatorischen Templates, automatischer Durchsetzung", "Social und Passwordless Login: 30+ Social Providers, Biometrie, Magic Links, Progressive Profiling", "Einheitliches Kundenprofil: Identity Resolution schafft Golden Record ueber alle Touchpoints", "Preference Center: Self-Service fuer Kanal, Frequenz, Content, Interessen", "First-Party-Daten-Plattform: Infrastruktur fuer consented Kundendaten bei Cookie-Verlust", "SAP-Integration: compliant Profile direkt in Emarsys, Commerce, Sales/Service Cloud"]}, "talk": {"en": [{"p": "Open", "l": "Quick question: if a data protection authority called you tomorrow and asked 'prove you have valid consent for how you use this specific customer's data' - could you provide a complete, timestamped audit trail within the hour?"}, {"p": "Pain", "l": "For most organizations, the honest answer is no. Consent was captured inconsistently across different systems, there is no central record, and proving compliance requires manual investigation. Meanwhile, the business wants more personalization, which requires more data, which requires more consent. It is a Catch-22 without the right infrastructure."}, {"p": "Vision", "l": "CDC solves this by being the single system of record for customer identity and consent. Every registration, every consent change, every preference update - captured, versioned, auditable. And because you now have clean, consented data, you can personalize more aggressively AND more compliantly simultaneously."}, {"p": "Proof", "l": "[Reference customer] consolidated 4 separate identity systems into CDC, achieved GDPR audit readiness in 3 months, increased registration conversion by 40% through social login, and grew their marketable database by 60% because customers trusted the preference center enough to opt in."}, {"p": "Next Step", "l": "The right starting point is a consent and identity audit: we assess your current state across digital properties, identify compliance gaps and registration friction, and design the target architecture. This also quantifies the first-party data opportunity as cookies disappear."}], "de": [{"p": "Eroeffnung", "l": "Wenn eine Datenschutzbehoerde morgen 'beweisen Sie Consent fuer diesen Kunden' fragt - koennten Sie innerhalb einer Stunde einen vollstaendigen Audit Trail liefern?"}, {"p": "Schmerz", "l": "Ehrliche Antwort meist nein. Consent inkonsistent, kein zentrales Record. Business will mehr Personalisierung die mehr Daten und Consent braucht. Catch-22 ohne Infrastruktur."}, {"p": "Vision", "l": "CDC als Single System of Record fuer Identity und Consent. Jede Registrierung, jede Consent-Aenderung erfasst und auditierbar. Saubere Daten erlauben aggressivere UND compliante Personalisierung."}, {"p": "Beweis", "l": "[Referenz] 4 Identity-Systeme konsolidiert, GDPR-Audit-Readiness in 3 Monaten, +40% Registrierungs-Conversion, +60% marketable Database durch Vertrauen."}, {"p": "Naechster Schritt", "l": "Consent- und Identity-Audit: aktuellen Zustand bewerten, Compliance-Luecken und Registrierungsreibung identifizieren, Zielarchitektur designen."}]}, "comp": {"en": [{"v": "Okta / Auth0 (Customer Identity)", "d": "Strong in developer-focused CIAM and authentication. CDC differentiates with enterprise consent management, preference centers, unified profile capabilities, and native SAP ecosystem integration for marketing and commerce activation."}, {"v": "OneTrust (Consent)", "d": "OneTrust is a consent/privacy tool focused on cookie banners and preference management. CDC provides CIAM + consent + profile in one platform - not just compliance but identity and personalization infrastructure."}, {"v": "Salesforce CDP / Data Cloud", "d": "Salesforce focuses on data unification for marketing. CDC provides the identity and consent foundation that ensures data is compliant before activation. Different layer: CDC is identity/consent infrastructure, Salesforce CDP is activation."}], "de": [{"v": "Okta / Auth0", "d": "Stark entwicklerfokussiertes CIAM. CDC differenziert mit Consent Management, Preference Centers und SAP-Integration fuer Aktivierung."}, {"v": "OneTrust", "d": "Consent/Privacy-Tool fuer Cookie-Banner. CDC bietet CIAM + Consent + Profil in einer Plattform - nicht nur Compliance sondern Identity-Infrastruktur."}, {"v": "Salesforce CDP", "d": "Fokus auf Datenunifizierung fuer Marketing. CDC liefert Identity- und Consent-Fundament das Compliance sichert vor Aktivierung."}]}, "dont": {"en": ["Do not position as a cookie consent banner tool - CDC is full CIAM + consent + profile infrastructure, not just a compliance checkbox", "Never scare customers with fines alone - also show the positive value: better data, better personalization, better conversion through trust", "Do not ignore existing IAM investments (Okta, Ping) - position CDC as complementary for customer-facing identity, not replacement for employee IAM", "Avoid making this a pure IT/security conversation - involve marketing and digital teams who benefit from richer customer profiles"], "de": ["Nicht als Cookie-Banner-Tool positionieren - CDC ist volle CIAM + Consent + Profil-Infrastruktur", "Nicht nur mit Bussgeldern Angst machen - positiven Wert zeigen: bessere Daten, Personalisierung, Conversion", "Bestehende IAM (Okta, Ping) nicht ignorieren - CDC ergaenzt fuer Kundenidentity", "Nicht nur IT/Security-Gespraech - Marketing und Digital einbeziehen"]}, "qual": {"en": ["GDPR/CCPA compliance concerns without a system of record for consent", "Multiple digital properties (websites, apps) with inconsistent identity management", "Low registration conversion due to friction (long forms, no social login)", "First-party data strategy needed as third-party cookies deprecate", "Cannot recognize customers across channels (fragmented identities)", "Personalization ambition blocked by lack of clean, consented customer data", "Privacy regulatory audit upcoming or recent compliance findings"], "de": ["GDPR/CCPA-Bedenken ohne Consent System of Record", "Mehrere Digital Properties mit inkonsistenter Identity", "Niedrige Registrierungs-Conversion wegen Reibung", "First-Party-Daten-Strategie bei Cookie-Verlust noetig", "Kunden ueber Kanaele nicht erkennbar", "Personalisierung blockiert durch fehlende saubere Daten", "Regulatorischer Audit anstehend oder Findings"]}, "indDiff": {"en": [{"i": "Retail / E-Commerce", "p": "Millions of customer identities, high registration abandonment, need for personalization across web/app/store while maintaining consent compliance.", "f": "Frictionless registration with social login, progressive profiling during shopping journey, consent-based personalization enabling product recommendations, unified identity across online and offline."}, {"i": "Media & Publishing", "p": "Subscription and paywall management, content personalization, advertising consent for GDPR-compliant ad targeting, and reader engagement tracking.", "f": "Identity-linked subscription management, granular advertising consent management, content preference profiling, and reader engagement scoring for personalization."}], "de": [{"i": "Handel / E-Commerce", "p": "Millionen Identities, hoher Registrierungsabbruch, Personalisierung ueber Web/App/Store bei Consent-Compliance.", "f": "Reibungslose Registrierung, Progressive Profiling, Consent-basierte Empfehlungen, einheitliche Identity online/offline."}, {"i": "Medien & Publishing", "p": "Abo/Paywall, Content-Personalisierung, Werbe-Consent fuer GDPR-compliant Targeting, Leser-Engagement.", "f": "Identity-verknuepfte Abos, granularer Werbe-Consent, Content-Praeferenz-Profiling, Engagement-Scoring."}]}, "inds": ["Retail", "E-commerce", "Media", "Telecommunications", "Travel", "Financial Services", "Healthcare", "Automotive (D2C)"], "obj": {"en": [{"o": "We use Auth0 / Okta for identity", "r": "Auth0/Okta handle authentication. SAP CDC handles the full customer identity lifecycle: registration, progressive profiling, consent management, preference centers, AND authentication. CIAM is broader than IAM."}, {"o": "GDPR is handled by our legal team", "r": "Legal defines policy. CDC ENFORCES it technically: consent capture at every touchpoint, auditable consent trail, automated data deletion, preference centers. Legal needs technical enforcement."}, {"o": "Our customer data is in our CRM already", "r": "CRM stores relationships. CDC unifies IDENTITY across all touchpoints: web, app, store, IoT. One person = one profile regardless of channel. Feeds CRM with richer data."}, {"o": "We do not have enough digital customer touchpoints", "r": "If you have a website + app + any digital contact, you have the foundation. CDC captures progressive data from every interaction. Start now, value grows with every new touchpoint."}, {"o": "Implementation is complex - privacy is hard", "r": "CDC provides pre-built consent screens, registration flows, and preference centers. Configuration, not development. Typical deployment in 8-12 weeks for core CIAM."}], "de": [{"o": "Nutzen Auth0/Okta", "r": "Auth0/Okta: Authentifizierung. SAP CDC: voller Identitaets-Lifecycle inkl. Consent, Profiling, Praeferenzen."}, {"o": "DSGVO ist bei Legal", "r": "Legal definiert. CDC SETZT technisch um: Consent-Erfassung, Audit-Trail, automatische Loeschung."}, {"o": "Kundendaten im CRM", "r": "CRM = Beziehungen. CDC = Identitaet ueber alle Touchpoints vereint."}, {"o": "Nicht genug digitale Touchpoints", "r": "Website + App + Kontakt reicht. Progressive Erfassung. Wert waechst mit Touchpoints."}, {"o": "Implementierung komplex", "r": "Pre-built Consent-Screens, Registrierung, Praeferenzen. Konfiguration in 8-12 Wochen."}]}, "persona": {"en": [{"role": "CDO / Head of Digital", "msg": "Unified customer identity, progressive profiling, 360-degree customer view foundation", "prio": "Primary"}, {"role": "DPO / Privacy Officer", "msg": "GDPR/ePrivacy technical enforcement, consent management, audit trail, data subject requests", "prio": "Primary"}, {"role": "CMO", "msg": "First-party data strategy, richer customer profiles for personalization, consent-based marketing", "prio": "Champion"}, {"role": "CIO / CISO", "msg": "Secure authentication, SSO, fraud prevention, reduce identity sprawl", "prio": "Technical"}], "de": [{"role": "CDO / Digital-Leiter", "msg": "Einheitliche Identitaet, Profiling, 360-Grad-Basis", "prio": "Primaer"}, {"role": "DPO / Datenschutz", "msg": "DSGVO-Enforcement, Consent, Audit Trail, Loeschanfragen", "prio": "Primaer"}, {"role": "CMO", "msg": "First-Party-Daten, reichere Profile, Consent-basiertes Marketing", "prio": "Champion"}, {"role": "CIO / CISO", "msg": "Sichere Authentifizierung, SSO, Fraud, Identitaetskonsolidierung", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Customer identities managed + authentications/month", "range": "Starting 50K-100K EUR/year. Enterprise 200K-600K (depends on identity volume)", "includes": "CIAM (registration, login, SSO), consent management, preference center, progressive profiling, identity resolution"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Verwaltete Identitaeten + Authentifizierungen", "range": "Ab 50K-100K EUR/Jahr. Enterprise 200K-600K", "includes": "CIAM, Consent Management, Praeferenzen, Profiling, Identity Resolution"}}, "crossSell": {"en": [{"trigger": "Marketing personalization on unified profiles", "solution": "SAP Emarsys", "why": "CDC profiles feed Emarsys for true 1:1 personalization with consent"}, {"trigger": "Commerce experience needs login", "solution": "SAP Commerce Cloud", "why": "Unified registration/login across commerce + service + marketing"}, {"trigger": "Customer analytics needed", "solution": "SAP Datasphere", "why": "Customer identity data as foundation for analytics and AI"}, {"trigger": "Sales needs customer context", "solution": "SAP Sales Cloud", "why": "Enriched customer profiles inform sales conversations"}], "de": [{"trigger": "Marketing-Personalisierung", "solution": "SAP Emarsys", "why": "CDC-Profile fuer 1:1 mit Consent"}, {"trigger": "Commerce braucht Login", "solution": "SAP Commerce Cloud", "why": "Unified Registration ueber Commerce + Service"}, {"trigger": "Kundenanalytics", "solution": "SAP Datasphere", "why": "Identitaetsdaten als Analytics-Basis"}, {"trigger": "Vertrieb braucht Kontext", "solution": "SAP Sales Cloud", "why": "Angereicherte Profile informieren Vertrieb"}]}, "refs": {"en": [{"industry": "Media/Publishing", "country": "Germany", "outcome": "CDC for 8M subscriber identities. Registration conversion +35% (progressive profiling). GDPR audit passed with zero findings."}, {"industry": "Retail", "country": "Austria", "outcome": "Unified identity across 200 stores + online. Single sign-on. Identified customers went from 20% to 65% of transactions."}, {"industry": "Telecommunications", "country": "Poland", "outcome": "CDC for 4M customers. Consent preference center. Marketing opt-in rate improved 40% through transparent choices. Zero GDPR complaints."}], "de": [{"industry": "Medien/Verlag", "country": "Deutschland", "outcome": "8M Identitaeten. Registrierungs-Conversion +35%. DSGVO-Audit: null Befunde."}, {"industry": "Retail", "country": "Oesterreich", "outcome": "Einheitliche Identitaet ueber 200 Filialen + Online. Identifizierte Kunden von 20% auf 65%."}, {"industry": "Telko", "country": "Polen", "outcome": "4M Kunden. Praeferenz-Center. Opt-in +40%. Null DSGVO-Beschwerden."}]}, "roi": {"en": ["30-50% increase in registration/login conversion (progressive profiling)", "100% GDPR audit readiness (automated consent trail)", "40-60% increase in identified customer interactions", "25-35% improvement in marketing opt-in rates", "50-70% reduction in data subject request processing time"], "de": ["30-50% mehr Registrierungs-Conversion", "100% DSGVO-Audit-Bereitschaft", "40-60% mehr identifizierte Interaktionen", "25-35% bessere Marketing-Opt-in-Rate", "50-70% schnellere Betroffenenanfragen"]}, "meeComp": {"en": [{"competitor": "Auth0 (Okta)", "strength": "Developer-friendly, excellent docs, strong in B2B IAM, free tier", "counter": "SAP CDC: CIAM scope (consent, profiling, preferences - not just auth). Deeper customer lifecycle. Auth0 is authentication, CDC is customer identity platform."}, {"competitor": "OneTrust (Consent/Privacy)", "strength": "Market leader in consent management, cookie banners, privacy compliance", "counter": "SAP CDC: consent + identity + profiling unified. OneTrust only does consent - needs separate IAM. CDC gives one platform for the full customer identity lifecycle."}, {"competitor": "Salesforce Customer 360 Identity", "strength": "Part of Salesforce ecosystem, LoginID, social login", "counter": "SAP CDC: stronger consent/privacy (EU origin, GDPR-native), deeper progressive profiling, not dependent on Salesforce ecosystem."}], "de": [{"competitor": "Auth0 (Okta)", "strength": "Developer-freundlich, Docs, B2B IAM", "counter": "SAP CDC: CIAM-Scope (Consent, Profiling, Praeferenzen). Auth0 = nur Auth."}, {"competitor": "OneTrust", "strength": "Marktfuehrer Consent, Cookie Banner", "counter": "SAP CDC: Consent + Identitaet + Profiling vereint. OneTrust nur Consent."}, {"competitor": "Salesforce Identity", "strength": "SF-Oekosystem, Social Login", "counter": "SAP CDC: staerker in Consent/Privacy (EU-Herkunft, DSGVO-nativ)."}]}}], "Human Resources": [{"name": "SAP SuccessFactors", "sub": {"en": "Complete Cloud HCM Suite - Hire-to-Retire, Global, Intelligent, Experience-Driven", "de": "Vollstaendige Cloud-HCM-Suite - Hire-to-Retire, Global, Intelligent, Erlebnisorientiert"}, "elev": {"en": "SAP SuccessFactors is a comprehensive cloud Human Capital Management (HCM) suite covering the entire employee lifecycle: recruiting, onboarding, learning, performance management, compensation, succession planning, workforce analytics, core HR, payroll, and time management. It serves over 200 million users in 200+ countries, supporting local regulations, languages, and labor laws at enterprise scale. For organizations still running on-premise HR (including SAP HCM/ECC HR), SuccessFactors is the cloud transformation path that modernizes HR from an administrative function into a strategic business partner with data-driven people decisions.", "de": "SAP SuccessFactors ist eine umfassende Cloud-HCM-Suite fuer den gesamten Mitarbeiter-Lifecycle: Recruiting, Onboarding, Learning, Performance, Compensation, Succession, Analytics, Core HR, Payroll und Zeitwirtschaft. Ueber 200 Millionen Nutzer in 200+ Laendern. Fuer Organisationen auf On-Premise-HR ist SuccessFactors der Cloud-Transformationspfad der HR zum strategischen Business Partner macht."}, "pain": {"en": ["On-premise HR system (SAP HCM or other) reaching end of maintenance or end of innovation - no new capabilities, only break-fix", "Cannot attract top talent: recruiting process is slow, career sites look outdated, candidate experience is poor compared to modern competitors", "No workforce analytics: cannot answer basic questions like 'what is our attrition risk?' or 'where are our skills gaps?' - decisions made on gut feel", "Employee experience terrible: clunky self-service, multiple HR systems to navigate, different tools for different tasks - nothing feels modern", "Performance management is an annual checkbox exercise that neither managers nor employees find valuable", "Compliance risk growing: operating in multiple countries with changing labor laws, cannot keep up with localization requirements manually", "Cannot plan workforce strategically: no scenario modeling for headcount, no succession pipeline visibility, no skills-based planning"], "de": ["On-Premise-HR am End-of-Maintenance/Innovation - keine neuen Faehigkeiten", "Top-Talent nicht gewinnen: langsames Recruiting, veraltete Karriereseiten, schlechte Candidate Experience", "Keine Workforce Analytics: Grundfragen wie Fluktruationsrisiko oder Skills-Gaps nicht beantwortbar", "Employee Experience schlecht: umstaendlicher Self-Service, mehrere HR-Systeme", "Performance Management jaehrliche Checkbox-Uebung ohne Wert", "Compliance-Risiko in mehreren Laendern mit aendernden Arbeitsgesetzen", "Keine strategische Workforce-Planung: kein Szenario-Modelling, keine Nachfolge-Sicht"]}, "questions": {"en": [{"t": "Current HR system", "q": "What is your current HR system landscape? On-premise SAP HCM, another vendor, or a patchwork of solutions? How old is the core system?"}, {"t": "Employee experience", "q": "How would your employees rate their HR self-service experience? Can they complete common HR tasks (leave, expenses, learning) easily on mobile?"}, {"t": "Talent challenges", "q": "What are your top 3 people challenges right now? Talent acquisition, retention, skills gaps, succession, engagement, or something else?"}, {"t": "Analytics capability", "q": "Can your CHRO today see real-time dashboards on headcount, attrition risk, diversity, compensation equity, and skills distribution - or does that require manual compilation?"}, {"t": "Global complexity", "q": "How many countries do you operate in? Are HR processes and policies localized correctly, or is compliance a manual and risky effort?"}, {"t": "Recruiting speed", "q": "What is your average time-to-hire for critical roles? Where are the bottlenecks - sourcing, screening, interviewing, or offer management?"}, {"t": "Strategic workforce planning", "q": "Can you model scenarios like 'what happens if we grow 20% in region X' or 'what if we acquire company Y' - in terms of headcount, skills, and cost?"}, {"t": "Integration need", "q": "How important is it that HR data connects to finance (for headcount cost), operations (for workforce planning), and payroll seamlessly?"}], "de": [{"t": "Aktuelles HR-System", "q": "Aktuelle HR-Systemlandschaft? On-Premise, anderer Anbieter, Flickwerk? Alter des Kernsystems?"}, {"t": "Employee Experience", "q": "Wie wuerden Mitarbeiter ihren HR-Self-Service bewerten? Mobile HR-Aufgaben einfach erledigbar?"}, {"t": "Talent-Herausforderungen", "q": "Top-3-Personalthemen: Akquise, Retention, Skills, Nachfolge, Engagement?"}, {"t": "Analytics", "q": "Kann CHRO Echtzeit-Dashboards zu Headcount, Fluktuationsrisiko, Diversitaet, Compensation sehen?"}, {"t": "Globale Komplexitaet", "q": "Wie viele Laender? HR-Prozesse korrekt lokalisiert oder manuelle Compliance?"}, {"t": "Recruiting-Geschwindigkeit", "q": "Durchschnittliche Time-to-Hire fuer kritische Rollen? Engpaesse?"}, {"t": "Strategische Planung", "q": "Szenarien modellierbar wie '20% Wachstum in Region X' bezueglich Headcount, Skills, Kosten?"}, {"t": "Integration", "q": "Wie wichtig Verbindung HR-Finance (Headcount-Kosten) und HR-Operations (Workforce Planning)?"}]}, "diff": {"en": ["Complete suite: all HR processes from one vendor in one cloud - recruiting, core HR, payroll, learning, performance, compensation, succession. No integration gaps between modules", "200+ country localization: labor law compliance, local formats, statutory reporting, and language support maintained by SAP. Not your problem to keep up with regulatory changes", "Embedded AI: skills inference, attrition prediction, candidate matching, learning recommendations, and compensation benchmarking powered by ML across the anonymized customer base", "Modern employee experience: consumer-grade UX, mobile-first, conversational HR interactions through Joule (AI copilot), and self-service for 90% of common HR tasks", "Workforce analytics: people analytics with benchmarking, predictive models, and story-telling dashboards. Answer strategic questions, not just report headcount", "Integration with S/4HANA Finance: real-time headcount cost visibility in financial planning. HR data and financial data in one picture for business decisions", "SAP HCM migration path: proven migration methodology and tools for moving from on-premise SAP HCM to cloud SuccessFactors - not starting over but transforming"], "de": ["Vollstaendige Suite: alle HR-Prozesse eines Anbieters in einer Cloud ohne Integrationsluecken", "200+ Laender lokalisiert: Arbeitsrecht, Formate, Meldungen, Sprachen von SAP gepflegt", "Eingebettete KI: Skills-Inferenz, Fluktuationsvorhersage, Kandidaten-Matching, Lernempfehlungen", "Moderne Employee Experience: Consumer-UX, Mobile-first, Joule-Interaktion, Self-Service fuer 90% Aufgaben", "Workforce Analytics: People Analytics mit Benchmarks, Vorhersagen und Story-Telling", "S/4HANA-Finance-Integration: Echtzeit-Headcount-Kosten in Finanzplanung", "SAP-HCM-Migrationspfad: bewiesene Methodik und Tools - transformieren statt neu beginnen"]}, "talk": {"en": [{"p": "Open", "l": "Here is what keeps most CHROs up at night: they know their people are the company's most valuable asset, but they are making people decisions with less data and intelligence than they use to manage their supply chain or finance. That gap is where SuccessFactors lives."}, {"p": "Pain", "l": "The root cause is usually a legacy HR system that was built for administration, not for strategy. It tracks headcount but cannot predict attrition. It stores performance ratings but cannot identify future leaders. It manages payroll but cannot tell you where your skills gaps are. Administration, not intelligence."}, {"p": "Vision", "l": "What if HR had the same intelligence that finance and supply chain have? Real-time dashboards showing attrition risk by team, AI recommending development paths, recruiting powered by skills matching not keyword search, and workforce planning connected to business strategy?"}, {"p": "Proof", "l": "[Reference customer] migrated from on-premise SAP HCM to SuccessFactors across 45 countries in 18 months. Time-to-hire dropped 40%, employee self-service adoption reached 85%, and for the first time their CHRO had a real-time skills gap dashboard that drove targeted L&D investment."}, {"p": "Next Step", "l": "The starting point depends on your biggest pain: if it is talent acquisition, we start with recruiting. If it is strategic planning, we start with analytics. For end-of-maintenance migration, we do a cloud readiness assessment. In all cases, 4-6 weeks to a concrete roadmap."}], "de": [{"p": "Eroeffnung", "l": "Was CHROs nachts wachhaelt: Menschen sind wertvollstes Asset aber People-Entscheidungen mit weniger Daten als Supply Chain oder Finance. Diese Luecke ist wo SuccessFactors lebt."}, {"p": "Schmerz", "l": "Legacy-HR-System fuer Administration gebaut, nicht Strategie. Trackt Headcount aber sagt nicht Fluktuation vorher. Verwaltet Payroll aber zeigt keine Skills-Gaps."}, {"p": "Vision", "l": "HR mit derselben Intelligenz wie Finance und SC? Echtzeit-Dashboards fuer Fluktuationsrisiko, KI-Entwicklungspfade, Skills-Matching-Recruiting, Workforce-Planning verbunden mit Strategie."}, {"p": "Beweis", "l": "[Referenz] Migration von SAP HCM zu SF ueber 45 Laender in 18 Monaten. Time-to-Hire -40%, Self-Service 85%, erstmals Skills-Gap-Dashboard."}, {"p": "Naechster Schritt", "l": "Startpunkt je nach Pain: Recruiting, Analytics oder Migration Cloud Readiness. In allen Faellen 4-6 Wochen bis konkrete Roadmap."}]}, "comp": {"en": [{"v": "Workday HCM", "d": "Workday is the primary competitor and strong in UX and unified data model. SuccessFactors differentiates with broader country coverage (200+ vs. ~50 deep), native SAP Finance integration, larger existing customer base for migration, and pre-built localization content."}, {"v": "Oracle HCM Cloud", "d": "Oracle bundles HCM into their cloud ERP play. SuccessFactors is the dedicated HCM specialist with deeper talent management, broader localization, and the dominant position in SAP-centric enterprises."}, {"v": "On-premise SAP HCM", "d": "End-of-maintenance approaching. SuccessFactors provides the natural migration path with proven tools and methodology - preserving process investments while gaining cloud innovation."}, {"v": "Best-of-breed patchwork (Greenhouse + Culture Amp + Cornerstone + etc.)", "d": "Multiple point solutions create integration nightmares and no unified employee experience. SuccessFactors provides one platform, one data model, one vendor - simplicity at scale."}], "de": [{"v": "Workday HCM", "d": "Hauptwettbewerber, stark in UX. SuccessFactors differenziert mit breiterer Laenderabdeckung (200+), nativer SAP-Finance-Integration und Migration."}, {"v": "Oracle HCM Cloud", "d": "Oracle buendelt in ERP. SuccessFactors ist dedizierter HCM-Spezialist mit tieferem Talent Management und breiterer Lokalisierung."}, {"v": "On-Premise SAP HCM", "d": "End-of-Maintenance. SuccessFactors ist natuerlicher Migrationspfad mit bewiesenen Tools."}, {"v": "Best-of-Breed-Flickwerk", "d": "Mehrere Punktloesungen ohne einheitliche Experience. SuccessFactors: eine Plattform, ein Datenmodell."}]}, "dont": {"en": ["Do not try to out-UX Workday in a demo-off - win on localization breadth, SAP Finance integration, and existing SAP customer momentum", "Never dismiss existing HR system investments - acknowledge what works and propose a phased transformation journey", "Do not underestimate change management - HR transformation is as much about process and culture as technology", "Avoid leading with technology - lead with CHRO-level outcomes: talent attraction, retention, strategic planning, compliance", "Do not promise all modules at once - start with highest-value modules (often core HR or recruiting) and expand"], "de": ["Nicht versuchen Workday im Demo-UX zu schlagen - auf Lokalisierung, SAP-Finance-Integration und Bestandskunden gewinnen", "Bestehende HR-Investitionen nicht abtun - anerkennen und phasenweise Transformation vorschlagen", "Change Management nicht unterschaetzen - HR-Transformation ist Prozess und Kultur", "Nicht Technologie fuehren - CHRO-Outcomes: Talent, Retention, Strategie, Compliance", "Nicht alle Module auf einmal versprechen - mit hoechstem Wert starten und erweitern"]}, "qual": {"en": ["On-premise SAP HCM customer facing end-of-maintenance (2027)", "Operating in 10+ countries needing localized, compliant HR processes", "CHRO mandate for strategic workforce analytics and AI-driven people decisions", "Poor employee experience with current HR tools - low self-service adoption", "Talent acquisition challenges: high time-to-hire, losing candidates to faster competitors", "Best-of-breed HR tool sprawl creating integration issues and inconsistent experience", "Workforce planning disconnected from financial planning and business strategy"], "de": ["SAP-HCM-On-Premise vor End-of-Maintenance (2027)", "10+ Laender mit Lokalisierungsbedarf", "CHRO-Mandat fuer strategische Analytics und KI-People-Entscheidungen", "Schlechte Employee Experience mit aktuellen Tools", "Talent-Akquisitions-Herausforderungen", "HR-Tool-Wildwuchs", "Workforce-Planning getrennt von Finanzplanung"]}, "indDiff": {"en": [{"i": "Manufacturing", "p": "Shift workers, hourly employees, union requirements, safety training compliance, and workforce planning tied to production schedules.", "f": "Time and attendance management for complex shift patterns, safety/compliance training tracking, union rule configuration, and workforce scheduling integrated with production planning."}, {"i": "Retail / Hospitality", "p": "High-volume seasonal hiring, high turnover, distributed workforce across hundreds of locations, and scheduling complexity.", "f": "High-volume recruiting workflows, rapid onboarding, workforce scheduling optimization, distributed manager self-service, and retention analytics for high-turnover roles."}], "de": [{"i": "Fertigung", "p": "Schichtarbeiter, Stundenlohn, Tarifanforderungen, Sicherheitstraining, Workforce-Planning an Produktion gebunden.", "f": "Zeitwirtschaft fuer Schichtmuster, Sicherheits-Training-Tracking, Tarifkonfiguration, Planung mit , Transform, and Continuously Improve Your Processes", "de": "Business Process Intelligence - Prozesse Sehen, Verstehen, Transformieren und Kontinuierlich Verbessern"}, "elev": {"en": "SAP Signavio is a comprehensive business process transformation suite that combines process mining (discovering actual process flows from system logs), process modeling (designing target processes), process intelligence (benchmarking against best practices), and continuous improvement (monitoring live process KPIs). For organizations undergoing ERP transformation (especially RISE with SAP), Signavio is the critical tool that tells you how your processes actually run today, where the inefficiencies hide, what best practice looks like, and whether the transformation is delivering results. Without it, you are transforming blind.", "de": "SAP Signavio ist eine Business-Process-Transformation-Suite die Process Mining (tatsaechliche Prozessflows aus Systemlogs), Process Modelling (Zielprozesse designen), Process Intelligence (Best-Practice-Benchmarking) und Continuous Improvement (Live-KPIs) kombiniert. Fuer ERP-Transformation sagt Signavio wie Prozesse heute laufen, wo Ineffizienzen sind, was Best Practice ist und ob Transformation Ergebnisse liefert."}, "pain": {"en": ["About to start S/4HANA transformation but have no reliable picture of how processes actually run today - documentation is outdated or non-existent", "Cannot quantify process inefficiencies: everyone knows processes are broken but cannot prove where, how much it costs, or what to fix first", "Process documentation exists but sits on a shelf - static Visio diagrams that do not reflect reality and are never updated", "No way to benchmark processes against industry standards - do not know whether 'our way' is good or terrible compared to peers", "After go-live, no mechanism to continuously monitor whether processes perform as designed or drift back to old habits", "Change management struggles because people do not believe the current process is broken - no evidence-based argumentation", "Multiple process improvement initiatives (Lean, Six Sigma, digital transformation) with no shared process repository or common understanding"], "de": ["S/4HANA-Transformation steht an aber kein zuverlaessiges Bild wie Prozesse heute laufen", "Prozessineffizienzen nicht quantifizierbar - alle wissen es ist kaputt aber nicht wo und was es kostet", "Prozessdokumentation existiert aber liegt im Regal - statische Visio-Diagramme die Realitaet nicht reflektieren", "Kein Benchmarking gegen Branchenstandards", "Nach Go-Live kein Mechanismus fuer kontinuierliches Monitoring ob Prozesse wie designed laufen", "Change Management kaempft weil Leute nicht glauben dass aktueller Prozess schlecht ist - kein Beweis", "Mehrere Verbesserungsinitiativen ohne geteiltes Repository oder gemeinsames Verstaendnis"]}, "questions": {"en": [{"t": "Process transparency", "q": "If I asked you right now to show me exactly how your order-to-cash process runs end-to-end - all variants, all exceptions, with actual cycle times - could you do it?"}, {"t": "ERP transformation", "q": "Are you planning or currently executing an S/4HANA or cloud ERP transformation? How are you deciding which processes to redesign versus lift-and-shift?"}, {"t": "Inefficiency cost", "q": "Can you quantify the cost of process inefficiency? For example, do you know how much late payments cost you, or what percentage of purchase orders require rework?"}, {"t": "Benchmarking", "q": "Do you know how your processes compare to industry best practice? For example, is your order-to-cash cycle time fast or slow relative to peers?"}, {"t": "Process mining", "q": "Have you done process mining before? If so, what did you discover - and were you able to act on it?"}, {"t": "Continuous improvement", "q": "After a process change is implemented, how do you know it is working? Is there ongoing monitoring, or do you check once and move on?"}, {"t": "Transformation scope", "q": "In your transformation program, how are you deciding which processes to prioritize? Data-driven prioritization or political/intuition-driven?"}], "de": [{"t": "Prozesstransparenz", "q": "Koennten Sie mir jetzt zeigen wie Order-to-Cash End-to-End laeuft - alle Varianten, Ausnahmen, Zykluszeiten?"}, {"t": "ERP-Transformation", "q": "S/4HANA-/Cloud-ERP-Transformation geplant oder laufend? Wie entscheiden Sie Redesign vs. Lift-and-Shift?"}, {"t": "Ineffizienzkosten", "q": "Prozessineffizienz-Kosten quantifizierbar? Z.B. was kosten spaete Zahlungen oder PO-Nacharbeit?"}, {"t": "Benchmarking", "q": "Wissen Sie wie Ihre Prozesse gegen Best Practice stehen? O2C-Zykluszeit schnell oder langsam vs. Peers?"}, {"t": "Process Mining", "q": "Schon Process Mining gemacht? Was entdeckt und konnten Sie darauf handeln?"}, {"t": "Kontinuierliche Verbesserung", "q": "Nach Prozessaenderung - woher wissen Sie dass es funktioniert? Laufendes Monitoring?"}, {"t": "Priorisierung", "q": "In der Transformation - wie werden Prozesse priorisiert? Datengetrieben oder Intuition?"}]}, "diff": {"en": ["Process mining from SAP data: automatically discover actual process flows directly from SAP ECC/S/4HANA event logs - see reality, not documentation", "Benchmarking intelligence: compare your process KPIs against anonymized data from thousands of SAP customers - know exactly where you stand versus peers", "Pre-built process models: SAP Best Practice content for 100+ business processes that serve as transformation target - not starting from scratch", "End-to-end suite: mining (discover) + modeling (design) + intelligence (benchmark) + monitoring (sustain) in one platform - complete process lifecycle", "ERP transformation accelerator: specifically designed to support RISE with SAP and S/4HANA journeys - from current-state analysis to target-state validation", "Continuous process monitoring: live dashboards tracking process KPIs post-go-live, alerting when processes deviate from target design", "Collaborative: business users can view, comment on, and contribute to process documentation - not just a BPM specialist tool"], "de": ["Process Mining aus SAP-Daten: tatsaechliche Flows direkt aus SAP-Event-Logs entdecken", "Benchmarking: eigene KPIs gegen anonymisierte Daten tausender SAP-Kunden vergleichen", "Vorgefertigte Prozessmodelle: SAP Best Practice fuer 100+ Prozesse als Transformationsziel", "End-to-End-Suite: Mining + Modelling + Intelligence + Monitoring in einer Plattform", "ERP-Transformation-Accelerator: speziell fuer RISE/S/4HANA-Journey designed", "Kontinuierliches Monitoring: Live-Dashboards nach Go-Live mit Abweichungs-Alerts", "Kollaborativ: Business User koennen Prozessdokumentation einsehen und beitragen"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you directly: how confident are you that you know how your core business processes actually run today? Not how they are documented, not how they are supposed to run - but what actually happens in the system, with all the exceptions and workarounds?"}, {"p": "Pain", "l": "Most organizations discover during their S/4HANA transformation that reality diverges enormously from documentation. Processes have 50+ variants where 10 were expected, cycle times vary by 10x across regions, and nobody knew because they never mined the data. That discovery during transformation is expensive and delays the project."}, {"p": "Vision", "l": "What if you had that clarity before you transform? Process mining shows you exactly what happens today - every variant, every bottleneck, every rework loop. Then Signavio benchmarks you against best practice so you know which processes to redesign and which are already good. And after go-live, continuous monitoring ensures you stay on target."}, {"p": "Proof", "l": "[Reference customer] used Signavio before their S/4HANA migration and discovered that their P2P process had 340 variants (they expected 15). By addressing the root causes before migration, they reduced process complexity by 70% and accelerated the project by 3 months. Post-go-live, continuous monitoring caught process drifts within days instead of months."}, {"p": "Next Step", "l": "The fastest insight comes from a process mining sprint: we connect to your SAP system, mine 2-3 core processes (typically O2C and P2P), and present findings within 3-4 weeks. You will see your process reality for the first time - and it is always eye-opening."}], "de": [{"p": "Eroeffnung", "l": "Wie sicher sind Sie dass Sie wissen wie Kernprozesse TATSAECHLICH laufen? Nicht dokumentiert, nicht geplant - was wirklich im System passiert?"}, {"p": "Schmerz", "l": "Organisationen entdecken waehrend S/4HANA-Transformation dass Realitaet enorm von Dokumentation abweicht. 50+ Varianten statt 10, 10x Zykluszeit-Unterschiede. Entdeckung waehrend Transformation ist teuer."}, {"p": "Vision", "l": "Klarheit VOR Transformation: Mining zeigt exakt was heute passiert. Benchmarking gegen Best Practice zeigt was redesigned werden muss. Monitoring nach Go-Live sichert Zielerreichung."}, {"p": "Beweis", "l": "[Referenz] P2P-Mining vor Migration: 340 Varianten (erwartet 15). Komplexitaet -70%, Projekt 3 Monate beschleunigt. Post-Go-Live Drifts in Tagen statt Monaten erkannt."}, {"p": "Naechster Schritt", "l": "Process Mining Sprint: SAP-System anbinden, 2-3 Kernprozesse minen, Ergebnisse in 3-4 Wochen. Sie sehen Prozess-Realitaet erstmals - immer augenoeffnend."}]}, "comp": {"en": [{"v": "Celonis", "d": "Celonis is the process mining market leader and a strong competitor. Signavio differentiates with the complete suite (mining + modeling + benchmarking + monitoring), native SAP Best Practice content, and direct integration into the RISE with SAP transformation journey."}, {"v": "Microsoft Process Mining (Minit)", "d": "Microsoft acquired Minit and integrates into Power Platform. Earlier stage, less mature for enterprise SAP scenarios. Signavio offers deeper SAP integration, richer benchmarking, and the complete transformation suite."}, {"v": "ARIS (Software AG)", "d": "ARIS is a traditional BPM modeling tool. Signavio adds process mining (data-driven discovery), benchmarking intelligence, and continuous monitoring that ARIS lacks. More modern, more cloud-native, more collaborative."}, {"v": "Manual process workshops", "d": "Traditional approach: consultants interview stakeholders and draw process diagrams. Results in biased, incomplete documentation. Process mining reveals objective truth from system data - faster, more accurate, and evidence-based."}], "de": [{"v": "Celonis", "d": "Process-Mining-Marktfuehrer. Signavio differenziert mit vollstaendiger Suite, SAP Best Practice Content und direkter RISE-Integration."}, {"v": "Microsoft (Minit)", "d": "Frueher, weniger reif fuer Enterprise-SAP. Signavio bietet tiefere SAP-Integration und Benchmarking."}, {"v": "ARIS", "d": "Traditionelles BPM-Modelling. Signavio addiert Mining, Benchmarking und Monitoring. Moderner und kollaborativer."}, {"v": "Manuelle Workshops", "d": "Subjektiv, unvollstaendig. Mining zeigt objektive Wahrheit aus Systemdaten - schneller und evidenzbasiert."}]}, "dont": {"en": ["Do not position only as a process mining tool - the complete suite (mine + model + benchmark + monitor) is the differentiator versus point solutions", "Never underestimate Celonis in competitive situations - they have strong market presence. Focus on the SAP-native integration and transformation suite advantages", "Do not sell only to IT - the business process owners and transformation program leadership are the key stakeholders", "Avoid making this a one-time exercise - continuous monitoring post-go-live is where long-term value lives", "Do not promise process mining replaces transformation consulting - it augments and accelerates it with data, but decisions still require expertise"], "de": ["Nicht nur als Process-Mining-Tool positionieren - Suite ist Differenzierer", "Celonis nicht unterschaetzen - auf SAP-native-Integration fokussieren", "N nce checking."}], "de": [{"competitor": "Celonis", "strength": "Marktfuehrer Mining, starke Marke", "counter": "Signavio: Management + Mining kombiniert, in RISE enthalten, SAP-Best-Practices, transformationsorientiert."}, {"competitor": "ARIS (Software AG)", "strength": "Legacy-Leader Modellierung, grosse Unternehmen", "counter": "Signavio: Cloud-nativ, Mining integriert, SAP-Alignment, schneller."}, {"competitor": "Microsoft Process Mining", "strength": "Guenstig/M365 enthalten, Desktop-Tasks", "counter": "Signavio: Enterprise-Mining, SAP-nativ, Transformation, Conformance."}]}}, {"name": "SAP LeanIX", "sub": {"en": "Enterprise Architecture Management - Clarity in Complexity, Data-Driven IT Decisions", "de": "Enterprise Architecture Management - Klarheit in Komplexitaet, Datengetriebene IT-Entscheidungen"}, "elev": {"en": "SAP LeanIX is a cloud-native Enterprise Architecture Management (EAM) platform that provides a live, collaborative map of your IT landscape - applications, technologies, business capabilities, and their interconnections. For organizations managing complex application portfolios (often 200-2000+ applications), LeanIX answers critical questions: Which applications support which business capabilities? What is the technology risk? Where are redundancies? What should we modernize, consolidate, or retire? During S/4HANA and cloud transformations, LeanIX provides the architectural clarity needed to make informed decisions about what to transform, in what order, and with what dependencies.", "de": "SAP LeanIX ist eine cloud-native Enterprise-Architecture-Management-Plattform die eine lebende, kollaborative Karte der IT-Landschaft bietet. Fuer Organisationen mit 200-2000+ Applikationen beantwortet LeanIX: Welche Apps unterstuetzen welche Capabilities? Wo ist Technologierisiko? Wo Redundanzen? Was modernisieren, konsolidieren, abloesen? Bei S/4HANA-Transformation liefert LeanIX die architektonische Klarheit fuer informierte Entscheidungen."}, "pain": {"en": ["No one has a complete picture of the application landscape - it is in scattered spreadsheets that are always outdated", "Cannot assess transformation impact: when changing one system, do not know what other applications, interfaces, and business processes are affected", "Application portfolio bloated with redundant solutions: 5 CRM tools, 3 BI platforms, overlapping ERPs from acquisitions - but no data to drive rationalization", "Technology risk invisible: applications running on end-of-life technology, unsupported versions, or single-vendor-dependent - discovered only during incidents", "M&A integration planning done manually without understanding the full landscape overlap between acquiring and acquired company", "Cloud transformation stuck because there is no clear picture of what can move to cloud, what stays on-premise, and in what sequence", "IT cost allocation unclear: cannot map IT spending to business capabilities to determine where the organization over- or under-invests"], "de": ["Kein vollstaendiges Bild der Applikationslandschaft - verstreute veraltete Spreadsheets", "Transformations-Impact nicht bewertbar: Auswirkungen von Systemwechsel auf andere Apps/Interfaces", "Portfolio mit redundanten Loesungen: 5 CRM, 3 BI, ueberlappende ERPs aus Akquisitionen", "Technologierisiko unsichtbar: EOL-Technologie, unsupportete Versionen", "M&A-Integration manuell ohne Overlap-Verstaendnis", "Cloud-Transformation haengt wegen fehlendem Bild was wohin kann", "IT-Kostenallokation unklar: Spending nicht Business-Capabilities zuordbar"]}, "questions": {"en": [{"t": "Landscape clarity", "q": "Could you show me today a complete, current map of all applications in your landscape, who owns them, what they connect to, and what business capabilities they support?"}, {"t": "Transformation planning", "q": "In your S/4HANA or cloud transformation, how are you determining which applications are affected, what the dependencies are, and in what sequence to migrate?"}, {"t": "Redundancy", "q": "How many applications do you have that serve overlapping purposes? Post-M&A, have you fully rationalized the combined portfolio?"}, {"t": "Technology risk", "q": "Do you have visibility into which applications run on end-of-life technology, unsupported versions, or have critical single-point-of-failure dependencies?"}, {"t": "Cost transparency", "q": "Can you map your IT spending to business capabilities? Do you know which capabilities are over-invested and which are under-served?"}, {"t": "Decision support", "q": "When leadership asks 'should we build or buy for this capability' - do you have the data to answer intelligently?"}, {"t": "Collaboration", "q": "Who maintains your architecture documentation today? Is it a central team in Visio/Excel, or is it collaborative and distributed?"}], "de": [{"t": "Landschafts-Klarheit", "q": "Koennten Sie heute eine vollstaendige aktuelle Karte aller Applikationen zeigen? Ownership, Verbindungen, Capabilities?"}, {"t": "Transformationsplanung", "q": "Bei S/4HANA/Cloud-Transformation - wie bestimmen Sie betroffene Apps, Abhaengigkeiten, Reihenfolge?"}, {"t": "Redundanz", "q": "Wie viele ueberlappende Applikationen? Nach M&A vollstaendig rationalisiert?"}, {"t": "Technologierisiko", "q": "Sichtbarkeit welche Apps auf EOL-Technologie laufen?"}, {"t": "Kostentransparenz", "q": "IT-Spending auf Business-Capabilities abbildbar? Wo ueber-/unterinvestiert?"}, {"t": "Entscheidungsunterstuetzung", "q": "Bei 'build or buy' - Daten fuer intelligente Antwort vorhanden?"}, {"t": "Kollaboration", "q": "Wer pflegt Architektur-Doku? Zentral in Visio/Excel oder kollaborativ?"}]}, "diff": {"en": ["Live, collaborative: continuously updated by distributed teams - not a one-time documentation effort that becomes stale within months", "SaaS discovery and management: automatically discovers cloud applications (SaaS) across the organization, identifying shadow IT and redundancies", "Transformation planning: specific features for S/4HANA migration planning - impact analysis, dependency mapping, wave planning with sequencing logic", "Technology risk scoring: automatic assessment of technology lifecycle status, support timelines, and vendor risk for every application in the portfolio", "Business capability mapping: links applications to the business capabilities they serve - enabling strategic investment decisions rather than just IT inventory management", "Integration with RISE: connects to the RISE with SAP transformation methodology, providing the architectural foundation for cloud migration decisions", "API-first and integrations: connects to ServiceNow (CMDB), Jira, SAP Solution Manager, and others for automatic data enrichment"], "de": ["Lebend, kollaborativ: kontinuierlich aktualisiert - keine einmalige Doku die in Monaten veraltet", "SaaS-Discovery: entdeckt automatisch Cloud-Applikationen, identifiziert Shadow IT", "Transformationsplanung: S/4HANA-Migration mit Impact-Analyse, Dependency-Mapping, Wave-Planning", "Technologie-Risiko-Scoring: automatische Bewertung von Lifecycle, Support, Vendor-Risk", "Business-Capability-Mapping: Apps mit Capabilities verknuepft fuer strategische Investitions-Entscheidungen", "RISE-Integration: verbunden mit Transformations-Methodik", "API-first: ServiceNow, Jira, SAP Solution Manager Integration"]}, "talk": {"en": [{"p": "Open", "l": "Here is a question CIOs struggle with: how many applications are in your landscape right now? Not approximately - exactly. And which of them are critical, which are redundant, and which are running on technology that will be unsupported in 18 months?"}, {"p": "Pain", "l": "Without that clarity, every transformation decision is a gamble. You change one system and unexpectedly break 5 others because nobody mapped the interfaces. You plan migration waves based on politics rather than dependencies. You keep paying for 3 tools that do the same thing because nobody proved the overlap."}, {"p": "Vision", "l": "LeanIX gives you a live, always-current map of your entire IT landscape: every application, every interface, every technology, mapped to business capabilities and scored for risk. When you plan your S/4HANA transformation, you see exactly what is affected and in what order to move. When you acquire a company, you immediately see the overlap."}, {"p": "Proof", "l": "[Reference customer] used LeanIX for their S/4HANA transformation planning: identified 45 applications directly dependent on the ERP, mapped all interfaces for migration sequencing, and discovered 30+ redundant applications across the portfolio worth 2M EUR/year in license savings."}, {"p": "Next Step", "l": "The starting point is a landscape inventory sprint: we import your application data (from CMDBs, spreadsheets, or discovery), create the initial map, and run a technology risk assessment. Usually 4-6 weeks to first actionable insights."}], "de": [{"p": "Eroeffnung", "l": "Wie viele Applikationen in Ihrer Landschaft? Nicht ungefaehr - exakt. Welche kritisch, redundant, auf nicht-supporteter Technologie?"}, {"p": "Schmerz", "l": "Ohne Klarheit ist jede Transformations-Entscheidung ein Gluecksspiel. System aendern, 5 andere brechen. Migration-Waves politisch statt Abhaengigkeits-basiert. 3 gleiche Tools bezahlen."}, {"p": "Vision", "l": "LeanIX: lebende aktuelle Karte der IT-Landschaft. Jede App, jedes Interface, jede Technologie - auf Capabilities gemappt und Risiko-bewertet."}, {"p": "Beweis", "l": "[Referenz] S/4HANA-Planung: 45 ERP-abhaengige Apps identifiziert, Interfaces fuer Sequenzierung gemappt, 30+ redundante Apps entdeckt = 2M EUR/Jahr Lizenz-Savings."}, {"p": "Naechster Schritt", "l": "Landscape-Inventory-Sprint: App-Daten importieren, initiale Karte erstellen, Technologie-Risiko-Assessment. 4-6 Wochen bis erste Insights."}]}, "comp": {"en": [{"v": "Ardoq", "d": "Direct EAM competitor. LeanIX has larger market presence, more integrations, and specific SAP transformation features that Ardoq lacks (RISE integration, S/4HANA wave planning)."}, {"v": "Mega HOPEX", "d": "Traditional EAM tool - heavyweight, consultant-dependent. LeanIX is SaaS-native, self-service, and collaborative by design. Faster time to value, lower operating cost."}, {"v": "ServiceNow CMDB", "d": "ServiceNow CMDB is infrastructure-focused (servers, networks). LeanIX operates at the application and business capability level. Complementary - LeanIX integrates with ServiceNow CMDB for enrichment."}, {"v": "Excel / Visio / PowerPoint", "d": "The most common 'tool' for EA. Static, outdated within weeks, no collaboration, no automation. LeanIX provides the living, connected, always-current alternative."}], "de": [{"v": "Ardoq", "d": "Direkter EAM-Wettbewerber. LeanIX groessere Praesenz, mehr Integrationen, spezifische SAP-Transformations-Features."}, {"v": "Mega HOPEX", "d": "Traditionell, schwergewichtig. LeanIX ist SaaS-nativ, Self-Service, kollaborativ. Schneller Wert."}, {"v": "ServiceNow CMDB", "d": "Infrastruktur-fokussiert. LeanIX auf Applikations-/Capability-Ebene. Komplementaer - integriert."}, {"v": "Excel / Visio", "d": "Statisch, in Wochen veraltet, keine Kollaboration. LeanIX ist die lebende Alternative."}]}, "dont": {"en": ["Do not sell as documentation tool - the value is in decision support for transformation, not in creating pretty diagrams", "Never ignore existing ServiceNow/CMDB investments - position as complementary, enriching infrastructure data with business context", "Do not underestimate data quality effort - initial landscape data is always messy. Set expectations that quality improves over time with collaborative ownership", "Avoid selling only to Enterprise Architects - CIOs, transformation leads, and M&A integration teams are equally important stakeholders"], "de": ["Nicht als Doku-Tool verkaufen - Wert in Entscheidungsunterstuetzung fuer Transformation", "ServiceNow/CMDB nicht ignorieren - komplementaer positionieren", "Datenqualitaets-Aufwand nicht unterschaetzen - verbessert sich mit kollaborativer Pflege", "Nicht nur an Enterprise Architects - CIOs, Transformations-Leads und M&A sind Stakeholder"]}, "qual": {"en": ["S/4HANA or cloud transformation in planning phase needing landscape clarity", "200+ applications with no clear inventory or dependency mapping", "Post-M&A integration requiring portfolio rationalization", "CIO mandate to reduce application redundancy and technology risk", "IT cost transparency initiative needing capability-based cost allocation", "No current EAM tool or using outdated/shelf-ware solution", "Shadow IT problem: unknown SaaS applications proliferating across the organization"], "de": ["S/4HANA/Cloud-Transformation in Planungsphase", "200+ Apps ohne klares Inventar oder Dependency-Mapping", "M&A-Integration mit Portfolio-Rationalisierung", "CIO-Mandat Redundanz und Risiko zu senken", "IT-Kostentransparenz-Initiative", "Kein aktuelles EAM oder veraltetes Tool", "Shadow-IT-Problem mit unkontrollierten SaaS-Apps"]}, "indDiff": {"en": [{"i": "Financial Services", "p": "Thousands of applications across business lines with strict regulatory requirements for IT risk management, disaster recovery documentation, and technology lifecycle governance.", "f": "Regulatory compliance reporting for IT landscape, DR/BCP mapping, technology risk heatmaps for regulatory submissions, and business-critical application identification for operational resilience."}, {"i": "Manufacturing (multi-site)", "p": "Complex SAP landscape with multiple ERP instances, MES systems, and plant-level applications that need to be rationalized during S/4HANA consolidation.", "f": "Multi-ERP landscape mapping for consolidation planning, plant-level application inventory, interface mapping for MES/ERP integration, and S/4HANA migration wave planning across sites."}], "de": [{"i": "Finanzdienstleister", "p": "Tausende Apps mit regulatorischen Anforderungen an IT-Risiko, DR-Dokumentation, Lifecycle-Governance.", "f": "Regulatorisches Compliance-Reporting, DR/BCP-Mapping, Risiko-Heatmaps, Business-Critical-App-Identifikation."}, {"i": "Fertigung (Multi-Site)", "p": "Komplexe SAP-Landschaft mit mehreren ERPs, MES, Plant-Apps fuer S/4HANA-Konsolidierung.", "f": "Multi-ERP-Mapping, Plant-Inventar, Interface-Mapping fuer MES/ERP, Wave-Planning ueber Standorte."}]}, "inds": ["Financial Services", "Manufacturing", "Healthcare", "Retail", "Public Sector", "Telecommunications", "Energy", "Technology"], "obj": {"en": [{"o": "We track our landscape in Excel/SharePoint", "r": "How current is it? Excel becomes outdated the day it is created. LeanIX provides a LIVING architecture repository with automated discovery, integrations, and collaborative updates."}, {"o": "Enterprise Architecture is overhead", "r": "Without EA visibility, every project reinvents wheels: duplicate systems, unknown dependencies, failed integrations. LeanIX quantifies this: what does each unknown dependency cost when it breaks?"}, {"o": "Our architects use ArchiMate/Sparx - why switch?", "r": "Those model architectures. LeanIX MANAGES architectures: lifecycle planning, technology risk, transformation roadmaps, application rationalization. It is decision support, not diagramming."}, {"o": "We do not have a dedicated EA team", "r": "LeanIX is designed for crowd-sourced input. Application owners update their own records. Surveys automate data collection. No dedicated EA team needed."}, {"o": "Another SaaS tool our architects will not use", "r": "LeanIX integrates with ServiceNow, Jira, SAP, cloud providers for automated data. Architects USE the insights; they do not manually maintain a catalog."}], "de": [{"o": "Excel/SharePoint reicht", "r": "Wie aktuell? LeanIX: LEBENDES Repository mit Auto-Discovery und Integrationen."}, {"o": "EA ist Overhead", "r": "Ohne EA: Duplikate, unbekannte Abhaengigkeiten, gescheiterte Integrationen. Was kostet jede?"}, {"o": "Nutzen ArchiMate/Sparx", "r": "Die modellieren. LeanIX VERWALTET: Lifecycle, Risiko, Roadmaps, Rationalisierung."}, {"o": "Kein dediziertes EA-Team", "r": "Crowd-sourced: App-Owner updaten selbst. Surveys automatisieren."}, {"o": "Noch ein SaaS fuer Architekten", "r": "Integriert mit ServiceNow, Jira, SAP, Cloud. Auto-Daten, Architekten nutzen Insights."}]}, "persona": {"en": [{"role": "CIO / CTO", "msg": "IT landscape transparency, technology risk management, transformation planning, cost optimization", "prio": "Primary"}, {"role": "Enterprise Architect", "msg": "Living architecture repository, automated discovery, dependency mapping, rationalization", "prio": "Primary"}, {"role": "Head of Transformation", "msg": "Application portfolio for transformation roadmap, cloud migration planning, risk assessment", "prio": "Champion"}, {"role": "CFO / IT Finance", "msg": "IT cost transparency, redundancy elimination, license optimization, business capability mapping", "prio": "Influencer"}], "de": [{"role": "CIO / CTO", "msg": "IT-Transparenz, Tech-Risiko, Transformationsplanung, Kostenoptimierung", "prio": "Primaer"}, {"role": "Enterprise Architect", "msg": "Lebendes Repository, Auto-Discovery, Dependencies, Rationalisierung", "prio": "Primaer"}, {"role": "Transformationsleiter", "msg": "App-Portfolio fuer Roadmap, Cloud-Migration, Risiko", "prio": "Champion"}, {"role": "CFO / IT Finance", "msg": "IT-Kostentransparenz, Redundanz eliminieren, Lizenzen", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Factsheets (applications/capabilities managed)", "range": "Starting 50K-120K EUR/year for mid-market. Enterprise 150K-500K+ (depends on landscape size)", "includes": "Application Portfolio Management, Technology Risk, Transformation Management, optional: SaaS Management, Value Stream"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Factsheets (verwaltete Applications)", "range": "Ab 50K-120K EUR/Jahr, Enterprise 150K-500K+", "includes": "APM, Technology Risk, Transformation, optional: SaaS Mgmt, Value Stream"}}, "crossSell": {"en": , "country": "Schweiz", "outcome": "M&A-Integration: 3 IT-Landschaften in Wochen kartiert. Timeline -40%."}, {"industry": "Retail", "country": "Oesterreich", "outcome": "35% Apps auf End-of-Life Tech. Proaktive Migration. Null Ausfaelle durch Tech-Debt."}]}, "roi": {"en": ["15-30% IT cost reduction through application rationalization", "40-60% faster M&A IT integration through landscape visibility", "50-70% reduction in time for transformation impact assessment", "80% reduction in architecture documentation effort (automated discovery)", "Avoid 2-5M EUR/year in redundant licenses and duplicate capabilities"], "de": ["15-30% IT-Kosten-Reduktion durch Rationalisierung", "40-60% schnellere M&A-IT-Integration", "50-70% schnellere Impact-Assessments", "80% weniger Dokumentationsaufwand", "2-5M EUR/Jahr redundante Lizenzen vermieden"]}, "meeComp": {"en": [{"competitor": "Ardoq", "strength": "Modern, flexible metamodel, good API, growing in Europe", "counter": "LeanIX: larger enterprise reference base, SAP integration (RISE alignment), stronger transformation management, established DACH presence."}, {"competitor": "ServiceNow ITOM/CMDB", "strength": "Dominant in IT service management, strong discovery, enterprise standard", "counter": "LeanIX: business capability focus (not just IT infra), architect-friendly, transformation roadmapping. ServiceNow is bottom-up (infra), LeanIX is top-down (business)."}, {"competitor": "Mega Hopex", "strength": "Traditional EA tool, ArchiMate compliant, GRC integration", "counter": "LeanIX: modern cloud-native UX, faster adoption, crowd-sourcing model vs. dedicated EA team. Hopex is complex; LeanIX democratizes EA."}], "de": [{"competitor": "Ardoq", "strength": "Modern, flexibel, API, waechst in Europa", "counter": "LeanIX: groessere Referenzbasis, SAP-Integration, staerkeres Transformations-Mgmt."}, {"competitor": "ServiceNow CMDB", "strength": "Dominant ITSM, Discovery, Enterprise-Standard", "counter": "LeanIX: Business-Capability-Fokus, Architekten-freundlich, Transformation. ServiceNow = Infra, LeanIX = Business."}, {"competitor": "Mega Hopex", "strength": "Traditionelles EA, ArchiMate, GRC", "counter": "LeanIX: Cloud-nativ, schnellere Adoption, Crowd-Sourcing. Hopex komplex."}]}}, {"name": "SAP WalkMe", "sub": {"en": "Digital Adoption Platform", "de": "Digitale Adoptionsplattform"}, "elev": {"en": "SAP WalkMe accelerates software adoption by overlaying contextual guidance, automation, and analytics directly on top of any application. Instead of lengthy training programs or static documentation, users get real-time, in-app walkthroughs that guide them step-by-step through complex processes. For SAP customers rolling out S/4HANA, SuccessFactors, or any cloud solution, WalkMe dramatically reduces time-to-proficiency, eliminates process errors, and provides visibility into where users struggle - turning every application into a self-service experience that drives ROI from day one.", "de": "SAP WalkMe beschleunigt Software-Adoption durch kontextuelle Fuehrung, Automatisierung und Analytics direkt in jeder Anwendung. Statt langer Schulungen erhalten Nutzer Echtzeit-Walkthroughs Schritt fuer Schritt durch komplexe Prozesse. Bei S/4HANA-, SuccessFactors- oder Cloud-Rollouts reduziert WalkMe die Time-to-Proficiency drastisch, eliminiert Prozessfehler und zeigt wo Nutzer kaempfen - jede Anwendung wird zur Self-Service-Erfahrung die ROI ab Tag eins liefert."}, "pain": {"en": ["S/4HANA rollout with low user adoption and high support tickets", "Expensive classroom training that users forget within weeks", "Process errors from users not following correct steps", "No visibility into where users get stuck or drop off", "Change fatigue - too many new systems, too little guidance", "Help desk overwhelmed after every go-live or update"], "de": ["S/4HANA-Rollout mit niedriger Adoption und hohen Tickets", "Teure Schulungen die in Wochen vergessen werden", "Prozessfehler durch falsche Schritte", "Keine Sicht wo Nutzer steckenbleiben", "Change-Muedigkeit - zu viele Systeme, zu wenig Fuehrung", "Helpdesk ueberlastet nach jedem Go-Live"]}, "questions": {"en": [{"t": "Adoption", "q": "After your last major rollout, what was user adoption like after 3 months? Where did people struggle most?"}, {"t": "Training", "q": "How much do you invest in training per rollout? How quickly does that knowledge decay?"}, {"t": "Support", "q": "What does your ticket volume look like after a go-live? How long until it normalizes?"}, {"t": "Visibility", "q": "Can you see today where users abandon a process or make errors? Do you have that data?"}, {"t": "Change", "q": "How many system changes are coming in the next 12-18 months? How will you support users through all of them?"}, {"t": "Compliance", "q": "Are there processes where incorrect execution creates compliance or financial risk?"}, {"t": "Scale", "q": "How many applications and users need to be supported? Across how many regions/languages?"}], "de": [{"t": "Adoption", "q": "Wie war die Nutzeradoption 3 Monate nach dem letzten Rollout? Wo kaempften die Leute?"}, {"t": "Training", "q": "Trainingskosten pro Rollout? Wie schnell verfaellt das Wissen?"}, {"t": "Support", "q": "Ticketvolumen nach Go-Live? Wie lange bis Normalisierung?"}, {"t": "Sichtbarkeit", "q": "Koennen Sie sehen wo Nutzer abbrechen oder Fehler machen?"}, {"t": "Change", "q": "Wie viele Systemwechsel in den naechsten 12-18 Monaten?"}, {"t": "Compliance", "q": "Gibt es Prozesse wo fehlerhafte Ausfuehrung Compliance-Risiken schafft?"}, {"t": "Skalierung", "q": "Wie viele Applikationen und Nutzer? Regionen/Sprachen?"}]}, "diff": {"en": ["Overlay on ANY application - SAP and non-SAP, web and desktop", "No-code authoring: business process owners create guides without IT", "Analytics dashboard shows exactly where users struggle, drop off, or deviate", "Automation: auto-fill fields, skip unnecessary steps, trigger workflows", "Multi-language support for global rollouts from single content source", "Segments: different guidance for different roles, experience levels, regions"], "de": ["Overlay auf JEDER Anwendung - SAP und Nicht-SAP", "No-Code: Fachbereiche erstellen Guides ohne IT", "Analytics zeigt exakt wo Nutzer kaempfen oder abbrechen", "Automatisierung: Felder fuellen, Schritte ueberspringen, Workflows", "Multi-Sprache fuer globale Rollouts aus einer Quelle", "Segmente: unterschiedliche Fuehrung nach Rolle und Erfahrung"]}, "talk": {"en": [{"p": "Open", "l": "Every transformation project lives or dies on user adoption. The technology works - but do people actually use it correctly?"}, {"p": "Pain", "l": "I hear this constantly: we invested millions in S/4HANA, but six months later support tickets are still high and people revert to workarounds. Sound familiar?"}, {"p": "Vision", "l": "Imagine every user gets a personal guide inside the application - contextual, step-by-step, exactly when they need it. No training sessions, no manuals. The app teaches itself."}, {"p": "Proof", "l": "[Reference] reduced support tickets by 60% post-go-live and cut training costs by 70%. Time-to-proficiency went from 8 weeks to 2 weeks."}, {"p": "Next", "l": "We can run a 2-week pilot on one critical process - you will see adoption analytics within days. Which process causes the most friction today?"}], "de": [{"p": "Oeffnung", "l": "Jedes Transformationsprojekt steht und faellt mit der Nutzeradoption."}, {"p": "Schmerz", "l": "Millionen in S/4HANA investiert, aber nach 6 Monaten noch hohe Tickets und Workarounds."}, {"p": "Vision", "l": "Jeder Nutzer bekommt einen persoenlichen Guide in der Anwendung - kontextuell, Schritt fuer Schritt."}, {"p": "Beweis", "l": "[Referenz] Tickets -60%, Trainingskosten -70%, Time-to-Proficiency von 8 auf 2 Wochen."}, {"p": "Naechstes", "l": "2-Wochen-Pilot auf einem kritischen Prozess. Welcher verursacht die meiste Reibung?"}]}, "comp": {"en": [{"v": "Whatfix", "d": "WalkMe: deeper analytics, enterprise scale, SAP-native integration. Whatfix: lighter but less insight into user behavior patterns."}, {"v": "SAP Enable Now", "d": "WalkMe: real-time overlay + analytics + automation. Enable Now: content authoring focus, less behavioral insight."}, {"v": "Pendo/Userlane", "d": "WalkMe: covers SAP and non-SAP enterprise apps. Pendo: product-led growth focused, not enterprise process guidance."}, {"v": "Training-only approach", "d": "Training decays 70% in 30 days. WalkMe provides permanent in-context support that adapts as software changes."}], "de": [{"v": "Whatfix", "d": "WalkMe: tiefere Analytics, Enterprise-Skalierung, SAP-nativ."}, {"v": "SAP Enable Now", "d": "WalkMe: Echtzeit + Analytics + Automatisierung. Enable Now: Content-Fokus."}, {"v": "Pendo/Userlane", "d": "WalkMe: Enterprise SAP + Nicht-SAP. Pendo: Product-Led Growth."}, {"v": "Nur Training", "d": "Training zerfaellt 70% in 30 Tagen. WalkMe bietet permanente Unterstuetzung."}]}, "dont": {"en": ["Not 'just tooltips' - it is analytics + automation + guidance combined", "Never position as replacement for ALL training - complements instructor-led for complex topics", "Do not sell without tying to a transformation initiative (S/4HANA, SuccessFactors rollout)", "Avoid 'no training needed ever again' - WalkMe reduces, not eliminates", "Do not ignore IT security concerns about overlay technology"], "de": ["Nicht 'nur Tooltips' - Analytics + Automatisierung + Fuehrung", "Nie als Ersatz fuer ALLES Training positionieren", "Nicht ohne Transformationsinitiative verkaufen", "Nicht 'nie wieder Training' - reduziert, eliminiert nicht", "IT-Sicherheitsbedenken nicht ignorieren"]}, "qual": {"en": ["Major SAP rollout planned or recently completed with adoption issues", "High post-go-live support ticket volume", "Large user population (1,000+) across multiple regions", "Multiple system changes planned in next 18 months", "Compliance-critical processes with error rates", "Training budget under pressure"], "de": ["SAP-Rollout geplant/kuerzlich mit Adoptionsproblemen", "Hohe Tickets nach Go-Live", "Grosse Nutzerbasis (1.000+) in mehreren Regionen", "Mehrere Systemwechsel in 18 Monaten", "Compliance-kritische Prozesse mit Fehlerquoten", "Trainingsbudget unter Druck"]}, "indDiff": {"en": [{"i": "Manufacturing", "p": "Shop floor workers with limited IT literacy using complex ERP transactions", "f": "Step-by-step guidance for production confirmations, quality notifications. Reduces errors in MES/ERP interaction."}, {"i": "Financial Services", "p": "Regulatory processes must be followed exactly - deviation = compliance risk", "f": "Enforced process paths with validation. Analytics prove compliance adherence."}, {"i": "Life Sciences", "p": "GxP processes, SOPs that change quarterly, audit requirements", "f": "Updated guidance pushed instantly when SOPs change. Audit trail of user actions."}, {"i": "Retail", "p": "High turnover workforce, seasonal hiring, minimal training time", "f": "New hires productive in days not weeks. Seasonal ramp without classroom."}], "de": [{"i": "Fertigung", "p": "Shopfloor-Mitarbeiter mit begrenzter IT-Kompetenz", "f": "Schritt-fuer-Schritt fuer Rueckmeldungen, QM. Reduziert Fehler."}, {"i": "Finanzdienstleistungen", "p": "Regulatorische Prozesse muessen exakt befolgt werden", "f": "Erzwungene Prozesspfade. Analytics beweisen Compliance."}, {"i": "Life Sciences", "p": "GxP, SOPs aendern sich quartalsweise", "f": "Guidance sofort aktualisiert bei SOP-Aenderungen."}, {"i": "Retail", "p": "Hohe Fluktuation, saisonale Einstellungen", "f": "Neue Mitarbeiter in Tagen produktiv."}]}, "inds": ["Manufacturing", "Financial Services", "Life Sciences", "Retail", "Public Sector", "Utilities", "All industries"], "obj": {"en": [{"o": "We do training - we do not need in-app guidance", "r": "Training happens once; users forget 70% within a week. WalkMe guides users IN THE MOMENT of need - contextual, persistent, evolving. Training + WalkMe is the combination that actually works."}, {"o": "Our UX is good enough
