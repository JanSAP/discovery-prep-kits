from scratch. Your existing content migrates and runs alongside new Datasphere capabilities from day one.", "de": "SAP BW Bridge bietet einen bewaehrten Migrationspfad von On-Premise BW/4HANA oder BW on HANA zu SAP Datasphere. Bewahrt bestehende BW-Investitionen - Queries, Modelle, Transformationen - beim Umzug in die Cloud. Fuer Unternehmen mit hohen BW-Infrastrukturkosten, knappen ABAP/BW-Skills und Modernisierungsbedarf: Sie fangen nicht bei null an. Bestehende Inhalte migrieren und laufen neben neuen Datasphere-Faehigkeiten ab Tag eins."}, "pain": {"en": ["BW hardware refresh coming - huge capex for aging technology", "BW/ABAP talent retiring or impossible to hire", "BW performance degrading as data volumes grow", "Cannot innovate: stuck maintaining BW instead of building new analytics", "Cloud strategy mandated but BW is the last on-premise holdout", "Dual maintenance: BW for SAP data AND separate cloud analytics - costly overlap"], "de": ["BW-Hardware-Refresh anstehend - hohe Capex fuer alte Technik", "BW/ABAP-Talente gehen in Rente oder nicht einstellbar", "BW-Performance sinkt bei wachsenden Datenmengen", "Keine Innovation: BW-Wartung statt neuer Analytics", "Cloud-Strategie, aber BW bleibt On-Premise", "Doppelte Wartung: BW + Cloud-Analytics teuer"]}, "questions": {"en": [{"t": "BW version", "q": "Running BW/4HANA, BW on HANA, or classic BW? What version and patch level?"}, {"t": "Content", "q": "How many InfoProviders, queries, transformations? Which are actively used vs. legacy?"}, {"t": "Infrastructure", "q": "When is the next hardware refresh? What does BW infrastructure cost annually?"}, {"t": "Team", "q": "How many BW/ABAP specialists do you have? What is the talent outlook in 3 years?"}, {"t": "Analytics strategy", "q": "What is the target analytics architecture? Pure cloud? Hybrid? What role does BW play long-term?"}, {"t": "Timeline", "q": "Is there a deadline driving this - hardware EOL, license renewal, cloud mandate?"}], "de": [{"t": "BW-Version", "q": "BW/4HANA, BW on HANA oder klassisch? Version?"}, {"t": "Content", "q": "Wie viele InfoProvider, Queries, Transformationen? Aktiv vs. Legacy?"}, {"t": "Infrastruktur", "q": "Naechster Hardware-Refresh? Jaehrliche BW-Kosten?"}, {"t": "Team", "q": "Wie viele BW/ABAP-Spezialisten? Talent-Ausblick in 3 Jahren?"}, {"t": "Analytics-Strategie", "q": "Ziel-Architektur? Cloud/Hybrid? BW-Rolle langfristig?"}, {"t": "Timeline", "q": "Deadline: Hardware-EOL, Lizenzerneuerung, Cloud-Mandat?"}]}, "diff": {"en": ["Preserves existing BW content: queries, models, transformations migrate", "Runs inside Datasphere: BW content alongside new cloud capabilities", "Migration tooling with automated assessment and conversion", "Eliminates on-premise infrastructure costs", "Gradual modernization: migrate first, then innovate with Datasphere features", "No big-bang required - phased approach with coexistence"], "de": ["Bewahrt BW-Content: Queries, Modelle, Transformationen migrieren", "Laeuft in Datasphere: BW neben neuen Cloud-Faehigkeiten", "Migrationstooling mit automatisiertem Assessment", "Eliminiert On-Premise-Infrastrukturkosten", "Schrittweise Modernisierung: erst migrieren, dann innovieren", "Kein Big-Bang - phasenweiser Ansatz mit Koexistenz"]}, "talk": {"en": [{"p": "Open", "l": "BW has served you well for years. The question is not whether to keep the content - it is whether to keep the infrastructure."}, {"p": "Pain", "l": "That hardware refresh quote - what could you do with that budget if BW ran in cloud instead? And the team maintaining it - could they build new things?"}, {"p": "Vision", "l": "Your BW queries, models, transformations running in Datasphere cloud. Same content, zero hardware. Then gradually add federation, AI, self-service on top."}, {"p": "Proof", "l": "[Reference] migrated 400 queries and 50 InfoProviders in 3 months. Infra cost eliminated. Team now builds Datasphere data products instead of patching BW."}, {"p": "Next", "l": "BW assessment scans your system - shows what migrates cleanly, what needs attention, and gives a realistic timeline and effort estimate."}], "de": [{"p": "Oeffnung", "l": "BW hat Jahre gedient. Frage ist nicht ob Content behalten - sondern ob Infrastruktur."}, {"p": "Schmerz", "l": "Hardware-Refresh-Kosten - was koennten Sie mit dem Budget tun wenn BW in der Cloud liefe?"}, {"p": "Vision", "l": "BW-Queries und Modelle in Datasphere Cloud. Gleicher Content, null Hardware. Dann foederieren, KI, Self-Service."}, {"p": "Beweis", "l": "[Referenz] 400 Queries, 50 InfoProvider in 3 Monaten. Infrakosten eliminiert."}, {"p": "Naechstes", "l": "BW-Assessment scannt System - zeigt was sauber migriert und gibt Zeitplan."}]}, "comp": {"en": [{"v": "Stay on BW on-prem", "d": "Hardware refresh + talent risk + no innovation. BW Bridge: same content, cloud economics, future-proof."}, {"v": "Greenfield Datasphere", "d": "Greenfield discards years of BW investment. Bridge preserves and migrates - then innovate on top."}, {"v": "Migrate to Snowflake/Databricks", "d": "Loses SAP semantics and BW logic. Must rebuild everything. Bridge preserves queries and models."}, {"v": "BW/4HANA cloud (private)", "d": "Still on-prem architecture in cloud. Bridge moves to cloud-native Datasphere."}], "de": [{"v": "BW On-Prem bleiben", "d": "Hardware + Talent-Risiko + keine Innovation. Bridge: Cloud-Oekonomie."}, {"v": "Greenfield Datasphere", "d": "Verwirft Jahre BW-Investment. Bridge bewahrt und migriert."}, {"v": "Snowflake/Databricks", "d": "Verliert SAP-Semantik und BW-Logik. Alles neu bauen."}, {"v": "BW/4HANA Cloud (privat)", "d": "Noch On-Prem-Architektur in Cloud. Bridge zu cloud-nativem Datasphere."}]}, "dont": {"en": ["Not 'BW is dead' - it is a migration path that respects the investment", "Never promise 100% automated migration - some content needs manual attention", "Do not ignore the organizational change: BW team needs reskilling path", "Avoid oversimplifying timelines - depends heavily on content complexity", "Do not dismiss BW value - acknowledge what it delivered, position Bridge as evolution"], "de": ["Nicht 'BW ist tot' - Migrationspfad der Investment respektiert", "Nie 100% automatisierte Migration versprechen", "Organisatorischen Wandel beachten: BW-Team braucht Reskilling", "Zeitplaene nicht vereinfachen - abhaengig von Komplexitaet", "BW-Wert nicht abwerten - Evolution positionieren"]}, "qual": {"en": ["BW hardware refresh in next 12-18 months", "BW/ABAP team shrinking (retirement, attrition)", "Cloud-first mandate but BW remains on-premise", "Significant BW content still actively used", "Datasphere or SAC already in use or planned", "Dual maintenance cost (BW + cloud analytics) too high"], "de": ["BW-Hardware-Refresh in 12-18 Monaten", "BW/ABAP-Team schrumpft", "Cloud-Mandat aber BW On-Premise", "Signifikanter aktiver BW-Content", "Datasphere/SAC im Einsatz oder geplant", "Doppelte Wartungskosten zu hoch"]}, "indDiff": {"en": [{"i": "Manufacturing", "p": "Heavy BW usage for production reporting, cost analysis, quality KPIs", "f": "Production queries migrate. Add IoT/quality data via Datasphere federation."}, {"i": "Financial Services", "p": "Regulatory reporting built in BW, complex transformations", "f": "Regulatory content preserved. Augment with real-time risk data in Datasphere."}, {"i": "Utilities", "p": "IS-U billing analytics, meter data volumes growing", "f": "Billing analytics migrate. Smart meter data via Datasphere scalability."}], "de": [{"i": "Fertigung", "p": "BW fuer Produktions-Reporting, Kostenanalyse, Qualitaet", "f": "Produktions-Queries migrieren. IoT/Qualitaet via Foederation."}, {"i": "Finanzdienstleistungen", "p": "Regulatorik in BW, komplexe Transformationen", "f": "Regulatorik erhalten. Echtzeit-Risiko in Datasphere."}, {"i": "Energieversorger", "p": "IS-U-Billing-Analytics, wachsende Zaehlermengen", "f": "Billing migriert. Smart-Meter via Datasphere-Skalierung."}]}, "inds": ["Manufacturing", "Financial Services", "Utilities", "Retail", "Chemicals", "Public Sector", "All industries"], "obj": {"en": [{"o": "BW still works fine - why change?", "r": "BW on-premise will lose support. More importantly: BW Bridge is not a replacement, it is a MIGRATION PATH. Your existing BW content (queries, models) runs in Datasphere. Preserve investment while gaining cloud benefits."}, {"o": "We have too many BW objects to migrate", "r": "BW Bridge supports bulk migration of queries, InfoProviders, transformations. Automated assessment tool identifies what migrates 1:1, what needs adjustment. Typically 60-70% migrates directly."}, {"o": "Data Warehouse is dead - we should go lakehouse", "r": "Lakehouse is great for raw/unstructured. But governed business reporting needs a semantic layer. BW Bridge in Datasphere gives you BOTH: BW semantics + open data access."}, {"o": "Migration will break our existing reports", "r": "BW Bridge maintains the BW query runtime. Existing reports (BEx, Analysis for Office) continue working on migrated content. Migration without disruption."}, {"o": "Why not just rebuild in Datasphere from scratch?", "r": "Years of business logic encoded in BW models should not be thrown away. BW Bridge preserves that logic. Rebuild only where old patterns genuinely do not serve the business."}], "de": [{"o": "BW funktioniert noch", "r": "BW Bridge ist Migrationspfad: BW-Content laeuft in Datasphere. Investition erhalten + Cloud."}, {"o": "Zu viele BW-Objekte", "r": "Bulk-Migration. Assessment-Tool zeigt was 1:1 migriert. Typisch 60-70% direkt."}, {"o": "Data Warehouse ist tot - Lakehouse", "r": "BW Bridge in Datasphere: BW-Semantik + offener Datenzugang. Beides."}, {"o": "Migration bricht Reports", "r": "BW-Query-Runtime erhalten. BEx/AO-Reports funktionieren weiter."}, {"o": "Warum nicht neu in Datasphere bauen?", "r": "Jahre an Business-Logik erhalten. Nur umbauen wo alt nicht mehr dient."}]}, "persona": {"en": [{"role": "CIO", "msg": "Cloud migration path for analytics, reduce on-premise footprint, modernize data architecture", "prio": "Primary"}, {"role": "Head of BI/Analytics", "msg": "Migrate BW content without losing reports, gradual modernization, hybrid BW+Datasphere", "prio": "Primary"}, {"role": "BW Administrator", "msg": "Reduce BW operations burden, automated migration tools, preserve your expertise", "prio": "Technical"}, {"role": "CFO", "msg": "Reduce infrastructure cost (BW hardware), shift to cloud OpEx, maintain reporting continuity", "prio": "Influencer"}], "de": [{"role": "CIO", "msg": "Cloud-Migrationspfad fuer Analytics, On-Premise reduzieren", "prio": "Primaer"}, {"role": "BI/Analytics-Leiter", "msg": "BW-Content migrieren ohne Reports zu verlieren, graduelle Modernisierung", "prio": "Primaer"}, {"role": "BW-Administrator", "msg": "BW-Ops-Last reduzieren, automatisierte Migration, Expertise erhalten", "prio": "Technisch"}, {"role": "CFO", "msg": "Infrastrukturkosten senken, Cloud-OpEx, Reporting-Kontinuitaet", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Part of Datasphere subscription", "metric": "Included with Datasphere capacity units", "range": "BW Bridge is a feature of Datasphere. No separate license. Datasphere: 50K-800K EUR/year", "includes": "BW Bridge runtime, migration tools, BW query execution in Datasphere, hybrid connectivity"}, "de": {"model": "Teil der Datasphere-Subskription", "metric": "In Datasphere Capacity Units enthalten", "range": "Kein separates Lizenz. Datasphere: 50K-800K EUR/Jahr", "includes": "BW Bridge Runtime, Migrationstools, BW-Query-Ausfuehrung, Hybrid-Konnektivitaet"}}, "crossSell": {"en": [{"trigger": "BW migration is first step of larger data transformation", "solution": "SAP Datasphere (full)", "why": "BW Bridge leads naturally into Datasphere for new data products"}, {"trigger": "Need modern analytics on migrated data", "solution": "SAP Analytics Cloud", "why": "SAC as new frontend replacing BEx/Web Intelligence"}, {"trigger": "ERP also migrating to S/4HANA", "solution": "RISE with SAP", "why": "Align BW and ERP migration timelines for single transformation"}, {"trigger": "AI aspirations on enterprise data", "solution": "SAP Business Data Cloud", "why": "Once in Datasphere, data becomes AI-ready through BDC"}], "de": [{"trigger": "BW-Migration als erster Schritt", "solution": "SAP Datasphere (voll)", "why": "BW Bridge fuehrt zu Datasphere fuer neue Data Products"}, {"trigger": "Moderne Analytics nach Migration", "solution": "SAP Analytics Cloud", "why": "SAC als neues Frontend statt BEx"}, {"trigger": "ERP migriert auch zu S/4", "solution": "RISE with SAP", "why": "BW- und ERP-Migration gleichzeitig"}, {"trigger": "KI-Ambitionen", "solution": "SAP Business Data Cloud", "why": "In Datasphere werden Daten KI-ready"}]}, "refs": {"en": [{"industry": "Automotive", "country": "Germany", "outcome": "3,500 BW objects assessed. 2,200 migrated via BW Bridge in 6 months. Reports continued working without re-training users. Infrastructure cost reduced 45%."}, {"industry": "Utilities", "country": "Austria", "outcome": "BW Bridge for regulatory reporting. Migration of 400 queries. Zero business disruption. BW hardware decommissioned, saving 180K EUR/year."}, {"industry": "Manufacturing", "country": "Poland", "outcome": "Phased BW migration: Phase 1 (BW Bridge) in 4 months, Phase 2 (native Datasphere models) ongoing. Old BW system shut down after 8 months."}], "de": [{"industry": "Automotive", "country": "Deutschland", "outcome": "3.500 BW-Objekte bewertet. 2.200 in 6 Monaten migriert. Reports weiter ohne Schulung."}, {"industry": "Versorger", "country": "Oesterreich", "outcome": "BW Bridge fuer Regulatorik. 400 Queries migriert. BW-Hardware abgeschaltet, 180K EUR/Jahr gespart."}, {"industry": "Fertigung", "country": "Polen", "outcome": "Phasenweise Migration. Altes BW nach 8 Monaten abgeschaltet."}]}, "roi": {"en": ["40-60% reduction in analytics infrastructure cost (BW hardware eliminated)", "60-70% of BW content migrates with minimal effort (automated tools)", "Zero report disruption for end users during migration", "Preserve 5-10+ years of business logic investment", "Enable gradual modernization (no big-bang required)"], "de": ["40-60% weniger Analytics-Infrastrukturkosten", "60-70% BW-Content migriert mit minimalem Aufwand", "Null Report-Stoerung fuer Endanwender", "5-10+ Jahre Business-Logik-Investition erhalten", "Graduelle Modernisierung moeglich"]}, "meeComp": {"en": [{"competitor": "Rebuild on Snowflake/Databricks", "strength": "Modern, open, performant, no SAP dependency", "counter": "BW Bridge: preserves years of BW logic, no rebuild cost, reports continue working. Rebuilding from scratch = 12-24 month project with risk."}, {"competitor": "Microsoft Fabric migration", "strength": "Unified analytics, Power BI native, Copilot integration", "counter": "BW Bridge: BW semantics preserved (Fabric cannot interpret). SAP data context maintained. Lower migration risk."}, {"competitor": "Stay on BW/4HANA (on-premise)", "strength": "No migration effort, existing team skills", "counter": "Staying = growing infrastructure cost, no AI/cloud benefits, isolation from modern data ecosystem. BW Bridge is the gentle path forward."}], "de": [{"competitor": "Neubau auf Snowflake/Databricks", "strength": "Modern, offen, performant", "counter": "BW Bridge: BW-Logik erhalten, kein Neubau, Reports funktionieren. Neubau = 12-24 Monate Risiko."}, {"competitor": "Microsoft Fabric Migration", "strength": "Unified Analytics, Power BI, Copilot", "counter": "BW Bridge: BW-Semantik erhalten, SAP-Kontext, niedrigeres Risiko."}, {"competitor": "Auf BW/4HANA bleiben", "strength": "Kein Aufwand, Team-Skills", "counter": "Wachsende Kosten, keine KI/Cloud, Isolation. BW Bridge = sanfter Weg."}]}}], "Spend Management": [{"name": "SAP Ariba", "sub": {"en": "Intelligent Procurement - Source, Contract, Procure, Pay Across 5M+ Suppliers", "de": "Intelligenter Einkauf - Sourcing, Vertraege, Beschaffung, Zahlung ueber 5M+ Lieferanten"}, "elev": {"en": "SAP Ariba is the world's largest B2B procurement network, connecting over 5 million buyers and suppliers on a single platform. It covers the full source-to-pay cycle: strategic sourcing (finding and qualifying suppliers), contract management, operational procurement (requisition to PO), invoice management, and supplier management. The network effect is the killer differentiator - once you are on Ariba, you access a pre-connected supplier ecosystem where electronic transactions replace manual processes. For procurement organizations, Ariba transforms purchasing from a transactional back-office function into a strategic value driver with full spend visibility, compliance automation, and negotiation intelligence.", "de": "SAP Ariba ist das weltweit groesste B2B-Beschaffungsnetzwerk mit ueber 5 Millionen Kaeufern und Lieferanten auf einer Plattform. Voller Source-to-Pay-Zyklus: strategisches Sourcing, Vertragsmanagement, operativer Einkauf, Rechnungsmanagement und Lieferantenmanagement. Der Netzwerkeffekt ist der entscheidende Differenzierer - auf Ariba zugreifen bedeutet Zugang zu einem vorvernetzten Lieferanten-Oekosystem."}, "pain": {"en": ["Maverick spend: 40-60% of purchases happen outside procurement processes - no visibility, no leverage, no compliance", "Cannot see total spend across the organization - fragmented systems, local contracts, off-contract purchases make spend analytics impossible", "Supplier management is reactive: no systematic performance tracking, risk monitoring, or relationship development", "Sourcing events take too long - RFx processes are manual, comparison is in Excel, and negotiations lack data-driven intelligence", "Invoice processing is a manual bottleneck: paper invoices, manual matching, payment delays causing supplier friction", "Contract compliance is low: negotiated terms exist but are not enforced during purchase because procurement and contracting systems are disconnected", "No visibility into supplier risk: financial stability, ESG compliance, concentration risk - discovered only when a supplier fails"], "de": ["Maverick Spend: 40-60% der Einkauefe ausserhalb Einkaufsprozesse - keine Sichtbarkeit, kein Hebel", "Gesamtspend nicht sichtbar - fragmentierte Systeme, lokale Vertraege, Off-Contract-Einkauefe", "Lieferantenmanagement reaktiv: kein systematisches Performance-Tracking oder Risikoueberwachung", "Sourcing-Events dauern zu lange - manuelle RFx, Excel-Vergleiche", "Rechnungsverarbeitung manueller Engpass: Papier, manuelles Matching, Zahlungsverzoegerungen", "Vertrags-Compliance niedrig: Konditionen verhandelt aber nicht durchgesetzt beim Kauf", "Keine Lieferantenrisiko-Sichtbarkeit: Finanzen, ESG, Konzentrationsrisiko - erst bei Ausfall entdeckt"]}, "questions": {"en": [{"t": "Spend visibility", "q": "Can you tell me today, with confidence, what your organization spent by category, supplier, and business unit last quarter? How much of that spend was on-contract?"}, {"t": "Maverick spend", "q": "What percentage of purchases happen outside the formal procurement process? And what does that uncontrolled spend cost you in missed savings and compliance risk?"}, {"t": "Supplier network", "q": "How many active suppliers do you have? How do new suppliers get onboarded - and how long does that process take from request to first PO?"}, {"t": "Sourcing efficiency", "q": "Walk me through a typical sourcing event. How long from identifying a need to having a signed contract with a qualified supplier?"}, {"t": "Invoice pain", "q": "What is your invoice processing cost? How many are paper, how many electronic? What is the average cycle time from receipt to approval to payment?"}, {"t": "Risk awareness", "q": "Have you experienced a significant supplier disruption in the last 2 years? How did you find out - proactive monitoring or reactive crisis?"}, {"t": "Savings pressure", "q": "What procurement savings target does your CPO have? And how much can realistically be achieved with current tools and processes?"}], "de": [{"t": "Spend-Sichtbarkeit", "q": "Koennen Sie heute zuverlaessig sagen was die Organisation nach Kategorie, Lieferant und Bereich ausgegeben hat? Wie viel davon on-contract?"}, {"t": "Maverick Spend", "q": "Welcher Anteil der Einkauefe laeuft ausserhalb des formalen Prozesses? Kosten an entgangenen Einsparungen?"}, {"t": "Lieferantennetz", "q": "Wie viele aktive Lieferanten? Wie werden neue ongeboardet - und wie lange dauert das?"}, {"t": "Sourcing", "q": "Typisches Sourcing-Event: Wie lange von Bedarfserkennung bis signiertem Vertrag?"}, {"t": "Rechnungen", "q": "Rechnungsverarbeitungskosten? Anteil Papier vs. elektronisch? Durchschnittliche Zykluszeit?"}, {"t": "Risikobewusstsein", "q": "Signifikante Lieferantendisruption in letzten 2 Jahren? Proaktiv erkannt oder reaktiv?"}, {"t": "Einsparungsdruck", "q": "Welches Savings-Target hat der CPO? Wie viel realistisch mit aktuellen Tools erreichbar?"}]}, "diff": {"en": ["Network effect: 5M+ pre-connected suppliers. Your new supplier may already be on Ariba, meaning instant electronic connectivity - no EDI setup, no integration project", "Unified source-to-pay: sourcing, contracts, procurement, invoicing, and payment in one platform - complete audit trail from need to payment", "Spend intelligence: AI-powered spend classification, benchmarking against network-wide data, and savings opportunity identification", "Supplier risk monitoring: continuous monitoring of financial health, ESG compliance, news sentiment, and geographic risk for your supplier base", "Guided buying: Amazon-like purchasing experience that ensures compliance while giving users freedom - channel spend through contracts without friction", "Community intelligence: leverage anonymized network data - see how much others pay for similar goods, identify alternative suppliers, benchmark lead times", "Integrated with S/4HANA: seamless flow from SAP ERP requisition to Ariba sourcing/procurement and back - one process across systems"], "de": ["Netzwerkeffekt: 5M+ vorvernetzte Lieferanten. Sofortige elektronische Konnektivitaet ohne EDI-Projekte", "Einheitlicher Source-to-Pay: Sourcing, Vertraege, Einkauf, Rechnungen, Zahlung auf einer Plattform", "Spend Intelligence: KI-Klassifikation, Benchmarking gegen Netzwerkdaten, Savings-Identifikation", "Lieferantenrisiko-Monitoring: kontinuierliche Ueberwachung von Finanzen, ESG, News, Geografie", "Guided Buying: Amazon-aehnliche Erfahrung die Compliance sichert bei User-Freiheit", "Community Intelligence: anonymisierte Netzwerkdaten fuer Preisvergleich und Alternativ-Lieferanten", "S/4HANA-integriert: nahtloser Fluss von Requisition zu Ariba und zurueck"]}, "talk": {"en": [{"p": "Open", "l": "Here is what I consistently see in procurement organizations your size: you have negotiated great contracts, but actual spend compliance is below 60%. That means 40% of your purchasing power - the leverage you fought to build - is wasted because people buy around the system."}, {"p": "Pain", "l": "And the root cause is usually the same: procurement systems are too complex for end users, supplier onboarding takes too long, and there is no easy path between needing something and buying it compliantly. So people find workarounds."}, {"p": "Vision", "l": "What if purchasing was as easy as Amazon - but compliant, on-contract, and visible? What if new suppliers were connected in days, not months? And what if you could see every dollar spent, by every department, against every contract - in real-time?"}, {"p": "Proof", "l": "[Reference customer] went from 45% spend-under-management to 85% within 18 months. They achieved 12% addressable savings through better compliance, network-powered supplier discovery, and AI-identified savings opportunities that were invisible before."}, {"p": "Next Step", "l": "The most impactful starting point is a spend analysis. We run your AP data through Ariba's AI-powered classification engine and give you a fact-based picture of where spend is going, where it is off-contract, and where the biggest savings opportunities hide. Takes 3-4 weeks, eye-opening results."}], "de": [{"p": "Eroeffnung", "l": "Was ich durchgehend sehe: gute Vertraege verhandelt, aber echte Spend-Compliance unter 60%. 40% der Einkaufsmacht verpufft weil am System vorbei gekauft wird."}, {"p": "Schmerz", "l": "Ursache: Systeme zu komplex, Lieferanten-Onboarding zu lang, kein einfacher Weg von Bedarf zu compliantem Kauf. Also Workarounds."}, {"p": "Vision", "l": "Einkauf so einfach wie Amazon - aber compliant, on-contract, sichtbar. Neue Lieferanten in Tagen verbunden. Jeden Euro sehen, jede Abteilung, jeder Vertrag - in Echtzeit."}, {"p": "Beweis", "l": "[Referenz] von 45% auf 85% Spend-under-Management in 18 Monaten. 12% adressierbare Savings durch Compliance und netzwerkgestuetzte Identifikation."}, {"p": "Naechster Schritt", "l": "Spend-Analyse: AP-Daten durch KI-Klassifikation - faktisches Bild wo Spend hingeht, wo off-contract, wo groesste Savings. 3-4 Wochen."}]}, "comp": {"en": [{"v": "Coupa", "d": "Coupa is strong in user experience and adoption. Ariba differentiates with network size (5M+ vs. Coupa's smaller network), deeper SAP integration, and sourcing/contract management depth. For SAP-centric enterprises, Ariba provides native integration that Coupa requires middleware to achieve."}, {"v": "Jaggaer", "d": "Jaggaer focuses on direct materials and manufacturing procurement. Ariba is stronger in indirect, has a larger network, and provides unified source-to-pay. Jaggaer's direct material capabilities are being closed by Ariba's growing manufacturing industry focus."}, {"v": "Oracle Procurement Cloud", "d": "Oracle bundles procurement into its cloud ERP. Ariba provides a dedicated best-of-breed procurement platform with the world's largest supplier network - a capability Oracle simply does not have. Network intelligence is unique to Ariba."}, {"v": "Manual / Email / Spreadsheets", "d": "No visibility, no compliance, no leverage, no audit trail. Every manual process costs 10-50x more per transaction than automated. The savings from automation alone typically pays for Ariba within the first year."}], "de": [{"v": "Coupa", "d": "Coupa stark in UX. Ariba mit groesserem Netzwerk (5M+), tieferer SAP-Integration und Sourcing/Contract-Tiefe."}, {"v": "Jaggaer", "d": "Jaggaer fokussiert Direktmaterial. Ariba staerker in Indirect, groesseres Netzwerk, einheitlicher S2P."}, {"v": "Oracle Procurement", "d": "Oracle buendelt in ERP. Ariba ist dedizierte Best-of-Breed-Plattform mit weltgroesstem Netzwerk."}, {"v": "Manuell / Email", "d": "Keine Sichtbarkeit, Compliance oder Leverage. Jeder manuelle Prozess kostet 10-50x mehr. Automation zahlt Ariba im ersten Jahr."}]}, "dont": {"en": ["Do not lead with technology or network statistics - lead with business outcomes: savings, compliance, speed, risk reduction", "Never underestimate Coupa in competitive situations - they have strong UX and customer success. Focus on network advantage and SAP integration depth", "Do not promise instant savings without effort - realizing procurement value requires organizational change, supplier enablement, and process redesign", "Avoid positioning as 'just e-procurement' - Ariba is strategic sourcing + supplier management + risk + procurement + invoicing", "Never dismiss the supplier adoption challenge - getting suppliers to transact electronically requires an enablement strategy"], "de": ["Nicht mit Technologie fuehren - mit Ergebnissen: Savings, Compliance, Geschwindigkeit, Risikosenkung", "Coupa nicht unterschaetzen - starkes UX. Auf Netzwerk und SAP-Integration fokussieren", "Keine Instant-Savings ohne Aufwand versprechen - braucht org. Change und Lieferanten-Enablement", "Nicht als 'nur E-Procurement' positionieren - ist strategisch: Sourcing, SRM, Risiko, Invoicing", "Lieferanten-Adoption-Herausforderung nicht abtun - braucht Enablement-Strategie"]}, "qual": {"en": ["Addressable spend above 100M EUR with significant portion unmanaged or off-contract", "CPO mandate for cost reduction (typically 5-15% savings target)", "Manual procurement processes consuming excessive FTEs", "Poor spend visibility - cannot answer basic questions about where money goes", "Supplier risk exposure highlighted by recent disruption", "Existing SAP ERP wanting integrated source-to-pay", "Large supplier base (500+) with low electronic transaction rate"], "de": ["Adressierbarer Spend ueber 100M EUR mit ungemanagtem Anteil", "CPO-Mandat zur Kostensenkung (5-15% Savings-Target)", "Manuelle Einkaufsprozesse verbrauchen FTEs", "Schlechte Spend-Sichtbarkeit", "Lieferantenrisiko durch Disruption sichtbar geworden", "SAP-ERP mit Wunsch nach integriertem S2P", "Grosse Lieferantenbasis (500+) mit wenig elektronischen Transaktionen"]}, "indDiff": {"en": [{"i": "Manufacturing", "p": "Complex direct material procurement with multi-tier supplier management, quality-linked sourcing, and production-schedule-driven ordering.", "f": "Direct material sourcing with quality scoring, supplier qualification workflows, production-aligned release scheduling, and multi-tier supply risk visibility through the network."}, {"i": "Public Sector", "p": "Strict regulatory procurement requirements, transparency mandates, small business participation quotas, and complex approval hierarchies.", "f": "Configurable approval workflows meeting public sector regulations, small business tracking and reporting, full audit trail for transparency, compliant sourcing processes."}], "de": [{"i": "Fertigung", "p": "Komplexe Direktmaterial-Beschaffung mit Multi-Tier-SRM, qualitaetsgebundenem Sourcing, produktionsgesteuerter Bestellung.", "f": "Direktmaterial-Sourcing mit Quality Scoring, Qualifizierungs-Workflows, produktionsausgerichtete Abrufe."}, {"i": "Oeffentlicher Sektor", "p": "Strenge regulatorische Beschaffung, Transparenzpflichten, KMU-Quoten, komplexe Genehmigungshierarchien.", "f": "Konfigurierbare Workflows fuer Public Sector, KMU-Tracking, vollstaendiger Audit Trail, compliant Sourcing."}]}, "inds": ["Manufacturing", "Public Sector", "Financial Services", "Retail", "Healthcare", "Energy", "Technology", "All industries with significant procurement volume"], "obj": {"en": [{"o": "We already have a procurement system in ERP", "r": "ERP handles PO processing. Ariba handles STRATEGIC procurement: sourcing events, supplier discovery, contract management, spend analytics, and 5.5M supplier network. ERP is transaction, Ariba is strategy."}, {"o": "Our suppliers will not adopt another portal", "r": "5.5 million suppliers already on Ariba Network. Most of your suppliers are likely already there. For the rest: free basic account. Network effect means they benefit from other customer connections too."}, {"o": "Too complex for our procurement maturity", "r": "Start with one module: Guided Buying (simple, user-friendly purchasing) or Sourcing (competitive bidding). Grow into advanced capabilities over time."}, {"o": "Coupa/Jaggaer is cheaper", "r": "Compare: Ariba includes the largest supplier network (5.5M). Others charge extra for network access or have smaller ecosystems. Also: native SAP ERP integration vs. expensive middleware."}, {"o": "We do not have enough spend to justify it", "r": "Companies with 50M+ EUR addressable spend typically see 5-15% savings. That is 2.5-7.5M EUR value. Ariba ROI is typically under 12 months for mid-market."}], "de": [{"o": "Haben schon Procurement im ERP", "r": "ERP = Transaktionen. Ariba = strategisch: Sourcing, Lieferantennetzwerk, Vertraege, Spend-Analytics."}, {"o": "Lieferanten wollen kein Portal", "r": "5,5 Mio. Lieferanten bereits auf Ariba Network. Kostenloser Basiszugang."}, {"o": "Zu komplex fuer unsere Reife", "r": "Mit einem Modul starten: Guided Buying oder Sourcing. Erweitern ueber Zeit."}, {"o": "Coupa/Jaggaer guenstiger", "r": "Ariba inkl. groesstes Netzwerk (5,5M). Andere berechnen extra. Native SAP-Integration."}, {"o": "Nicht genug Spend", "r": "Ab 50M EUR Spend: 5-15% Einsparung = 2,5-7,5M EUR. ROI unter 12 Monate."}]}, "persona": {"en": [{"role": "CPO / VP Procurement", "msg": "Strategic sourcing, spend visibility, supplier risk management, ESG in supply base", "prio": "Primary"}, {"role": "CFO", "msg": "5-15% procurement savings, maverick spend reduction, working capital optimization", "prio": "Primary"}, {"role": "Category Manager", "msg": "Sourcing events, contract compliance, supplier performance, market intelligence", "prio": "Champion"}, {"role": "Sustainability Officer", "msg": "Supplier ESG scoring, sustainable sourcing, scope 3 data from supply base", "prio": "Emerging"}], "de": [{"role": "CPO / VP Einkauf", "msg": "Strategisches Sourcing, Spend-Sichtbarkeit, Lieferantenrisiko, ESG", "prio": "Primaer"}, {"role": "CFO", "msg": "5-15% Einsparung, Maverick-Spend, Working Capital", "prio": "Primaer"}, {"role": "Kategorie-Manager", "msg": "Sourcing-Events, Vertrags-Compliance, Supplier Performance", "prio": "Champion"}, {"role": "Nachhaltigkeitsbeauftragter", "msg": "Lieferanten-ESG, nachhaltiger Einkauf, Scope 3", "prio": "Aufkommend"}]}, "commercial": {"en": {"model": "Subscription (annual, modular)", "metric": "Spend under management + users + transactions", "range": "Starting 100K-250K EUR/year for mid-market. Enterprise: 500K-2M+/year (depends on modules + spend volume)", "includes": "Selected modules (Sourcing, Contracts, Buying, SLP, Network), Ariba Network access"}, "de": {"model": "Subskription (jaehrlich, modular)", "metric": "Managed Spend + Nutzer + Transaktionen", "range": "Ab 100K-250K EUR/Jahr Mittelstand. Enterprise 500K-2M+", "includes": "Module (Sourcing, Contracts, Buying, SLP, Network)"}}, "crossSell": {"en": [{"trigger": "Travel & expense alongside procurement", "solution": "SAP Concur", "why": "Total spend management: indirect (Ariba) + T&E (Concur)"}, {"trigger": "External workforce management", "solution": "SAP Fieldglass", "why": "Complete spend: goods (Ariba) + services/contingent labor (Fieldglass)"}, {"trigger": "ERP transformation", "solution": "RISE with SAP", "why": "Native Ariba-to-S/4HANA integration in RISE bundle"}, {"trigger": "Supply chain risk concerns", "solution": "SAP Supply Chain Control Tower", "why": "Supplier risk from Ariba feeds Control Tower alerts"}], "de": [{"trigger": "Reisekosten neben Procurement", "solution": "SAP Concur", "why": "Total Spend: Indirekt (Ariba) + T&E (Concur)"}, {"trigger": "Externe Arbeitskraefte", "solution": "SAP Fieldglass", "why": "Goods (Ariba) + Services (Fieldglass)"}, {"trigger": "ERP-Transformation", "solution": "RISE with SAP", "why": "Native Ariba-S/4HANA-Integration"}, {"trigger": "Supply-Chain-Risiko", "solution": "SAP Control Tower", "why": "Lieferantenrisiko fuettert Alerts"}]}, "refs": {"en": [{"industry": "Automotive", "country": "Germany", "outcome": "Ariba Sourcing + Contracts for 2B EUR spend. 8% average savings on sourced categories. Contract compliance from 62% to 91%."}, {"industry": "Utilities", "country": "Austria", "outcome": "Guided Buying for 3,000 users. Maverick spend reduced from 35% to 8%. PO cycle time from 5 days to same-day."}, {"industry": "Pharmaceuticals", "country": "Switzerland", "outcome": "Ariba SLP for 5,000 suppliers. Risk assessment automated. 3 critical supply disruptions prevented in year 1."}], "de": [{"industry": "Automotive", "country": "Deutschland", "outcome": "Sourcing + Contracts fuer 2 Mrd. EUR. 8% Einsparung. Vertrags-Compliance von 62% auf 91%."}, {"industry": "Versorger", "country": "Oesterreich", "outcome": "Guided Buying fuer 3.000 User. Maverick-Spend von 35% auf 8%."}, {"industry": "Pharma", "country": "Schweiz", "outcome": "SLP fuer 5.000 Lieferanten. 3 Stoerungen verhindert in Jahr 1."}]}, "roi": {"en": ["5-15% savings on sourced spend categories", "60-80% reduction in maverick (off-contract) spending", "50-70% faster sourcing cycle times", "30-40% reduction in supplier onboarding time", "ROI typically achieved within 9-12 months"], "de": ["5-15% Einsparung auf gesourcte Kategorien", "60-80% weniger Maverick-Spend", "50-70% schnellere Sourcing-Zyklen", "30-40% schnelleres Lieferanten-Onboarding", "ROI typisch in 9-12 Monaten"]}, "meeComp": {"en": [{"competitor": "Coupa", "strength": "Modern UX, easy deployment, BSM positioning, good mid-market traction", "counter": "Ariba: 5.5M supplier network (vs. Coupa's smaller network), deeper sourcing/category mgmt, native SAP integration without middleware."}, {"competitor": "Jaggaer", "strength": "Strong in DACH mid-market, industry solutions (automotive, public sector)", "counter": "Ariba: global scale, network effect, broader suite, AI-powered insights. Jaggaer is regional, Ariba is global."}, {"competitor": "Oracle Procurement Cloud", "strength": "Bundled with Oracle ERP, competitive pricing for Oracle shops", "counter": "Ariba: best-in-class network, works with ANY ERP, proven in SAP landscape, stronger supplier collaboration."}], "de": [{"competitor": "Coupa", "strength": "Modernes UX, einfach, BSM, Mittelstand", "counter": "Ariba: 5,5M-Netzwerk, tieferes Sourcing, native SAP-Integration."}, {"competitor": "Jaggaer", "strength": "Stark in DACH-Mittelstand, Branchen", "counter": "Ariba: globaler Scale, Netzwerk-Effekt, breitere Suite, KI."}, {"competitor": "Oracle Procurement", "strength": "Bundle mit Oracle ERP", "counter": "Ariba: bestes Netzwerk, ERP-agnostisch, staerkere Lieferanten-Kollaboration."}]}}, {"name": "SAP Concur", "sub": {"en": "Travel, Expense & Invoice Management - Automated, Compliant, Employee-Friendly", "de": "Reise-, Spesen- & Rechnungsmanagement - Automatisiert, Compliant, Mitarbeiterfreundlich"}, "elev": {"en": "SAP Concur is the world's leading travel and expense management solution, used by over 70 million users globally. It automates the entire employee spending lifecycle: travel booking (within policy), expense reporting (receipt capture to reimbursement), invoice processing, and audit. For finance and compliance teams, Concur provides complete visibility and control over employee-initiated spend. For employees, it eliminates the pain of manual expense reports. For companies, it typically delivers 20-30% reduction in T&E costs through policy enforcement, preferred supplier compliance, and fraud detection - while making the process easier for everyone.", "de": "SAP Concur ist die weltweit fuehrende Reise- und Spesenmanagementloesung, genutzt von ueber 70 Millionen Nutzern. Automatisiert den gesamten Mitarbeiter-Ausgabenzyklus: Reisebuchung, Spesenabrechnung, Rechnungsverarbeitung und Audit. Liefert typisch 20-30% T&E-Kostensenkung durch Policyentforcement und Betrugserkennung."}, "pain": {"en": ["Expense reports take employees hours to complete and managers days to approve - manual, tedious, and error-prone", "No real-time visibility into travel and expense spend - finance discovers budget overruns weeks after they happen", "Travel policy compliance is low because booking tools do not enforce it - employees book wherever is easiest, not cheapest", "Lost receipts, missing documentation, and audit findings creating compliance headaches and reimbursement delays", "Cannot detect expense fraud or duplicate submissions systematically - relying on manager review which catches maybe 10%", "Travel program savings unrealized: negotiated hotel/airline rates not used because employees do not know about them or find them inconvenient", "Invoice processing for non-PO spend (services, subscriptions) is a manual matching nightmare with no automation"], "de": ["Spesenabrechnungen kosten Mitarbeitern Stunden und Managern Tage - manuell, muehsam, fehleranfaellig", "Keine Echtzeit-Sicht auf T&E-Spend - Finance entdeckt Budget-Ueberziehungen Wochen spaeter", "Reisepolicy-Compliance niedrig weil Buchungstools sie nicht durchsetzen", "Verlorene Belege, fehlende Dokumentation, Audit-Findings", "Betrug und Doppeleinreichungen nicht systematisch erkennbar", "Reiseprogramm-Savings unrealisiert: verhandelte Raten nicht genutzt", "Rechnungsverarbeitung fuer Non-PO-Spend manuell ohne Automation"]}, "questions": {"en": [{"t": "Current process", "q": "Walk me through what happens today when an employee comes back from a business trip. How long does it take from trip end to reimbursement?"}, {"t": "Compliance", "q": "What is your travel policy compliance rate? Do employees book through preferred channels, or do they book wherever is most convenient?"}, {"t": "Cost visibility", "q": "Can your CFO see total T&E spend in real-time, broken down by department, category, and policy compliance - or does it take weeks to compile?"}, {"t": "Fraud risk", "q": "Have you discovered expense fraud or significant policy violations in the last year? How were they caught - systematically or accidentally?"}, {"t": "Employee satisfaction", "q": "How do employees feel about the expense process? Is it a frequent complaint, or something that works smoothly?"}, {"t": "Travel program", "q": "Do you have negotiated rates with hotels, airlines, or car rental companies? What percentage of bookings actually use those rates?"}, {"t": "Scale", "q": "How many expense reports are processed monthly? How many employees travel regularly?"}], "de": [{"t": "Aktueller Prozess", "q": "Was passiert wenn ein Mitarbeiter von einer Reise zurueckkommt? Wie lange bis Erstattung?"}, {"t": "Compliance", "q": "Reisepolicy-Compliance-Rate? Buchen Mitarbeiter ueber bevorzugte Kanaele?"}, {"t": "Kostensichtbarkeit", "q": "Kann der CFO T&E-Spend in Echtzeit sehen nach Abteilung, Kategorie, Compliance?"}, {"t": "Betrugsrisiko", "q": "Spesenbetrug oder Policy-Verstoesse im letzten Jahr entdeckt? Systematisch oder zufaellig?"}, {"t": "Mitarbeiterzufriedenheit", "q": "Wie empfinden Mitarbeiter den Spesenprozess? Haeufige Beschwerde?"}, {"t": "Reiseprogramm", "q": "Verhandelte Raten? Welcher Anteil nutzt sie tatsaechlich?"}, {"t": "Volumen", "q": "Monatliche Spesenabrechnungen? Regelmaessig reisende Mitarbeiter?"}]}, "diff": {"en": ["70M+ users globally: proven at massive scale, continuously improved through billions of transactions across industries and geographies", "Mobile-first experience: photograph receipts, auto-populate expense lines via OCR, submit on-the-go. Minimal manual effort", "Integrated travel booking: employees book within Concur, system enforces policy during booking (not after), preferred suppliers surfaced automatically", "AI-powered audit: automatically flags policy violations, duplicate expenses, fraud patterns - not just sampling but every single transaction analyzed", "Real-time spend visibility: dashboards showing T&E spend as it happens, not after month-end compilation. Budget alerts before overruns", "Connected ecosystem: direct connections to airlines, hotels, ride-sharing, card providers - transactions flow automatically without manual entry", "Configurable policy engine: complex multi-level policies (by country, grade, project, client) enforced automatically during booking and reporting"], "de": ["70M+ Nutzer: bewiesen in Massstab, kontinuierlich verbessert durch Milliarden Transaktionen", "Mobile-first: Belege fotografieren, OCR auto-ausfuellen, unterwegs einreichen", "Integrierte Reisebuchung: Policy wird WAEHREND Buchung durchgesetzt, nicht danach", "KI-Audit: automatische Policy-Verstoesse, Duplikate, Betrugsmuster - jede Transaktion analysiert", "Echtzeit-Sicht: T&E-Spend wie er entsteht, nicht nach Monatsende. Budget-Alerts", "Connected Ecosystem: Airlines, Hotels, Ride-Sharing, Karten - automatischer Datenfluss", "Konfigurierbarer Policy-Engine: komplexe Regeln automatisch durchgesetzt"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you: what is your company's total T&E spend annually? Now - what percentage of that could you reduce if every booking was compliant, every receipt was captured, and every policy violation was caught before approval?"}, {"p": "Pain", "l": "The pattern I see everywhere: employees hate doing expenses (so they delay or do them poorly), managers rubber-stamp approvals (so policy violations pass), and finance discovers problems weeks later with no ability to recover. Everyone loses."}, {"p": "Vision", "l": "What if expense reporting was as easy as taking a photo? What if travel bookings automatically showed policy-compliant options first? What if every transaction was AI-audited in real-time, and your CFO had a live dashboard of all employee spend?"}, {"p": "Proof", "l": "[Reference customer] reduced T&E processing cost by 65%, improved policy compliance from 55% to 88%, and identified over 500K in previously undetected duplicate/fraudulent submissions in the first year."}, {"p": "Next Step", "l": "The fastest value demonstration is a benchmark analysis. We compare your T&E metrics (cost per report, compliance rate, cycle time) against industry benchmarks and calculate the savings potential. Usually takes 2 weeks and produces a compelling CFO-ready business case."}], "de": [{"p": "Eroeffnung", "l": "Gesamte T&E-Ausgaben jaehrlich? Welcher Anteil reduzierbar wenn jede Buchung compliant, jeder Beleg erfasst, jeder Verstoss erkannt?"}, {"p": "Schmerz", "l": "Ueberall dasselbe: Mitarbeiter hassen Spesen, Manager genehmigen blind, Finance entdeckt Probleme Wochen spaeter. Alle verlieren."}, {"p": "Vision", "l": "Spesenerfassung so einfach wie ein Foto. Buchungen zeigen automatisch Policy-konforme Optionen. Jede Transaktion KI-geprueft. CFO hat Live-Dashboard."}, {"p": "Beweis", "l": "[Referenz] -65% Verarbeitungskosten, Compliance von 55% auf 88%, 500K an Duplikaten/Betrug im ersten Jahr erkannt."}, {"p": "Naechster Schritt", "l": "Benchmark-Analyse: T&E-Metriken gegen Branche vergleichen und Savings-Potenzial berechnen. 2 Wochen, CFO-ready Business Case."}]}, "comp": {"en": [{"v": "Emburse (Certify/Abacus)", "d": "Smaller solutions for SMB. Concur delivers enterprise scale, global coverage, complex policy engines, and integrated travel booking. Different league for organizations above 1000 employees."}, {"v": "Navan (TripActions)", "d": "Navan is strong in travel booking UX and employee experience. Concur counters with deeper expense management, stronger audit/compliance, SAP integration, and proven enterprise scale. Navan is newer and less proven in complex global deployments."}, {"v": "Manual/Excel process", "d": "Manual expense processing costs 20-50 EUR per report. Concur brings that below 5 EUR. Plus: compliance, visibility, fraud detection, and employee satisfaction improvements that manual processes cannot deliver."}], "de": [{"v": "Emburse", "d": "SMB-Loesungen. Concur liefert Enterprise-Skalierung, globale Abdeckung, komplexe Policy-Engines."}, {"v": "Navan", "d": "Stark in Buchungs-UX. Concur staerker in Spesen, Audit/Compliance, SAP-Integration und Enterprise-Skalierung."}, {"v": "Manuell/Excel", "d": "Manuelle Verarbeitung 20-50 EUR pro Bericht. Concur unter 5 EUR. Plus Compliance und Betrugserkennung."}]}, "dont": {"en": ["Do not focus only on cost savings - employee experience improvement is equally important for adoption and stakeholder buy-in", "Never underestimate the integration effort with existing ERP, HR, and payroll systems - plan for it in the timeline", "Do not promise overnight policy compliance - achieving high compliance requires change management and employee communication", "Avoid positioning as 'just expense software' - the travel booking integration and AI audit capabilities are major differentiators", "Do not ignore local requirements in global deployments - tax rules, per diem rates, and receipt requirements vary significantly by country"], "de": ["Nicht nur Kostensavings fokussieren - Employee Experience ist gleichwichtig fuer Adoption", "Integrationsaufwand mit ERP, HR, Payroll nicht unterschaetzen", "Nicht ueber Nacht Policy-Compliance versprechen - braucht Change Management", "Nicht als 'nur Spesensoftware' positionieren - Reisebuchung und KI-Audit sind Differenzierer", "Lokale Anforderungen in globalen Deployments nicht ignorieren - Steuerregeln, Per Diem variieren stark"]}, "qual": {"en": ["1000+ employees with regular business travel", "Current expense process is paper-based, Excel-based, or uses outdated tools", "T&E spend exceeding 5M EUR annually with suspected compliance gaps", "CFO mandate to improve spend visibility and reduce T&E costs", "Frequent audit findings related to travel and expense compliance", "Employee complaints about expense process complexity and reimbursement delays", "Global organization needing multi-country, multi-currency expense management"], "de": ["1000+ Mitarbeiter mit regelmaessigen Dienstreisen", "Aktueller Prozess papierbasiert oder mit veralteten Tools", "T&E-Spend ueber 5M EUR mit vermuteten Compliance-Luecken", "CFO-Mandat fuer Spend-Sichtbarkeit und T&E-Kostensenkung", "Haeufige Audit-Findings zu T&E-Compliance", "Mitarbeiterbeschwerden ueber Prozess und Erstattungsdauer", "Globale Organisation mit Multi-Country-Anforderungen"]}, "indDiff": {"en": [{"i": "Professional Services / Consulting", "p": "Billable travel expenses that must be accurately captured, categorized by client/project, and passed through to invoicing. Time sensitivity for project accounting.", "f": "Project/client coding at capture, billable vs. non-billable classification, direct integration with project billing systems, per-project spend analytics for margin management."}, {"i": "Government / Public Sector", "p": "Strict per diem rules, pre-approval requirements, taxpayer accountability, and detailed audit trail requirements. Every cent must be justified.", "f": "Configurable per diem engine by location, mandatory pre-approval workflows, full audit trail with document retention, public-sector-specific compliance reporting."}], "de": [{"i": "Professional Services", "p": "Abrechenbare Reisekosten nach Kunde/Projekt kategorisiert fuer Rechnungsstellung. Zeit-Sensitivitaet.", "f": "Projekt-/Kunden-Codierung bei Erfassung, billable/non-billable Klassifikation, Projektabrechnungs-Integration."}, {"i": "Oeffentlicher Sektor", "p": "Strenge Per-Diem-Regeln, Vorabgenehmigung, Rechenschaftspflicht, detaillierte Audit Trails.", "f": "Per-Diem-Engine nach Standort, obligatorische Vorab-Workflows, vollstaendiger Audit Trail."}]}, "inds": ["Professional Services", "Financial Services", "Technology", "Manufacturing", "Public Sector", "Energy", "Healthcare", "All industries with business travel"], "obj": {"en": [{"o": "Excel/manual expense reports work for us", "r": "At what cost? Average manual expense report costs 40-50 EUR to process. With 500+ reports/month, automation saves 250K+ EUR/year. Plus: policy violations go undetected."}, {"o": "We do not travel enough to justify it", "r": "Concur covers ALL employee expenses: meals, supplies, mileage, subscriptions - not just flights. If you reimburse employees, Concur adds value."}, {"o": "Our ERP handles expense processing", "r": "ERP processes the payment. Concur handles the experience: mobile receipt capture, policy enforcement, approval workflows, audit compliance, and travel booking integration."}, {"o": "Employees will resist another app", "r": "Concur mobile: snap receipt photo, done. No filling forms. AI categorizes, policy checks automatically. Employees get reimbursed faster. Adoption is typically 90%+ within 3 months."}, {"o": "Implementation is disruptive", "r": "Concur SaaS: no infrastructure. Standard configuration in 6-10 weeks. Employees adopt naturally due to mobile simplicity. Minimal training required."}], "de": [{"o": "Excel reicht fuer uns", "r": "Manueller Report kostet 40-50 EUR. Bei 500+ Reports/Monat: 250K+ EUR/Jahr Ersparnis."}, {"o": "Nicht genug Reisen", "r": "Concur fuer ALLE Spesen: Mahlzeiten, Material, Km, Abos - nicht nur Fluege."}, {"o": "ERP macht Spesenverarbeitung", "r": "ERP zahlt. Concur: Erlebnis, Mobil-Belege, Policy, Workflows, Audit."}, {"o": "Mitarbeiter wollen keine weitere App", "r": "Concur Mobile: Beleg fotografieren, fertig. KI kategorisiert. 90%+ Adoption."}, {"o": "Imple 5-90% reduction in processing time (from days to hours)", "15-25% reduction in T&E spend through policy enforcement", "95%+ audit compliance (vs. typical 40-60% with manual)", "ROI typically achieved within 6-9 months"], "de": ["50-70% weniger Kosten pro Spesenabrechnung", "75-90% kuerzere Bearbeitungszeit", "15-25% T&E-Reduktion durch Policy-Enforcement", "95%+ Audit-Compliance", "ROI in 6-9 Monaten"]}, "meeComp": {"en": [{"competitor": "Rydoo", "strength": "European-focused, simple UX, competitive pricing for SMB", "counter": "Concur: global coverage (200+ countries), deeper policy engine, travel integration, proven enterprise scale. Rydoo struggles above 1000 users."}, {"competitor": "Yokoy (Swiss)", "strength": "AI-first, modern Swiss fintech, strong DACH positioning", "counter": "Concur: 70M+ users globally, integration depth (SAP, any ERP), travel ecosystem. Yokoy is young with limited enterprise references."}, {"competitor": "Expensify / Brex", "strength": "Modern UX, card-first approach, startup-friendly", "counter": "Concur: enterprise features (multi-country policy, audit trail, compliance), SAP integration, travel management. Consumer-grade tools lack governance."}], "de": [{"competitor": "Rydoo", "strength": "Europa-fokussiert, einfach, SMB-Preis", "counter": "Concur: global (200+ Laender), tiefere Policy, Travel, Enterprise-Scale."}, {"competitor": "Yokoy", "strength": "KI-first, Schweizer Fintech, DACH", "counter": "Concur: 70M+ User, Integrations-Tiefe, Travel-Oekosystem."}, {"competitor": "Expensify / Brex", "strength": "Modernes UX, Karten-first, Startups", "counter": "Concur: Enterprise-Governance, Multi-Country, SAP-Integration."}]}}, {"name": "SAP Fieldglass", "sub": {"en": "External Workforce Management - Visibility & Control Over Contingent Labor, SOW, and Services", "de": "Externes Workforce Management - Sichtbarkeit & Kontrolle ueber Zeitarbeit, SOW und Services"}, "elev": {"en": "SAP Fieldglass is the leading Vendor Management System (VMS) for managing external workforce and services procurement. In most enterprises, 30-50% of the total workforce is now external (contractors, temps, consultants, freelancers, outsourced services). Fieldglass provides complete visibility and control over this spend: from requesting a worker or service, through supplier selection, worker engagement, time tracking, deliverable management, to invoice and payment. Without a VMS, this massive spend category is typically invisible to procurement, unmanaged by HR, and represents significant compliance and cost risk.", "de": "SAP Fieldglass ist das fuehrende Vendor Management System fuer externes Workforce und Services-Procurement. In den meisten Unternehmen sind 30-50% der Workforce extern. Fieldglass gibt volle Sichtbarkeit und Kontrolle: von Anforderung ueber Lieferantenselektion, Engagement, Zeiterfassung, Deliverable-Management bis Rechnung und Zahlung."}, "pain": {"en": ["No visibility into how many external workers are engaged, who they are, what they cost, or when their engagements end", "Managers engage contractors and consultants directly without procurement involvement - spend is invisible until invoices arrive", "Cannot compare external worker rates against market benchmarks - consistently overpaying because there is no rate intelligence", "Statement of Work (SOW) projects poorly managed: deliverables unclear, milestones missed, spend escalates without accountability", "Co-employment and compliance risk: external workers treated like employees without proper classification, creating legal exposure", "Supplier performance not tracked: same staffing agencies used regardless of quality because there is no systematic measurement", "Total workforce planning impossible: HR sees internal headcount, no one sees the full picture including external workers"], "de": ["Keine Sichtbarkeit wie viele Externe engagiert sind, wer, was sie kosten, wann Engagement endet", "Manager engagieren Contractor direkt ohne Einkauf - Spend erst bei Rechnungseingang sichtbar", "Raten nicht gegen Markt benchmarkbar - konsistente Ueberzahlung", "SOW-Projekte schlecht gemanagt: Deliverables unklar, Milestones verfehlt, Spend eskaliert", "Co-Employment-Risiko: Externe wie Mitarbeiter behandelt ohne korrekte Klassifizierung", "Lieferantenperformance nicht getrackt", "Total Workforce Planning unmoeglich - HR sieht nur Interne"]}, "questions": {"en": [{"t": "External spend", "q": "Do you know your total annual spend on external workforce - contractors, temps, SOW services, freelancers? If I asked right now, could you give me a number?"}, {"t": "Visibility gap", "q": "Does your CPO or CHRO know how many external workers are in the building today? Which projects they are on? When their contracts expire?"}, {"t": "Rate management", "q": "How are rates for external workers determined? Is there market benchmarking, or is it negotiated ad-hoc between the hiring manager and the staffing agency?"}, {"t": "Compliance", "q": "Have you had any co-employment risk situations, worker misclassification concerns, or regulatory audit findings related to external workforce?"}, {"t": "SOW management", "q": "How are Statement of Work engagements managed today? Who tracks deliverables, milestones, and spend against budget?"}, {"t": "Supplier performance", "q": "How do you evaluate which staffing agencies perform best? Is there data-driven ranking, or is it based on relationship and habit?"}, {"t": "Total workforce", "q": "Can you see your full workforce - internal employees plus all external workers - in one view for capacity planning?"}], "de": [{"t": "Externer Spend", "q": "Kennen Sie Ihren Gesamt-Jahres-Spend fuer externe Workforce? Koennten Sie mir jetzt eine Zahl nennen?"}, {"t": "Sichtbarkeit", "q": "Weiss Ihr CPO/CHRO wie viele Externe heute im Unternehmen sind? Auf welchen Projekten? Wann Vertraege enden?"}, {"t": "Ratenmanagement", "q": "Wie werden Raten bestimmt? Markt-Benchmarking oder Ad-hoc zwischen Manager und Staffing-Agentur?"}, {"t": "Compliance", "q": "Co-Employment-Risiken, Fehlklassifizierung oder Audit-Findings bei externer Workforce?"}, {"t": "SOW", "q": "Wie werden SOW-Engagements gemanagt? Wer trackt Deliverables, Milestones, Spend?"}, {"t": "Lieferantenperformance", "q": "Wie werden Staffing-Agenturen bewertet? Datengetrieben oder Beziehung/Gewohnheit?"}, {"t": "Total Workforce", "q": "Volle Workforce-Sicht - Interne plus alle Externe - fuer Kapazitaetsplanung moeglich?"}]}, "diff": {"en": ["Complete external workforce visibility: every contingent worker, SOW project, and service engagement visible in one platform with cost, timeline, and compliance status", "Rate intelligence: market benchmarking against millions of engagements in the Fieldglass network. Know if you are overpaying before you approve", "SOW lifecycle management: from scope definition through milestone tracking to deliverable acceptance and payment - accountability for every services dollar", "Compliance automation: worker classification rules, tenure tracking, automatic alerts for co-employment risk, and regulatory-compliant processes", "Supplier scorecard: data-driven staffing agency performance tracking - fill rate, quality, time-to-fill, attrition - driving better supplier decisions", "Total workforce view: combine with SuccessFactors for full internal + external workforce visibility for capacity planning and skills gap analysis", "Network effect: pre-connected staffing agencies and suppliers for faster sourcing of external talent"], "de": ["Volle Sichtbarkeit: jeder Externe, SOW, Service in einer Plattform mit Kosten, Timeline, Compliance", "Rate Intelligence: Benchmarking gegen Millionen Engagements im Netzwerk", "SOW-Lifecycle: von Scope bis Deliverable-Abnahme und Zahlung - Accountability", "Compliance-Automation: Klassifizierungsregeln, Tenure-Tracking, automatische Co-Employment-Alerts", "Lieferanten-Scorecard: datengetriebenes Performance-Tracking der Staffing-Agenturen", "Total Workforce View: mit SuccessFactors fuer interne + externe Sicht", "Netzwerkeffekt: vorvernetzte Agenturen fuer schnelleres Sourcing"]}, "talk": {"en": [{"p": "Open", "l": "Here is a question that usually gets an uncomfortable silence: what is your total external workforce spend - contractors, temps, SOW services - and who is accountable for managing it? In most companies, this is 30-40% of total labor cost with zero governance."}, {"p": "Pain", "l": "The risk is threefold: financial (overpaying by 10-20% because there is no rate benchmarking), compliance (co-employment exposure, misclassification liability), and operational (no visibility into who is working on what, creating business continuity risk)."}, {"p": "Vision", "l": "Fieldglass gives you one platform where every external engagement is requested, approved, rate-benchmarked, performance-tracked, and compliantly managed. You see total workforce cost for the first time - internal and external together - and you can make informed decisions."}, {"p": "Proof", "l": "[Reference customer] discovered they were spending 40% more on external workforce than they knew - engagement happened below procurement radar. Within one year on Fieldglass, they achieved 15% rate reduction through benchmarking and consolidated their staffing suppliers from 120 to 30."}, {"p": "Next Step", "l": "The logical first step is an external workforce assessment. We analyze your current external spend, identify where it is unmanaged, benchmark key rates against market, and quantify the compliance exposure. Usually 3-4 weeks for a fact-based picture."}], "de": [{"p": "Eroeffnung", "l": "Eine Frage die meist unbequeme Stille erzeugt: Ihr gesamter externer Workforce-Spend - und wer verantwortet ihn? In den meisten Unternehmen sind das 30-40% der Laborkosten ohne Governance."}, {"p": "Schmerz", "l": "Dreifaches Risiko: finanziell (10-20% Ueberzahlung), Compliance (Co-Employment, Fehlklassifizierung), operativ (kein Wissen wer woran arbeitet)."}, {"p": "Vision", "l": "Fieldglass: eine Plattform wo jedes Engagement angefragt, genehmigt, rate-benchmarkt und compliant gemanagt wird. Erste echte Total-Workforce-Sicht."}, {"p": "Beweis", "l": "[Referenz] entdeckte 40% mehr Externer-Spend als bekannt. In einem Jahr 15% Ratensenkung und Staffing-Lieferanten von 120 auf 30 konsolidiert."}, {"p": "Naechster Schritt", "l": "External Workforce Assessment: Spend analysieren, Unmanaged identifizieren, Raten benchmarken, Compliance-Exposure quantifizieren. 3-4 Wochen."}]}, "comp": {"en": [{"v": "Beeline", "d": "Beeline is a direct VMS competitor. Fieldglass differentiates with superior SAP integration (Ariba, SuccessFactors), larger network, and combined contingent + SOW management in one platform."}, {"v": "Workday VNDLY", "d": "Newer in the VMS space via acquisition. Fieldglass has 20+ years of VMS maturity, larger customer base, proven enterprise scale, and deeper procurement integration through Ariba connection."}, {"v": "No system (managed via email/spreadsheets)", "d": "This is the most common 'competitor' - doing nothing. The conversation centers on making the invisible visible: quantifying the cost of unmanaged external workforce."}], "de": [{"v": "Beeline", "d": "Direkter VMS-Wettbewerber. Fieldglass differenziert mit SAP-Integration, groesserem Netzwerk, kombiniertem Contingent + SOW."}, {"v": "Workday VNDLY", "d": "Neuer im VMS durch Akquisition. Fieldglass hat 20+ Jahre Reife, groessere Basis, bewiesene Enterprise-Skalierung."}, {"v": "Kein System", "d": "Haeufigstes 'Konkurrenz'-Szenario. Gespraech fokussiert: das Unsichtbare sichtbar und steuerbar machen."}]}, "dont": {"en": ["Do not make this only a procurement conversation - involve HR (total workforce strategy) and legal (compliance risk). This is a cross-functional value proposition", "Never underestimate organizational resistance from hiring managers who enjoy direct contractor relationships without oversight", "Do not promise immediate savings without acknowledging t ed matching, and project-based spend analytics."}, {"i": "Life Sciences", "p": "Regulatory requirements for contractor qualification, training compliance, and documented access control for GxP environments.", "f": "Qualification workflow integration, training compliance verification before engagement start, access control documentation, and engagement tenure monitoring for regulatory compliance."}], "de": [{"i": "Technologie / IT", "p": "Massiver Contractor/SOW-Spend fuer IT-Projekte. Rateninflation, Scope Creep, Deliverable-Tracking schwierig.", "f": "IT-spezifische Rate Cards, SOW-Milestone-Tracking, Skill-Matching, projektbasierte Spend-Analytics."}, {"i": "Life Sciences", "p": "Regulatorische Anforderungen an Contractor-Qualifizierung, Training, Zugangskontrolle in GxP.", "f": "Qualifizierungs-Workflows, Trainings-Compliance-Pruefung, Zugangsdokumentation, Tenure-Monitoring."}]}, "inds": ["Technology", "Financial Services", "Life Sciences", "Manufacturing", "Energy", "Professional Services", "Telecommunications", "Public Sector"], "obj": {"en": [{"o": "We manage external workers through our staffing agency", "r": "That is exactly the problem. You rely on the agency for rate benchmarking, compliance, and performance. Fieldglass gives YOU visibility and control over your external workforce spend."}, {"o": "External workforce is only 10% of our headcount", "r": "But likely 20-40% of your workforce cost. External workers are the fastest-growing labor category. Without visibility, you overpay, under-comply, and face co-employment risk."}, {"o": "Our HR system handles contractors", "r": "HR systems track headcount, not engagements. Fieldglass manages the LIFECYCLE: requirement, sourcing, rate negotiation, time/deliverable tracking, invoice matching, offboarding."}, {"o": "Too much process change for hiring managers", "r": "Fieldglass streamlines the process: faster requests, pre-qualified talent pools, rate cards. Hiring managers spend LESS time, not more. They get wo
