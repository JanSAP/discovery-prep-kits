apabilities, and pre-built content. Migration path available for existing BW customers."}], "de": [{"v": "Snowflake", "d": "Maechtig aber generisch - keine SAP-Semantik, kein Content, kein nativer Konnektor. Datasphere integriert MIT Snowflake und addiert SAP-Wert."}, {"v": "Databricks", "d": "Exzellent fuer Data Engineering und ML. Datasphere ergaenzt als Business-Semantik-Layer. Koexistenz: Datasphere federiert in Databricks fuer ML."}, {"v": "Microsoft Fabric", "d": "MS Unified Analytics. Datasphere differenziert mit tiefer SAP-Business-Content, Hierarchien, Berechtigungen und nativem SAP-Zugang."}, {"v": "BW/4HANA", "d": "On-Premise, monolithisch. Datasphere ist cloud-nativer Nachfolger mit offener Architektur und Federation. Migrationspfad fuer BW-Kunden."}]}, "dont": {"en": ["Do not position as replacing existing data platform investments (Snowflake, Databricks) - Datasphere complements them by adding SAP-specific business context and governance", "Never ignore existing BW investments - acknowledge migration path and coexistence model. Do not imply BW is worthless overnight", "Do not oversell as 'one data platform to rule them all' - it excels at SAP data semantics and federation, not at replacing specialized tools", "Avoid pure technical messaging - lead with business outcomes: faster insights, trusted numbers, self-service for users", "Do not underestimate data governance maturity needed - tool alone does not solve organizational data ownership challenges"], "de": ["Nicht als Ersatz fuer Snowflake/Databricks positionieren - ergaenzt mit SAP-Kontext und Governance", "BW-Investitionen nicht ignorieren - Migrationspfad und Koexistenz anerkennen", "Nicht als 'eine Plattform fuer alles' ueberverkaufen - exzellent bei SAP-Semantik und Federation", "Nicht rein technisch - mit Business-Outcomes fuehren", "Data-Governance-Reife nicht unterschaetzen - Tool allein loest keine Organisations-Ownership"]}, "qual": {"en": ["Multiple reports showing different numbers for the same KPI - 'version of truth' problem", "Data teams overwhelmed with extraction/transformation requests - analytics backlog growing", "Existing BW customer wanting to move to cloud-native data management", "AI/ML initiatives blocked by inability to access clean, integrated training data", "Self-service analytics initiative that needs a governed data layer", "Investment in Snowflake/Databricks but SAP data remains poorly integrated", "CFO/CDO mandate for data governance and single source of truth"], "de": ["Mehrere Berichte mit verschiedenen Zahlen fuer gleichen KPI", "Datenteams ueberwaeltigt mit Extraktionsanfragen", "BW-Kunde mit Cloud-native-Wunsch", "KI/ML blockiert durch fehlende saubere Daten", "Self-Service-Initiative braucht governed Data Layer", "Snowflake/Databricks vorhanden aber SAP-Daten schlecht integriert", "CFO/CDO-Mandat fuer Governance und Single Source of Truth"]}, "indDiff": {"en": [{"i": "Financial Services", "p": "Regulatory reporting requires combining data from core banking, trading, risk systems, and SAP finance with strict auditability and lineage requirements.", "f": "Full data lineage for regulatory audit, federation across systems without creating copies (data residency), pre-built financial analytics content, governed access with SAP authorization propagation."}, {"i": "Manufacturing", "p": "Production data in MES, quality in LIMS, supply chain in SAP, IoT data in data lakes. Need unified view for operational analytics and predictive maintenance.", "f": "Federation across production systems, IoT data lake connectivity, pre-built manufacturing analytics, real-time operational dashboards combining OEE, quality, and cost data."}], "de": [{"i": "Finanzdienstleister", "p": "Regulatorisches Reporting erfordert Kombination aus Kernbanking, Handel, Risiko und SAP Finance mit Auditierbarkeit.", "f": "Volle Lineage fuer Audit, Federation ohne Kopien, vorgefertigte Finance-Analytics, governed Access."}, {"i": "Fertigung", "p": "Produktionsdaten in MES, Qualitaet in LIMS, SC in SAP, IoT in Data Lakes. Einheitliche Sicht noetig.", "f": "Federation ueber Produktionssysteme, IoT-Anbindung, vorgefertigte Manufacturing Analytics."}]}, "inds": ["Financial Services", "Manufacturing", "Retail", "Healthcare", "Public Sector", "Utilities", "All industries with complex data landscape"], "obj": {"en": [{"o": "We already have a data warehouse (Snowflake/Databricks)", "r": "Datasphere federates WITH your existing warehouse - it does not replace it. The unique value: SAP business semantics preserved. Your Snowflake cannot interpret SAP data models natively."}, {"o": "BW is working fine for us", "r": "BW serves reporting. Datasphere serves the modern data mesh: self-service, federation, semantic layer, open data sharing. It is the next generation, and BW content migrates into it."}, {"o": "Our data team uses Python/SQL - they will not use an SAP tool", "r": "Datasphere exposes standard SQL, connects to Jupyter notebooks, supports Python, R, and integrates with any BI tool. Your data engineers keep their tools."}, {"o": "We do not have enough data volume to justify it", "r": "Value is not volume - it is semantics. Even small SAP datasets lose meaning when extracted raw. Datasphere preserves business context (currencies, hierarchies, units)."}, {"o": "Another data platform adds complexity", "r": "Datasphere REDUCES complexity by providing one semantic layer across SAP + non-SAP data. Instead of 10 ETL pipelines interpreting SAP data differently, you have one truth."}], "de": [{"o": "Haben schon Snowflake/Databricks", "r": "Datasphere foederiert MIT bestehendem Warehouse. Einzigartiger Wert: SAP-Semantik erhalten."}, {"o": "BW funktioniert fuer uns", "r": "BW = Reporting. Datasphere = Data Mesh, Self-Service, Federation, offenes Daten-Sharing."}, {"o": "Team nutzt Python/SQL", "r": "Datasphere: Standard-SQL, Jupyter, Python, R, jedes BI-Tool."}, {"o": "Nicht genug Datenvolumen", "r": "Wert ist Semantik, nicht Volumen. SAP-Kontext (Waehrungen, Hierarchien) bleibt erhalten."}, {"o": "Noch eine Datenplattform = Komplexitaet", "r": "REDUZIERT Komplexitaet: eine semantische Schicht statt 10 ETL-Pipelines."}]}, "persona": {"en": [{"role": "CDO / Head of Data", "msg": "Unified semantic layer, data mesh enablement, self-service data access with governance", "prio": "Primary"}, {"role": "CIO", "msg": "Reduce data landscape complexity, enable AI-ready data foundation, future-proof data architecture", "prio": "Primary"}, {"role": "Head of BI/Analytics", "msg": "Governed data products, faster access to SAP data, reduced data preparation time", "prio": "Champion"}, {"role": "Data Engineer", "msg": "SQL access, open standards, federation with existing tools, no lock-in", "prio": "Technical"}], "de": [{"role": "CDO / Datenleiter", "msg": "Einheitliche Semantik, Data Mesh, Self-Service mit Governance", "prio": "Primaer"}, {"role": "CIO", "msg": "Datenkomplexitaet reduzieren, KI-ready, zukunftssicher", "prio": "Primaer"}, {"role": "BI/Analytics-Leiter", "msg": "Governed Data Products, schnellerer SAP-Datenzugang", "prio": "Champion"}, {"role": "Data Engineer", "msg": "SQL, offene Standards, Federation, kein Lock-in", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Consumption-based (capacity units)", "metric": "Storage + compute capacity units", "range": "Starting 50K-100K EUR/year, typical enterprise 200K-800K/year", "includes": "Datasphere platform, federation, semantic layer, data marketplace, SAP connectors"}, "de": {"model": "Verbrauchsbasiert (Capacity Units)", "metric": "Speicher + Compute", "range": "Ab 50K-100K EUR/Jahr, Enterprise 200K-800K", "includes": "Platform, Federation, Semantik, Marketplace, SAP-Konnektoren"}}, "crossSell": {"en": [{"trigger": "Need analytics and planning on top", "solution": "SAP Analytics Cloud", "why": "SAC is the native consumption layer for Datasphere data products"}, {"trigger": "Want AI on enterprise data", "solution": "SAP Business Data Cloud + AI", "why": "Datasphere provides the governed data foundation for AI use cases"}, {"trigger": "Still running BW", "solution": "SAP BW Bridge", "why": "Migrate BW content into Datasphere with BW Bridge"}, {"trigger": "Non-SAP data integration needed", "solution": "SAP Integration Suite", "why": "Feed non-SAP data into Datasphere through managed integrations"}], "de": [{"trigger": "Analytics und Planung oben drauf", "solution": "SAP Analytics Cloud", "why": "SAC konsumiert Datasphere Data Products"}, {"trigger": "KI auf Unternehmensdaten", "solution": "SAP Business Data Cloud + AI", "why": "Datasphere als KI-Datenfundament"}, {"trigger": "Noch BW im Einsatz", "solution": "SAP BW Bridge", "why": "BW-Content nach Datasphere migrieren"}, {"trigger": "Non-SAP-Daten integrieren", "solution": "SAP Integration Suite", "why": "Non-SAP in Datasphere einspeisen"}]}, "refs": {"en": [{"industry": "Manufacturing", "country": "Germany", "outcome": "Unified data layer across S/4HANA + Snowflake + Azure Data Lake. Data preparation time reduced 70%. Self-service analytics enabled for 200 business users."}, {"industry": "Retail", "country": "Austria", "outcome": "Datasphere as semantic layer for 15 SAP systems. Single version of truth for inventory, sales, finance across all stores."}, {"industry": "Insurance", "country": "Switzerland", "outcome": "Federated analytics without data replication. Compliance-friendly: data stays at source. Time to new report from 6 weeks to 3 days."}], "de": [{"industry": "Fertigung", "country": "Deutschland", "outcome": "Einheitliche Datenschicht S/4HANA + Snowflake + Azure. Datenaufbereitung -70%. Self-Service fuer 200 User."}, {"industry": "Retail", "country": "Oesterreich", "outcome": "Semantische Schicht fuer 15 SAP-Systeme. Eine Wahrheit fuer Bestand, Umsatz, Finanzen."}, {"industry": "Versicherung", "country": "Schweiz", "outcome": "Foederierte Analytics ohne Replikation. Compliance-konform. Report-Zeit von 6 Wochen auf 3 Tage."}]}, "roi": {"en": ["60-80% reduction in data preparation/wrangling time", "70% faster time-to-insight for new analytical use cases", "40-50% reduction in data pipeline maintenance cost", "Eliminate 80% of point-to-point SAP data extractions", "3-5x more business users enabled for self-service analytics"], "de": ["60-80% weniger Datenaufbereitungszeit", "70% schneller neue analytische Erkenntnisse", "40-50% weniger Pipeline-Wartungskosten", "80% der SAP-Datenextraktionen eliminiert", "3-5x mehr Self-Service-Analytics-Nutzer"]}, "meeComp": {"en": [{"competitor": "Snowflake", "strength": "Dominant cloud DWH, great performance, broad ecosystem", "counter": "Datasphere: SAP business semantics (no manual mapping), federation (no replication needed), governed data products. Use Datasphere WITH Snowflake, not instead of."}, {"competitor": "Databricks (Lakehouse)", "strength": "Best for data engineering + ML, open formats (Delta)", "counter": "Datasphere: business user-friendly, SAP-native semantics, no data engineering skills needed for SAP data. Complement, not compete."}, {"competitor": "Microsoft Fabric", "strength": "Integrated with Power BI, Azure ecosystem, copilot integration", "counter": "Datasphere: SAP business context preserved. Fabric treats SAP data as raw tables - loses meaning. Best used together."}], "de": [{"competitor": "Snowflake", "strength": "Dominantes Cloud-DWH, Performance", "counter": "Datasphere: SAP-Semantik, Federation, Data Products. MIT Snowflake nutzen."}, {"competitor": "Databricks", "strength": "Data Engineering + ML, offene Formate", "counter": "Datasphere: Business-User-freundlich, SAP-nativ. Ergaenzt Databricks."}, {"competitor": "Microsoft Fabric", "strength": "Power BI integriert, Azure, Copilot", "counter": "Datasphere: SAP-Kontext erhalten. Fabric sieht nur rohe Tabellen."}]}}, {"name": "SAP Business AI / Joule", "sub": {"en": "AI Embedded in Business Processes - Not a Toy, a Productivity Multiplier", "de": "KI eingebettet in Geschaeftsprozesse - Kein Spielzeug, ein Produktivitaets-Multiplikator"}, "elev": {"en": "SAP Business AI brings artificial intelligence directly into enterprise business processes - not as a standalone tool but embedded where work actually happens. Joule is SAP's generative AI copilot that works across the SAP portfolio, understanding business context and enabling natural-language interaction with enterprise systems. Together, they deliver AI that is relevant (trained on business processes), reliable (with built-in guardrails and data privacy), and responsible (transparent, fair, EU AI Act ready). This is not generic ChatGPT for the enterprise - this is AI that understands procurement, finance, HR, supply chain, and manufacturing at a process level.", "de": "SAP Business AI bringt kuenstliche Intelligenz direkt in Geschaeftsprozesse - nicht als separates Tool sondern eingebettet wo Arbeit passiert. Joule ist SAPs generativer KI-Copilot der ueber das SAP-Portfolio arbeitet, Business-Kontext versteht und natuerliche Sprache mit Enterprise-Systemen verbindet. Relevant (auf Geschaeftsprozesse trainiert), zuverlaessig (mit Guardrails und Datenschutz), verantwortungsvoll (transparent, fair, EU AI Act ready)."}, "pain": {"en": ["Massive AI hype but no clear path to business value - executives asking 'what is our AI strategy?' without knowing where to start", "Generic AI tools (ChatGPT, Copilot) useful for emails but cannot touch actual business processes - purchase orders, production plans, financial postings", "Repetitive manual tasks consuming skilled employee time: matching invoices, categorizing tickets, reviewing contracts, creating reports", "Cannot hire fast enough - need to make existing employees 2-3x more productive with intelligent automation", "Data privacy and compliance concerns blocking AI adoption - cannot send enterprise data to public AI models", "Previous AI/ML projects failed because models could not be integrated back into the business process where decisions happen", "Employees frustrated with system complexity - too many clicks, too many screens, too much context-switching to get simple things done"], "de": ["Massiver KI-Hype ohne klaren Weg zu Business-Wert - Executives fragen 'was ist unsere KI-Strategie?'", "Generische KI-Tools nuetzlich fuer Emails aber koennen keine Geschaeftsprozesse beruehren", "Repetitive manuelle Aufgaben verbrauchen Fachkraefte-Zeit: Rechnungsmatching, Ticketkategorisierung, Reports", "Nicht schnell genug einstellen - bestehende Mitarbeiter 2-3x produktiver machen", "Datenschutz und Compliance blockieren KI-Adoption", "Fruehere KI-Projekte gescheitert weil Modelle nicht in Prozesse integrierbar", "Mitarbeiter frustriert mit Systemkomplexitaet - zu viele Klicks und Screens"]}, "questions": {"en": [{"t": "AI ambition", "q": "Where does AI sit on your executive agenda? Is there a stated AI strategy, or are individual teams experimenting without coordination?"}, {"t": "Process candidates", "q": "If you could instantly automate or augment one repetitive task that consumes significant employee time today - what would it be?"}, {"t": "Data privacy", "q": "What are your data privacy and compliance requirements around AI? Can you use public cloud AI, or do you need private, on-premises, or EU-only processing?"}, {"t": "Previous attempts", "q": "Have you already tried AI/ML projects? What worked, what did not, and why? What blocked getting from proof-of-concept to production?"}, {"t": "User experience", "q": "How many systems does a typical employee interact with daily? Would natural-language access to their tasks and data improve their productivity?"}, {"t": "Productivity pressure", "q": "Where is the headcount pressure greatest? Which teams need to do more with the same or fewer people?"}, {"t": "Compliance", "q": "Are there upcoming regulatory requirements around AI (EU AI Act) that you need to prepare for? How mature is your AI governance?"}], "de": [{"t": "KI-Ambition", "q": "Wo steht KI auf der Executive-Agenda? Strategie oder unkoordinierte Team-Experimente?"}, {"t": "Prozesskandidaten", "q": "Wenn Sie sofort eine repetitive Aufgabe automatisieren/augmentieren koennten die signifikante Zeit verbraucht - welche?"}, {"t": "Datenschutz", "q": "Datenschutz-/Compliance-Anforderungen? Public Cloud KI moeglich oder privat/EU-only noetig?"}, {"t": "Fruehe Versuche", "q": "Schon KI/ML-Projekte versucht? Was ging, was nicht, warum? Blocker von PoC zu Produktion?"}, {"t": "User Experience", "q": "Wie viele Systeme nutzt ein typischer Mitarbeiter taeglich? Wuerde natuerliche Sprache Produktivitaet steigern?"}, {"t": "Produktivitaetsdruck", "q": "Wo ist der Headcount-Druck am groessten? Welche Teams muessen mehr mit weniger schaffen?"}, {"t": "Regulatorik", "q": "Regulatorische KI-Anforderungen (EU AI Act)? Wie reif ist KI-Governance?"}]}, "diff": {"en": ["Process-embedded: AI is not a separate tool - it is built into the transaction where work happens. Recommendations appear in context, not in a separate app", "Business-trained models: SAP AI understands purchase orders, not just text. It knows what a 3-way match is, what a goods receipt looks like, what an anomalous journal entry means", "Joule as unified copilot: one AI assistant across HR, finance, procurement, supply chain - employees learn one interaction model, not five different tools", "Responsible AI by design: data privacy (customer data never trains shared models), EU AI Act compliance framework, explainability, bias monitoring built in", "Pre-built AI scenarios: 100+ ready-to-activate AI use cases across SAP applications - invoice matching, demand forecasting, talent recommendations, ticket routing", "No-regret starting point: AI capabilities included in existing subscriptions. Customers activate scenarios, not buy new products", "Enterprise guardrails: AI operates within business rules, authorization models, and compliance boundaries - not a free-form generator that might hallucinate financial data"], "de": ["Prozesseingebettet: KI nicht separates Tool sondern im Prozess wo Arbeit passiert", "Business-trainierte Modelle: versteht Bestellungen, 3-Way-Match, Wareneingaenge, anomale Buchungen", "Joule als einheitlicher Copilot: ein KI-Assistent ueber HR, Finance, Einkauf, SC", "Responsible AI: Datenschutz, EU AI Act, Erklaerbarkeit, Bias-Monitoring eingebaut", "100+ fertige KI-Szenarien: Rechnungsmatching, Demand Forecasting, Talent-Empfehlungen, Ticket-Routing", "No-regret: KI in bestehenden Abos enthalten. Szenarien aktivieren, nicht neu kaufen", "Enterprise-Guardrails: KI operiert innerhalb Geschaeftsregeln und Berechtigungen"]}, "talk": {"en": [{"p": "Open", "l": "Every organization I speak with right now has 'AI strategy' on their board agenda. But the question that actually matters is not 'should we use AI?' - it is 'where does AI create measurable business value safely, and how quickly can we get there?'"}, {"p": "Pain", "l": "What I see is two extremes: either companies are doing nothing because they are paralyzed by privacy/compliance concerns, or they have scattered experiments that produce impressive demos but never make it into production processes. Both are wasted potential."}, {"p": "Vision", "l": "SAP Business AI is different because it is already embedded in the processes your people use every day. You do not build AI from scratch - you activate it. Joule understands your business context and helps employees interact with complex systems through natural language. Safe, governed, productive from day one."}, {"p": "Proof", "l": "[Reference customer] activated AI-powered invoice matching and reduced manual matching effort by 60%. Their procurement team uses Joule to create purchase orders through natural language - what used to take 12 clicks takes a conversation. All within existing compliance framework."}, {"p": "Next Step", "l": "The fastest path to value is an AI activation workshop. We identify 3-5 pre-built AI scenarios relevant to your highest-volume processes, activate them in your existing SAP environment, and measure impact within 4-6 weeks. No custom development required for the first wave."}], "de": [{"p": "Eroeffnung", "l": "Jede Organisation hat 'KI-Strategie' auf der Vorstandsagenda. Aber die wichtige Frage ist nicht 'sollen wir KI nutzen?' sondern 'wo schafft KI messbar sicher Wert und wie schnell?'"}, {"p": "Schmerz", "l": "Zwei Extreme: entweder gelaehmte Untaetigkeit wegen Privacy-Bedenken, oder verstreute Experimente die nie in Produktion kommen. Beides verschwendetes Potenzial."}, {"p": "Vision", "l": "SAP Business AI ist anders weil es bereits in taeglichen Prozessen eingebettet ist. Nicht von Null bauen - aktivieren. Joule versteht Business-Kontext und hilft natuerliche Sprache zu nutzen. Sicher, governed, produktiv ab Tag 1."}, {"p": "Beweis", "l": "[Referenz] KI-Rechnungsmatching aktiviert: -60% manueller Aufwand. Einkauf nutzt Joule fuer Bestellungen per Sprache. Was 12 Klicks brauchte geht als Gespraech."}, {"p": "Naechster Schritt", "l": "KI-Aktivierungs-Workshop: 3-5 fertige Szenarien identifizieren, in bestehendem SAP aktivieren, Impact in 4-6 Wochen messen. Keine Custom-Entwicklung fuer erste Welle."}]}, "comp": {"en": [{"v": "Microsoft Copilot (M365)", "d": "Copilot excels in Office productivity (emails, documents, meetings). SAP Business AI excels in business processes (procurement, finance, manufacturing). Complementary - different domains. SAP AI changes business outcomes, Copilot changes personal productivity."}, {"v": "Google Gemini / Vertex AI", "d": "Powerful AI platform for custom model development. SAP provides pre-built, process-embedded AI scenarios that are production-ready. Google requires building from scratch for business process scenarios."}, {"v": "ServiceNow AI", "d": "Strong in IT service management AI. SAP Business AI covers the full breadth of enterprise business processes - finance, procurement, supply chain, HR, manufacturing - not just IT operations."}, {"v": "OpenAI / ChatGPT Enterprise", "d": "General-purpose language model. Does not understand SAP business objects, cannot execute transactions, has no process context. SAP Business AI is process-aware, authorized, and integrated into the transaction flow."}], "de": [{"v": "Microsoft Copilot", "d": "Exzellent in Office-Produktivitaet. SAP Business AI in Geschaeftsprozessen. Komplementaer. SAP veraendert Business Outcomes."}, {"v": "Google Gemini / Vertex AI", "d": "Maechtig fuer Custom Models. SAP bietet fertige prozesseingebettete Szenarien. Google erfordert Eigenentwicklung."}, {"v": "ServiceNow AI", "d": "Stark in ITSM. SAP Business AI deckt volle Breite ab: Finance, Einkauf, SC, HR, Fertigung."}, {"v": "OpenAI / ChatGPT Enterprise", "d": "Allgemein. Versteht keine SAP-Objekte, fuehrt keine Transaktionen aus. SAP Business AI ist prozessbewusst und integriert."}]}, "dont": {"en": ["Do not over-hype AI capabilities - be specific about what is available today vs. roadmap. Customers are tired of vaporware", "Never promise AI replaces jobs - position as productivity multiplier and augmentation. Sensitive topic that can derail conversations", "Do not ignore data privacy concerns - proactively address them. SAP's approach (no cross-customer training, EU data processing) is a major differentiator", "Avoid generic AI messaging - always ground in specific use cases relevant to the customer's industry and role", "Do not position as competing with hyperscaler AI platforms - SAP Business AI is complementary, focused on business process layer"], "de": ["KI-Faehigkeiten nicht ueberhypen - spezifisch was heute verfuegbar vs. Roadmap", "Nie versprechen KI ersetzt Jobs - als Produktivitaetsmultiplikator positionieren", "Datenschutz-Bedenken nicht ignorieren - proaktiv adressieren. SAPs Ansatz ist Differenzierer", "Generisches KI-Messaging vermeiden - immer spezifische Use Cases fuer Branche/Rolle", "Nicht als Hyperscaler-KI-Konkurrenz positionieren - komplementaer, auf Business-Prozess-Layer"]}, "qual": {"en": ["Executive-level AI strategy mandate without clear implementation path", "High-volume repetitive processes consuming significant FTEs (invoice processing, ticket routing, report generation)", "Privacy/compliance concerns blocking adoption of public AI tools", "Existing SAP landscape where embedded AI can activate without new infrastructure", "Labor market pressure: cannot hire fast enough, need productivity gains from existing workforce", "Digital transformation initiative with AI as a key pillar", "Previous AI experiments that failed to reach production - looking for productized, embedded approach"], "de": ["Executive KI-Mandat ohne klaren Implementierungspfad", "Hochvolumige repetitive Prozesse die FTEs verbrauchen", "Datenschutz-Bedenken blockieren Public-AI-Tools", "SAP-Landschaft wo eingebettete KI ohne neue Infrastruktur aktivierbar", "Arbeitsmarktdruck: Produktivitaetsgewinne aus bestehendem Team", "Digitale Transformation mit KI als Saeule", "Gescheiterte KI-Experimente - suchen produktisierten eingebetteten Ansatz"]}, "indDiff": {"en": [{"i": "Financial Services", "p": "High-volume transaction matching, fraud detection, regulatory document processing, and customer communication personalization. Strict compliance requirements for any AI.", "f": "AI-powered payment matching, anomaly detection for fraud/AML, intelligent document extraction for KYC/regulatory filings, Joule for financial reporting queries. All within regulatory-compliant processing framework."}, {"i": "Manufacturing", "p": "Quality defect prediction, maintenance scheduling optimization, production planning assistance, and engineering change impact assessment.", "f": "Predictive quality (detect defects before they occur), intelligent maintenance scheduling based on sensor data, AI-assisted production planning, Joule for natural-language MRP queries and production status."}, {"i": "Retail", "p": "Demand pattern recognition, personalized customer engagement, automated product descriptions, and store staffing optimization.", "f": "AI demand sensing for micro-forecasting, automated product content generation, personalized offer recommendations, intelligent workforce scheduling. Joule for store managers to query performance."}], "de": [{"i": "Finanzdienstleister", "p": "Transaktionsmatching, Betrugs-erkennung, regulatorische Dokumentenverarbeitung, Kundenkommunikation.", "f": "KI-Zahlungsmatching, Anomalie-Erkennung, Dokumentenextraktion fuer KYC, Joule fuer Finanz-Queries."}, {"i": "Fertigung", "p": "Qualitaets-Vorhersage, Wartungsoptimierung, Produktionsplanung, Engineering-Change-Bewertung.", "f": "Predictive Quality, intelligente Wartung, KI-Produktionsplanung, Joule fuer natuerliche MRP-Abfragen."}, {"i": "Handel", "p": "Demand-Muster, personalisierte Kundenansprache, automatische Produktbeschreibungen, Personaloptimierung.", "f": "KI-Demand-Sensing, automatische Produkttexte, personalisierte Empfehlungen, intelligente Personalplanung."}]}, "inds": ["All industries", "Financial Services", "Manufacturing", "Retail", "Healthcare", "Public Sector", "Professional Services", "Utilities"], "obj": {"en": [{"o": "We are already using ChatGPT/Copilot", "r": "Generic AI does not understand your SAP business processes. Joule is embedded IN SAP transactions with context. It knows your purchase orders, employees, financial data - ChatGPT does not."}, {"o": "AI is not mature enough for enterprise use", "r": "SAP Business AI is not experimental. It is production-ready, embedded AI: auto-matching invoices, demand forecasting, talent recommendations. These are deterministic, governed use cases."}, {"o": "Data privacy concerns with AI", "r": "SAP AI runs in your SAP environment. Your data is not used to train public models. Compliant with EU AI Act, GDPR by design. Full data sovereignty."}, {"o": "Our employees will resist AI", "r": "Joule augments, not replaces. It handles repetitive tasks (data entry, matching, summarization) so employees focus on decisions. Position as productivity boost, not job threat."}, {"o": "We cannot quantify AI ROI", "r": "Start with one measurable use case: invoice matching (measure FTE hours saved), demand forecast (measure accuracy improvement). SAP provides ROI calculators for each AI scenario."}], "de": [{"o": "Nutzen schon ChatGPT/Copilot", "r": "Generische KI versteht SAP-Prozesse nicht. Joule ist eingebettet MIT Kontext."}, {"o": "KI nicht reif genug fuer Enterprise", "r": "SAP Business AI ist produktionsreif: Rechnungsmatching, Prognose, Talent."}, {"o": "Datenschutz-Bedenken", "r": "SAP AI laeuft in Ihrer Umgebung. Keine Trainings mit Ihren Daten. EU AI Act/DSGVO-konform."}, {"o": "Mitarbeiter werden KI ablehnen", "r": "Joule ergaenzt, ersetzt nicht. Automatisiert Wiederholendes."}, {"o": "KI-ROI nicht quantifizierbar", "r": "Ein Use Case starten: Rechnungsmatching (FTE messen) oder Forecast-Genauigkeit."}]}, "persona": {"en": [{"role": "CEO / CDO", "msg": "Enterprise AI strategy, competitive advantage through AI-augmented operations, responsible AI", "prio": "Primary"}, {"role": "CIO / CTO", "msg": "Governed AI platform, integrated with existing SAP landscape, avoid shadow AI proliferation", "prio": "Primary"}, {"role": "VP Finance", "msg": "Automated matching, predictive forecasting, anomaly detection, faster close", "prio": "Champion"}, {"role": "VP HR", "msg": "AI-powered talent matching, skills inference, sentiment analysis, attrition prediction", "prio": "Champion"}, {"role": "End Users (any department)", "msg": "Natural language queries, automated summaries, guided task completion via Joule", "prio": "User"}], "de": [{"role": "CEO / CDO", "msg": "KI-Strategie, Wettbewerbsvorteil, Responsible AI", "prio": "Primaer"}, {"role": "CIO / CTO", "msg": "Governed KI, integriert in SAP-Landschaft, Shadow-AI vermeiden", "prio": "Primaer"}, {"role": "VP Finance", "msg": "Auto-Matching, Predictive, Anomalie-Erkennung", "prio": "Champion"}, {"role": "VP HR", "msg": "Talent-Matching, Skills, Sentiment, Attrition", "prio": "Champion"}, {"role": "Endanwender", "msg": "Natural Language, Zusammenfassungen, Joule-Assistenz", "prio": "Nutzer"}]}, "commercial": {"en": {"model": "Included in SAP solutions + premium AI add-ons", "metric": "AI transactions / premium AI units", "range": "Basic Joule included with S/4HANA Cloud. Premium AI scenarios 50K-200K EUR/year add-on", "includes": "Joule assistant, embedded AI scenarios, Document Information Extraction, premium: custom AI"}, "de": {"model": "In SAP-Loesungen enthalten + Premium-KI-Add-ons", "metric": "KI-Transaktionen / Premium-Units", "range": "Basis-Joule in S/4HANA Cloud enthalten. Premium 50K-200K EUR/Jahr", "includes": "Joule, eingebettete KI, Dokumentenextraktion, Premium: Custom AI"}}, "crossSell": {"en": [{"trigger": "Customer adopting S/4HANA Cloud", "solution": "Joule is embedded - activate it", "why": "Zero additional implementation - just enable AI features already in the license"}, {"trigger": "High document processing volume", "solution": "SAP Document Information Extraction", "why": "AI extracts data from invoices, POs, contracts automatically"}, {"trigger": "Want to build custom AI on SAP data", "solution": "SAP AI Core + Datasphere", "why": "Train and deploy custom ML models on governed enterprise data"}, {"trigger": "HR looking at AI for talent", "solution": "SAP SuccessFactors AI", "why": "AI-powered recruiting, learning recommendations, skills inference"}], "de": [{"trigger": "S/4HANA Cloud Adoption", "solution": "Joule aktivieren", "why": "Keine zusaetzliche Implementierung - Features freischalten"}, {"trigger": "Hohes Dokumentenvolumen", "solution": "Document Information Extraction", "why": "KI extrahiert aus Rechnungen, Bestellungen, Vertraegen"}, {"trigger": "Custom AI auf SAP-Daten", "solution": "SAP AI Core + Datasphere", "why": "Eigene ML-Modelle auf governed Daten"}, {"trigger": "HR sucht KI fuer Talent", "solution": "SuccessFactors AI", "why": "KI-Recruiting, Lernempfehlungen, Skills"}]}, "refs": {"en": [{"industry": "Financial Services", "country": "Germany", "outcome": "Joule deployed for 2,000 users. Invoice matching automation: 85% straight-through processing. 3 FTE equivalent saved in AP alone."}, {"industry": "Manufacturing", "country": "Austria", "outcome": "Business AI for demand sensing. Forecast accuracy improved 18%. Excess inventory reduced by 22M EUR."}, {"industry": "Retail", "country": "Poland", "outcome": "AI-powered customer segmentation via SAP AI. Campaign response rate improved 35%. Marketing spend efficiency up 20%."}], "de": [{"industry": "Finanzdienstleistungen", "country": "Deutschland", "outcome": "Joule fuer 2.000 User. Rechnungsmatching: 85% automatisiert. 3 FTE in AP gespart."}, {"industry": "Fertigung", "country": "Oesterreich", "outcome": "Demand Sensing: Prognose +18%, Ueberbestand -22M EUR."}, {"industry": "Retail", "country": "Polen", "outcome": "KI-Kundensegmentierung. Kampagnen-Response +35%, Marketing-Effizienz +20%."}]}, "roi": {"en": ["70-90% automation rate for document processing (invoices, POs)", "15-25% improvement in forecast accuracy (demand, cash flow)", "2-4 FTE equivalent productivity gain per department through automation", "30-40% faster resolution of routine HR/IT/Finance requests via Joule", "20-30% reduction in manual data entry and matching effort"], "de": ["70-90% Automatisierung bei Dokumentenverarbeitung", "15-25% bessere Prognosegenauigkeit", "2-4 FTE Produktivitaetsgewinn pro Abteilung", "30-40% schnellere Bearbeitung von Routineanfragen via Joule", "20-30% weniger manuelle Dateneingabe"]}, "meeComp": {"en": [{"competitor": "Microsoft Copilot (365 + Dynamics)", "strength": "Ubiquitous Office integration, familiar UX, strong marketing", "counter": "SAP AI/Joule: understands SAP business objects natively. Copilot sees Office data - Joule sees your purchase orders, production plans, employee records IN context."}, {"competitor": "Google Vertex AI / Gemini", "strength": "Best foundation models, strong for custom ML", "counter": "SAP AI: pre-built enterprise scenarios (no training needed), governed data, process-embedded. Google requires building everything from scratch."}, {"competitor": "ServiceNow AI", "strength": "Strong in IT workflows and service management AI", "counter": "SAP AI: broader scope (finance, HR, supply chain, procurement), not limited to service/IT workflows."}], "de": [{"competitor": "Microsoft Copilot", "strength": "Office-Integration, bekannte UX", "counter": "Joule: versteht SAP-Objekte nativ (Bestellungen, Plaene, Mitarbeiter)."}, {"competitor": "Google Vertex AI", "strength": "Beste Foundation Models, Custom ML", "counter": "SAP AI: fertige Enterprise-Szenarien, governed Data, prozesseingebettet."}, {"competitor": "ServiceNow AI", "strength": "IT-Workflows, Service Management", "counter": "SAP AI: breiter (Finance, HR, SC, Procurement), nicht nur IT."}]}}, {"name": "SAP Analytics Cloud", "sub": {"en": "Planning, BI & Predictive in One - From Insight to Action Without Switching Tools", "de": "Planung, BI & Predictive in Einem - Von Insight zu Aktion ohne Toolwechsel"}, "elev": {"en": "SAP Analytics Cloud (SAC) unifies business intelligence, augmented analytics, and enterprise planning in a single cloud platform. It eliminates the traditional gap between understanding what happened (BI reporting), predicting what will happen (augmented analytics), and deciding what to do (planning). For SAP customers, it provides native connectivity to S/4HANA, BW, and Datasphere with live data access - no extracts, no stale reports. For planning teams, it offers collaborative enterprise planning with driver-based models, what-if scenarios, and workflow-based approval. One tool from boardroom reporting to department-level planning.", "de": "SAP Analytics Cloud vereint Business Intelligence, Augmented Analytics und Enterprise Planning in einer Cloud-Plattform. Eliminiert die traditionelle Luecke zwischen Verstehen was passiert ist (BI), Vorhersagen was passieren wird (Augmented Analytics) und Entscheiden was zu tun ist (Planung). Native Konnektivitaet zu S/4HANA, BW, Datasphere mit Live-Zugang."}, "pain": {"en": ["Separate tools for reporting (Tableau/Power BI), planning (Excel), and analysis - context lost between systems, data never matches", "Month-end reporting takes days of manual compilation - by the time leadership sees numbers, they are outdated", "Planning process lives entirely in Excel spreadsheets - no version control, no audit trail, impossible to consolidate across departments", "Cannot do predictive analytics without data science team involvement - business users stuck with backward-looking reports", "No self-service: business users depend on IT for every new report, chart, or data view. IT backlog growing", "Board reports manually assembled from multiple sources - presentation risk, inconsistency between slides", "Financial planning disconnected from operational planning - budget numbers do not reflect operational reality"], "de": ["Separate Tools fuer Reporting, Planung und Analyse - Kontext geht verloren, Daten passen nie", "Monatsreporting dauert Tage manueller Kompilation - Leadership sieht veraltete Zahlen", "Planung komplett in Excel - kein Versioning, kein Audit Trail, Konsolidierung unmoeglich", "Predictive unmoeglich ohne Data Science Team - User auf rueckblickende Reports beschraenkt", "Kein Self-Service: User haengen von IT ab fuer jeden Report. IT-Backlog waechst", "Vorstandsreports manuell aus mehreren Quellen - Inkonsistenzrisiko", "Finanzplanung getrennt von operativer Planung"]}, "questions": {"en": [{"t": "Tool landscape", "q": "What tools are your teams using today for reporting and planning? How many different tools, and do they talk to each other?"}, {"t": "Planning process", "q": "Walk me through your annual planning/budgeting process. How long does it take, how many iterations, and what percentage lives in Excel?"}, {"t": "Report delivery", "q": "How long after month-end does leadership get their performance reports? And do they trust the numbers without questioning?"}, {"t": "Self-service", "q": "Can business users create their own reports and analyses, or does every request go through IT/BI team?"}, {"t": "Predictive need", "q": "Are there decisions you make regularly where a forward-looking prediction would be more valuable than a backward-looking report?"}, {"t": "Consolidation", "q": "How do you consolidate plans and actuals across departments, regions, or business units? Manual aggregation or automated?"}, {"t": "SAP data", "q": "How much of your reporting data comes from SAP systems? Is the connection live or batch-extracted?"}], "de": [{"t": "Tool-Landschaft", "q": "Welche Tools fuer Reporting und Planung? Wie viele, sprechen sie miteinander?"}, {"t": "Planung", "q": "Beschreiben Sie den Jahresplanungsprozess. Dauer, Iterationen, Anteil in Excel?"}, {"t": "Reportlieferung", "q": "Wie lange nach Monatsende bekommt Leadership Performance-Reports? Vertrauenswuerdig?"}, {"t": "Self-Service", "q": "Koennen User eigene Reports erstellen oder geht alles ueber IT/BI?"}, {"t": "Predictive", "q": "Entscheidungen wo Vorhersage wertvoller waere als Rueckblick?"}, {"t": "Konsolidierung", "q": "Plaene und Actuals ueber Abteilungen/Regionen konsolidiert - manuell oder automatisch?"}, {"t": "SAP-Daten", "q": "Wie viel Reporting-Daten aus SAP? Live oder Batch-Extrakt?"}]}, "diff": {"en": ["BI + Planning unified: one tool for reporting, analysis, AND enterprise planning. No data gaps between what you see and what you plan", "Live SAP connectivity: direct connection to S/4HANA, BW, Datasphere without data extraction. Reports always show current data, not yesterday's copy", "Augmented analytics: AI-powered insights, anomaly detection, and natural-language queries built in - no data science team required", "Collaborative planning: replace Excel-based planning with workflow-driven, auditable, version-controlled collaborative planning at enterprise scale", "Smart predict: embedded ML for forecasting, classification, and regression - business users train and deploy models without coding", "Digital boardroom: real-time executive dashboards with drill-down capability, designed for leadership presentations and decision-making", "Mobile-first design: full analytics and planning capabilities on any device, anywhere"], "de": ["BI + Planung vereint: ein Tool fuer Reporting, Analyse UND Enterprise-Planung", "Live SAP-Konnektivitaet: direkte Verbindung ohne Extraktion. Reports immer aktuell", "Augmented Analytics: KI-Insights, Anomalieerkennung, natuerliche Sprache eingebaut", "Kollaborative Planung: Excel ersetzen mit Workflow, Audit Trail, Versionierung", "Smart Predict: eingebettetes ML fuer Forecasting ohne Coding", "Digital Boardroom: Echtzeit Executive-Dashboards mit Drill-Down", "Mobile-first: volle Analytics und Planung auf jedem Geraet"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you something practical: in your last planning cycle, how many hours did your finance team spend consolidating spreadsheets, reconciling numbers, and formatting reports - versus actually analyzing and making decisions?"}, {"p": "Pain", "l": "The typical pattern I see: reporting lives in one tool, planning in Excel, and predictive analytics nowhere. That means your team spends enormous effort moving data between systems and never gets to the insight that actually changes decisions."}, {"p": "Vision", "l": "What if your team had one platform where they see real-time performance (live from SAP), predict what will happen next (built-in ML), and adjust plans immediately - all in the same session? That is SAP Analytics Cloud: from insight to action without switching tools."}, {"p": "Proof", "l": "[Reference customer] eliminated their 3-week Excel-based planning cycle. They now plan collaboratively in SAC with workflow approvals, and leadership gets real-time dashboards that refresh from S/4HANA live. Planning accuracy improved 20% because assumptions are tested with predictive models."}, {"p": "Next Step", "l": "The ideal first step is a planning modernization assessment or BI consolidation analysis - depending on where your biggest pain is. We evaluate your current landscape, identify quick wins, and show a working prototype on your actual data within 3-4 weeks."}], "de": [{"p": "Eroeffnung", "l": "Praktisch gefragt: Im letzten Planungszyklus - wie viele Stunden fuer Spreadsheet-Konsolidierung und Formatierung vs. echte Analyse und Entscheidung?"}, {"p": "Schmerz", "l": "Typisch: Reporting in einem Tool, Planung in Excel, Predictive nirgends. Enormer Aufwand Daten zu verschieben, nie beim entscheidungsaendernden Insight."}, {"p": "Vision", "l": "Ein Tool: Echtzeit-Performance (live aus SAP), Vorhersage (eingebautes ML), Planung anpassen - alles in einer Session. SAC: von Insight zu Aktion ohne Toolwechsel."}, {"p": "Beweis", "l": "[Referenz] 3-Wochen-Excel-Planung eliminiert. Kollaborative Planung mit Workflows. Leadership Echtzeit-Dashboards live aus S/4HANA. Planungsgenauigkeit +20%."}, {"p": "Naechster Schritt", "l": "Planning-Modernisierung oder BI-Konsolidierung - je nach Pain. Landschaft evaluieren, Quick Wins, Prototyp auf echten Daten in 3-4 Wochen."}]}, "comp": {"en": [{"v": "Tableau / Power BI", "d": "Pure BI tools - no planning capability. SAC combines BI AND planning in one platform. Also, Tableau/Power BI require data extraction from SAP; SAC connects live. For SAP-centric organizations, SAC eliminates the data replication layer entirely."}, {"v": "Anaplan", "d": "Strong in collaborative planning. SAC matches planning capabilities while ALSO providing BI and predictive. One platform vs. Anaplan (planning) + Tableau (BI) + separate predictive tool. Also, SAC reads SAP data live; Anaplan requires extraction."}, {"v": "Excel (planning)", "d": "Excel cannot provide version control, audit trail, workflow approval, consolidation across 50+ contributors, or predictive capabilities. SAC replaces Excel planning while preserving the familiar spreadsheet-like experience users are comfortable with."}, {"v": "IBM Planning Analytics (TM1)", "d": "Legacy planning platform with high maintenance and limited BI capability. SAC is cloud-native with embedded analytics, AI, and native SAP connectivity. No infrastructure management required."}], "de": [{"v": "Tableau / Power BI", "d": "Reine BI ohne Planung. SAC kombiniert beides. Tableau/PBI brauchen Extraktion; SAC verbindet live."}, {"v": "Anaplan", "d": "Stark in Planung. SAC bietet Planung UND BI UND Predictive. Eine Plattform vs. drei Tools. SAC liest SAP live."}, {"v": "Excel", "d": "Kein Versioning, Audit, Workflow, Konsolidierung oder Predictive. SAC ersetzt mit vertrautem Interface."}, {"v": "IBM TM1", "d": "Legacy mit hoher Wartung. SAC ist cloud-nativ mit Analytics, KI und nativer SAP-Verbindung."}]}, "dont": {"en": ["Do not position as 'just another BI tool' - the planning + BI convergence is the unique value proposition. Lead with that combination", "Never dismiss existing Tableau/Power BI investments aggressively - acknowledge their BI strength but highlight the planning gap and SAP connectivity gap", "Do not oversell planning complexity on day one - start with BI/analytics and expand into planning as trust builds", "Avoid comparing on visualization richness alone - Tableau has more chart types. SAC wins on SAP integration, planning, and unified experience", "Do not ignore the Excel love - users love Excel. SAC should be positioned as enhancing and scaling Excel workflows, not destroying them"], "de": ["Nicht als 'noch ein BI-Tool' - die Planung+BI-Konvergenz ist der einzigartige Wert", "Tableau/PBI nicht aggressiv abtun - BI-Staerke anerkennen, Planungs- und SAP-Luecke zeigen", "Planungskomplexitaet nicht am Tag 1 ueberverkaufen - mit BI starten, Planung erweitern", "Nicht nur Visualisierung vergleichen - SAC gewinnt bei Integration, Planung, einheitlicher Erfahrung", "Excel-Liebe nicht ignorieren - SAC erw n?"}], "de": [{"t": "Landschaft", "q": "Wie viele Integrationspunkte SAP zu anderen Systemen? Dokumentiert?"}, {"t": "Middleware", "q": "Heutige Middleware? PI/PO, MuleSoft, Custom? Wer pflegt?"}, {"t": "Cloud", "q": "Was passiert mit Integrationen beim Cloud-Umzug?"}, {"t": "APIs", "q": "API-Strategie? Wie entdeckt, gesichert, governed?"}, {"t": "Events", "q": "Use Cases fuer Event-Driven? Echtzeit-Trigger?"}, {"t": "Clean Core", "q": "Wie werden ECC-interne Integrationen bei S/4HANA behandelt?"}, {"t": "Wartung", "q": "Aufwand fuer Integrationswartung? Was bricht am haeufigsten?"}]}, "diff": {"en": ["2,800+ pre-built integration flows for SAP-to-SAP and SAP-to-third-party", "Integration Advisor: AI-assisted mapping reduces development time 60%+", "API Management: full lifecycle governance, monetization, developer portal", "Event Mesh: publish-subscribe for real-time event-driven architecture", "Migration tooling from PI/PO with automated assessment", "One platform: iPaaS + API mgmt + event mesh + B2B integration"], "de": ["2.800+ vorgefertigte Integrationsflows", "Integration Advisor: KI-Mapping reduziert Entwicklung 60%+", "API Management: Lifecycle-Governance, Portal", "Event Mesh: Publish-Subscribe fuer Echtzeit", "PI/PO-Migration mit automatisiertem Assessment", "Eine Plattform: iPaaS + API + Events + B2B"]}, "talk": {"en": [{"p": "Open", "l": "Every cloud move, every clean core initiative - integrations are the hidden risk that derails timelines."}, {"p": "Pain", "l": "How many integrations would break if you upgraded SAP tomorrow? Can anyone in the room answer that with confidence?"}, {"p": "Vision", "l": "One governed platform: pre-built SAP content, API portal for developers, event-driven for real-time. Integrations that upgrade themselves."}, {"p": "Proof", "l": "[Reference] migrated 200+ PI/PO interfaces in 4 months. Integration maintenance effort reduced 50%. Zero breakage on S/4HANA upgrade."}, {"p": "Next", "l": "Integration assessment maps your curre ata as a product - not a project. It is the fastest path from SAP data to business insight and AI-readiness.", "de": "SAP Business Data Cloud kombiniert Datasphere und Master-Data-Governance in einem Angebot das kuratierte, KI-bereite Geschaeftsdaten liefert. Vorgefertigte Datenprodukte mit SAP-Semantik - bereit fuer Analytics, Planung und KI ohne Monate Data Engineering. Fuer Organisationen die in nie-endenden Datenprojekten versinken: governed, vertrauenswuerdige Daten als Produkt - nicht als Projekt."}, "pain": {"en": ["Data lake projects that took years and still do not deliver business value", "SAP data extraction breaks semantics - finance teams do not trust the numbers", "AI initiatives blocked by 'data not ready'", "No single version of truth across SAP and non-SAP", "Data engineering team overwhelmed with requests", "Master data quality issues undermining every analytics initiative"], "de": ["Data-Lake-Projekte die Jahre dauerten ohne Business Value", "SAP-Extraktion zerstoert Semantik - Finance vertraut Zahlen nicht", "KI blockiert durch 'Daten nicht bereit'", "Keine Single Truth ueber SAP und Nicht-SAP", "Data Engineering ueberlastet", "Stammdatenqualitaet untergraebt jede Analytics-Initiative"]}, "questions": {"en": [{"t": "Data projects", "q": "How many data/analytics projects are in flight? How many delivered value on time?"}, {"t": "SAP data", "q": "How do analytics and AI teams access SAP data today? How long does a new data request take?"}, {"t": "Trust", "q": "Does finance trust the numbers in your analytics platform? Or do they still reconcile back to SAP?"}, {"t": "AI readiness", "q": "When your AI team asks for data, what is the typical lead time? What blocks them?"}, {"t": "Master data", "q": "How is master data governed? One golden record or multiple conflicting sources?"}, {"t": "Strategy", "q": "Is there a data mesh or data product strategy? Who owns data domains?"}], "de": [{"t": "Datenprojekte", "q": "Wie viele Daten-/Analytics-Projekte laufen? Wie viele lieferten puenktlich Wert?"}, {"t": "SAP-Daten", "q": "Wie greifen Analytics/KI auf SAP-Daten zu? Vorlaufzeit fuer neue Datenanfragen?"}, {"t": "Vertrauen", "q": "Vertraut Finance den Zahlen in der Analytics-Plattform?"}, {"t": "KI-Bereitschaft", "q": "Vorlaufzeit wenn KI-Team Daten braucht? Was blockiert?"}, {"t": "Stammdaten", "q": "Wie wird Stammdaten-Governance betrieben? Ein Golden Record?"}, {"t": "Strategie", "q": "Data-Mesh-/Datenprodukt-Strategie? Wer besitzt Datendomaenen?"}]}, "diff": {"en": ["Pre-built data products with SAP business semantics preserved end-to-end", "Master data governance included - single golden record across systems", "AI-ready: curated data directly consumable by SAP Business AI and Joule", "Open architecture: works with Snowflake, Databricks, hyperscaler lakes", "Data product marketplace: governed self-service for business users", "Faster time-to-value: weeks not months to first analytics/AI use case"], "de": ["Vorgefertigte Datenprodukte mit SAP-Semantik durchgaengig", "Stammdaten-Governance inklusive - ein Golden Record", "KI-ready: direkt konsumierbar fuer SAP Business AI / Joule", "Offen: Snowflake, Databricks, Hyperscaler", "Datenprodukt-Marktplatz: Self-Service mit Governance", "Schnellere Time-to-Value: Wochen statt Monate"]}, "talk": {"en": [{"p": "Open", "l": "Every company I speak with has the same story: we invested in a data platform, but getting trusted SAP data into it is still a project every single time."}, {"p": "Pain", "l": "How long does it take today from 'I need this SAP data for AI' to actually having it ready, trusted, and usable? Weeks? Months?"}, {"p": "Vision", "l": "Data as a product: pre-built, semantically correct, governed, AI-ready. Your teams consume data like they consume SaaS - self-service, instant, trusted."}, {"p": "Proof", "l": "[Reference] went from 6-month data projects to 3-week data product delivery. Finance finally trusts the analytics numbers because SAP semantics are preserved."}, {"p": "Next", "l": "Data readiness assessment shows where your highest-value data products are and how fast we can deliver the first one."}], "de": [{"p": "Oeffnung", "l": "Jedes Unternehmen: in Datenplattform investiert, aber vertrauenswuerdige SAP-Daten sind immer noch ein Projekt."}, {"p": "Schmerz", "q": "Wie lange von 'brauche SAP-Daten fuer KI' bis bereit und vertrauenswuerdig?"}, {"p": "Vision", "l": "Daten als Produkt: vorgefertigt, semantisch korrekt, governed, KI-ready."}, {"p": "Beweis", "l": "[Referenz] Von 6-Monats-Projekten zu 3-Wochen-Datenprodukt-Lieferung."}, {"p": "Naechstes", "l": "Data-Readiness-Assessment zeigt hoechstwertige Datenprodukte."}]}, "comp": {"en": [{"v": "Snowflake/Databricks alone", "d": "BDC preserves SAP semantics automatically. External platforms need manual modeling and lose business meaning."}, {"v": "SAP Datasphere standalone", "d": "BDC adds master data governance and pre-built data products on top of Datasphere foundation."}, {"v": "Custom data engineering", "d": "BDC: pre-built, governed, weeks to value. Custom: months of engineering, ongoing maintenance, no guarantees."}, {"v": "Microsoft Fabric", "d": "BDC: native SAP semantics and master data. Fabric: general-purpose, needs SAP expertise."}], "de": [{"v": "Snowflake/Databricks allein", "d": "BDC bewahrt SAP-Semantik. Externe brauchen manuelles Modeling."}, {"v": "Datasphere standalone", "d": "BDC fuegt Stammdaten-Governance und Datenprodukte hinzu."}, {"v": "Custom Engineering", "d": "BDC: vorgefertigt, Wochen. Custom: Monate, Wartung."}, {"v": "Microsoft Fabric", "d": "BDC: native SAP-Semantik. Fabric: generisch."}]}, "dont": {"en": ["Not 'just Datasphere renamed' - includes master data governance and data products", "Do not ignore existing data platform investments - BDC complements, does not replace lakes", "Never promise 'all data ready in weeks' - scope matters, start with one domain", "Do not sell without AI/analytics use case - BDC needs a consumption st
