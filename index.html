rocess compliance", "prio": "Champion"}, {"role": "Process Owner", "msg": "Ensure process adherence, guide users through correct paths, measure completion rates", "prio": "Champion"}], "de": [{"role": "CIO / Transformationsleiter", "msg": "S/4-Adoption beschleunigen, Change-Risiko senken, Adoption messen", "prio": "Primaer"}, {"role": "VP HR / Learning", "msg": "Kontinuierliches Lernen, Trainingskosten senken, kontextuelle Unterstuetzung", "prio": "Primaer"}, {"role": "IT-Leiter / Help Desk", "msg": "Ticket-Deflection, Self-Service, L1 reduzieren, Compliance", "prio": "Champion"}, {"role": "Prozesseigner", "msg": "Prozesstreu, korrekte Pfade, Completion Rates", "prio": "Champion"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Users guided + applications covered", "range": "Starting 50K-100K EUR/year for single application. Enterprise (multi-app) 150K-500K+", "includes": "DAP platform, analytics, guidance builder, segmentation, optional: ActionBot, Workstation"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Gefuehrte User + abgedeckte Applikationen", "range": "Ab 50K-100K EUR/Jahr (Single App). Enterprise 150K-500K+", "includes": "DAP-Plattform, Analytics, Guidance Builder, Segmentierung"}}, "crossSell": {"en": [{"trigger": "S/4HANA go-live approaching", "solution": "RISE with SAP", "why": "WalkMe ensures RISE adoption from day one"}, {"trigger": "Process optimization needed first", "solution": "SAP Signavio", "why": "Signavio optimizes process, WalkMe ensures users follow the optimized path"}, {"trigger": "Multiple SAP cloud apps deploying", "solution": "SAP SuccessFactors / Sales Cloud / etc.", "why": "WalkMe guides across all SAP cloud apps - unified adoption layer"}, {"trigger": "Self-service support needed", "solution": "SAP Service Cloud (internal)", "why": "WalkMe deflects internal support tickets through guided self-service"}], "de": [{"trigger": "S/4-Go-Live naht", "solution": "RISE with SAP", "why": "WalkMe sichert RISE-Adoption ab Tag eins"}, {"trigger": "Erst Prozessoptimierung", "solution": "SAP Signavio", "why": "Signavio optimiert, WalkMe sichert Befolgung"}, {"trigger": "Mehrere SAP-Cloud-Apps", "solution": "SF / Sales Cloud / etc.", "why": "WalkMe ueber alle SAP-Apps als Adoptionsschicht"}, {"trigger": "Self-Service-Support", "solution": "SAP Service Cloud", "why": "WalkMe deflektiert Tickets durch Fuehrung"}]}, "refs": {"en": [{"industry": "Manufacturing", "country": "Germany", "outcome": "WalkMe on S/4HANA for 3,000 users. Help desk tickets -45% in 3 months. Process completion rate +30%. Training budget reduced 60%."}, {"industry": "Financial Services", "country": "Austria", "outcome": "WalkMe across SuccessFactors + S/4HANA. Onboarding time for new hires from 4 weeks to 10 days. Compliance process errors -80%."}, {"industry": "Retail", "country": "Czech Republic", "outcome": "WalkMe for new POS system rollout to 500 stores. Zero classroom training needed. Full adoption in 2 weeks vs. planned 2 months."}], "de": [{"industry": "Fertigung", "country": "Deutschland", "outcome": "S/4HANA, 3.000 User. Tickets -45%. Process Completion +30%. Trainingsbudget -60%."}, {"industry": "Finanzdienstleistungen", "country": "Oesterreich", "outcome": "SF + S/4. Onboarding von 4 Wochen auf 10 Tage. Compliance-Fehler -80%."}, {"industry": "Retail", "country": "Tschechien", "outcome": "Neues POS-System, 500 Filialen. Null Schulung noetig. Volle Adoption in 2 Wochen."}]}, "roi": {"en": ["40-60% reduction in help desk/support tickets", "50-70% reduction in training time and cost", "25-35% improvement in process completion rates", "60-80% faster user adoption of new systems", "30-50% reduction in errors and rework from incorrect process execution"], "de": ["40-60% weniger Helpdesk-Tickets", "50-70% weniger Trainingszeit und -kosten", "25-35% bessere Process Completion Rates", "60-80% schnellere System-Adoption", "30-50% weniger Fehler und Rework"]}, "meeComp": {"en": [{"competitor": "Whatfix", "strength": "Lower price point, good for mid-market, simple setup", "counter": "WalkMe: deeper analytics, enterprise scale, multi-app orchestration, SAP-native integration. Whatfix is adequate for simple scenarios but lacks enterprise depth."}, {"competitor": "Userlane", "strength": "German company, DACH presence, simple interactive guides", "counter": "WalkMe: broader platform (analytics, automation, ActionBot), multi-system workflows, SAP strategic partnership. Userlane is guides-only."}, {"competitor": "In-house training / traditional LMS", "strength": "Existing investment, known approach", "counter": "WalkMe: contextual (in-the-moment) vs. classroom (one-time). 70% knowledge loss within a week. WalkMe is persistent performance support."}], "de": [{"competitor": "Whatfix", "strength": "Guenstiger, Mittelstand, einfach", "counter": "WalkMe: tiefere Analytics, Enterprise, Multi-App, SAP-nativ."}, {"competitor": "Userlane", "strength": "Deutsch, DACH, einfache Guides", "counter": "WalkMe: breitere Plattform (Analytics, Automation), Multi-System, SAP-Partnerschaft."}, {"competitor": "Inhouse-Training / LMS", "strength": "Bestehende Investition", "counter": "WalkMe: kontextuell im Moment vs. einmalig. 70% Wissensverlust. Persistent."}]}}], "Sustainability": [{"name": "SAP Sustainability (CSRD / Green Ledger)", "sub": {"en": "Regulatory ESG Reporting, Carbon Accounting & Green Ledger - Compliance and Beyond", "de": "Regulatorisches ESG-Reporting, Carbon Accounting & Green Ledger - Compliance und darueber hinaus"}, "elev": {"en": "SAP's sustainability portfolio addresses the urgent enterprise need for environmental, social, and governance (ESG) data management, regulatory reporting (CSRD/ESRS, EU Taxonomy, SEC Climate), and operational decarbonization. The Green Ledger concept embeds sustainability data directly alongside financial data in S/4HANA, treating carbon like currency - every transaction records its environmental footprint alongside its financial footprint. This is not a standalone reporting tool bolted on after the fact - it is sustainability data integrated into the core of enterprise operations, enabling real-time steering, automated regulatory compliance, and supply chain carbon transparency.", "de": "SAPs Nachhaltigkeitsportfolio adressiert den dringenden Bedarf an ESG-Datenmanagement, regulatorischem Reporting (CSRD/ESRS, EU-Taxonomie, SEC Climate) und operativer Dekarbonisierung. Green Ledger bettet Nachhaltigkeitsdaten direkt neben Finanzdaten in S/4HANA ein - CO2 wie Waehrung behandeln. Keine nachtraeglich angeschraubte Reporting-Loesung sondern integriert im Kern der Operationen."}, "pain": {"en": ["CSRD reporting deadline approaching with no system in place - currently collecting ESG data manually in spreadsheets with no audit trail", "Carbon footprint calculation is guesswork: using industry averages, not actual data. Cannot report accurately or identify where to reduce", "Sustainability data disconnected from financial systems - reported separately, inconsistently, and with months of lag. No one trusts the numbers", "Supply chain emissions (Scope 3) are a black box - 70-90% of total footprint but no way to collect actual supplier data", "Regulatory requirements multiplying (CSRD, EU Taxonomy, SEC, CBAM) with different frameworks, timelines, and data requirements", "Board asking for sustainability KPIs integrated into business decisions but finance and sustainability teams work in separate worlds", "Cannot prove product-level carbon footprint to customers requesting environmental data for their own reporting (data chain requirement)"], "de": ["CSRD-Frist naht ohne System - ESG-Daten manuell in Spreadsheets ohne Audit Trail", "Carbon Footprint ist Schaetzung: Branchendurchschnitte statt echte Daten", "Nachhaltigkeitsdaten getrennt von Finanzsystemen - separat, inkonsistent, Monate Verzoegerung", "Scope-3-Emissionen (70-90% des Footprints) eine Blackbox", "Regulatorische Anforderungen multiplizieren sich (CSRD, Taxonomie, SEC, CBAM)", "Board will Nachhaltigkeits-KPIs in Geschaeftsentscheidungen aber Finance und Sustainability getrennt", "Produkt-Carbon-Footprint fuer Kunden nicht nachweisbar"]}, "questions": {"en": [{"t": "Regulatory timeline", "q": "When does CSRD reporting become mandatory for your organization? What is your current readiness level - do you have data, systems, and processes in place?"}, {"t": "Data collection", "q": "How is sustainability data currently collected? Manually from departments, estimated from spend data, or measured from actual operational data?"}, {"t": "Scope 3", "q": "What is your approach to Scope 3 (supply chain) emissions? Can you get actual data from suppliers, or are you using industry average emission factors?"}, {"t": "Integration", "q": "Is sustainability reporting connected to your financial systems, or is it a separate exercise performed by a different team with different data?"}, {"t": "Decarbonization", "q": "Beyond reporting, do you have operational targets for emission reduction? If so, can you identify which operations, products, or suppliers are the biggest contributors?"}, {"t": "Customer requirements", "q": "Are customers asking for product-level carbon footprint data? How are you responding today?"}, {"t": "Green Ledger interest", "q": "Would it be valuable to see the environmental footprint of every business transaction alongside its financial footprint - in the same system, in real-time?"}], "de": [{"t": "Regulatorischer Zeitplan", "q": "Wann wird CSRD fuer Sie verpflichtend? Bereitschaftsgrad - Daten, Systeme, Prozesse vorhanden?"}, {"t": "Datenerfassung", "q": "Wie werden Nachhaltigkeitsdaten gesammelt? Manuell, aus Spend geschaetzt, oder aus Betriebsdaten gemessen?"}, {"t": "Scope 3", "q": "Ansatz fuer Scope 3? Echte Lieferantendaten oder Branchendurchschnitte?"}, {"t": "Integration", "q": "Nachhaltigkeitsreporting mit Finanzsystemen verbunden oder separate Uebung?"}, {"t": "Dekarbonisierung", "q": "Operative Reduktionsziele? Koennen Sie identifizieren welche Operationen/Produkte/Lieferanten am meisten beitragen?"}, {"t": "Kundenanforderungen", "q": "Fragen Kunden nach Produkt-Carbon-Footprint? Wie antworten Sie heute?"}, {"t": "Green Ledger", "q": "Waere es wertvoll den Umwelt-Footprint jeder Transaktion neben dem Finanz-Footprint zu sehen?"}]}, "diff": {"en": ["Green Ledger: carbon accounting embedded in S/4HANA alongside financial accounting. Every transaction captures environmental impact - not a bolt-on but core integrated", "Actual data over estimates: leverages operational data from SAP systems (procurement, production, logistics) for actual-based carbon calculation rather than industry averages", "CSRD/ESRS ready: pre-built reporting templates aligned with European Sustainability Reporting Standards, including double materiality assessment support", "Scope 3 via Ariba network: leverage the SAP Business Network to request and receive actual emission data from suppliers - addressing the biggest data gap in carbon accounting", "Product Carbon Footprint: calculate and communicate product-level footprint based on actual material, energy, and logistics data - enabling downstream value chain reporting", "Multi-framework support: CSRD, EU Taxonomy, GRI, CDP, TCFD, SEC Climate - one data model serving multiple reporting requirements", "Audit-ready: full data lineage, automated calculations, and version-controlled reporting that withstands external assurance requirements"], "de": ["Green Ledger: Carbon Accounting in S/4HANA neben Financial Accounting - jede Transaktion erfasst Umwelt-Impact", "Echte Daten statt Schaetzungen: Betriebsdaten aus SAP fuer tatsaechliche Berechnung", "CSRD/ESRS-ready: vorgefertigte Reporting-Templates nach ESRS, Double Materiality", "Scope 3 via Ariba: ueber Business Network echte Lieferanten-Emissionsdaten anfordern", "Product Carbon Footprint: auf Basis realer Material-, Energie- und Logistikdaten berechnen", "Multi-Framework: CSRD, Taxonomie, GRI, CDP, TCFD, SEC - ein Datenmodell", "Audit-ready: volle Lineage, automatisierte Berechnungen, versioniertes Reporting"]}, "talk": {"en": [{"p": "Open", "l": "CSRD is not optional and it is not just a reporting exercise. Companies that treat it as a compliance checkbox will spend millions on manual data collection and still produce numbers nobody trusts. But companies that integrate sustainability data into their operational systems will get compliance AND decision intelligence simultaneously."}, {"p": "Pain", "l": "The problem I see is that most organizations today collect sustainability data in spreadsheets, weeks after the fact, using industry-average emission factors. The result: numbers that are inaccurate, unauditable, months late, and completely disconnected from operational decision-making. That approach will not survive external assurance requirements."}, {"p": "Vision", "l": "The Green Ledger approach flips this: sustainability data is captured at the transaction level, in real-time, from actual operational data in SAP. When you buy material, the system records the carbon footprint alongside the cost. When you ship a product, logistics emissions are calculated from actual routes and modes. The CFO and CSO see the same numbers because they come from the same system."}, {"p": "Proof", "l": "[Reference customer] moved from a 6-month manual ESG reporting cycle to automated quarterly reporting with Green Ledger. Scope 1+2 accuracy improved from +/-40% estimates to +/-5% actuals. They can now steer decarbonization operationally because they see the data in real-time, not retrospectively."}, {"p": "Next Step", "l": "The right starting point depends on urgency: if CSRD compliance is the immediate driver, we start with a reporting readiness assessment and gap analysis against ESRS. If operational decarbonization is the goal, we start with a carbon data architecture design. Both typically 4-6 weeks to concrete roadmap."}], "de": [{"p": "Eroeffnung", "l": "CSRD ist nicht optional und keine reine Reporting-Uebung. Compliance-Checkbox = Millionen fuer manuelle Sammlung und unvertrauenswuerdige Zahlen. Integration in Systeme = Compliance UND Entscheidungsintelligenz."}, {"p": "Schmerz", "l": "Nachhaltigkeitsdaten in Spreadsheets, Wochen spaeter, mit Branchendurchschnitten. Ungenau, nicht auditierbar, Monate spaet, von Entscheidungen getrennt. Ueberlebt externe Pruefung nicht."}, {"p": "Vision", "l": "Green Ledger: Daten auf Transaktionsebene, in Echtzeit, aus echten Betriebsdaten. Material kaufen = Carbon neben Kosten. Versenden = Logistik-Emissionen aus echten Routen. CFO und CSO sehen dieselben Zahlen."}, {"p": "Beweis", "l": "[Referenz] Von 6-Monat-manuellem ESG-Reporting zu automatisiertem Quartals-Reporting. Scope 1+2 von +/-40% auf +/-5%. Dekarbonisierung operativ steuerbar durch Echtzeit-Daten."}, {"p": "Naechster Schritt", "l": "Bei CSRD-Dringlichkeit: Reporting-Readiness und ESRS-Gap-Analyse. Bei Dekarbonisierung: Carbon-Datenarchitektur. Beides 4-6 Wochen bis Roadmap."}]}, "comp": {"en": [{"v": "Sphera / Ecoinvent (LCA tools)", "d": "Traditional life cycle assessment tools for detailed product analysis. SAP adds enterprise scale, ERP integration, automated data capture, and regulatory reporting. LCA tools are point solutions; SAP integrates into operations."}, {"v": "Persefoni / Watershed", "d": "Carbon accounting point solutions focused on reporting. SAP differentiates with ERP-embedded actual data (not estimates), Green Ledger integration, and supply chain data via Business Network. Point tools calculate; SAP integrates and operationalizes."}, {"v": "Microsoft Sustainability Manager", "d": "Microsoft provides basic carbon reporting integrated with Azure/M365 data. SAP goes deeper: transaction-level carbon in ERP, supply chain Scope 3 via Ariba, and product-level footprint from actual manufacturing data."}, {"v": "Manual / Consultancy-driven reporting", "d": "Annual exercise costing months and consultancy fees, producing static PDF reports. SAP provides continuous, automated, auditable reporting integrated into business operations. Not once-a-year compliance but real-time steering."}], "de": [{"v": "Sphera / Ecoinvent", "d": "Traditionelle LCA-Tools. SAP addiert Enterprise-Skalierung, ERP-Integration, automatisierte Datenerfassung."}, {"v": "Persefoni / Watershed", "d": "Carbon-Reporting-Punktloesungen. SAP differenziert mit ERP-integrierten echten Daten, Green Ledger und SC-Daten via Network."}, {"v": "Microsoft Sustainability Manager", "d": "Basis-Reporting. SAP: Transaktions-Carbon im ERP, Scope 3 via Ariba, Produkt-Footprint aus Fertigung."}, {"v": "Manuell / Beratung", "d": "Jaehrliche Uebung mit Monaten Aufwand. SAP: kontinuierlich, automatisiert, auditierbar, in Betrieb integriert."}]}, "dont": {"en": ["Do not sell sustainability as 'just compliance' - position the operational intelligence and competitive advantage (customer requirements, green financing, brand) alongside regulatory necessity", "Never promise perfect Scope 3 accuracy from day one - it is a journey from estimates to actuals. Set realistic expectations about data maturity progression", "Do not ignore the CFO - sustainability reporting is becoming as rigorous as financial reporting. The CFO cares about auditability, controls, and integration with financial close", "Avoid 'greenwashing' concerns - be honest about what can be measured accurately today versus what requires estimation. Transparency builds trust", "Do not position only for manufacturing - CSRD applies to all sectors. Service companies, financial institutions, and retailers all need this"], "de": ["Nicht nur als Compliance verkaufen - operative Intelligenz und Wettbewerbsvorteil betonen", "Nie perfekte Scope-3-Genauigkeit am Tag 1 versprechen - Journey von Schaetzungen zu Actuals", "CFO nicht ignorieren - will Auditierbarkeit und Integration mit Financial Close", "Greenwashing-Bedenken vermeiden - ehrlich was messbar ist und was Schaetzung", "Nicht nur fuer Fertigung - CSRD gilt fuer alle Sektoren"]}, "qual": {"en": ["CSRD reporting obligation starting 2025/2026 with no system in place", "Carbon neutrality or Net Zero commitment with no operational measurement capability", "Customer requirements for product carbon footprint data (especially in automotive/industrial supply chains)", "Board-level ESG commitment requiring integration of sustainability into business decisions", "Current ESG reporting purely manual/spreadsheet-based - approaching auditability requirements", "SAP S/4HANA customer wanting to leverage Green Ledger capabilities", "Supply chain decarbonization initiative requiring Scope 3 supplier data collection"], "de": ["CSRD-Pflicht ab 2025/2026 ohne System", "Carbon-Neutralitaets-/Net-Zero-Commitment ohne operative Messung", "Kundenanforderungen fuer Product Carbon Footprint", "Board-ESG-Commitment mit Integration in Entscheidungen", "ESG-Reporting manuell/Spreadsheet bei steigenden Audit-Anforderungen", "S/4HANA-Kunde fuer Green Ledger", "SC-Dekarbonisierung braucht Scope-3-Lieferantendaten"]}, "indDiff": {"en": [{"i": "Automotive", "p": "CBAM exposure, battery passport requirements, OEM carbon targets flowing down to tier suppliers, and complex multi-tier supply chain Scope 3 accounting.", "f": "Supplier carbon data collection via Business Network, battery passport data management, product carbon footprint for each component/assembly, and OEM reporting template compliance."}, {"i": "Chemicals", "p": "Energy-intensive operations, complex emission calculations by production process, product-level environmental declarations, and regulatory chemical reporting overlap.", "f": "Process-specific emission factor management, energy monitoring integration, product environmental footprint (PEF) calculation, and combined environmental/chemical regulatory reporting."}, {"i": "Financial Services", "p": "Financed emissions (Scope 3 Category 15), portfolio carbon scoring, TCFD/SFDR reporting, and sustainable finance product documentation.", "f": "Financed emissions calculation from lending/investment portfolio, counterparty carbon data integration, ESG scoring for portfolio management, and sustainable finance regulatory reporting."}], "de": [{"i": "Automobil", "p": "CBAM, Batteriepass, OEM-Carbon-Targets fuer Zulieferer, Multi-Tier Scope 3.", "f": "Lieferanten-Carbon via Network, Batteriepass, Product Carbon Footprint, OEM-Reporting-Templates."}, {"i": "Chemie", "p": "Energieintensiv, prozess-spezifische Emissionen, Umweltdeklarationen, regulatorische Ueberschneidung.", "f": "Prozess-Emissionsfaktoren, Energie-Monitoring, Product Environmental Footprint, kombiniertes Reporting."}, {"i": "Finanzdienstleister", "p": "Finanzierte Emissionen (Scope 3 Cat 15), Portfolio-Scoring, TCFD/SFDR.", "f": "Finanzierte-Emissionen-Berechnung, ESG-Scoring, Sustainable-Finance-Reporting."}]}, "inds": ["All industries (CSRD scope)", "Manufacturing", "Automotive", "Chemicals", "Energy", "Financial Services", "Retail", "Food & Beverage", "Logistics"], "obj": {"en": [{"o": "CSRD is just reporting - Excel can do it", "r": "CSRD requires auditable, traceable data across your entire value chain. Excel cannot provide audit trails, multi-entity consolidation, or automated data collection from ERP. Auditors will reject Excel."}, {"o": "We are not in scope for CSRD yet", "r": "Timeline: Large companies 2025, listed SMEs 2026, value chain reporting means YOUR customers will ask for YOUR data soon regardless of your own reporting obligation."}, {"o": "Our sustainability team handles this manually", "r": "CSRD requires 1,000+ data points, double materiality assessment, and quarterly updates. Manual approaches do not scale. The regulation is designed to require systematic data management."}, {"o": "We already have a sustainability tool (Sphera/Watershed)", "r": "Those handle environmental data well. Green Ledger integrates sustainability data WITH financial data in ONE ledger. CSRD requires financial-grade accuracy for ESG data. That requires ERP integration."}, {"o": "ROI of sustainability reporting is unclear", "r": "Non-compliance: fines + audit failures + investor downgrade. Proactive: better ESG ratings = lower cost of capital (20-50 bps), access to sustainable finance, customer requirement compliance."}], "de": [{"o": "CSRD ist nur Reporting - Excel reicht", "r": "CSRD erfordert pruefbare, rueckverfolgbare Daten. Excel: kein Audit Trail, keine Konsolidierung."}, {"o": "Nicht im CSRD-Scope", "r": "Value-Chain-Reporting: Ihre KUNDEN werden IHRE Daten fordern, unabhaengig von eigener Pflicht."}, {"o": "Nachhaltigkeitsteam macht das manuell", "r": "1.000+ Datenpunkte, doppelte Wesentlichkeit, quartalsweise. Manuell skaliert nicht."}, {"o": "Haben schon Sustainability-Tool", "r": "Green Ledger: Nachhaltigkeit MIT Finanzdaten in EINEM Ledger. ERP-Integration fuer CSRD-Genauigkeit."}, {"o": "ROI unklar", "r": "Non-Compliance: Strafen + Audit-Fehler. Proaktiv: bessere ESG-Ratings = niedrigere Kapitalkosten."}]}, "persona": {"en": [{"role": "CSO (Sustainability Officer)", "msg": "CSRD compliance, automated ESG reporting, double materiality, value chain data collection", "prio": "Primary"}, {"role": "CFO", "msg": "Financial-grade ESG data, Green Ledger integration, audit readiness, investor requirements, cost of capital", "prio": "Primary"}, {"role": "Head of Reporting / Controlling", "msg": "Integrated financial + sustainability reporting, automation, ESRS standards compliance", "prio": "Champion"}, {"role": "CEO / Board", "msg": "Regulatory compliance, reputation, sustainable business model, stakeholder trust", "prio": "Influencer"}], "de": [{"role": "CSO (Nachhaltigkeitsbeauftragter)", "msg": "CSRD-Compliance, automatisiertes ESG-Reporting, doppelte Wesentlichkeit", "prio": "Primaer"}, {"role": "CFO", "msg": "Finanzqualitaet ESG-Daten, Green Ledger, Audit, Investoren, Kapitalkosten", "prio": "Primaer"}, {"role": "Reporting-Leiter", "msg": "Integriertes Financial + Sustainability Reporting, ESRS", "prio": "Champion"}, {"role": "CEO / Vorstand", "msg": "Regulatorik, Reputation, nachhaltiges Geschaeftsmodell", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Subscription (annual, modular)", "metric": "Entities reporting + modules", "range": "Starting 50K-150K EUR/year for single entity CSRD. Enterprise (multi-entity, full scope): 200K-600K+", "includes": "Green Ledger, CSRD/ESRS templates, carbon accounting, data collection framework, audit support"}, "de": {"model": "Subskription (jaehrlich, modular)", "metric": "Berichtende Einheiten + Module", "range": "Ab 50K-150K EUR/Jahr Single-Entity. Enterprise 200K-600K+", "includes": "Green Ledger, CSRD/ESRS-Vorlagen, CO2-Bilanzierung, Datenerfassung, Audit-Support"}}, "crossSell": {"en": [{"trigger": "Scope 3 data from supply chain", "solution": "SAP Ariba (Supplier ESG)", "why": "Collect supplier ESG data through Ariba network for Scope 3 reporting"}, {"trigger": "Transport emissions tracking", "solution": "SAP Transportation Management", "why": "TM provides CO2 per shipment data for Scope 3 logistics"}, {"trigger": "Financial-sustainability integration", "solution": "RISE with SAP (S/4HANA)", "why": "Green Ledger runs IN S/4HANA - one transaction, one posting, both dimensions"}, {"trigger": "Analytics and disclosure", "solution": "SAP Analytics Cloud", "why": "ESG dashboards, scenario modeling for decarbonization paths"}], "de": [{"trigger": "Scope-3-Daten aus Supply Chain", "solution": "SAP Ariba (Supplier ESG)", "why": "Lieferanten-ESG ueber Ariba-Netzwerk fuer Scope 3"}, {"trigger": "Transport-Emissionen", "solution": "SAP TM", "why": "CO2 pro Sendung fuer Scope 3 Logistik"}, {"trigger": "Finance-Sustainability-Integration", "solution": "RISE (S/4HANA)", "why": "Green Ledger IN S/4: eine Transaktion, beide Dimensionen"}, {"trigger": "Analytics und Offenlegung", "solution": "SAP Analytics Cloud", "why": "ESG-Dashboards, Dekarbonisierungs-Szenarien"}]}, "refs": {"en": [{"industry": "Chemical", "country": "Germany", "outcome": "Green Ledger for CSRD first-wave reporting. Automated 70% of ESRS data points from ERP. Audit-ready in 4 months vs. estimated 12 months manually."}, {"industry": "Automotive", "country": "Austria", "outcome": "Carbon accounting across 8 plants. Scope 1+2 tracking automated. Identified 15% emission reduction opportunity through process optimization."}, {"industry": "Financial Services", "country": "Switzerland", "outcome": "ESG scoring for investment portfolio using SAP data. Sustainable finance products launched 6 months earlier. 2B EUR in green bonds enabled."}], "de": [{"industry": "Chemie", "country": "Deutschland", "outcome": "Green Ledger fuer CSRD. 70% ESRS-Datenpunkte automatisiert. Audit-ready in 4 vs. 12 Monaten."}, {"industry": "Automotive", "country": "Oesterreich", "outcome": "CO2-Bilanzierung, 8 Werke. Scope 1+2 automatisiert. 15% Reduktionspotenzial entdeckt."}, {"industry": "Finanzdienstleistungen", "country": "Schweiz", "outcome": "ESG-Scoring fuer Portfolio. 2 Mrd. EUR Green Bonds ermoeglicht."}]}, "roi": {"en": ["70-80% automation of CSRD/ESRS data collection (vs. manual)", "4-6 month faster CSRD readiness vs. manual approach", "100% audit trail compliance (required by regulation)", "20-50 basis points lower cost of capital through better ESG ratings", "Avoid regulatory fines and audit failures (estimated 500K-5M EUR risk)"], "de": ["70-80% Automatisierung CSRD/ESRS-Datenerfassung", "4-6 Monate schnellere CSRD-Readiness", "100% Audit-Trail-Compliance", "20-50 Basispunkte niedrigere Kapitalkosten", "Regulatorische Strafen vermeiden (500K-5M EUR Risiko)"]}, "meeComp": {"en": [{"competitor": "Sphera / EcoVadis", "strength": "Specialized ESG tools, good for environmental data, established in sustainability", "counter": "SAP Sustainability: integrated with financial ledger (Green Ledger unique), ERP-native data, audit-grade accuracy. Specialized tools need separate integration and lack financial-grade controls."}, {"competitor": "Watershed / Persefoni", "strength": "Modern carbon accounting, good UX, fast deployment for Scope 1-2", "counter": "SAP: CSRD is broader than carbon (social, governance), Green Ledger provides audit-grade integration with financials. Point solutions miss the regulatory breadth."}, {"competitor": "Microsoft Sustainability Manager", "strength": "Bundled with Azure, Copilot integration, broad ESG framework", "counter": "SAP: deeper ERP integration (transaction-level carbon tracking), Green Ledger for financial-sustainability link, stronger in regulated CSRD compliance."}], "de": [{"competitor": "Sphera / EcoVadis", "strength": "Spezialisierte ESG-Tools, Umweltdaten", "counter": "SAP: mit Finanz-Ledger integriert, ERP-nativ, pruefungsgrade Genauigkeit."}, {"competitor": "Watershed / Persefoni", "strength": "Modernes Carbon Accounting, schnell", "counter": "SAP: CSRD breiter als CO2, Green Ledger verknuepft Finanzen."}, {"competitor": "Microsoft Sustainability Manager", "strength": "Azure-Bundle, Copilot, ESG-Framework", "counter": "SAP: tiefere ERP-Integration, Green Ledger, staerker bei regulierter CSRD-Compliance."}]}}]};
const PLAYS=[{"name": {"en": "S/4HANA Transformation Play", "de": "S/4HANA-Transformations-Play"}, "desc": {"en": "Complete cloud ERP transformation combining process intelligence, ERP migration, adoption assurance, and enterprise architecture visibility.", "de": "Vollstaendige Cloud-ERP-Transformation mit Prozessintelligenz, ERP-Migration, Adoptionssicherung und EA-Sichtbarkeit."}, "solutions": ["RISE with SAP", "SAP Signavio", "SAP WalkMe", "SAP LeanIX", "SAP Integration Suite"], "pitch": {"en": "Transform with confidence: know your processes (Signavio), plan your landscape (LeanIX), migrate your ERP (RISE), connect your systems (Integration Suite), and ensure adoption (WalkMe).", "de": "Transformieren mit Sicherheit: Prozesse verstehen (Signavio), Landschaft planen (LeanIX), ERP migrieren (RISE), Systeme verbinden (Integration Suite), Adoption sichern (WalkMe)."}}, {"name": {"en": "Intelligent Data & AI Play", "de": "Intelligente Daten- & KI-Play"}, "desc": {"en": "Build the AI-ready data foundation and deploy enterprise AI across business processes.", "de": "KI-bereites Datenfundament aufbauen und Enterprise-KI ueber Geschaeftsprozesse deployen."}, "solutions": ["SAP Business Data Cloud", "SAP Datasphere", "SAP Business AI / Joule", "SAP Analytics Cloud"], "pitch": {"en": "Foundation (BDC/Datasphere) provides governed, semantic data. AI (Joule) automates processes. Analytics (SAC) drives decisions. From raw data to AI-powered enterprise in one coherent stack.", "de": "Fundament (BDC/Datasphere) liefert governed Daten. KI (Joule) automatisiert. Analytics (SAC) entscheidet. Vom Rohdatum zum KI-Unternehmen."}}, {"name": {"en": "Total Spend Management Play", "de": "Total-Spend-Management-Play"}, "desc": {"en": "Unified visibility and control across all spend categories: procurement, travel, and external workforce.", "de": "Einheitliche Sichtbarkeit und Kontrolle ueber alle Ausgabenkategorien: Einkauf, Reisen, externe Mitarbeiter."}, "solutions": ["SAP Ariba", "SAP Concur", "SAP Fieldglass"], "pitch": {"en": "One view of total spend: goods and services (Ariba), travel and expenses (Concur), external workforce (Fieldglass). Typically 10-20% total spend reduction through visibility alone.", "de": "Eine Sicht auf Gesamtausgaben: Gueter (Ariba), Reisen (Concur), Externe (Fieldglass). Typisch 10-20% Reduktion durch Sichtbarkeit."}}, {"name": {"en": "Customer Experience Suite Play", "de": "Customer-Experience-Suite-Play"}, "desc": {"en": "End-to-end customer engagement from identity through marketing, commerce, sales, and service.", "de": "End-to-End-Kundenerlebnis von Identitaet ueber Marketing, Commerce, Vertrieb und Service."}, "solutions": ["SAP Customer Data Cloud (CIAM)", "SAP Emarsys", "SAP Commerce Cloud", "SAP Sales Cloud", "SAP Service Cloud"], "pitch": {"en": "Know your customer (CDC), engage them (Emarsys), sell to them (Commerce + Sales Cloud), and serve them (Service Cloud). One unified customer profile across all touchpoints.", "de": "Kunden kennen (CDC), ansprechen (Emarsys), verkaufen (Commerce + Sales), betreuen (Service). Ein Profil ueber alle Touchpoints."}}, {"name": {"en": "Mid-Market Cloud ERP Play (GROW)", "de": "Mittelstand-Cloud-ERP-Play (GROW)"}, "desc": {"en": "Fast path to cloud ERP for mid-market companies with analytics, integration, and HR.", "de": "Schneller Weg zu Cloud-ERP fuer Mittelstand mit Analytics, Integration und HR."}, "solutions": ["GROW with SAP", "SAP Analytics Cloud", "SAP Integration Suite", "SAP SuccessFactors"], "pitch": {"en": "Pre-configured S/4HANA Public Cloud (GROW) + planning and analytics (SAC) + connectivity (Integration Suite) + people management (SuccessFactors). Full business suite in months, not years.", "de": "Vorkonfiguriertes S/4HANA Public Cloud (GROW) + Analytics (SAC) + Konnektivitaet (IS) + HR (SF). Volle Suite in Monaten."}}, {"name": {"en": "BW to Cloud Analytics Play", "de": "BW-zu-Cloud-Analytics-Play"}, "desc": {"en": "Modernize your analytics landscape from on-premise BW to cloud-native data and analytics.", "de": "Analytics-Landschaft modernisieren: von On-Premise-BW zu Cloud-nativen Daten und Analytics."}, "solutions": ["SAP BW Bridge (Move to Cloud)", "SAP Datasphere", "SAP Analytics Cloud", "SAP Business Data Cloud"], "pitch": {"en": "Migrate BW content (BW Bridge), modernize data architecture (Datasphere), deliver modern analytics (SAC), and prepare for AI (BDC). No big-bang - phased, risk-managed approach.", "de": "BW-Content migrieren (Bridge), Datenarchitektur modernisieren (Datasphere), Analytics (SAC), KI vorbereiten (BDC). Phasenweise."}}, {"name": {"en": "Sustainable Enterprise Play", "de": "Nachhaltiges-Unternehmen-Play"}, "desc": {"en": "Embed sustainability into core business operations - from supply chain to reporting.", "de": "Nachhaltigkeit in Kerngeschaeft einbetten - von Supply Chain bis Reporting."}, "solutions": ["SAP Sustainability (CSRD / Green Ledger)", "SAP Ariba", "SAP Transportation Management", "SAP Analytics Cloud"], "pitch": {"en": "Report (CSRD/Green Ledger), source sustainably (Ariba supplier ESG), measure logistics emissions (TM), analyze and plan decarbonization (SAC). Compliance + competitive advantage.", "de": "Berichten (CSRD), nachhaltig einkaufen (Ariba ESG), Logistik-Emissionen messen (TM), Dekarbonisierung planen (SAC)."}}];

// Track scroll to highlight active dot
(function(){
  var kv=document.getElementById('kV');
  if(!kv)return;
  var _raf=null;
  kv.addEventListener('scroll',function(){
    if(_raf)return;
    _raf=requestAnimationFrame(function(){
      _raf=null;
      var secs=document.querySelectorAll('#kV .sec[data-sec]');
      var dots=document.querySelectorAll('#secNav .sec-dot');
      if(!secs.length||!dots.length)return;
      var kvTop=kv.getBoundingClientRect().top;
      var activeId=null;
      secs.forEach(function(s){
        var r=s.getBoundingClientRect();
        if(r.top-kvTop<kv.clientHeight*0.4)activeId=s.getAttribute('data-sec');
      });
      dots.forEach(function(d){
        d.classList.toggle('active',d.getAttribute('data-nav')===activeId);
      });
    });
  });
})();

CUSTOMER: ${company}${url?' | '+url:''}${notes?' | '+notes:''}${personas.length?' | Meeting: '+personas.join(','):''}

KIT "${k.name}" DATA:
${JSON.stringify(kitData)}

Return ONLY valid JSON:
{"companySnapshot":{"industry":"sector","description":"what they do in 2-3 sentences","hq":"city, country","markets":"key regions/markets they operate in","revenue":"latest known annual revenue figure","employees":"approx headcount","keyProducts":"their main products or services (brief)","strategicFocus":"current strategic priorities or transformation initiatives based on public info","recentHighlights":"1-2 notable recent developments (acquisitions, partnerships, earnings, leadership changes)","techLandscape":"known ERP/tech stack or digital maturity if available, otherwise N/A"},"profile":"1-line: industry,size,country,SAP situation","topPains":[max 3 indices],"topQuestions":[max 4 indices ranked],"likelyObjections":[max 2 indices],"relevantRefs":[indices],"industryFocus":index or -1,"personaFocus":[indices],"opener":"1-2 sentence personalized opening for this customer","watchOut":"1 brief competitive/risk warning","roiHighlight":[max 2 indices],"callPrep":{"questions":["4 discovery questions rewritten/adapted specifically for this customer and their industry - reference their actual business context"],"differentiators":["3-4 differentiators rewritten to explain why it matters specifically for THIS company"],"objections":[{"o":"likely objection from this customer","r":"tailored rebuttal referencing their situation"}],"talkTrack":"A 3-4 sentence tailored pitch for this specific customer combining their situation with the solution value"}}`;

  var apiUrl='https://api.groq.com/openai/v1/chat/completions';
  var payload=JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],temperature:0.3,response_format:{type:'json_object'}});

  async function callAI(attempt){
    var resp=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},body:payload});
    if(resp.status===429){
      document.getElementById('aiStatus').textContent='Rate limited — please wait a moment and try again.';
      return resp;
    }
    if(resp.status===503&&attempt<2){
      var wait=5000*(attempt+1);
      document.getElementById('aiStatus').textContent='Service busy — retrying in '+(wait/1000)+'s';
      await new Promise(r=>setTimeout(r,wait));
      return callAI(attempt+1);
    }
    return resp;
  }

  try{
    var resp=await callAI(0);
    if(!resp.ok){
      var errBody=await resp.text();
      console.error('Groq HTTP error:',resp.status,errBody);
      document.getElementById('aiStatus').innerHTML=resp.status===429?'Rate limit reached — please wait a moment and try again.':'API error '+resp.status+'. Check console.';
      btn.classList.remove('loading');btn.disabled=false;
      return;
    }
    var data=await resp.json();
    if(!data.choices||!data.choices[0]||!data.choices[0].message){
      console.error('Groq unexpected:',data);
      document.getElementById('aiStatus').textContent='Unexpected response';
      btn.classList.remove('loading');btn.disabled=false;
      return;
    }
    var text=data.choices[0].message.content;
    text=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    _aiResult=JSON.parse(text);
    renderAiResults(company,k,L);
    document.getElementById('aiStatus').textContent='';
  }catch(e){
    console.error('Gemini error:',e);
    document.getElementById('aiStatus').textContent='Error: '+e.message;
  }
  btn.classList.remove('loading');btn.disabled=false;
}

function openQuiz(){

  let questions=buildQuizQuestions(k,L);

  questions.forEach((q,i)=>{
    h+=`<div class="quiz-q"><p>${i+1}. ${q.question}</p>`;

      h+=`<div class="quiz-opt"><input type="radio" name="q${i}" id="q${i}o${j}" value="${j}"><label for="q${i}o${j}">${opt}</label></div>`;
    });

  });
  h+=`<button class="summ-btn summ-btn-primary" onclick="scoreQuiz()">Check Answers</button>`;

  document.getElementById('quizOverlay').classList.add('active');
  window._quizAnswers=questions.map(q=>q.correct);

function buildQuizQuestions(k,L){
  let qs=[];
  // Q1: Elevator pitch key theme
  qs.push({question:L==='en'?'What is the primary value proposition of '+k.name+'?':'Was ist das primaere Wertversprechen von '+k.name+'?',options:[k.diff[L][0],k.dont[L][0]||'N/A',k.pain[L][0]||'N/A'],correct:0});
  // Q2: Competitor
  if(k.comp[L].length>=2){qs.push({question:L==='en'?'Which is a key competitor for this solution?':'Wer ist ein Hauptwettbewerber?',options:[k.comp[L][0].v,k.inds[0]||'N/A','SAP Concur'],correct:0});}
  // Q3: What NOT to say
  if(k.dont[L].length>=2){qs.push({question:L==='en'?'Which statement should you AVOID saying?':'Welche Aussage sollten Sie VERMEIDEN?',options:[k.dont[L][0],k.diff[L][0],k.qual[L][0]||'N/A'],correct:0});}
  // Q4: Key differentiator
  if(k.diff[L].length>=3){qs.push({question:L==='en'?'Which is a genuine key differentiator?':'Was ist ein echtes Differenzierungsmerkmal?',options:[k.diff[L][1],k.pain[L][1]||'N/A',k.dont[L][1]||'N/A'],correct:0});}
  // Q5: Qualifying signal
  if(k.qual[L].length>=2){qs.push({question:L==='en'?'Which is a qualifying signal for this solution?':'Was ist ein Qualifizierungssignal?',options:[k.qual[L][0],k.dont[L][0]||'N/A',k.comp[L][0]?k.comp[L][0].v:'N/A'],correct:0});}
  return qs.slice(0,5);
}
function scoreQuiz(){
  let correct=0,total=window._quizAnswers.length;
  window._quizAnswers.forEach((a,i)=>{
    let sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(sel&&parseInt(sel.value)===a)correct++;
  });
  let pct=Math.round(correct/total*100);
  let el=document.getElementById('quizResult');
  el.style.display='block';
  el.className='quiz-result '+(pct>=80?'good':pct>=50?'mid':'low');
  el.textContent=`${correct}/${total} correct (${pct}%) - ${pct>=80?(lang==='en'?'Great! You know this kit well.':'Super! Sie kennen dieses Kit gut.'):pct>=50?(lang==='en'?'Good start - review the sections you missed.':'Guter Anfang - wiederholen Sie die Bereiche die Sie verpasst haben.'):(lang==='en'?'Review this kit before your next call.':'Ueberpruefen Sie dieses Kit vor Ihrem naechsten Call.')}`;
}
function closeQuiz(){document.getElementById('quizOverlay').classList.remove('active');}

// Easter egg 2: Drag the logo - rubber band back
(function(){
  let logo=document.querySelector('.logo');
  let dragging=false,startX,startY,offX,offY;
  logo.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    dragging=true;logo.classList.add('logo-dragging');
    let rect=logo.getBoundingClientRect();
    startX=rect.left;startY=rect.top;
    offX=e.clientX-rect.left;offY=e.clientY-rect.top;
    logo.style.transition='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    let dx=e.clientX-offX-startX;
    let dy=e.clientY-offY-startY;
    logo.style.transform='translate('+dx+'px,'+dy+'px)';
  });
  document.addEventListener('mouseup',function(){
    if(!dragging)return;
    dragging=false;
    logo.style.transition='transform .5s cubic-bezier(.68,-0.55,.27,1.55)';
    logo.style.transform='translate(0,0)';
    setTimeout(()=>{logo.style.transition='transform .15s';logo.classList.remove('logo-dragging');},600);
  });
})();

// Easter egg 7: Matrix rain
function eeMatrix(){
  let canvas=document.getElementById('eeMatrix');
  canvas.classList.add('active');
  let ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let cols=Math.floor(canvas.width/14);
  let drops=Array(cols).fill(1);
  let chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*SAP';
  let intv=setInterval(function(){
    ctx.fillStyle='rgba(0,0,0,.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#0f0';ctx.font='13px monospace';
    for(let i=0;i<drops.length;i++){
      let ch=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(ch,i*14,drops[i]*14);
      if(drops[i]*14>canvas.height&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    }
  },33);
  setTimeout(()=>{clearInterval(intv);canvas.classList.remove('active');ctx.clearRect(0,0,canvas.width,canvas.height);},4000);
}

let compareSelected=[];
// Tools dropdown

function openCompare(){
  compareSelected=[];
  let L=lang;
  let h='<div class="compare-header"><h2>'+(L==='en'?'Compare Kits':'Kits vergleichen')+'</h2><button class="compare-close" onclick="closeCompare()">&times;</button></div>';
  h+='<p style="font-size:13px;color:var(--g1);margin-bottom:12px">'+(L==='en'?'Select 2-3 kits to compare side by side:':'2-3 Kits zum Vergleichen auswaehlen:')+'</p>';
  h+='<div class="compare-picker" id="comparePicker">';
  LOBS.forEach(function(lob,li){
    KITS[lob].forEach(function(kit,ki){
      h+='<div class="compare-chip" data-li="'+li+'" data-ki="'+ki+'" onclick="toggleCompareChip(this)">'+kit.name+'</div>';
    });
  });
  h+='</div>';
  h+='<button onclick="renderCompare()" style="margin:16px 0;background:var(--blue);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">'+(L==='en'?'Compare Selected':'Auswahl vergleichen')+'</button>';
  h+='<div id="compareGrid"></div>';
  document.getElementById('compareModal').innerHTML=h;
  document.getElementById('compareOverlay').classList.add('show');document.getElementById('secNav').classList.add('hidden');
}
function closeCompare(){document.getElementById('compareOverlay').classList.remove('show');document.getElementById('secNav').classList.remove('hidden');}
function toggleCompareChip(el){
  let li=+el.dataset.li,ki=+el.dataset.ki;
  let idx=compareSelected.findIndex(x=>x.li===li&&x.ki===ki);
  if(idx>=0){compareSelected.splice(idx,1);el.classList.remove('selected');}
  else if(compareSelected.length<3){compareSelected.push({li:li,ki:ki});el.classList.add('selected');}
}
function renderCompare(){
  if(compareSelected.length<2)return;
  let L=lang;
  let cols=compareSelected.length;
  let selectedKits=compareSelected.map(function(s){return KITS[LOBS[s.li]][s.ki];});
  let h='<div class="compare-grid" style="grid-template-columns:repeat('+cols+',1fr)">';
  selectedKits.forEach(function(kit){
    h+='<div class="compare-col">';
    h+='<h3>'+kit.name+'</h3>';
    h+='<h4>'+(L==='en'?'Elevator Pitch':'Elevator Pitch')+'</h4><p>'+kit.elev[L].substring(0,200)+'...</p>';
    h+='<h4>'+(L==='en'?'Key Differentiators':'Differenzierung')+'</h4><ul>'+kit.diff[L].slice(0,3).map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>';
    if(kit.roi) h+='<h4>ROI</h4><ul>'+kit.roi[L].slice(0,3).map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>';
    h+='</div>';
  });
  h+='</div>';

  // --- SECTION: How These Connect (cross-sell triggers) ---
  var connections=[];
  selectedKits.forEach(function(kitA,iA){
    if(!kitA.crossSell||!kitA.crossSell[L])return;
    kitA.crossSell[L].forEach(function(cs){
      selectedKits.forEach(function(kitB,iB){
        if(iA===iB)return;
        if(cs.solution.toLowerCase().indexOf(kitB.name.toLowerCase())!==-1||kitB.name.toLowerCase().indexOf(cs.solution.toLowerCase().replace('sap ',''))!==-1){
          connections.push({from:kitA.name,to:kitB.name,trigger:cs.trigger,solution:cs.solution,why:cs.why});
        }
      });
    });
  });
  h+='<div class="compare-connect"><h3>'+(L==='en'?'How These Connect':'Wie diese zusammenwirken')+'</h3>';
  if(connections.length>0){
    connections.forEach(function(c){
      h+='<div class="connect-card"><div class="connect-path"><span class="connect-from">'+c.from+'</span><span class="connect-arrow">&#8594;</span><span class="connect-to">'+c.to+'</span></div><div class="connect-trigger"><strong>'+(L==='en'?'When:':'Wenn:')+'</strong> '+c.trigger+'</div><div class="connect-why"><strong>'+(L==='en'?'Why:':'Warum:')+'</strong> '+c.why+'</div></div>';
    });
  } else {
    h+='<p style="color:var(--g1);font-size:13px">'+(L==='en'?'No direct cross-sell triggers found between these kits.':'Keine direkten Cross-Sell-Trigger zwischen diesen Kits gefunden.')+'</p>';
  }
  h+='</div>';

  // --- SECTION: Positioning Sequence ---
  h+='<div class="compare-connect"><h3>'+(L==='en'?'Suggested Positioning Sequence':'Empfohlene Positionierungsreihenfolge')+'</h3>';
  var sequence=[];
  selectedKits.forEach(function(kit){
    var triggerCount=0;
    connections.forEach(function(c){if(c.from===kit.name)triggerCount++;});
    sequence.push({name:kit.name,triggers:triggerCount});
  });
  sequence.sort(function(a,b){return b.triggers-a.triggers;});
  h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
  sequence.forEach(function(s,i){
    h+='<span class="connect-from" style="font-size:14px">'+s.name+'</span>';
    if(i<sequence.length-1) h+='<span class="connect-arrow">&#8594;</span>';
  });
  h+='</div><p style="font-size:12px;color:var(--g1)">'+(L==='en'?'Lead with the solution that triggers the others. This sequence is based on cross-sell trigger density.':'Fuehren Sie mit der Loesung die die anderen ausloest. Reihenfolge basiert auf Cross-Sell-Trigger-Dichte.')+'</p></div>';

  // --- SECTION: Unified Discovery Questions (deduplicated) ---
  h+='<div class="compare-connect"><h3>'+(L==='en'?'Unified Discovery Questions':'Vereinte Discovery-Fragen')+'</h3>';
  var allQs=[],seenQs={};
  selectedKits.forEach(function(kit){
    kit.questions[L].forEach(function(q){
      var key=q.t.toLowerCase();
      if(!seenQs[key]){seenQs[key]=true;allQs.push({t:q.t,q:q.q,kit:kit.name});}
    });
  });
  h+='<ul style="padding-left:16px">';
  allQs.slice(0,10).forEach(function(q){
    h+='<li style="margin-bottom:8px;font-size:13px;line-height:1.5"><strong>['+q.t+']</strong> '+q.q+' <span style="font-size:11px;color:var(--g2);margin-left:4px">('+q.kit+')</span></li>';
  });
  h+='</ul></div>';

  // --- SECTION: Shared Personas ---
  h+='<div class="compare-connect"><h3>'+(L==='en'?'Shared Buyer Personas':'Gemeinsame Buyer-Personas')+'</h3>';
  var personaMap={};
  selectedKits.forEach(function(kit){
    if(!kit.persona||!kit.persona[L])return;
    kit.persona[L].forEach(function(p){
      var role=p.role;
      if(!personaMap[role])personaMap[role]={role:role,kits:[],msgs:[]};
      personaMap[role].kits.push(kit.name);
      personaMap[role].msgs.push(p.msg);
    });
  });
  var sharedPersonas=Object.values(personaMap).filter(function(p){return p.kits.length>1;});
  if(sharedPersonas.length>0){
    h+='<div style="display:grid;gap:10px">';
    sharedPersonas.forEach(function(p){
      h+='<div class="connect-card"><strong>'+p.role+'</strong> <span style="font-size:11px;color:var(--g2)">'+(L==='en'?'appears in':'erscheint in')+' '+p.kits.join(' + ')+'</span>';
      h+='<ul style="margin-top:6px;padding-left:16px">';
      p.kits.forEach(function(k,i){h+='<li style="font-size:12px;color:#444"><strong>'+k+':</strong> '+p.msgs[i]+'</li>';});
      h+='</ul></div>';
    });
    h+='</div>';
  } else {
    h+='<p style="font-size:13px;color:var(--g1)">'+(L==='en'?'No overlapping personas across selected kits. Consider separate conversations per buyer role.':'Keine ueberlappenden Personas. Erwaegen Sie separate Gespraeche pro Rolle.')+'</p>';
  }
  h+='</div>';

  // --- SECTION: Combined Commercial Snapshot ---
  h+='<div class="compare-connect"><h3>'+(L==='en'?'Combined Commercial Snapshot':'Kommerzielle Uebersicht')+'</h3>';
  h+='<div class="compare-grid" style="grid-template-columns:repeat('+cols+',1fr)">';
  selectedKits.forEach(function(kit){
    h+='<div class="connect-card">';
    h+='<strong>'+kit.name+'</strong>';
    if(kit.commercial&&kit.commercial[L]){
      var c=kit.commercial[L];
      h+='<div style="margin-top:8px;font-size:12px;line-height:1.7;color:#444">';
      h+='<div><strong>'+(L==='en'?'Model':'Modell')+':</strong> '+c.model+'</div>';
      h+='<div><strong>'+(L==='en'?'Metric':'Metrik')+':</strong> '+c.metric+'</div>';
      h+='<div><strong>'+(L==='en'?'Range':'Bereich')+':</strong> '+c.range+'</div>';
      h+='</div>';
    } else {
      h+='<div style="margin-top:8px;font-size:12px;color:var(--g2)">'+(L==='en'?'No commercial data':'Keine Vertriebsdaten')+'</div>';
    }
    h+='</div>';
  });
  h+='</div></div>';

  // --- SECTION: Potential Objection Overlap ---
  h+='<div class="compare-connect"><h3>'+(L==='en'?'Shared Objections to Prepare For':'Gemeinsame Einwaende vorbereiten')+'</h3>';
  var objMap={};
  selectedKits.forEach(function(kit){
    if(!kit.obj||!kit.obj[L])return;
    kit.obj[L].forEach(function(o){
      var key=o.o.toLowerCase().substring(0,30);
      if(!objMap[key])objMap[key]={obj:o.o,responses:[],kits:[]};
      objMap[key].kits.push(kit.name);
      objMap[key].responses.push(o.r);
    });
  });
  var sharedObjs=Object.values(objMap).filter(function(o){return o.kits.length>1;});
  if(sharedObjs.length>0){
    sharedObjs.forEach(function(o){
      h+='<div class="connect-card"><strong style="color:#c62828">&#9888; '+o.obj+'</strong>';
      h+='<ul style="margin-top:6px;padding-left:16px">';
      o.kits.forEach(function(k,i){h+='<li style="font-size:12px;color:#444;margin-bottom:4px"><strong>'+k+':</strong> '+o.responses[i]+'</li>';});
      h+='</ul></div>';
    });
  } else {
    h+='<p style="font-size:13px;color:var(--g1)">'+(L==='en'?'No overlapping objections. Prepare for each kit independently.':'Keine ueberlappenden Einwaende. Bereiten Sie jeden Kit einzeln vor.')+'</p>';
  }
  h+='</div>';

  document.getElementById('compareGrid').innerHTML=h;
}

// Feature 6: URL deep-linking
function updateURL(){
  let params=new URLSearchParams(window.location.search);
  params.set('lob',curLob);params.set('kit',curKit);
  let newUrl=window.location.pathname+'?'+params.toString();
  history.replaceState(null,'',newUrl);
}
function loadFromURL(){
  let params=new URLSearchParams(window.location.search);
  if(params.has('lob'))curLob=parseInt(params.get('lob'))||0;
  if(params.has('kit'))curKit=parseInt(params.get('kit'))||0;
  if(params.has('lang')){lang=params.get('lang')==='de'?'de':'en';setLang(lang);}
  if(params.has('oncall')&&params.get('oncall')==='1'){setTimeout(openOnCall,300);}
}

// Feature 5: Copy entire kit as markdown
function copyKitMD(){
  let k=KITS[LOBS[curLob]][curKit],L=lang;
  let md='# '+k.name+'\n';
  md+='> '+k.sub[L]+'\n\n';
  md+='## Elevator Pitch\n'+k.elev[L]+'\n\n';
  md+='## Pain Points\n'+k.pain[L].map(x=>'- '+x).join('\n')+'\n\n';
  md+='## Discovery Questions\n'+k.questions[L].map(x=>'- **['+x.t+']** '+x.q).join('\n')+'\n\n';
  md+='## Differentiators\n'+k.diff[L].map(x=>'- '+x).join('\n')+'\n\n';
  md+='## Talking Points\n'+k.talk[L].map(x=>'- **'+x.p+':** '+x.l).join('\n')+'\n\n';
  md+='## Competitive\n'+k.comp[L].map(x=>'- **'+x.v+':** '+x.d).join('\n')+'\n\n';
  if(k.obj)md+='## Objection Handling\n'+k.obj[L].map(x=>'- **'+x.o+':** '+x.r).join('\n')+'\n\n';
  if(k.dont)md+='## Do Not Say\n'+k.dont[L].map(x=>'- '+x).join('\n')+'\n\n';
  if(k.roi)md+='## ROI\n'+k.roi[L].map(x=>'- '+x).join('\n')+'\n';
  navigator.clipboard.writeText(md).then(function(){
    let btn=document.getElementById('mdCopyBtn');
    if(btn){btn.textContent='Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy as Markdown';btn.classList.remove('copied');},1500);}
  });
}

// Feature 2: On the Call mode
function startCallWithIntel(){
  var r=_aiResult;if(!r)return;
  _aiCallMode=true;
  var company=document.getElementById('aiCompany').value.trim();
  var k=KITS[LOBS[curLob]][curKit],L=lang;
  var cp=r.callPrep||{};
  // Close AI modal
  document.getElementById('aiOverlay').classList.remove('show');
  // Build On the Call with intel
  document.getElementById('oncallTitle').textContent=(L==='en'?'On the Call':'Im Gespraech')+' \u2014 '+k.name+' \u00d7 '+company;
  var h='',tog='<span class="oc-tog">&#9660;</span>';

  // AI Intel header card - full width, prominent
  h+='<div style="grid-column:1/-1;padding:16px 24px;background:#fff;border-bottom:1px solid #e8eaed">';
  h+='<div style="font-size:15px;line-height:1.6;color:#333">';
  h+='<strong style="color:var(--deep);font-size:16px">'+company+'</strong>';
  if(r.companySnapshot&&r.companySnapshot.description)h+=' — '+r.companySnapshot.description;
  h+='</div>';
  if(r.watchOut)h+='<div style="margin-top:10px;font-size:12.5px;color:#C62828;font-weight:600;display:inline-block;background:#FFEBEE;padding:5px 12px;border-radius:6px">'+r.watchOut+'</div>';
  h+='</div>';

  // Personalized opener
  var hook=r.opener||k.talk[L][0].l;
  h+='<div class="oncall-pitch"><h3 onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Your Opening for '+company:'Eroeffnung fuer '+company)+tog+'</h3><div class="oc-content"><p>'+hook+'</p>';
  if(cp.talkTrack)h+='<p style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;font-size:13px">'+cp.talkTrack+'</p>';
  h+='</div></div>';

  // Left panel: Adapted Questions + Adapted Differentiators
  h+='<div class="oncall-panel left">';
  h+='<h3 onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Questions for '+company:'Fragen fuer '+company)+tog+'</h3>';
  if(cp.questions&&cp.questions.length){
    h+='<ul class="oc-content">'+cp.questions.map(function(q){return '<li onclick="event.stopPropagation();this.classList.toggle(\'used\')">'+q+'</li>';}).join('')+'</ul>';
  } else {
    var qs=[];
    if(r.topQuestions&&r.topQuestions.length){r.topQuestions.forEach(function(idx){if(k.questions[L][idx])qs.push(k.questions[L][idx]);});}
    if(!qs.length)qs=k.questions[L].slice(0,5);
    h+='<ul class="oc-content">'+qs.map(function(x){return '<li onclick="event.stopPropagation();this.classList.toggle(\'used\')"><strong>['+x.t+']</strong> '+x.q+'</li>';}).join('')+'</ul>';
  }
  h+='<h3 style="margin-top:14px" onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Why '+k.name+' for '+company:'Warum '+k.name+' fuer '+company)+tog+'</h3>';
  if(cp.differentiators&&cp.differentiators.length){
    h+='<ul class="oc-content">'+cp.differentiators.map(function(d){return '<li onclick="event.stopPropagation();this.classList.toggle(\'used\')">'+d+'</li>';}).join('')+'</ul>';
  } else {
    h+='<ul class="oc-content">'+k.diff[L].slice(0,4).map(function(x){var colon=x.indexOf(':');var bolded=colon>0&&colon<40?'<strong>'+x.substring(0,colon)+'</strong>'+x.substring(colon):('<strong>'+x.split(' ').slice(0,3).join(' ')+'</strong> '+x.split(' ').slice(3).join(' '));return '<li onclick="event.stopPropagation();this.classList.toggle(\'used\')">'+bolded+'</li>';}).join('')+'</ul>';
  }
  h+='</div>';

  // Right panel: Adapted Objections + ROI + Notes
  h+='<div class="oncall-panel">';
  if(cp.objections&&cp.objections.length){
    h+='<h3 onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Likely Objections from '+company:'Einwaende von '+company)+tog+'</h3>';
    h+='<ul class="oc-content">'+cp.objections.map(function(x){return '<li onclick="event.stopPropagation();this.classList.toggle(\'used\')"><strong>'+x.o+'</strong> \u2014 '+x.r+'</li>';}).join('')+'</ul>';
  } else if(k.obj){
    var objs=[];
    if(r.likelyObjections&&r.likelyObjections.length){r.likelyObjections.forEach(function(idx){if(k.obj[L][idx])objs.push(k.obj[L][idx]);});}
    if(!objs.length)objs=k.obj[L].slice(0,4);
    h+='<h3 onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Likely Objections':'Wahrscheinliche Einwaende')+tog+'</h3>';
    h+='<ul class="oc-content">'+objs.map(function(x){return '<li onclick="event.stopPropagation();this.classList.toggle(\'used\')"><strong>'+x.o+'</strong> \u2014 '+x.r+'</li>';}).join('')+'</ul>';
  }
  if(k.roi){
    var rois=[];
    if(r.roiHighlight&&r.roiHighlight.length){r.roiHighlight.forEach(function(idx){if(k.roi[L][idx])rois.push(k.roi[L][idx]);});}
    if(!rois.length)rois=k.roi[L].slice(0,4);
    h+='<h3 style="margin-top:14px" onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Proof Points':'Beweis-Punkte')+tog+'</h3>';
    h+='<div class="oncall-stats oc-content">'+rois.map(function(x){return '<span class="oncall-stat" onclick="event.stopPropagation();this.classList.toggle(\'used\')" style="cursor:pointer">'+x+'</span>';}).join('')+'</div>';
  }
  h+='<h3 style="margin-top:14px" onclick="this.nextElementSibling.classList.toggle(\'hidden\');this.querySelector(\'.oc-tog\').classList.toggle(\'hidden\')">'+(L==='en'?'Quick Notes':'Notizen')+tog+'</h3>';
  h+='<div class="oncall-notes oc-content"><textarea id="oncallNotes" placeholder="'+(L==='en'?'Jot down key points... (copy before leaving)':'Wichtige Punkte notieren... (vor Verlassen kopieren)')+'"></textarea><div style="display:flex;align-items:center;gap:12px;margin-top:6px"><button onclick="event.stopPropagation();navigator.clipboard.writeText(document.getElementById(\'oncallNotes\').value);this.textContent=\''+(L==='en'?'Copied!':'Kopiert!')+'\';setTimeout(()=>{this.textContent=\''+(L==='en'?'Copy Notes':'Notizen kopieren')+'\'},1500)" style="background:var(--g3);border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">'+(L==='en'?'Copy Notes':'Notizen kopieren')+'</button><span class="oncall-notes-hint">'+(L==='en'?'Not saved \u2014 copy before closing':'Nicht gespeichert \u2014 vor Schliessen kopieren')+'</span></div></div>';
  h+='</div>';

  // Do Not Say
  if(k.dont){
    h+='<div class="oncall-warn"><span class="oncall-warn-label">'+(L==='en'?'Do Not Say':'Nicht sagen')+'</span><div class="oncall-warn-items">';
    k.dont[L].slice(0,5).forEach(function(d){h+='<div class="oncall-warn-item">'+d+'</div>';});
    h+='</div></div>';
  }

  document.getElementById('oncallBody').innerHTML=h;
  document.getElementById('oncallOverlay').classList.add('show');
  document.querySelector('.contact-chip').style.display='none';
  document.getElementById('aiFab').style.display='none';
  document.getElementById('secNav').classList.add('hidden');
}

function closeOnCall(){
  var notes=document.getElementById('oncallNotes');
  if(notes&&notes.value.trim().length>0){
    if(!confirm(lang==='en'?'You have unsaved notes. If you leave, they will be lost.\n\nDid you copy them?':'Sie haben ungespeicherte Notizen. Beim Verlassen gehen diese verloren.\n\nHaben Sie sie kopiert?')){return;}
  }
  document.getElementById('oncallOverlay').classList.remove('show');
  document.querySelector('.contact-chip').style.display='';
  document.getElementById('aiFab').style.display='';
  document.getElementById('secNav').classList.remove('hidden');
  // If started from AI Intel, re-open the results
  if(_aiCallMode&&_aiResult){
    _aiCallMode=false;
    document.getElementById('aiOverlay').classList.add('show');
  }
}
