ine", "strength": "Starkes VMS in USA, Analytics", "counter": "Fieldglass: global EMEA, native SAP, Total Spend mit Ariba/Concur."}, {"competitor": "Magnit", "strength": "MSP + VMS kombiniert", "counter": "Fieldglass: Plattform-Unabhaengigkeit, SAP-Oekosystem."}, {"competitor": "Manuell / Agentur", "strength": "Keine Plattformkosten", "counter": "Fieldglass: 10-20% versteckte Einsparungen. Zahlt sich in Q1 aus."}]}}], "Customer Experience": [{"name": "SAP Commerce Cloud", "sub": {"en": "Enterprise B2B/B2C/D2C Commerce - Complex Catalogs, Configurators, and Global Scale", "de": "Enterprise B2B/B2C/D2C Commerce - Komplexe Kataloge, Konfiguratoren und Globale Skalierung"}, "elev": {"en": "SAP Commerce Cloud is an enterprise-grade digital commerce platform built for organizations with complex products, sophisticated pricing, multi-channel requirements, and global operations. Unlike lightweight Shopify-style platforms, Commerce Cloud handles the scenarios that matter for enterprise: complex product configuration (CPQ), B2B-specific features (contract pricing, approval workflows, punchout), multi-site/multi-country management, and deep ERP integration for real-time inventory, pricing, and ATP. It powers both B2B and B2C experiences from a single platform, with the headless architecture flexibility that modern digital teams demand.", "de": "SAP Commerce Cloud ist eine Enterprise-Commerce-Plattform fuer Organisationen mit komplexen Produkten, anspruchsvoller Preisgestaltung, Multi-Channel und globalen Operationen. Beherrscht was fuer Enterprise zaehlt: CPQ, B2B-Features, Multi-Site/Multi-Country, tiefe ERP-Integration fuer Echtzeit-Bestand und ATP."}, "pain": {"en": ["Current commerce platform cannot handle B2B complexity: contract pricing, customer-specific catalogs, approval workflows, complex product configuration", "Disconnected from ERP: online prices do not match ERP prices, inventory shown online is inaccurate, orders require manual re-entry into SAP", "Cannot scale globally: each country site is a separate implementation, no shared catalog or content management, translations managed manually", "B2B customers expecting B2C-like digital experience but getting PDF catalogs and phone/fax ordering", "Product configurator needed online but current platform cannot handle variant-rich products with rules and constraints", "Multiple commerce platforms across business units with no standardization, shared technology, or unified customer view", "Performance problems during peak traffic - platform cannot auto-scale for promotional events or seasonal spikes"], "de": ["Aktuelle Plattform beherrscht B2B-Komplexitaet nicht: Vertragspreise, kundenspezifische Kataloge, Genehmigungen, Konfiguration", "Getrennt vom ERP: Online-Preise stimmen nicht, Bestand ungenau, Auftraege muessen manuell in SAP", "Global nicht skalierbar: jedes Land separate Implementierung, kein geteilter Katalog", "B2B-Kunden erwarten B2C-Erlebnis, bekommen PDF-Kataloge und Telefon/Fax", "Produktkonfigurator online noetig aber Plattform beherrscht Varianten mit Regeln nicht", "Mehrere Commerce-Plattformen ohne Standardisierung", "Performance-Probleme bei Spitzen - kein Auto-Scaling"]}, "questions": {"en": [{"t": "B2B vs B2C", "q": "Is your primary commerce need B2B, B2C, or both? What makes your B2B buying process complex - contract pricing, approval chains, product configuration?"}, {"t": "ERP integration", "q": "How critical is real-time integration with SAP for pricing, inventory availability, and order processing? What breaks today because of the gap?"}, {"t": "Product complexity", "q": "How complex are your products? Do customers need to configure, customize, or specify variants before ordering? How many SKUs/variants?"}, {"t": "Global scope", "q": "How many countries/regions do you sell in? Do you need localized sites, currencies, languages, and tax calculations?"}, {"t": "Channel strategy", "q": "What channels do you sell through - own webshop, marketplaces, mobile app, in-store, IoT/machine ordering? Do they need to share inventory and pricing?"}, {"t": "Current platform", "q": "What commerce platform are you on today? What is working, what is not, and what is driving the change?"}, {"t": "Self-service vision", "q": "What percentage of orders could be handled digitally without human involvement if the platform supported it?"}], "de": [{"t": "B2B vs B2C", "q": "Primaerer Bedarf B2B, B2C oder beides? Was macht B2B-Kauf komplex?"}, {"t": "ERP-Integration", "q": "Wie kritisch ist Echtzeit-SAP-Integration fuer Preise, Verfuegbarkeit, Auftragsverarbeitung?"}, {"t": "Produktkomplexitaet", "q": "Wie komplex sind Produkte? Konfiguration, Varianten, Regeln? Wie viele SKUs?"}, {"t": "Globaler Scope", "q": "Wie viele Laender? Lokalisierte Sites, Waehrungen, Sprachen, Steuerberechnung noetig?"}, {"t": "Kanalstrategie", "q": "Kanaele: Webshop, Marktplaetze, Mobile, In-Store, IoT? Geteilter Bestand/Preise?"}, {"t": "Aktuelle Plattform", "q": "Aktuelle Commerce-Plattform? Was geht, was nicht, was treibt Wechsel?"}, {"t": "Self-Service", "q": "Welcher Auftragsanteil waere digital ohne Menschen moeglich?"}]}, "diff": {"en": ["Enterprise B2B native: contract pricing, customer-specific catalogs, complex approval workflows, punchout catalog support, and self-service account management built in", "Real-time ERP integration: live pricing from S/4HANA, real-time ATP check, seamless order flow - no data replication lag or price mismatch", "Product configuration (CPQ): complex variant configuration with rules and constraints directly in the commerce experience - not a separate tool", "Composable/headless architecture: decoupled frontend via headless APIs for modern storefronts while retaining all backend commerce capabilities", "Global multi-site: manage multiple country sites, brands, and channels from one platform with shared catalog and localized experiences", "Auto-scaling on cloud: handles traffic spikes for promotions and seasonal peaks without performance degradation", "Marketplace and channel integration: connect to Amazon, Alibaba, industry-specific marketplaces with unified inventory and order management"], "de": ["Enterprise B2B nativ: Vertragspreise, kundenspezifische Kataloge, Genehmigungen, Punchout, Self-Service", "Echtzeit-ERP: Live-Preise aus S/4HANA, Echtzeit-ATP, nahtloser Auftragsfluss", "Produktkonfiguration (CPQ): Varianten mit Regeln direkt im Commerce-Erlebnis", "Composable/Headless: entkoppeltes Frontend ueber APIs fuer moderne Storefronts", "Global Multi-Site: mehrere Laender, Marken, Kanaele von einer Plattform", "Auto-Scaling: Spitzen ohne Performance-Degradation", "Marktplatz-Integration: Amazon, Alibaba, Branchen-Marktplaetze mit einheitlichem Bestand"]}, "talk": {"en": [{"p": "Open", "l": "Let me guess: your B2B customers are demanding a digital buying experience that looks like what they get at home as consumers - but your products, pricing, and processes are 10x more complex than a consumer store. Am I close?"}, {"p": "Pain", "l": "The gap I see in organizations like yours is that the commerce platform either handles simple B2C well but fails at B2B complexity, or handles B2B complexity but provides a terrible user experience. And in both cases, it is disconnected from SAP, creating a data integrity nightmare."}, {"p": "Vision", "l": "Commerce Cloud bridges that gap: it handles enterprise complexity (contract pricing, CPQ, approvals) while delivering a modern buying experience. And it is natively connected to your SAP backend - so prices, inventory, and orders are always accurate and in sync."}, {"p": "Proof", "l": "[Reference customer] migrated from Magento and increased digital B2B order volume by 200% because customers could finally self-serve: configure products, see their contract prices, check real-time availability, and place orders without calling sales. Cost-to-serve dropped 35%."}, {"p": "Next Step", "l": "The right approach is a commerce assessment where we map your product catalog complexity, integration requirements, and customer journey against Commerce Cloud capabilities. We can prototype a key scenario (e.g., B2B self-service with CPQ) in 4-6 weeks."}], "de": [{"p": "Eroeffnung", "l": "Vermutung: B2B-Kunden verlangen digitales Kauferlebnis wie zuhause - aber Ihre Produkte und Preise sind 10x komplexer als ein Consumer-Store?"}, {"p": "Schmerz", "l": "Commerce-Plattform beherrscht entweder B2C aber nicht B2B-Komplexitaet, oder B2B aber mit schlechtem UX. Und getrennt von SAP."}, {"p": "Vision", "l": "Commerce Cloud: Enterprise-Komplexitaet mit modernem UX. Nativ mit SAP verbunden - Preise, Bestand, Auftraege immer korrekt und synchron."}, {"p": "Beweis", "l": "[Referenz] Von Magento: +200% digitale B2B-Auftraege weil Kunden self-serven konnten. Cost-to-Serve -35%."}, {"p": "Naechster Schritt", "l": "Commerce Assessment: Katalog-Komplexitaet, Integration, Customer Journey gegen Capabilities. Prototyp eines Szenarios in 4-6 Wochen."}]}, "comp": {"en": [{"v": "Shopify Plus", "d": "Excellent for B2C simplicity. Cannot handle B2B complexity: contract pricing, complex product configuration, approval workflows. Not designed for enterprise with ERP integration needs."}, {"v": "Adobe Commerce (Magento)", "d": "Flexible open-source heritage but lacks native B2B depth and ERP integration. Requires heavy customization for enterprise B2B scenarios that Commerce Cloud provides out-of-the-box."}, {"v": "commercetools", "d": "Pure headless API-first commerce. Strong for custom frontend teams. Lacks pre-built B2B features, product configuration, and ERP integration that Commerce Cloud includes natively."}, {"v": "Salesforce Commerce Cloud (B2B)", "d": "Salesforce is CRM-first, commerce-second. SAP Commerce Cloud offers deeper product configuration, true real-time ERP integration, and more mature B2B capabilities out of the box."}], "de": [{"v": "Shopify Plus", "d": "Gut fuer B2C-Einfachheit. Beherrscht B2B-Komplexitaet nicht: Vertragspreise, Konfiguration, Genehmigungen."}, {"v": "Adobe Commerce", "d": "Flexibel aber ohne native B2B-Tiefe und ERP-Integration. Schwere Anpassung fuer Enterprise-B2B noetig."}, {"v": "commercetools", "d": "Reines Headless API-First. Keine vorgefertigten B2B-Features, CPQ oder ERP-Integration."}, {"v": "Salesforce Commerce", "d": "CRM-first, Commerce-second. SAP bietet tiefere Konfiguration und echte ERP-Echtzeit-Integration."}]}, "dont": {"en": ["Do not position for simple B2C-only use cases where Shopify would suffice - Commerce Cloud's value is in complexity", "Never promise 'no development needed' - enterprise commerce implementations always require customization, integration work, and frontend development", "Do not ignore the headless/composable trend - acknowledge it and explain that Commerce Cloud supports both headless AND traditional approaches", "Avoid comparing on B2C UI prettiness alone - Commerce Cloud wins on B2B depth, ERP integration, and enterprise complexity handling"], "de": ["Nicht fuer simple B2C-Faelle positionieren wo Shopify reicht - Wert liegt in Komplexitaet", "Nie 'keine Entwicklung noetig' versprechen - Enterprise Commerce braucht immer Customizing", "Headless/Composable-Trend nicht ignorieren - erklaeren dass beides unterstuetzt wird", "Nicht nur B2C-UI-Optik vergleichen - Commerce Cloud gewinnt bei B2B, ERP, Komplexitaet"]}, "qual": {"en": ["Complex B2B commerce needs: contract pricing, customer-specific catalogs, approval workflows", "Product configuration requirement online (CPQ for variants with rules)", "SAP ERP integration critical for pricing, ATP, and order processing", "Current platform hitting limits on B2B complexity or global scalability", "Multiple commerce platforms needing consolidation", "Significant cost-to-serve for orders that should be self-service digital"], "de": ["Komplexe B2B-Commerce-Beduerfnisse: Vertragspreise, Genehmigungen", "CPQ online noetig", "SAP-ERP-Integration kritisch fuer Preise, ATP, Auftraege", "Aktuelle Plattform an B2B-/Skalierungs-Grenzen", "Mehrere Plattformen konsolidieren", "Hohe Cost-to-Serve fuer Auftraege die Self-Service sein sollten"]}, "indDiff": {"en": [{"i": "Industrial Manufacturing / Spare Parts", "p": "Complex hierarchical catalogs, supersession chains, machine-specific part compatibility, and emergency ordering with differentiated SLAs.", "f": "Hierarchical catalog with machine/serial number part lookup, supersession management, SLA-based delivery options, and technical drawings/3D models in product detail pages."}, {"i": "Wholesale Distribution", "p": "Large B2B customer base with customer-specific pricing agreements, bulk ordering, credit management, and route-based delivery scheduling.", "f": "Customer-specific price lists from ERP in real-time, bulk order templates, integrated credit checking, delivery date selection with route optimization visibility."}], "de": [{"i": "Industriefertigung / Ersatzteile", "p": "Hierarchische Kataloge, Supersession, Maschinen-Teile-Kompatibilitaet, Notbestellungen mit SLAs.", "f": "Hierarchischer Katalog mit Maschinen-/Seriennummer-Lookup, Supersession, SLA-Lieferoptionen, technische Zeichnungen."}, {"i": "Grosshandel", "p": "Grosse B2B-Basis mit kundenspezifischen Preisvereinbarungen, Sammelbestellungen, Kreditmanagement.", "f": "Echtzeit-kundenspezifische Preise aus ERP, Sammelbestellvorlagen, Kreditpruefung, Lieferdatumswahl."}]}, "inds": ["Manufacturing", "Wholesale", "Automotive Parts", "Consumer Products", "Chemicals", "High Tech", "Telecommunications", "Life Sciences"], "obj": {"en": [{"o": "Shopify Plus / BigCommerce is simpler and cheaper", "r": "For simple B2C, sure. But SAP Commerce handles B2B complexity: customer-specific pricing, complex catalogs, multi-org, configure-price-quote, and native ERP integration for real-time inventory/ATP."}, {"o": "We already have a commerce platform", "r": "How well does it integrate with your ERP? Real-time pricing, inventory, credit checks? SAP Commerce eliminates the middleware gap between front-end and back-office."}, {"o": "Headless commerce is the future - SAP is monolithic", "r": "SAP Commerce IS headless-capable. Decoupled frontend via APIs, composable architecture. Use any frontend framework while SAP handles commerce logic and ERP integration."}, {"o": "Too complex to implement", "r": "Start with accelerators: pre-built B2B or B2C storefronts. Minimum viable commerce in 12-16 weeks. Extend iteratively."}, {"o": "Our sales team will resist digital channels", "r": "Commerce Cloud enables sales reps WITH digital: customer self-service for reorders, guided selling for reps, and real-time quoting. It augments the sales team."}], "de": [{"o": "Shopify Plus einfacher und guenstiger", "r": "Fuer einfaches B2C. SAP Commerce: B2B-Komplexitaet, kundenspezifische Preise, ERP-Integration."}, {"o": "Haben schon Commerce-Plattform", "r": "Wie gut integriert mit ERP? Echtzeit-Preise, Bestand, Kreditpruefung?"}, {"o": "Headless ist Zukunft - SAP monolithisch", "r": "SAP Commerce IST headless-faehig. Composable. Jedes Frontend, SAP-Logic dahinter."}, {"o": "Zu komplex", "r": "Accelerators: Pre-built Storefronts. MVP in 12-16 Wochen."}, {"o": "Vertrieb widersteht digitalen Kanaelen", "r": "Commerce ERGAENZT Vertrieb: Self-Service, Guided Selling, Echtzeit-Quoting."}]}, "persona": {"en": [{"role": "VP Digital / eCommerce", "msg": "Unified B2B+B2C commerce, omnichannel, personalization, scalability", "prio": "Primary"}, {"role": "VP Sales", "msg": "Digital self-service frees reps for high-value sales, real-time quoting, account management portal", "prio": "Primary"}, {"role": "CIO", "msg": "Single commerce platform integrated with ERP, eliminate point solutions, composable architecture", "prio": "Technical"}, {"role": "CFO", "msg": "Revenue growth through digital channels, reduced cost-to-serve, automated order processing", "prio": "Influencer"}], "de": [{"role": "VP Digital / eCommerce", "msg": "B2B+B2C, Omnichannel, Personalisierung, Skalierb [{"industry": "Industrial Manufacturing", "country": "Germany", "outcome": "B2B commerce portal for 5,000 customers. 35% of orders shifted to self-service. Cost-per-order reduced 60%."}, {"industry": "Wholesale", "country": "Austria", "outcome": "Commerce Cloud with ERP-integrated pricing. Real-time ATP. Customer satisfaction +25 NPS. Revenue +18% via digital channel."}, {"industry": "Automotive Aftermarket", "country": "Poland", "outcome": "Spare parts commerce with 200K SKUs. Search and order in seconds vs. hours on phone. Digital revenue from 0 to 30% in 18 months."}], "de": [{"industry": "Industriefertigung", "country": "Deutschland", "outcome": "B2B-Portal fuer 5.000 Kunden. 35% Self-Service. Cost-per-Order -60%."}, {"industry": "Grosshandel", "country": "Oesterreich", "outcome": "ERP-integrierte Preise. Echtzeit-ATP. NPS +25. Umsatz +18% digital."}, {"industry": "Automotive Aftermarket", "country": "Polen", "outcome": "Ersatzteile, 200K SKUs. Digitalumsatz von 0 auf 30% in 18 Monaten."}]}, "roi": {"en": ["20-40% revenue growth through digital commerce channel", "50-70% reduction in cost-per-order (self-service vs. manual)", "30-50% increase in average order value through recommendations", "60% reduction in order errors (system-validated vs. phone/email)", "25-35% of B2B orders shifted to digital self-service within 12 months"], "de": ["20-40% Umsatzwachstum durch Digital-Commerce", "50-70% weniger Cost-per-Order", "30-50% hoeherer durchschnittlicher Bestellwert", "60% weniger Bestellfehler", "25-35% B2B-Bestellungen auf Digital in 12 Monaten"]}, "meeComp": {"en": [{"competitor": "Salesforce Commerce Cloud (B2C Commerce)", "strength": "Strong B2C, modern UX tools, strong marketing", "counter": "SAP Commerce: B2B depth (pricing, catalogs, ERP integration), combined B2B+B2C on one platform. SFCC lacks B2B maturity."}, {"competitor": "Shopify Plus / BigCommerce", "strength": "Fast deployment, low cost, great for simple B2C/DTC", "counter": "SAP Commerce: complex B2B scenarios, ERP-native, multi-org, customer-specific pricing. Shopify is a ceiling for growing B2B businesses."}, {"competitor": "Adobe Commerce (Magento)", "strength": "Flexible open-source heritage, large developer community", "counter": "SAP Commerce: native SAP backend, enterprise scalability without custom development effort. Adobe needs heavy customization for B2B."}], "de": [{"competitor": "Salesforce Commerce (B2C)", "strength": "Starkes B2C, modernes UX", "counter": "SAP: B2B-Tiefe, ERP-Integration, B2B+B2C auf einer Plattform."}, {"competitor": "Shopify Plus", "strength": "Schnell, guenstig, einfaches B2C", "counter": "SAP: komplexes B2B, ERP-nativ, Multi-Org."}, {"competitor": "Adobe Commerce (Magento)", "strength": "Flexibel, Open Source, Community", "counter": "SAP: natives SAP-Backend, Enterprise ohne Custom-Aufwand."}]}}, {"name": "SAP Sales Cloud", "sub": {"en": "Intelligent CRM for Enterprise Sales - Pipeline, Forecasting, Guided Selling with SAP Integration", "de": "Intelligentes CRM fuer Enterprise-Vertrieb - Pipeline, Forecasting, Guided Selling mit SAP-Integration"}, "elev": {"en": "SAP Sales Cloud is a modern CRM solution designed for enterprise sales organizations that need more than contact management. It provides intelligent lead and opportunity management, AI-powered pipeline forecasting, guided selling with next-best-action recommendations, and - critically - native integration with SAP ERP for a complete view of the customer including order history, billing, delivery status, and credit. For B2B sales teams, it eliminates the CRM-ERP gap that causes sales reps to toggle between 5 systems to understand their customer.", "de": "SAP Sales Cloud ist eine moderne CRM-Loesung fuer Enterprise-Vertriebsorganisationen die mehr als Kontaktmanagement brauchen. Intelligentes Lead-/Opportunity-Management, KI-Pipeline-Forecasting, Guided Selling mit Next-Best-Action und native SAP-ERP-Integration fuer vollstaendige Kundensicht inklusive Bestellhistorie, Fakturierung, Lieferstatus und Kredit."}, "pain": {"en": ["Sales reps spend more time updating CRM than selling - system is seen as management overhead, not a selling tool", "No single customer view: sales sees CRM data, service sees tickets, ERP shows orders and billing - nobody sees the full picture", "Forecast accuracy poor because pipeline data is unreliable - reps update opportunities inconsistently, no AI-powered prediction", "Cannot measure or improve sales methodology adoption - no way to track if reps follow the prescribed selling process", "Lead-to-cash process disconnected: lead in CRM, quote in Excel, order in ERP - handoffs create delays and errors", "Sales managers lack real-time visibility into team activity and pipeline health - weekly reports from stale data", "No intelligent recommendation engine - reps rely on memory and intuition rather than data-driven next-best-actions"], "de": ["Vertriebler verbringen mehr Zeit mit CRM-Updates als Verkaufen - System als Management-Overhead", "Keine einheitliche Kundensicht: CRM, Service, ERP getrennt - niemand sieht alles", "Forecast-Genauigkeit schlecht weil Pipeline-Daten unzuverlaessig", "Vertriebsmethodologie-Adoption nicht messbar", "Lead-to-Cash getrennt: Lead in CRM, Angebot in Excel, Auftrag in ERP", "Manager ohne Echtzeit-Sicht auf Team-Aktivitaet und Pipeline", "Keine intelligenten Empfehlungen - Vertriebler auf Erinnerung und Intuition angewiesen"]}, "questions": {"en": [{"t": "CRM adoption", "q": "How would your sales reps honestly describe their CRM experience? Do they see it as a tool that helps them sell, or as administrative overhead they do for management?"}, {"t": "Customer 360", "q": "Can a sales rep see everything about a customer in one place - open quotes, order history, delivery status, billing, support tickets - or do they need 3+ systems?"}, {"t": "Forecast reliability", "q": "How accurate are your sales forecasts? Within 10%? 20%? And is that based on CRM data or on sales managers' gut feel overriding the system?"}, {"t": "Methodology", "q": "Is there a defined selling methodology (MEDDIC, SPIN, Challenger)? Can you track whether reps actually follow it in the system?"}, {"t": "Integration pain", "q": "How does a quote become an order in SAP today? Manual re-entry, file upload, or automated integration? Where do errors and delays happen?"}, {"t": "AI/Intelligence", "q": "Does your current CRM provide AI-powered recommendations - next-best-action, win probability, engagement scoring? Or is it purely a data repository?"}, {"t": "Mobile/field", "q": "Do your reps sell in the field? How well does the current system work on mobile devices and offline?"}], "de": [{"t": "CRM-Adoption", "q": "Wie wuerden Vertriebler ehrlich ihr CRM-Erlebnis beschreiben? Hilft beim Verkaufen oder Admin-Overhead?"}, {"t": "Kunden-360", "q": "Kann ein Vertriebler alles ueber Kunden an einem Ort sehen - Angebote, Bestellhistorie, Lieferstatus, Tickets?"}, {"t": "Forecast", "q": "Wie genau sind Forecasts? Im 10%-Bereich? Basiert auf CRM-Daten oder Manager-Bauchgefuehl?"}, {"t": "Methodologie", "q": "Definierte Vertriebsmethodik? Kann man im System tracken ob Reps sie befolgen?"}, {"t": "Integration", "q": "Wie wird Angebot zum SAP-Auftrag? Manuell, Datei-Upload, automatisiert? Wo Fehler und Verzoegerungen?"}, {"t": "KI/Intelligenz", "q": "Liefert aktuelles CRM KI-Empfehlungen - Next-Best-Action, Win-Probability, Scoring?"}, {"t": "Mobil/Feld", "q": "Vertrieb im Feld? Wie gut funktioniert aktuelles System mobil und offline?"}]}, "diff": {"en": ["Native SAP ERP integration: real-time access to order history, billing, credit, delivery status directly in CRM - no middleware, no batch sync", "AI-powered selling: opportunity scoring, next-best-action recommendations, and intelligent forecasting that learns from your win/loss patterns", "Digital selling room: collaborative spaces where buyer and seller share content, track engagement, and progress deals transparently", "Guided selling: configurable selling methodology (stage gates, required fields, validation rules) that ensures process compliance without slowing reps", "Integration with quotation/CPQ: seamless flow from opportunity to configured quote to SAP order - no manual handoff", "Sales planning integration: territory, quota, and incentive management connected to pipeline and actuals from ERP", "Mobile-first design: full CRM capability offline on mobile devices for field sales teams"], "de": ["Native SAP-ERP-Integration: Bestellhistorie, Faktura, Kredit, Lieferstatus in Echtzeit im CRM", "KI-Vertrieb: Opportunity Scoring, Next-Best-Action, intelligentes Forecasting", "Digital Selling Room: kollaborative Raeume fuer Kaeufer-Verkaeufer-Interaktion", "Guided Selling: konfigurierbare Methodik die Prozess sichert ohne zu bremsen", "CPQ-Integration: nahtlos von Opportunity zu konfiguriertem Angebot zu SAP-Auftrag", "Sales Planning: Territorien, Quoten, Incentives verbunden mit Pipeline und ERP-Actuals", "Mobile-first: volles CRM offline fuer Feld-Vertrieb"]}, "talk": {"en": [{"p": "Open", "l": "Quick question: what percentage of their working time do your sales reps actually spend selling - engaging with customers and progressing deals? I ask because in most organizations, it is below 30%. The rest is admin, data entry, and searching for information across systems."}, {"p": "Pain", "l": "The root cause is usually that CRM was implemented as a management reporting tool, not as a selling tool. So reps see it as overhead rather than help. And because it is disconnected from ERP, they still need to check SAP for order status, credit, and pricing. Multiple systems, zero productivity."}, {"p": "Vision", "l": "What if your CRM actually helped reps sell? A system that shows the full customer picture (including ERP data), recommends what to do next, handles the quote-to-order handoff automatically, and gives managers real-time pipeline intelligence without reps doing extra work?"}, {"p": "Proof", "l": "[Reference customer] increased sales productivity by 25% after switching to Sales Cloud. Reps stopped toggling between 4 systems because everything - orders, deliveries, billing, and pipeline - was in one place. Forecast accuracy improved from +/-30% to +/-12%."}, {"p": "Next Step", "l": "The starting point is a sales process assessment: we map your current selling methodology, CRM usage patterns, and ERP integration gaps. Then we show a working demo on your actual process within 3-4 weeks. Reps see their data in a system designed to help them, not monitor them."}], "de": [{"p": "Eroeffnung", "l": "Welchen Anteil ihrer Arbeitszeit verbringen Vertriebler tatsaechlich mit Verkaufen? In den meisten Organisationen unter 30%. Rest ist Admin und Systemsuche."}, {"p": "Schmerz", "l": "CRM als Management-Reporting implementiert, nicht als Verkaufstool. Getrennt von ERP - immer noch SAP pruefen fuer Status, Kredit, Preise."}, {"p": "Vision", "l": "CRM das beim Verkaufen hilft: volle Kundensicht inkl. ERP, empfiehlt naechste Aktion, Quote-to-Order automatisch, Echtzeit-Pipeline ohne Extra-Arbeit."}, {"p": "Beweis", "l": "[Referenz] +25% Vertriebsproduktivitaet. Kein Toggeln zwischen 4 Systemen. Forecast von +/-30% auf +/-12%."}, {"p": "Naechster Schritt", "l": "Sales Process Assessment: Methodik, CRM-Nutzung, ERP-Gaps abbilden. Demo auf echtem Prozess in 3-4 Wochen."}]}, "comp": {"en": [{"v": "Salesforce Sales Cloud", "d": "Salesforce is the market leader in CRM mindshare. SAP Sales Cloud differentiates with native ERP integration (no middleware needed for 360 customer view including orders, billing, deliveries), built-in AI that understands SAP business objects, and lower total cost for SAP-centric organizations."}, {"v": "Microsoft Dynamics 365 Sales", "d": "Strong in Microsoft ecosystem. SAP Sales Cloud offers deeper integration with SAP backend systems and more advanced B2B selling capabilities. For SAP ERP customers, Sales Cloud provides superior customer 360 view without custom integration."}, {"v": "HubSpot CRM", "d": "Excellent for SMB and marketing-led sales. Not designed for complex enterprise B2B sales with ERP integration, CPQ requirements, or multi-entity selling scenarios."}], "de": [{"v": "Salesforce", "d": "Marktfuehrer in CRM. SAP differenziert mit nativer ERP-Integration, KI die SAP-Objekte versteht, niedrigeren Gesamtkosten fuer SAP-Organisationen."}, {"v": "Microsoft Dynamics 365", "d": "Stark im MS-Oekosystem. SAP bietet tiefere SAP-Backend-Integration und fortschrittlichere B2B-Faehigkeiten."}, {"v": "HubSpot", "d": "Exzellent fuer SMB. Nicht fuer komplexe Enterprise-B2B mit ERP, CPQ oder Multi-Entity."}]}, "dont": {"en": ["Do not try to out-feature Salesforce on generic CRM capabilities - win on SAP integration, total cost, and the 360 view that only SAP can provide natively", "Never dismiss existing Salesforce investment - if deeply embedded, consider coexistence. Pick battles where ERP integration gap is the clear pain", "Do not promise it will fix sales problems alone - CRM success requires process change, rep adoption strategy, and management commitment", "Avoid leading with technology - lead with rep productivity, forecast accuracy, and customer insight outcomes"], "de": ["Nicht versuchen Salesforce bei generischem CRM zu uebertreffen - auf SAP-Integration und 360-Sicht gewinnen", "Bestehende SF-Investition nicht abtun - bei tiefer Verankerung Koexistenz erwaegen", "Nicht versprechen CRM loest allein Sales-Probleme - braucht Prozess, Adoption, Management", "Nicht mit Technologie fuehren - mit Rep-Produktivitaet, Forecast, Customer Insight"]}, "qual": {"en": ["SAP ERP customer where sales team lacks real-time access to order/billing/delivery data", "CRM not adopted by reps because it does not help them sell (seen as admin tool)", "Quote-to-order process manual with handoffs between CRM and ERP causing delays", "Forecast accuracy below acceptable levels - management decisions made on unreliable pipeline data", "Considering Salesforce replacement due to cost or integration challenges with SAP backend", "Field sales team needing strong mobile/offline CRM capabilities"], "de": ["SAP-ERP-Kunde wo Vertrieb keinen Echtzeit-Zugang zu Auftrags-/Abrechnungs-/Lieferdaten hat", "CRM nicht adoptiert weil es nicht beim Verkaufen hilft", "Quote-to-Order manuell mit Handoffs und Verzoegerungen", "Forecast unter akzeptablem Level", "Salesforce-Abloesung wegen Kosten oder SAP-Integrations-Herausforderungen", "Feld-Vertrieb braucht starkes Mobile/Offline-CRM"]}, "indDiff": {"en": [{"i": "Manufacturing (B2B)", "p": "Complex product portfolios, long sales cycles, multi-stakeholder buying centers, and quotation processes involving product configuration and technical specifications.", "f": "Account intelligence with buying center mapping, integrated CPQ for configured quotes, technical specification management, project/program tracking across opportunities, machine-installed-base visibility for cross-sell/upsell."}, {"i": "Professional Services", "p": "Resource-dependent selling where project staffing and utilization directly impact what can be sold. Need to quote based on available resources and skills.", "f": "Resource availability checking during opportunity management, skills-based staffing in quotes, project reference matching for proposals, utilization-aware pipeline planning."}], "de": [{"i": "Fertigung (B2B)", "p": "Komplexe Portfolios, lange Zyklen, Multi-Stakeholder, Angebote mit Konfiguration und technischen Specs.", "f": "Account Intelligence mit Buying-Center-Mapping, CPQ, Spec-Management, Installed-Base fuer Cross-/Upsell."}, {"i": "Professional Services", "p": "Ressourcen-abhaengiger Vertrieb. Angebote basierend auf verfuegbaren Ressourcen und Skills.", "f": "Ressourcenverfuegbarkeit in Opportunity, Skills-Staffing, Referenz-Matching, Auslastungs-Pipeline-Planung."}]}, "inds": ["Manufacturing", "Wholesale", "Technology", "Professional Services", "Financial Services", "Automotive", "Industrial Equipment", "Energy"], "obj": {"en": [{"o": "We already have Salesforce", "r": "Salesforce excels at CRM but struggles with SAP backend integration. SAP Sales Cloud: native ERP data (pricing, inventory, orders) without middleware. Ask: how much does your SFDC-SAP integration cost annually?"}, {"o": "CRM adoption was poor in the past", "r": "Adoption fails when CRM does not help sellers sell. SAP Sales Cloud provides: AI lead scoring, guided selling, real-time ERP data. Reps see value because it makes them money."}, {"o": "Too many CRM features we will not use", "r": "Modular deployment. Start with pipeline + account management. Add guided selling, CPQ, visit planning as you mature. Pay for what you use."}, {"o": "Microsoft Dynamics CRM came free with our EA", "r": "Free does not mean free. Implementation, customization, SAP integration cost, ongoing maintenance. Compare: SAP Sales Cloud pre-integrated with ERP vs. Dynamics needing middleware."}, {"o": "Our sales process is too unique", "r": "SAP Sales Cloud is configurable: custom fields, workflows, guided selling playbooks. Enterprise customers consistently configure it to match complex B2B sales processes."}], "de": [{"o": "Haben schon Salesforce", "r": "SFDC: CRM gut, SAP-Integration schlecht. SAP Sales Cloud: native ERP-Daten ohne Middleware."}, {"o": "CRM-Adoption war schlecht", "r": "Adoption scheitert wenn CRM nicht hilft. SAP SC: AI Lead Scoring, Guided Selling, ERP-Daten."}, {"o": "Zu viele Features", "r": "Modular: Pipeline + Accounts starten. Guided Selling, CPQ spaeter."}, {"o": "Dynamics CRM kam kostenlos mit EA", "r": "Kostenlos ≠ gratis. Implementation + SAP-Integration. SAP SC: pre-integriert."}, {"o": "Vertriebsprozess zu einzigartig", "r": "Konfigurierbar: Custom Fields, Workflows, Playbooks fuer komplexe B2B-Prozesse."}]}, "persona": {"en": [{"role": "VP Sales / CRO", "msg": "Pipeline visibility, forecast accuracy, guided selling, rep productivity, win rate improvement", "prio": "Primary"}, {"role": "Sales Rep (user)", "msg": "Less admin, more selling. AI recommendations, real-time customer data, mobile", "prio": "User"}, {"role": "Sales Operations", "msg": "Accurate forecasting, territory management, analytics, process standardization", "prio": "Champion"}, {"role": "CIO", "msg": "Native SAP integration, reduced middleware, single vendor for CRM+ERP", "prio": "Technical"}], "de": [{"role": "VP Sales / CRO", "msg": "Pipeline, Forecast, Guided Selling, Produktivitaet, Win Rate", "prio": "Primaer"}, {"role": "Sales Rep", "msg": "Weniger Admin, mehr Verkaufen. KI, Echtzeit-Daten, Mobil", "prio": "Nutzer"}, {"role": "Sales Operations", "msg": "Forecasting, Territory, Analytics, Standardisierung", "prio": "Champion"}, {"role": "CIO", "msg": "Native SAP-Integration, weniger Middleware", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Subscription (annual, per-user)", "metric": "Named users (different tiers: Standard, Professional, Enterprise)", "range": "Standard: ~40-60 EUR/user/month. Professional: 80-120. Enterprise: 120-180. Typical deals 100K-500K/year", "includes": "CRM core, pipeline management, activity tracking, analytics, mobile, optional: CPQ, Guided Selling"}, "de": {"model": "Subskription (jaehrlich, pro Nutzer)", "metric": "Named Users (Standard/Professional/Enterprise)", "range": "Standard: ~40-60 EUR/User/Monat. Professional: 80-120. Enterprise: 120-180", "includes": "CRM, Pipeline, Activities, Analytics, Mobil, optional: CPQ, Guided Selling"}}, "crossSell": {"en": [{"trigger": "Need quoting/CPQ capabilities", "solution": "SAP CPQ (Configure Price Quote)", "why": "Guided selling with complex pricing from ERP"}, {"trigger": "Marketing automation alongside sales", "solution": "SAP Emarsys", "why": "Marketing-to-sales handoff, lead nurturing, campaign ROI"}, {"trigger": "Service alongside sales", "solution": "SAP Service Cloud", "why": "360-degree: sales + service on one platform"}, {"trigger": "Commerce for self-service orders", "solution": "SAP Commerce Cloud", "why": "Sales reps + digital commerce as unified customer engagement"}], "de": [{"trigger": "CPQ/Angebotserstellung", "solution": "SAP CPQ", "why": "Guided Selling mit ERP-Preisen"}, {"trigger": "Marketing neben Vertrieb", "solution": "SAP Emarsys", "why": "Marketing-to-Sales, Lead Nurturing"}, {"trigger": "Service neben Vertrieb", "solution": "SAP Service Cloud", "why": "360-Grad auf einer Plattform"}, {"trigger": "Self-Service-Commerce", "solution": "SAP Commerce Cloud", "why": "Vertrieb + Digital vereint"}]}, "refs": {"en": [{"industry": "Industrial Equipment", "country": "Germany", "outcome": "Sales Cloud for 800 reps replacing Salesforce. SAP integration cost eliminated (was 300K/year). Forecast accuracy improved 20%."}, {"industry": "Chemicals", "country": "Switzerland", "outcome": "Sales Cloud with embedded analytics. Pipeline visibility from 60% to 95%. Win rate improved 8 percentage points."}, {"industry": "Technology", "country": "Austria", "outcome": "Sales Cloud + CPQ for complex solutions selling. Quote generation from 3 days to 2 hours. Deal size increased 15% through guided selling."}], "de": [{"industry": "Industrieausruestung", "country": "Deutschland", "outcome": "800 Reps, Salesforce ersetzt. Integration -300K/Jahr. Forecast +20%."}, {"industry": "Chemie", "country": "Schweiz", "outcome": "Pipeline-Sichtbarkeit von 60% auf 95%. Win Rate +8pp."}, {"industry": "Technologie", "country": "Oesterreich", "outcome": "SC + CPQ: Angebote von 3 Tagen auf 2 Stunden. Deal Size +15%."}]}, "roi": {"en": ["15-25% improvement in forecast accuracy", "10-15% win rate improvement through guided selling", "20-30% increase in sales rep productivity (less admin)", "40-60% faster quote generation with CPQ", "50-70% reduction in CRM-to-ERP integration cost vs. Salesforce"], "de": ["15-25% bessere Forecast-Genauigkeit", "10-15% bessere Win Rate durch Guided Selling", "20-30% mehr Vertriebsproduktivitaet", "40-60% schnellere Angebotserstellung", "50-70% weniger CRM-ERP-Integrationskosten vs. Salesforce"]}, "meeComp": {"en": [{"competitor": "Salesforce Sales Cloud", "strength": "Market leader, massive ecosystem, AppExchange, best brand recognition", "counter": "SAP Sales Cloud: native ERP integration (zero middleware), total cost lower for SAP shops, real-time back-office data. SFDC integration to SAP costs 200-500K annually."}, {"competitor": "Microsoft Dynamics 365 Sales", "strength": "Office integration, familiar UX, bundled with EA, strong DACH partner network", "counter": "SAP Sales Cloud: deeper SAP data access, no middleware needed, combined with SAP CX suite. Dynamics SAP integration is costly and fragile."}, {"competitor": "HubSpot (enterprise)", "strength": "Easy-to-use, marketing+sales combined, fast adoption", "counter": "SAP Sales Cloud: enterprise B2B depth (complex org structures, CPQ, guided selling). HubSpot struggles with complex B2B sales cycles."}], "de": [{"competitor": "Salesforce", "strength": "Marktfuehrer, Oekosystem, Marke", "counter": "SAP SC: native ERP-Integration, geringere Gesamtkosten fuer SAP-Shops."}, {"competitor": "Microsoft Dynamics 365", "strength": "Office-Integration, EA-Bundle, DACH-Partner", "counter": "SAP SC: tieferer SAP-Datenzugang, kein Middleware."}, {"competitor": "HubSpot", "strength": "Einfach, Marketing+Sales, schnelle Adoption", "counter": "SAP SC: Enterprise-B2B-Tiefe, CPQ, Guided Selling."}]}}, {"name": "SAP Service Cloud", "sub": {"en": "Intelligent Customer Service - Omnichannel, AI-Assisted, Resolution-Focused", "de": "Intelligenter Kundenservice - Omnichannel, KI-Unterstuetzt, Loesungsfokussiert"}, "elev": {"en": "SAP Service Cloud is a modern customer service platform that enables companies to deliver fast, consistent, and intelligent service across all channels - phone, email, chat, social, self-service portal. It combines case management, knowledge management, SLA monitoring, AI-assisted agent guidance, and self-service capabilities in one platform. For SAP customers, the critical differentiator is native ERP integration: service agents see the full customer picture - orders, deliveries, billing, installed products - without switching systems. This context makes resolution faster, deflection higher, and customer satisfaction better.", "de": "SAP Service Cloud ist eine moderne Kundenservice-Plattform fuer schnellen, konsistenten und intelligenten Service ueber alle Kanaele. Case Management, Knowledge Management, SLA-Monitoring, KI-Agenten-Unterstuetzung und Self-Service. Der Differenzierer: native ERP-Integration - Agenten sehen volle Kundensicht inklusive Auftraege, Lieferungen und installierte Produkte."}, "pain": {"en": ["Agents toggle between 4-5 systems to understand a customer's situation - CRM, ERP, ticketing, knowledge base, product database. Each context switch costs time and accuracy", "No self-service options: every customer request requires an agent, even simple status inquiries that should be automated", "Cannot measure true cost of service or identify systemic issues - tickets resolved but root causes never addressed", "Service level agreements breached frequently because there is no proactive SLA monitoring or escalation automation", "Knowledge trapped in individual agents' heads - no systematic knowledge base, new agents take months to be productive", "Channel-inconsistent: customer gets different answers depending on whether they call, email, or chat. No unified case history", "Cannot proactively service customers - always reactive. No alerting when a delivery is late or a machine needs maintenance"], "de": ["Agenten zwischen 4-5 Systemen - CRM, ERP, Tickets, Wissensbasis. Jeder Wechsel kostet Zeit", "Kein Self-Service: jede Anfrage braucht Agent, auch simple Statusabfragen", "Servicekosten und systemische Probleme nicht messbar - Tickets geloest aber Ursachen nie adressiert", "SLA-Verletzungen weil kein proaktives Monitoring oder Eskalationsautomation", "Wissen in einzelnen Koepfen - keine systematische Wissensbasis", "Kanal-inkonsistent: verschiedene Antworten je nach Kanal. Keine einheitliche Fallhistorie", "Kein proaktiver Service - immer reaktiv"]}, "questions": {"en": [{"t": "Agent experience", "q": "How many different systems does a service agent need to access to fully resolve a typical customer issue? And how much time per interaction is spent searching for information?"}, {"t": "Self-service", "q": "What percentage of inbound service requests could theoretically be handled through self-service if customers had the right tools? What stops it today?"}, {"t": "SLA performance", "q": "What is your current SLA compliance rate? How often do tickets breach targets, and what is the penalty (contractual and reputational)?"}, {"t": "Knowledge", "q": "Where does your service knowledge live today? Is it documented and accessible, or stuck in experienced agents' heads?"}, {"t": "Channels", "q": "Which channels do customers use to reach service? Do you have a unified view across all of them, or are they managed in separate tools?"}, {"t": "Resolution metrics", "q": "What is your first-contact resolution rate? Average handle time? And are you improving or getting worse?"}, {"t": "Integration need", "q": "How often does resolving a service issue require looking up order details, delivery status, or product configuration in SAP?"}], "de": [{"t": "Agenten-Erlebnis", "q": "Wie viele Systeme braucht ein Agent fuer typische Loesung? Wie viel Zeit pro Interaktion fuer Informationssuche?"}, {"t": "Self-Service", "q": "Welcher Anteil eingehender Anfragen waere Self-Service-faehig? Was verhindert es?"}, {"t": "SLA", "q": "Aktuelle SLA-Compliance? Wie oft Ueberschreitungen? Welche Konsequenzen?"}, {"t": "Wissen", "q": "Wo lebt Servicewissen? Dokumentiert und zugaenglich oder in Koepfen?"}, {"t": "Kanaele", "q": "Welche Kanaele nutzen Kunden? Einheitliche Sicht oder separate Tools?"}, {"t": "Loesungsmetriken", "q": "First-Contact-Resolution? Durchschnittliche Handle Time? Trend?"}, {"t": "Integration", "q": "Wie oft erfordert Loesung Auftrags-/Liefer-/Produktdaten aus SAP?"}]}, "diff": {"en": ["Native ERP integration: agents see orders, deliveries, billing, installed base, contracts from SAP directly in the service screen - instant context", "AI-assisted resolution: intelligent ticket classification, suggested solutions from knowledge base, and next-best-action recommendations for agents", "Omnichannel unified: phone, email, chat, social media, self-service portal - one case, one history, consistent experience regardless of channel", "Self-service portal: customers check order status, log issues, browse knowledge articles, and track resolution progress without agent involvement", "Integrated knowledge management: AI-powered knowledge base with agent suggestions, customer self-service articles, and usage analytics to identify gaps", "SLA management: automatic monitoring, escalation rules, and proactive alerts before breaches occur", "Field service integration: seamlessly escalate from customer case to on-site service dispatch when remote resolution is not possible"], "de": ["Native ERP-Integration: Agenten sehen Auftraege, Lieferungen, Faktura, Installed Base direkt", "KI-Loesung: intelligente Klassifikation, vorgeschlagene Loesungen, Next-Best-Action", "Omnichannel: Telefon, Email, Chat, Social, Self-Service - ein Fall, eine Historie", "Self-Service-Portal: Kunden pruefen Status, melden Probleme, browsen Knowledge ohne Agent", "Knowledge Management: KI-Wissensbasis mit Vorschlaegen und Nutzungsanalyse", "SLA-Management: automatisches Monitoring und proaktive Alerts vor Verletzungen", "Field-Service-Integration: nahtlose Eskalation zu Vor-Ort-Service wenn Remote nicht loest"]}, "talk": {"en": [{"p": "Open", "l": "When your customers call service today, what is the first thing the agent does? In most organizations, the answer is: 'searches across 3 different systems to understand who this customer is and what they bought.' That search time is wasted time - for the agent AND the customer."}, {"p": "Pain", "l": "The cost of poor service tools is threefold: agent productivity (time wasted searching), customer satisfaction (hold times and repeated explanations), and missed self-service opportunity (every call that could have been a portal lookup costs you 10-50x more than self-service)."}, {"p": "Vision", "l": "What if the agent immediately sees everything - the customer's orders, deliveries, installed products, open issues, and contract terms - the moment the interaction starts? And what if AI suggests the most likely solution based on the product and symptom? Resolution in minutes, not hours."}, {"p": "Proof", "l": "[Reference customer] reduced average handle time by 30% after deploying Service Cloud with ERP integration. Self-service portal deflected 40% of status inquiries. Customer satisfaction (CSAT) improved 15 points within 6 months."}, {"p": "Next Step", "l": "The fastest path to value is deploying for one service team or product line first: connect the ERP integration, set up the knowledge base for the top 50 issue types, and launch a basic self-service portal. Results visible within 8-12 weeks."}], "de": [{"p": "Eroeffnung", "l": "Was macht Ihr Agent als Erstes? Meist: sucht in 3 Systemen um Kunden zu verstehen. Verschwendete Zeit fuer Agent UND Kunde."}, {"p": "Schmerz", "l": "Dreifache Kosten: Agenten-Produktivitaet, Kundenzufriedenheit, verpasste Self-Service-Moeglichkeit."}, {"p": "Vision", "l": "Agent sieht sofort alles - Auftraege, Lieferungen, Produkte, offene Issues, Vertrag. KI schlaegt wahrscheinlichste Loesung vor. Loesung in Minuten."}, {"p": "Beweis", "l": "[Referenz] -30% Handle Time. Self-Service deflektiert 40% Statusanfragen. CSAT +15 Punkte in 6 Monaten."}, {"p": "Naechster Schritt", "l": "Ein Team oder Produktlinie zuerst: ERP-Integration, Knowledge Base fuer Top-50-Issues, Self-Service-Portal. Ergebnisse in 8-12 Wochen."}]}, "comp": {"en": [{"v": "Salesforce Service Cloud", "d": "Market leader in service CRM. SAP differentiates with native ERP integration (no middleware for order/delivery/billing access), and lower TCO for SAP-centric organizations."}, {"v": "Zendesk", "d": "Strong for B2C/digital-native companies with high-volume simple tickets. Less suitable for complex B2B service scenarios requiring ERP data, installed base management, and field service integration."}, {"v": "ServiceNow CSM", "d": "Strong in IT-centric organizations. SAP Service Cloud offers deeper commerce and ERP integration for product-selling companies where service requires order/delivery context."}], "de": [{"v": "Salesforce Service Cloud", "d": "Marktfuehrer. SAP differenziert mit nativer ERP-Integration und niedrigerem TCO fuer SAP-Organisationen."}, {"v": "Zendesk", "d": "Stark fuer B2C/digital-native. Weniger geeignet fuer komplexe B2B mit ERP-Daten und Field Service."}, {"v": "ServiceNow CSM", "d": "Stark IT-zentriert. SAP bietet tiefere Commerce/ERP-Integration fuer produktverkaufende Unternehmen."}]}, "dont": {"en": ["Do not compete head-to-head with Salesforce on pure CRM features - win on ERP integration and total customer view", "Never ignore existing service tool investments - understand what works before proposing replacement", "Do not oversell AI capabilities - be specific about what AI does today (classification, suggestion) vs. future roadmap", "Avoid pure technology messaging - lead with agent productivity, CSAT improvement, and cost-per-resolution reduction"], "de": ["Nicht frontal gegen Salesforce bei reinem CRM - auf ERP-Integration und Gesamtsicht gewinnen", "Bestehende Service-Tools nicht ignorieren - verstehen was funktioniert", "KI nicht ueberverkaufen - spezifisch was heute vs. Roadmap", "Nicht Technologie fuehren - Agenten-Produktivitaet, CSAT, Cost-per-Resolution"]}, "qual": {"en": ["SAP ERP customer where service agents lack access to order/delivery/product data", "High service volume with self-service potential not realized", "SLA compliance challenges requiring better monitoring and escalation", "Multiple disconnected service tools across channels", "High agent onboarding time due to knowledge trapped in experienced staff", "Customer satisfaction declining or below industry benchmark", "Cost-per-resolution too high due to long handle times and system switching"], "de": ["SAP-ERP-Kunde wo Agenten keinen Zugang zu Auftrags-/Liefer-/Produktdaten haben", "Hohes Volumen mit unrealisiertem Self-Service-Potenzial", "SLA-Compliance-Herausforderungen", "Mehrere getrennte Service-Tools", "Hohe Einarbeitungszeit weil Wissen in erfahrenen Koepfen", "CSAT sinkend oder unter Benchmark", "Cost-per-Resolution zu hoch"]}, "indDiff": {"en": [{"i": "Manufacturing (After-Sales)", "p": "Complex installed base with warranty/contract management, spare parts identification, and field service dispatch for equipment repair.", "f": "Installed base visibility with serial number lookup, warranty/contract validation at case creation, integrated spare parts identification, and seamless field service dispatch for on-site repair."}, {"i": "Utilities", "p": "High-volume contact center operations with billing inquiries, meter readings, service appointments, and outage management.", "f": "Billing inquiry resolution with ERP integration, self-service meter reading submission, automated appointment scheduling, and outage notification with proactive status updates."}], "de": [{"i": "Fertigung (After-Sales)", "p": "Komplexe Installed Base mit Garantie/Vertrag, Ersatzteilidentifikation, Field Service fuer Reparatur.", "f": "Installed-Base-Sicht, Garantiepruefung bei Fallerstellung, Ersatzteil-ID, nahtloser Field-Service-Dispatch."}, {"i": "Utilities", "p": "Hohes Contact-Center-Volumen mit Abrechnungsanfragen, Zaehlerstaende, Termine, Ausfallmanagement.", "f": "Abrechnungsloesung mit ERP, Self-Service-Zaehlerstand, automatische Termine, Ausfallbenachrichtigung."}]}, "inds": ["Manufacturing", "Utilities", "Telecommunications", "High Tech", "Consumer Products", "Automotive", "Healthcare", "Industrial Equipment"], "obj": {"en": [{"o": "We already have ServiceNow / Zendesk", "r": "Those handle IT service/ticketing well. SAP Service Cloud handles CUSTOMER service with ERP context: order status, warranty, spare parts, service contracts - all real-time from SAP backend."}, {"o": "Our service volume is low", "r": "Even low volume benefits from: consistent service experience, knowledge base, SLA tracking, and customer history. The question is not volume but customer satisfaction impact."}, {"o": "Agents will resist changing tools", "r": "SAP Service Cloud provides ONE screen with all customer context (orders, returns, contracts, assets). Agents currently toggle 3-5 systems. Consolidation improves satisfaction."}, {"o": "We need field service, not just ticketing", "r": "SAP Service Cloud includes field service management: scheduling, mobile technician app, spare parts, service orders. Complete service lifecycle."}, {"o": "Salesforce Service Cloud is market standard", "r": "For generic service, yes. But when service requires ERP data (order history, warranty validation, spare part availability, invoicing), SAP Service Cloud eliminates integration complexity."}], "de": [{"o": "Haben ServiceNow/Zendesk", "r": "Die fuer IT-Tickets. SAP SC fuer Kundenservice MIT ERP-Kontext: Bestellstatus, Garantie, Ersatzteile."}, {"o": "Geringes Service-Volumen", "r": "Auch bei geringem Volumen: konsistentes Erlebnis, SLA-Tracking, Kundenhistorie."}, {"o": "Agenten widersetzen sich", "r": "EIN Bildschirm mit allem Kontext vs. 3-5 Systeme togglen."}, {"o": "Brauchen Field Service", "r": "SAP SC inkl. Field Service: Planung, Techniker-App, Ersatzteile, Service Orders."}, {"o": "Salesforce Service ist Standard", "r": "Generisch ja. Wenn Service ERP-Daten braucht: SAP SC eliminiert Integration."}]}, "persona": {"en": [{"role": "VP Customer Service", "msg": "Improve CSAT/NPS, reduce resolution time, omnichannel service, self-service deflection", "prio": "Primary"}, {"role": "Head of Field Service", "msg": "Optimized scheduling, first-time fix rate, spare parts management, mobile technician enablement", "prio": "Primary"}, {"role": "CIO", "msg": "Consolidate service tools, native ERP integration, reduce middleware cost", "prio": "Technical"}, {"role": "CFO", "msg": "Service as revenue (contracts, SLAs), reduce cost-to-serve, warranty cost control", "prio": "Influencer"}], "de": [{"role": "VP Kundenservice", "msg": "CSAT/NPS verbessern, schnellere Loesung, Omnichannel, Self-Service", "prio": "Primaer"}, {"role": "Field Service Leiter", "msg": "Optimierte Planung, First-Time-Fix, Ersatzteile, mobil", "prio": "Primaer"}, {"role": "CIO", "msg": "Tools konsolidieren, ERP-native, weniger Middleware", "prio": "Technisch"}, {"role": "CFO", "msg": "Service als Umsatz, Cost-to-Serve senken, Garantiekosten", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Subscription (annual, per-agent)", "metric": "Service agents + self-service users", "range": "Starting ~60-100 EUR/agent/month. Enterprise deals 100K-400K/year depending on agent count and modules", "includes": "Ticketing, case management, knowledge base, omnichannel, optional: Field Service, self-service portal"}, "de": {"model": "Subskription (pro Agent)", "metric": "Agents + Self-Service-User", "range": "Ab ~60-100 EUR/Agent/Monat. Enterprise 100K-400K/Jahr", "includes": "Ticketing, Case Mgmt, Knowledge Base, Omnichannel, optional: Field Service"}}, "crossSell": {"en": [{"trigger": "Sales visibility alongside service", "solution": "SAP Sales Cloud", "why": "Service insights feed sales (upsell opportunities from service interactions)"}, {"trigger": "Self-service portal needed", "solution": "SAP Commerce Cloud", "why": "Customer portal with service + commerce combined"}, {"trigger": "IoT-based predictive service", "solution": "SAP BTP (IoT services)", "why": "Connected products trigger service tickets automatically"}, {"trigger": "Customer data unification", "solution": "SAP Customer Data Cloud", "why": "Unified customer profile across service, sales, commerce"}], "de": [{"trigger": "Vertrieb neben Service", "solution": "SAP Sales Cloud", "why": "Service-Insights fuer Upsell"}, {"trigger": "Self-Service-Portal", "solution": "SAP Commerce Cloud", "why": "Kundenportal: Service + Commerce"}, {"trigger": "IoT-basierter Service", "solution": "SAP BTP (IoT)", "why": "Vernetzte Produkte loesen Tickets aus"}, {"trigger": "Kundendaten vereinheitlichen", "solution": "SAP Customer Data Cloud", "why": "Einheitliches Profil"}]}, "refs": {"en": [{"industry": "Industrial Equipment", "country": "Germany", "outcome": "Service Cloud for 200 agents + 50 field technicians. First-time fix rate from 62% to 84%. Average resolution time -45%."}, {"industry": "Consumer Electronics", "country": "Austria", "outcome": "Omnichannel service (chat, email, phone, social). CSAT from 3.2 to 4.4/5. Deflection to self-service: 40% of inquiries."}, {"industry": "Utilities", "country": "Czech Republic", "outcome": "Service Cloud + ERP integration for billing inquiries. Agent handling time -35%. Customer callback rate -50%."}], "de": [{"industry": "Industrieausruestung", "country": "Deutschland", "outcome": "200 Agents + 50 Techniker. First-Time-Fix von 62% auf 84%. Resolution -45%."}, {"industry": "Unterhaltungselektronik", "country": "Oesterreich", "outcome": "Omnichannel. CSAT von 3.2 auf 4.4. Self-Service-Deflection 40%."}, {"industry": "Versorger", "country": "Tschechien", "outcome": "SC + ERP fuer Abrechnungsanfragen. Handling-Time -35%. Rueckrufe -50%."}]}, "roi": {"en": ["30-45% reduction in average resolution time", "20-30% improvement in first-time fix rate (field service)", "25-40% deflection to self-service (reduced agent workload)", "15-25% improvement in CSAT/NPS scores", "40-50% reduction in service tool consolidation (fewer systems)"], "de": ["30-45% schnellere Loesungszeit", "20-30% bessere First-Time-Fix-Rate", "25-40% Self-Service-Deflection", "15-25% bessere CSAT/NPS", "40-50% Tool-Konsolidierung"]}, "meeComp": {"en": [{"competitor": "Salesforce Service Cloud", "strength": "Market leader, strong ecosystem, Einstein AI, broad partner network", "counter": "SAP Service Cloud: native ERP data (orders, warranty, inventory), no integration middleware needed, lower TCO for SAP customers."}, {"competitor": "ServiceNow CSM", "strength": "Strong workflow engine, IT+customer service combined, enterprise process automation", "counter": "SAP Service Cloud: designed for customer service (not IT-first), ERP-native, field service integrated."}, {"competitor": "Zendesk", "strength": "Easy setup, great UX, low cost for simple service", "counter": "SAP Service Cloud: enterprise complexity (SLAs, contracts, field service, ERP), scales beyond simple ticketing."}], "de": [{"competitor": "Salesforce Service Cloud", "strength": "Marktfuehrer, Einstein AI, Partner", "counter": "SAP SC: native ERP-Daten, kein Middleware, niedrigerer TCO."}, {"competitor": "ServiceNow CSM", "strength": "Workflow-Engine, IT+Customer", "counter": "SAP SC: kundenservice-designed, ERP-nativ, Field Service."}, {"competitor": "Zendesk", "strength": "Einfach, gute UX, guenstig", "counter": "SAP SC: Enterprise-Komplexitaet, SLAs, Field Service, ERP."}]}}, {"name": "SAP Emarsys", "sub": {"en": "Customer Engagement Platform - Personalized Omnichannel Marketing at Scale", "de": "Customer Engagement Platform - Personalisiertes Omnichannel-Marketing in Skalierung"}, "elev": {"en": "SAP Emarsys is an omnichannel customer engagement platform that enables marketers to create personalized campaigns across email, mobile push, SMS, web, ads, and in-app channels - all powered by AI and a unified customer profile. It is purpose-built for B2C commerce marketers who need to drive revenue through customer lifecycle management: acquisition, first purchase, repeat purchase, loyalty, and win-back. Unlike generic marketing automation, Emarsys comes with pre-built industry-specific strategies, tactics, and content that accelerate time to value.", "de": "SAP Emarsys ist eine Omnichannel-Engagement-Plattform die Marketern personalisierte Kampagnen ueber Email, Push, SMS, Web, Ads und In-App ermoeglicht - KI-gestuetzt mit einheitlichem Kundenprofil. Fuer B2C-Commerce-Marketer die Revenue durch Lifecycle Management treiben: Akquisition, Erstkauf, Wiederkauf, Loyalitaet, Win-Back."}, "pain": {"en": ["Marketing campaigns are batch-and-blast - same message to everyone, no personalization, declining engagement rates", "Cannot execute true omnichannel: email tool is separate from SMS, separate from web personalization, separate from ad targeting. No unified journey", "Customer data scattered across systems - no unified profile for personalization. Marketers do not know what each customer bought, browsed, or prefers", "Time-to-campaign too long: creating a personalized campaign takes weeks of IT involvement, segmentation, and content creation", "Cannot measure true marketing revenue attribution - know emails sent but not whether they drove actual purchase", "Marketing team dependent on IT for everything: segment creation, data extraction, campaign setup. No marketer autonomy", "Customer lifecycle not managed: no systematic approach to first-time buyer conversion, repeat purchase stimulation, or churn prevention"], "de": ["Kampagnen sind Batch-and-Blast - gleiche Nachricht an alle, keine Personalisierung", "Kein echtes Omnichannel: Email getrennt von SMS, Web, Ads. Keine einheitliche Journey", "Kundendaten verstreut - kein einheitliches Profil fuer Personalisierung", "Time-to-Campaign zu lang: personalisierte Kampagne braucht Wochen mit IT", "Marketing-Revenue-Attribution nicht messbar", "Marketing-Team abhaengig von IT", "Kunden-Lifecycle nicht gemanagt: kein systematischer Ansatz fuer Erst-/Wiederkauf"]}, "questions": {"en": [{"t": "Personalization maturity", "q": "How personalized are your marketing messages today? Is it real one-to-one personalization based on behavior, or just name insertion in a batch email?"}, {"t": "Channel coverage", "q": "Which marketing channels are you active on? And are they orchestrated as a unified journey, or operated as separate silos with different tools?"}, {"t": "Customer data", "q": "Do you have a unified customer profile that combines purchase history, browsing behavior, email engagement, and preferences - accessible for campaign targeting?"}, {"t": "Lifecycle management", "q": "Do you have systematic programs for key lifecycle moments - welcome series, first purchase stimulation, replenishment reminders, win-back?"}, {"t": "Marketer autonomy", "q": "Can your marketing team create and launch campaigns independently, or do they need IT/data team support for segmentation and execution?"}, {"t": "Revenue measurement", "q": "Can you attribute revenue to specific marketing campaigns or channels? Do you know the ROI of your email program?"}, {"t": "Commerce integration", "q": "Is your marketing platform connected to your commerce/ERP system? Can it react in real-time to purchase events, cart abandonment, or stock changes?"}], "de": [{"t": "Personalisierungs-Reife", "q": "Wie personalisiert sind Ihre Marketingnachrichten? Echte 1:1 basierend auf Verhalten oder nur Namenseinfuegung?"}, {"t": "Kanalabdeckung", "q": "Aktive Kanaele? Orchestriert als Journey oder separate Silos mit verschiedenen Tools?"}, {"t": "Kundendaten", "q": "Einheitliches Kundenprofil das Kaufhistorie, Browsing, Email-Engagement und Praeferenzen kombiniert?"}, {"t": "Lifecycle", "q": "Systematische Programme fuer Welcome, Erstkauf, Replenishment, Win-Back?"}, {"t": "Marketer-Autonomie", "q": "Marketing-Team selbststaendig oder IT/Data-Team fuer Segmentierung und Ausfuehrung noetig?"}, {"t": "Revenue-Messung", "q": "Revenue-Attribution zu Kampagnen/Kanaelen moeglich? ROI des Email-Programms bekannt?"}, {"t": "Commerce-Integration", "q": "Marketing-Plattform mit Commerce/ERP verbunden? Reagiert auf Kaufevents, Warenkorbabbruch, Bestandsaenderungen?"}]}, "diff": {"en": ["Pre-built industry strategies: not starting from scratch - Emarsys includes proven retail/commerce lifecycle strategies that activate within days", "True omnichannel: email, push, SMS, web personalization, social ads, and in-app unified on one customer profile with journey orchestration", "AI-powered personalization: product recommendations, send-time optimization, predictive segments, and content personalization driven by machine learning", "Marketer autonomy: drag-and-drop campaign creation, pre-built segments, visual journey builder - no IT dependency for day-to-day operations", "Real-time triggers: react to customer behavior as it happens - browse abandonment, cart abandonment, purchase confirmation, replenishment timing", "Revenue attribution: directly measure revenue driven by each campaign, channel, and customer segment - prove marketing ROI", "Commerce integration: native connection to SAP Commerce Cloud and other platforms for product catalog, inventory, and purchase event data"], "de": ["Vorgefertigte Branchen-Strategien: bewiesene Lifecycle-Strategien die in Tagen aktivieren", "Echtes Omnichannel: Email, Push, SMS, Web, Ads, In-App auf einem Profil mit Journey-Orchestrierung", "KI-Personalisierung: Produktempfehlungen, Sendezeitoptimierung, Predictive Segments", "Marketer-Autonomie: Drag-and-Drop, vorgefertigte Segmente, visueller Journey Builder ohne IT", "Echtzeit-Trigger: auf Kundenverhalten reagieren - Browse/Cart-Abandonment, Kauf, Replenishment", "Revenue-Attribution: direkt messen welcher Umsatz aus welcher Kampagne", "Commerce-Integration: native Verbindung zu SAP Commerce fuer Katalog, Bestand, Kaufevents"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you this: what percentage of your revenue comes from repeat customers versus new acquisition? And how systematically are you nurturing that repeat purchase behavior through personalized engagement?"}, {"p": "Pain", "l": "What I see in most retail/commerce organizations is that marketing does great at acquiring customers but then reverts to batch-and-blast email campaigns that treat a VIP customer the same as someone who bought once two years ago. The result: declining engagement, increasing unsubscribes, and revenue left on the table."}, {"p": "Vision", "l": "Imagine every customer gets the right message, on the right channel, at the right time - based on where they are in their lifecycle and what they have actually done. New buyer gets a welcome program. Repeat customer gets loyalty recognition. At-risk customer gets a personalized win-back. All automatic, all measurable."}, {"p": "Proof", "l": "[Reference retailer] implemented Emarsys lifecycle programs and saw 30% increase in repeat purchase rate within 6 months. Revenue attributable to marketing automation grew from 5% to 18% of total e-commerce revenue. Campaign creation time dropped from 2 weeks to 2 days."}, {"p": "Next Step", "l": "The fastest path is a lifecycle audit: we analyze your current customer data, identify the lifecycle stages with the biggest revenue opportunity (usually cart abandonment and repeat purchase), and deploy those automations within 4-6 weeks on your actual data."}], "de": [{"p": "Eroeffnung", "l": "Welcher Umsatzanteil kommt von Wiederkaeufern vs. Neuakquise? Und wie systematisch wird Wiederkauf durch personalisiertes Engagement gefoerdert?"}, {"p": "Schmerz", "l": "Marketing akquiriert gut, faellt dann auf Batch-and-Blast zurueck das VIP-Kunden wie Einmalkaeufern behandelt. Sinkende Engagement, steigende Abmeldungen."}, {"p": "Vision", "l": "Jeder Kunde bekommt die richtige Nachricht, auf dem richtigen Kanal, zum richtigen Zeitpunkt - basierend auf Lifecycle und Verhalten. Automatisch und messbar."}, {"p": "Beweis", "l": "[Referenz] +30% Wiederkaufrate in 6 Monaten. Marketing-Revenue von 5% auf 18% des E-Commerce-Umsatzes. Kampagnenerstellung von 2 Wochen auf 2 Tage."}, {"p": "Naechster Schritt", "l": "Lifecycle-Audit: Kundendaten analysieren, groesste Revenue-Opportunity identifizieren, Automationen in 4-6 Wochen auf echten Daten."}]}, "comp": {"en": [{"v": "Braze", "d": "Strong in mobile-first engagement. Emarsys differentiates with pre-built commerce strategies, native SAP Commerce integration, and stronger email marketing capabilities with revenue attribution."}, {"v": "Klaviyo", "d": "Popular with Shopify merchants for email/SMS. Emarsys serves enterprise scale with more channels, pre-built strategies, AI personalization, and SAP integration for larger commerce operations."}, {"v": "Salesforce Marketing Cloud", "d": "Large enterprise marketing platform. Emarsys is faster to value (pre-built strategies vs. build from scratch), more marketer-friendly (less IT dependency), and purpose-built for commerce revenue."}, {"v": "Adobe Campaign", "d": "Part of Adobe Experience Cloud. Heavy, complex, IT-intensive. Emarsys delivers faster time-to-value with marketer-friendly UX and pre-built strategies that Adobe requires custom building."}], "de": [{"v": "Braze", "d": "Stark Mobile-first. Emarsys differenziert mit Commerce-Strategien, SAP-Integration und staerkerem Email mit Revenue-Attribution."}, {"v": "Klaviyo", "d": "Populaer bei Shopify. Emarsys fuer Enterprise-Skalierung mit mehr Kanaelen und SAP-Integration."}, {"v": "Salesforce Marketing Cloud", "d": "Emarsys schneller zu Wert (vorgefertigte Strategien), marketerfreundlicher, fuer Commerce-Revenue gebaut."}, {"v": "Adobe Campaign", "d": "Schwer, komplex, IT-intensiv. Emarsys schneller mit Marketer-UX und vorgefertigten Strategien."}]}, "dont": {"en": ["Do not position for B2B marketing - Emarsys is built for B2C/D2C commerce. For B2B, point to Marketing Cloud or other solutions", "Never promise results without data quality - personalization is only as good as the customer data feeding it. Address data readiness", "Do not oversell AI without explaining the learning period - models need 30-60 days of data before recommendations become strong", "Avoid competing on email-only scenarios - Emarsys' value is omnichannel orchestration, not just better email"], "de": ["Nicht fuer B2B-Marketing positionieren - Emarsys ist B2C/D2C. Fuer B2B andere Loesungen", "Nie Ergebnisse ohne Datenqualitaet versprechen - Personalisierung nur so gut wie die Daten", "KI nicht ueberverkaufen ohne Lernphase zu erklaeren - 30-60 Tage", "Nicht nur auf Email konkurrieren - Wert ist Omnichannel-Orchestrierung"]}, "qual": {"en": ["B2C or D2C commerce business with significant customer database (100K+ contacts)", "Current marketing is batch-and-blast without personalization or lifecycle management", "Multiple disconnected marketing tools without unified customer view", "Marketing team constrained by IT dependency for campaign execution", "Revenue from repeat customers below industry benchmark", "Commerce platform (SAP or other) needing marketing automation integration", "CEO/CMO mandate to improve customer lifetime value and reduce acquisition cost"], "de": ["B2C/D2C-Commerce mit 100K+ Kontakten", "Aktuelles Marketing Batch-and-Blast ohne Personalisierung", "Mehrere getrennte Marketing-Tools ohne Kundensicht", "Marketing-Team durch IT-Abhaengigkeit eingeschraenkt", "Wiederkaufer-Revenue unter Benchmark", "Commerce-Plattform braucht Marketing-Automation", "CMO-Mandat fuer Customer Lifetime Value"]}, "indDiff": {"en": [{"i": "Fashion & Apparel", "p": "Seasonal collections, size/color preferences, high return rates. Need to personalize by style preference, purchase frequency, and seasonal buying patterns.", "f": "Style-affinity-based recommendations, seasonal collection launch campaigns, size-aware replenishment, return-reducing product fit guidance, VIP early access programs."}, {"i": "Grocery & Food Delivery", "p": "High purchase frequency, perishable inventory, basket-level personalization, and time-sensitive promotions. Need to drive weekly reordering behavior.", "f": "Replenishment timing prediction, basket-level cross-sell, time-sensitive flash promotions, recipe-based recommendations, loyalty program integration with purchase frequency incentives."}], "de": [{"i": "Fashion & Bekleidung", "p": "Saisonale Kollektionen, Groessen-/Farbpraeferenzen, hohe Retourenquote.", "f": "Stilbasierte Empfehlungen, saisonale Launch-Kampagnen, Groessen-Replenishment, VIP-Early-Access."}, {"i": "Lebensmittel/Lieferung", "p": "Hohe Kauffrequenz, verderblicher Bestand, Warenkorb-Personalisierung, zeitkritische Promotions.", "f": "Replenishment-Timing, Warenkorb-Cross-Sell, Flash-Promotions, Rezeptempfehlungen, Loyalitaet mit Frequenz-Anreizen."}]}, "inds": ["Retail", "Fashion", "E-commerce", "Consumer Products", "Travel & Hospitality", "Food & Beverage", "Telco", "Media & Entertainment"], "obj": {"en": [{"o": "We already use HubSpot / Mailchimp / Marketo", "r": "Those are marketing automation tools. Emarsys is an omnichannel customer engagement platform with COMMERCE integration. It personalizes based on purchase behavior, not just email opens."}, {"o": "Our marketing team is too small for this", "r": "Emarsys is designed for lean teams: pre-built tactics, AI automation, drag-and-drop campaigns. A 2-person team can run enterprise-grade marketing automation."}, {"o": "We are B2B - Emarsys is for B2C", "r": "Emarsys supports B2B: account-based campaigns, lifecycle automation, nurture programs. The core engine works for any audience with behavioral data."}, {"o": "Another marketing tool adds complexity", "r": "Emarsys REPLACES multiple tools: email, SMS, push, web personalization, loyalty. Consolidation, not addition."}, {"o": "We cannot prove marketing ROI", "r": "Emarsys provides revenue attribution per campaign, per channel, per tactic. Know exactly which EUR of revenue each campaign generated."}], "de": [{"o": "Haben HubSpot/Mailchimp/Marketo", "r": "Die: Marketing-Automation. Emarsys: Omnichannel-Engagement MIT Commerce-Integration."}, {"o": "Marketing-Team zu klein", "r": "Emarsys: Pre-built Tactics, KI, Drag-and-Drop. 2 Personen reichen fuer Enterprise-Marketing."}, {"o": "B2B - Emarsys ist fuer B2C", "r": "Emarsys unterstuetzt B2B: Account-based, Lifecycle, Nurture."}, {"o": "Noch ein Marketing-Tool = Komplexitaet", "r": "Emarsys ERSETZT: Email, SMS, Push, Web-Personalisierung, Loyalty."}, {"o": "Marketing-ROI nicht messbar", "r": "Revenue Attribution pro Kampagne, Kanal, Taktik."}]}, "persona": {"en": [{"role": "CMO / VP Marketing", "msg": "Revenue-driven marketing, personalization at scale, omnichannel engagement, clear ROI", "prio": "Primary"}, {"role": "Head of CRM / Lifecycle Marketing", "msg": "Automated lifecycle programs, behavioral triggers, retention improvement, segment optimization", "prio": "Primary"}, {"role": "eCommerce Director", "msg": "Commerce-integrated personalization, cart abandonment, product recommendations, post-purchase", "prio": "Champion"}, {"role": "CFO", "msg": "Measurable marketing ROI, customer lifetime value growth, acquisition cost optimization", "prio": "Influencer"}], "de": [{"role": "CMO / VP Marketing", "msg": "Revenue-Marketing, Personalisierung, Omnichannel, ROI", "prio": "Primaer"}, {"role": "CRM / Lifecycle-Marketing", "msg": "Automatisierte Lifecycle-Programme, Trigger, Retention", "prio": "Primaer"}, {"role": "eCommerce-Direktor", "msg": "Commerce-Personalisierung, Warenkorbabbruch, Empfehlungen", "prio": "Champion"}, {"role": "CFO", "msg": "Messbarer Marketing-ROI, CLV-Wachstum", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Contacts in database + channels used", "range": "Starting 50K-150K EUR/year for mid-market. Enterprise 200K-800K+ (depends on contact volume)", "includes": "Omnichannel execution (email, SMS, push, web), AI personalization, pre-built tactics, analytics"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Kontakte + Kanaele", "range": "Ab 50K-150K EUR/Jahr, Enterprise 200K-800K+", "includes": "Omnichannel (Email, SMS, Push, Web), KI, Pre-built Tactics, Analytics"}}, "crossSell": {"en": [{"trigger": "Customer has commerce platform", "solution": "SAP Commerce Cloud", "why": "Deep integration: Emarsys personalizes the commerce experience"}, {"trigger": "Need customer data unification", "solution": "SAP Customer Data Cloud (CIAM)", "why": "Unified profiles feed Emarsys for true 1:1 personalization"}, {"trigger": "Sales team alignment", "solution": "SAP Sales Cloud", "why": "Marketing qualified leads flow to sales pipeline"}, {"trigger": "Customer loyalty program", "solution": "Emarsys Loyalty module", "why": "Built-in loyalty: points, tiers, rewards integrated with campaigns"}], "de": [{"trigger": "Commerce-Plattform vorhanden", "solution": "SAP Commerce Cloud", "why": "Emarsys personalisiert Commerce-Erlebnis"}, {"trigger": "Kundendaten vereinheitlichen", "solution": "SAP Customer Data Cloud", "why": "Unified Profiles fuer 1:1"}, {"trigger": "Vertriebsteam-Alignment", "solution": "SAP Sales Cloud", "why": "MQLs fliessen in Sales Pipeline"}, {"trigger": "Loyalty-Programm", "solution": "Emarsys Loyalty", "why": "Punkte, Stufen, Rewards integriert"}]}, "refs": {"en": [{"industry": "Fashion Retail", "country": "Germany", "outcome": "Emarsys for 3M contacts. Email revenue +45%. Automated lifecycle campaigns generate 30% of email revenue with zero manual effort."}, {"industry": "eCommerce", "country": "Austria", "outcome": "Replaced Mailchimp + separate SMS tool. Cart abandonment recovery rate: 12%. Web personalization uplift: 8% on homepage revenue."}, {"industry": "Sports Retail", "country": "Poland", "outcome": "Omnichannel: email + app push + web. Customer retention improved 22%. Marketing team efficiency: 3x more campaigns with same headcount."}], "de": [{"industry": "Fashion Retail", "country": "Deutschland", "outcome": "3M Kontakte. Email-Umsatz +45%. 30% durch automatisierte Lifecycle."}, {"industry": "eCommerce", "country": "Oesterreich", "outcome": "Mailchimp + SMS ersetzt. Cart Recovery 12%. Web-Personalisierung +8%."}, {"industry": "Sport-Retail", "country": "Polen", "outcome": "Omnichannel. Retention +22%. 3x mehr Kampagnen bei gleichem Team."}]}, "roi": {"en": ["20-45% increase in email/campaign-attributed revenue", "10-15% improvement in customer retention rate", "3-5x improvement in marketing team productivity (automation)", "8-12% uplift in conversion through personalization", "30-50% reduction in marketing tool cost (consolidation)"], "de": ["20-45% mehr kampagnenattribuierter Umsatz", "10-15% bessere Kundenretention", "3-5x Marketing-Produktivitaet durch Automation", "8-12% Conversion-Uplift durch Personalisierung", "30-50% weniger Marketing-Tool-Kosten"]}, "meeComp": {"en": [{"competitor": "Salesforce Marketing Cloud", "strength": "Enterprise standard, Journey Builder, broad integrations", "counter": "Emarsys: faster time-to-value (pre-built tactics), commerce-native, simpler for lean teams. SFMC needs dedicated admin + months of setup."}, {"competitor": "Braze", "strength": "Best mobile engagement, modern real-time architecture", "counter": "Emarsys: omnichannel (not just mobile), commerce integration, revenue attribution. Braze lacks email depth and commerce context."}, {"competitor": "Klaviyo", "strength": "Excellent for Shopify-based eCommerce, easy setup, strong email", "counter": "Emarsys: enterprise scale, SAP commerce integration, true omnichannel (not just email+SMS). Klaviyo outgrown above 1M contacts."}], "de": [{"competitor": "Salesforce Marketing Cloud", "strength": "Enterprise-Standard, Journey Builder", "counter": "Emarsys: schneller Time-to-Value, Commerce-nativ, einfacher fuer kleine Teams."}, {"competitor": "Braze", "strength": "Bestes Mobile Engagement, Echtzeit", "counter": "Emarsys: Omnichannel, Commerce, Revenue Attribution. Braze schwach bei Email."}, {"competitor": "Klaviyo", "strength": "Exzellent fuer Shopify, einfach, Email", "counter": "Emarsys: Enterprise-Scale, SA
