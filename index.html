e mit erzwungener Sequenz, digitale Signaturen, integrierte Abweichungs-/CAPA-Workflows."}, {"i": "Maschinenbau", "p": "Komplexe Montage mit vielen Varianten, lange Taktzeiten, Engineer-to-Order. As-Built-Konfiguration dokumentieren.", "f": "Varianten-getriebene Arbeitsanweisungen, As-Built-Dokumentation, komplexe Stuecklistenaufloesung zur Laufzeit."}]}, "inds": ["Automotive", "Aerospace & Defense", "Life Sciences", "Industrial Machinery", "Electronics", "Food & Beverage", "Chemicals", "Medical Devices"], "obj": {"en": [{"o": "We already have MES from Siemens/Rockwell", "r": "SAP DM integrates with existing MES or replaces it. Key value: seamless ERP-to-shop-floor data flow without middleware. Ask: how much time do you spend reconciling MES data with SAP?"}, {"o": "Our shop floor is not ready for digitalization", "r": "Start with digital work instructions and production visibility. No IoT required initially. Prove value on one line, then expand to sensors and AI quality."}, {"o": "Too expensive for our production volume", "r": "DM Cloud is subscription-based, scales with production lines. Start with one plant, prove ROI on scrap reduction and OEE improvement, then expand."}, {"o": "Our operators cannot work with complex software", "r": "DM has role-based UIs designed for operators: large touch-friendly buttons, visual work instructions, guided workflows. Minimal training needed."}, {"o": "We need OT integration that SAP cannot do", "r": "SAP partners with leading OT providers (Siemens, Rockwell, Kepware) and supports OPC-UA, MQTT natively. Edge computing handles time-critical scenarios."}], "de": [{"o": "Wir haben MES von Siemens/Rockwell", "r": "SAP DM integriert mit oder ersetzt MES. Nahtloser ERP-Shop-Floor-Datenfluss."}, {"o": "Shop Floor nicht bereit fuer Digitalisierung", "r": "Start mit digitalen Arbeitsanweisungen. Kein IoT noetig am Anfang."}, {"o": "Zu teuer fuer unser Volumen", "r": "Subskription, skaliert mit Linien. Start mit einem Werk."}, {"o": "Bediener koennen keine komplexe Software", "r": "Rollenbasierte UI, Touch-freundlich, visuelle Anweisungen."}, {"o": "OT-Integration kann SAP nicht", "r": "Partner mit Siemens, Rockwell, OPC-UA, MQTT nativ, Edge Computing."}]}, "persona": {"en": [{"role": "VP Manufacturing / COO", "msg": "Improve OEE, reduce scrap, real-time production visibility, paperless shop floor", "prio": "Primary"}, {"role": "Plant Manager", "msg": "One view of production performance, digital work instructions, faster changeovers", "prio": "Primary"}, {"role": "Quality Manager", "msg": "Inline quality checks, SPC, automated non-conformance handling, traceability", "prio": "Champion"}, {"role": "CIO / IT Director", "msg": "Eliminate MES-ERP gap, reduce integration middleware, cloud-based scalability", "prio": "Technical"}], "de": [{"role": "VP Fertigung / COO", "msg": "OEE verbessern, Ausschuss reduzieren, Echtzeit-Sichtbarkeit", "prio": "Primaer"}, {"role": "Werkleiter", "msg": "Produktionsleistung, digitale Anweisungen, schnellere Umruestung", "prio": "Primaer"}, {"role": "Qualitaetsmanager", "msg": "Inline-QC, SPC, automatisierte Abweichungen, Rueckverfolgbarkeit", "prio": "Champion"}, {"role": "CIO", "msg": "MES-ERP-Luecke schliessen, Cloud-Skalierung", "prio": "Technisch"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Production lines / plants + users", "range": "100K-300K EUR/year per plant (depending on complexity), multi-plant deals 500K-1.5M", "includes": "DM Cloud platform, work instructions, production operator dashboard, basic analytics"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Produktionslinien/Werke + Nutzer", "range": "100K-300K EUR/Jahr pro Werk, Multi-Plant 500K-1.5M", "includes": "DM Cloud, Arbeitsanweisungen, Operator-Dashboard, Analytics"}}, "crossSell": {"en": [{"trigger": "Customer needs production planning too", "solution": "SAP IBP (Response & Supply)", "why": "Plan-to-produce: IBP for planning, DM for execution"}, {"trigger": "Quality management needs overhaul", "solution": "SAP QM (S/4HANA)", "why": "Integrated quality from shop floor inspection to ERP disposition"}, {"trigger": "Asset maintenance alongside production", "solution": "SAP Asset Management", "why": "Predictive maintenance reduces unplanned downtime on production lines"}, {"trigger": "Supply chain visibility beyond the plant", "solution": "SAP Supply Chain Control Tower", "why": "Plant performance feeds into end-to-end supply chain visibility"}], "de": [{"trigger": "Produktionsplanung auch noetig", "solution": "SAP IBP", "why": "Plan-to-Produce: IBP Planung, DM Ausfuehrung"}, {"trigger": "Qualitaetsmanagement-Ueberholung", "solution": "SAP QM (S/4HANA)", "why": "Integrierte Qualitaet von Shop Floor bis ERP"}, {"trigger": "Asset-Maintenance neben Produktion", "solution": "SAP Asset Management", "why": "Predictive Maintenance reduziert Ausfaelle"}, {"trigger": "SC-Sichtbarkeit ueber Werk hinaus", "solution": "SAP Control Tower", "why": "Werkleistung in E2E-Sichtbarkeit"}]}, "refs": {"en": [{"industry": "Automotive Tier-1", "country": "Germany", "outcome": "Paperless production across 4 lines. Scrap reduced 18%. Changeover time -25%."}, {"industry": "Food & Beverage", "country": "Austria", "outcome": "Digital work instructions + inline quality. Compliance audit time reduced 60%. Batch traceability from minutes to seconds."}, {"industry": "Electronics", "country": "Hungary", "outcome": "OEE visibility in real-time. Identified 12% hidden capacity. Deferred 5M EUR capacity investment."}], "de": [{"industry": "Automotive Tier-1", "country": "Deutschland", "outcome": "Papierlose Produktion, 4 Linien. Ausschuss -18%. Umruestzeit -25%."}, {"industry": "Lebensmittel", "country": "Oesterreich", "outcome": "Digitale Anweisungen + Inline-QC. Audit-Zeit -60%."}, {"industry": "Elektronik", "country": "Ungarn", "outcome": "Echtzeit-OEE. 12% versteckte Kapazitaet. 5M EUR Investition aufgeschoben."}]}, "roi": {"en": ["10-20% OEE improvement within first year", "15-25% scrap/waste reduction through real-time quality", "20-30% faster changeover times with digital instructions", "50-70% reduction in paper-based documentation", "30-40% faster root cause analysis for quality issues"], "de": ["10-20% OEE-Verbesserung im ersten Jahr", "15-25% Ausschussreduktion durch Echtzeit-Qualitaet", "20-30% schnellere Umruestung", "50-70% weniger Papierdokumentation", "30-40% schnellere Root-Cause-Analyse"]}, "meeComp": {"en": [{"competitor": "Siemens Opcenter / MOM", "strength": "Deep OT integration, strong brand in manufacturing, Teamcenter PLM link", "counter": "SAP DM: native ERP integration (no middleware), cloud-native, broader supply chain context. Siemens requires heavy integration to SAP."}, {"competitor": "Rockwell Plex / FTPC", "strength": "Strong in discrete manufacturing, IoT-native", "counter": "SAP DM: cross-industry, integrated with enterprise planning and quality, not siloed to shop floor."}, {"competitor": "Dassault DELMIA", "strength": "Strong in automotive/aero for process simulation", "counter": "SAP DM: operational execution focus, real-time ERP sync, simpler deployment for production management."}], "de": [{"competitor": "Siemens Opcenter", "strength": "Tiefe OT-Integration, Marke in Fertigung", "counter": "SAP DM: native ERP-Integration, Cloud-nativ, breiterer SC-Kontext."}, {"competitor": "Rockwell Plex", "strength": "Stark in diskreter Fertigung, IoT", "counter": "SAP DM: branchenuebergreifend, integriert mit Planung und Qualitaet."}, {"competitor": "Dassault DELMIA", "strength": "Stark in Auto/Aero fuer Simulation", "counter": "SAP DM: operative Ausfuehrung, Echtzeit-ERP-Sync."}]}}, {"name": "SAP Transportation Management", "sub": {"en": "End-to-End Freight Management - Plan, Execute, Settle, Optimize", "de": "End-to-End-Frachtmanagement - Planen, Ausfuehren, Abrechnen, Optimieren"}, "elev": {"en": "SAP Transportation Management (TM) provides end-to-end freight management capabilities covering transportation planning, carrier selection, route optimization, execution monitoring, freight cost calculation, and carrier settlement. It handles all modes (road, rail, ocean, air, intermodal) for both inbound and outbound logistics. Whether you are a shipper optimizing your freight spend across hundreds of carriers, or a logistics service provider managing thousands of daily shipments, TM delivers the visibility, optimization, and automation needed to reduce logistics costs while improving delivery reliability. Natively integrated with S/4HANA for seamless order-to-delivery processes.", "de": "SAP Transportation Management bietet End-to-End-Frachtmanagement: Transportplanung, Carrier-Selektion, Routenoptimierung, Ausfuehrungsmonitoring, Frachtkostenberechnung und Carrier-Settlement. Alle Modi (Strasse, Schiene, See, Luft, Intermodal) fuer ein- und ausgehende Logistik. Ob Verlader der Frachtkosten optimiert oder LSP der tausende Sendungen taeglich managed - TM liefert Visibilitaet, Optimierung und Automatisierung."}, "pain": {"en": ["Freight spend growing faster than revenue - no systematic way to optimize carrier selection, consolidation, or routing", "Manual transportation planning consuming excessive planner time - often done in Excel or legacy TMS with poor optimization", "No real-time visibility into shipment status - customer service cannot answer 'where is my order' without calling carriers manually", "Carrier invoice reconciliation is a manual nightmare - freight audit taking weeks with significant overpayment risk", "Cannot accurately calculate freight cost at order entry - leads to margin erosion on quoted deals", "Inbound logistics unmanaged - suppliers ship however they want, with no consolidation or cost control", "Sustainability reporting for transport emissions is guesswork - no way to calculate actual CO2 per shipment or route"], "de": ["Frachtkosten wachsen schneller als Umsatz - keine systematische Optimierung von Carrier, Konsolidierung, Routing", "Manuelle Transportplanung verbraucht zu viel Planerzeit - Excel oder Legacy-TMS mit schlechter Optimierung", "Keine Echtzeit-Sendungsverfolgung - Kundenservice kann 'wo ist meine Bestellung' nicht beantworten", "Frachtrechungspruefung manueller Albtraum - Wochen mit Ueberzahlungsrisiko", "Frachtkosten bei Auftragserfassung nicht genau berechenbar - Margenerosion", "Inbound-Logistik ungemanagt - Lieferanten versenden ohne Konsolidierung oder Kostenkontrolle", "Nachhaltigkeitsberichterstattung fuer Transportemissionen ist Schaetzung"]}, "questions": {"en": [{"t": "Freight spend", "q": "What is your annual freight spend, and how has it developed over the last 3 years? Do you know your cost per unit shipped or per km?"}, {"t": "Carrier landscape", "q": "How many carriers do you work with? How do you select which carrier gets which shipment - is it systematic optimization or manual/relationship-based?"}, {"t": "Planning process", "q": "How is transportation planned today - dedicated planners with a TMS, or logistics coordinators using email and spreadsheets?"}, {"t": "Visibility", "q": "When a customer calls asking 'where is my delivery' - how long does it take to get an accurate answer? Minutes or hours?"}, {"t": "Freight audit", "q": "What is your freight invoice process? How long from receipt to payment? Do you know your overpayment rate?"}, {"t": "Consolidation", "q": "Do you actively consolidate shipments across orders, customers, or plants to optimize truck fill rates?"}, {"t": "Sustainability", "q": "Is there a requirement or expectation to report transport CO2 emissions? Can you calculate that today per shipment?"}], "de": [{"t": "Frachtausgaben", "q": "Jaehrliche Frachtkosten und Entwicklung letzte 3 Jahre? Kennen Sie Kosten pro versendeter Einheit/km?"}, {"t": "Carrier-Landschaft", "q": "Wie viele Carrier? Wie wird selektiert - systematische Optimierung oder manuell/beziehungsbasiert?"}, {"t": "Planung", "q": "Wie wird Transport heute geplant - dedizierte Planer mit TMS oder Koordinatoren mit Email/Spreadsheets?"}, {"t": "Visibilitaet", "q": "Wenn Kunde fragt 'wo ist meine Lieferung' - wie lange bis genaue Antwort? Minuten oder Stunden?"}, {"t": "Frachtpruefung", "q": "Frachtrechnungsprozess? Dauer bis Zahlung? Ueberzahlungsrate bekannt?"}, {"t": "Konsolidierung", "q": "Aktive Sendungskonsolidierung ueber Auftraege, Kunden oder Werke fuer Auslastung?"}, {"t": "Nachhaltigkeit", "q": "Anforderung CO2-Emissionen im Transport zu berichten? Heute pro Sendung berechenbar?"}]}, "diff": {"en": ["Optimizer engine: mathematically optimizes carrier selection, load building, and routing across constraints (cost, time, capacity, CO2) - not just rule-based assignment", "All-mode coverage: road, rail, ocean, air, intermodal, parcel - one platform for complete logistics network management", "Native ERP integration: transportation planning triggered directly from sales orders and deliveries in S/4HANA - no interface lag or data duplication", "Real-time visibility & collaboration: track shipments across carriers, share ETAs with customers, proactive exception management", "Freight cost simulation at order entry: accurately estimate logistics cost before committing to customer delivery promises", "Integrated carrier settlement: automated freight invoice matching against expected cost - systematic overpayment prevention", "Embedded sustainability: calculate CO2 per shipment/route based on carrier-reported emission factors and actual distances"], "de": ["Optimizer: mathematische Carrier-Selektion, Beladungsoptimierung, Routing ueber Constraints - nicht regelbasiert", "Alle Modi: Strasse, Schiene, See, Luft, Intermodal, Paket - eine Plattform", "Native ERP-Integration: Transportplanung direkt aus Auftraegen/Lieferungen in S/4HANA", "Echtzeit-Visibilitaet & Kollaboration: Sendungen tracken, ETAs teilen, proaktives Exception Management", "Frachtkostensimulation bei Auftragserfassung: Logistikkosten vor Kundenzusage schaetzen", "Integriertes Carrier-Settlement: automatischer Rechnungsabgleich gegen Erwartungskosten", "Eingebettete Nachhaltigkeit: CO2 pro Sendung/Route berechnen"]}, "talk": {"en": [{"p": "Open", "l": "Freight cost is typically one of the top 3 controllable cost categories for companies with physical supply chains. Most organizations I talk to know their total freight spend but cannot explain why it is what it is - or systematically reduce it."}, {"p": "Pain", "l": "The pattern I see: transportation planning is done manually or with outdated tools, carrier selection is relationship-based rather than optimization-based, and freight invoices are paid without proper audit because the team does not have time. That combination easily represents 8-15% overspend on logistics."}, {"p": "Vision", "l": "What if every shipment was automatically optimized for cost, time, and carbon - with the right carrier selected from your contracted pool? What if customers could track their deliveries in real-time? And freight invoices were matched automatically against expected costs before payment?"}, {"p": "Proof", "l": "[Reference shipper] reduced freight costs by 12% in the first year through systematic optimization - better consolidation, smarter carrier selection, and automated freight audit that caught 3% overpayment they never knew existed."}, {"p": "Next Step", "l": "The logical first step is a freight spend analysis. We look at your shipping patterns, carrier mix, and cost drivers to quantify the optimization potential. Usually 3-4 weeks to get a factual picture of where the savings are."}], "de": [{"p": "Eroeffnung", "l": "Frachtkosten sind typisch Top-3 der kontrollierbaren Kostenkategorien. Die meisten kennen die Gesamtkosten aber koennen nicht erklaeren warum - oder systematisch senken."}, {"p": "Schmerz", "l": "Muster: manuelle Planung, beziehungsbasierte Carrier-Selektion, Rechnungszahlung ohne Audit. Kombination bedeutet leicht 8-15% Ueberspend."}, {"p": "Vision", "l": "Jede Sendung automatisch optimiert nach Kosten, Zeit, CO2. Kunden tracken Lieferungen live. Frachtrechnungen automatisch abgeglichen vor Zahlung."}, {"p": "Beweis", "l": "[Referenz] -12% Frachtkosten im ersten Jahr: bessere Konsolidierung, smartere Carrier-Selektion, automatisierter Freight Audit fing 3% Ueberzahlung."}, {"p": "Naechster Schritt", "l": "Freight-Spend-Analyse: Versandmuster, Carrier-Mix und Kostentreiber quantifizieren die Optimierung. 3-4 Wochen fuer faktisches Bild."}]}, "comp": {"en": [{"v": "Oracle Transportation Management (OTM)", "d": "Both are enterprise-grade TMS. SAP TM differentiates with native S/4HANA integration (no middleware), embedded in the same platform as order management and warehouse. Oracle OTM is a separate product requiring integration."}, {"v": "BluJay / E2open", "d": "Strong in carrier collaboration and visibility. SAP TM offers the same plus deep optimization, integrated freight costing at order entry, and native ERP connectivity that eliminates data duplication."}, {"v": "project44 / FourKites (visibility only)", "d": "These are pure visibility platforms - valuable but narrow. TM provides planning, execution, settlement AND visibility in one platform. No point in seeing a problem if you cannot re-plan immediately."}, {"v": "Manual/Excel planning", "d": "Excel cannot optimize across constraints, cannot automate carrier selection, and cannot scale. Even 50 daily shipments overwhelm manual processes. TM automates and optimizes."}], "de": [{"v": "Oracle TM (OTM)", "d": "Beide Enterprise-TMS. SAP TM mit nativer S/4HANA-Integration ohne Middleware. Oracle OTM separates Produkt."}, {"v": "BluJay / E2open", "d": "Stark in Carrier-Kollaboration. SAP TM bietet zusaetzlich Optimierung, integriertes Freight Costing und native ERP-Anbindung."}, {"v": "project44 / FourKites", "d": "Reine Visibilitaet - wertvoll aber schmal. TM bietet Planung, Ausfuehrung, Settlement UND Visibilitaet."}, {"v": "Manuell/Excel", "d": "Excel optimiert nicht, automatisiert keine Carrier-Selektion, skaliert nicht. TM automatisiert und optimiert."}]}, "dont": {"en": ["Do not lead with technology or logistics jargon - lead with cost reduction potential and service improvement", "Never position TM as only for large enterprises - it scales from 50 to 50,000 daily shipments", "Do not ignore the freight audit value - it often funds the entire solution within the first year", "Avoid positioning as replacement for visibility tools alone - TM is plan + execute + settle + visible. Full lifecycle.", "Do not underestimate carrier onboarding effort - collaborative carrier adoption takes time and relationship management"], "de": ["Nicht mit Technologie fuehren - mit Kostensenkungspotenzial und Service-Verbesserung", "Nie nur fuer Grossunternehmen positionieren - skaliert von 50 bis 50000 Sendungen taeglich", "Freight-Audit-Wert nicht ignorieren - finanziert oft die Loesung im ersten Jahr", "Nicht nur als Visibilitaets-Ersatz positionieren - TM ist Plan + Execute + Settle + Visible", "Carrier-Onboarding-Aufwand nicht unterschaetzen"]}, "qual": {"en": ["Annual freight spend exceeding 5M EUR with growth trend", "Multiple carriers (10+) without systematic optimization of allocation", "Manual transportation planning consuming significant planner FTEs", "Freight invoice disputes or suspected overpayment without audit capability", "Customer complaints about delivery visibility or reliability", "Sustainability reporting requirements for Scope 3 transportation emissions", "Current TMS approaching end-of-life or too rigid for changing logistics requirements"], "de": ["Jaehrliche Frachtkosten ueber 5M EUR mit Wachstumstrend", "Mehrere Carrier (10+) ohne systematische Allokationsoptimierung", "Manuelle Transportplanung mit signifikantem FTE-Aufwand", "Frachtrechnungsstreitigkeiten ohne Audit-Faehigkeit", "Kundenbeschwerden zu Liefervisibilitaet", "Scope-3-Nachhaltigkeitsberichterstattung fuer Transport", "Aktuelles TMS am Lebensende oder zu starr"]}, "indDiff": {"en": [{"i": "Consumer Products / Retail", "p": "High-frequency B2B deliveries to retail DC, strict delivery windows, chargeback risk for late/early delivery. Complex promotional logistics with demand spikes.", "f": "Appointment scheduling integration, delivery window optimization, chargeback avoidance through precision planning. Promotional volume surge planning with temporary carrier capacity booking."}, {"i": "Chemicals / Bulk", "p": "Hazardous goods compliance (ADR/IMDG), tank/silo transport, cleaning requirements between loads, driver certifications, route restrictions.", "f": "Dangerous goods integration with compliant carrier/vehicle selection, cleaning sequence management, certified driver matching, restricted route avoidance. Full regulatory documentation."}, {"i": "Automotive Logistics", "p": "Inbound material flows from global suppliers with complex milkruns, cross-docking, and JIT delivery to production lines. Premium freight when supply chain disrupts.", "f": "Milkrun optimization, cross-dock planning, JIT delivery scheduling synchronized with production. Premium freight management with cost allocation to root cause. Inbound visibility for production planning."}], "de": [{"i": "Konsumgueter / Handel", "p": "Hochfrequente B2B-Belieferung, enge Zeitfenster, Chargeback-Risiko. Komplexe Promotions-Logistik.", "f": "Zeitfenster-Optimierung, Chargeback-Vermeidung, Promotions-Volumenplanung mit temporaerer Carrier-Kapazitaet."}, {"i": "Chemie / Bulk", "p": "Gefahrgut-Compliance (ADR/IMDG), Tank-/Silotransport, Reinigungsanforderungen, Fahrerzertifizierungen.", "f": "Gefahrgut-Integration, Reinigungssequenz, zertifizierte Fahrer, Routenrestriktionen. Regulatorische Dokumentation."}, {"i": "Automobil-Logistik", "p": "Inbound von globalen Lieferanten mit Milkruns, Cross-Docking, JIT an Produktion. Premium-Fracht bei Disruption.", "f": "Milkrun-Optimierung, Cross-Dock-Planung, JIT-Synchronisation mit Produktion. Premium-Fracht-Management."}]}, "inds": ["Retail", "Consumer Products", "Automotive", "Chemicals", "Logistics Service Providers", "Industrial Manufacturing", "Pharma (cold chain)", "Oil & Gas"], "obj": {"en": [{"o": "We use a 3PL - we do not need TM", "r": "TM helps you MANAGE your 3PLs: rate comparison, carrier performance analytics, freight audit. You keep control and visibility even when outsourcing execution."}, {"o": "Our logistics is too simple for TM", "r": "If you spend more than 5M EUR/year on freight, TM typically saves 8-15% through optimization. Calculate: what is 10% of your freight spend?"}, {"o": "We already have a TMS", "r": "What does it integrate with? Most standalone TMS create data silos. SAP TM provides native ERP integration - order-to-delivery without interfaces."}, {"o": "Too complex to implement", "r": "Cloud-based TM with rapid deployment. Core freight management in 12-16 weeks. Start with outbound, add inbound and optimization later."}, {"o": "Our carriers will not adopt another portal", "r": "SAP TM integrates with SAP Business Network for carrier collaboration. 80K+ carriers already connected. Most of your carriers are likely already on it."}], "de": [{"o": "Wir nutzen 3PL - brauchen kein TM", "r": "TM verwaltet 3PLs: Tarifvergleich, Carrier-Performance, Freight Audit."}, {"o": "Logistik zu einfach fuer TM", "r": "Bei >5M EUR Frachtkosten spart TM 8-15% durch Optimierung."}, {"o": "Haben schon ein TMS", "r": "Integration? Standalone-TMS erzeugt Silos. SAP TM: native ERP-Integration."}, {"o": "Zu komplex zu implementieren", "r": "Cloud-TM, Rapid Deployment in 12-16 Wochen."}, {"o": "Carrier wollen kein neues Portal", "r": "SAP Business Network: 80K+ Carrier bereits verbunden."}]}, "persona": {"en": [{"role": "VP Logistics / Supply Chain", "msg": "Freight cost reduction, carrier performance visibility, sustainability reporting on transport", "prio": "Primary"}, {"role": "Head of Transportation", "msg": "Automated planning & optimization, load consolidation, real-time shipment visibility", "prio": "Primary"} Lager"}, {"trigger": "Aussenhandels-Compliance", "solution": "SAP GTS", "why": "Zoll/Trade integriert mit Transport"}, {"trigger": "E2E-SC-Sichtbarkeit", "solution": "SAP Control Tower", "why": "Transport in Gesamt-SC-Monitoring"}, {"trigger": "Scope-3-Reporting", "solution": "SAP Sustainability", "why": "Transport-CO2 in ESG-Reporting"}]}, "refs": {"en": [{"industry": "Chemical Logistics", "country": "Germany", "outcome": "Full TM deployment for 200K shipments/year. 12% freight cost reduction. Carrier compliance from 78% to 95%."}, {"industry": "Retail/FMCG", "country": "Poland", "outcome": "TM for CEE distribution network. Load consolidation improved 30%. CO2 per ton-km reduced 15%."}, {"industry": "Industrial Manufacturing", "country": "Austria", "outcome": "Replaced legacy TMS. 8% freight savings. Real-time visibility for customer delivery promises."}], "de": [{"industry": "Chemie-Logistik", "country": "Deutschland", "outcome": "TM fuer 200K Sendungen/Jahr. 12% Frachtkosten-Reduktion. Carrier-Compliance von 78% auf 95%."}, {"industry": "Retail/FMCG", "country": "Polen", "outcome": "TM fuer CEE-Distribution. Ladungskonsolidierung +30%. CO2 -15%."}, {"industry": "Industriefertigung", "country": "Oesterreich", "outcome": "Legacy-TMS ersetzt. 8% Frachtersparnisse. Echtzeit-Lieferversprechen."}]}, "roi": {"en": ["8-15% freight cost reduction through optimization and consolidation", "30-50% less manual effort in transportation planning", "20-30% improvement in on-time delivery performance", "40-60% faster freight invoice processing (automated audit)", "10-15% CO2 reduction through route and modal optimization"], "de": ["8-15% Frachtkosten-Reduktion", "30-50% weniger manueller Planungsaufwand", "20-30% bessere Liefertreue", "40-60% schnellere Frachtrechnungsverarbeitung", "10-15% CO2-Reduktion durch Routenoptimierung"]}, "meeComp": {"en": [{"competitor": "Oracle Transportation Management", "strength": "Mature product, strong in US, good optimization engine", "counter": "SAP TM: native S/4HANA integration, SAP Business Network (80K carriers), better EU/MEE localization and compliance."}, {"competitor": "Blue Yonder TMS", "strength": "Good optimization, strong in retail logistics", "counter": "SAP TM: integrated with ERP (no middleware), financial settlement built-in, broader supply chain integration."}, {"competitor": "Transporeon/Trimble", "strength": "Strong carrier marketplace in EU, good for spot freight", "counter": "SAP TM: strategic transportation management (not just marketplace), end-to-end from order to delivery, analytics."}], "de": [{"competitor": "Oracle TM", "strength": "Reifes Produkt, gute Optimierung", "counter": "SAP TM: native S/4HANA-Integration, Business Network, EU-Lokalisierung."}, {"competitor": "Blue Yonder TMS", "strength": "Gute Optimierung fuer Retail", "counter": "SAP TM: ERP-integriert, Abrechnung built-in."}, {"competitor": "Transporeon/Trimble", "strength": "Carrier-Marktplatz in EU, Spot-Fracht", "counter": "SAP TM: strategisches TMS, End-to-End, Analytics."}]}}, {"name": "SAP Supply Chain Control Tower", "sub": {"en": "End-to-End Visibility, Alerting & Orchestrated Response Across Your Supply Network", "de": "End-to-End-Visibilitaet, Alerting & Orchestrierte Reaktion im Supply Network"}, "elev": {"en": "SAP Supply Chain Control Tower provides real-time, end-to-end visibility across your entire supply chain - from suppliers through manufacturing to customer delivery. It aggregates data from SAP and non-SAP systems, applies intelligent alerting to detect exceptions and risks before they become problems, and enables orchestrated response through guided resolution workflows. Think of it as the central nervous system of your supply chain: always monitoring, always sensing, always surfacing what needs attention so your team focuses on exceptions rather than searching for information.", "de": "SAP Supply Chain Control Tower bietet Echtzeit-End-to-End-Visibilitaet ueber die gesamte Supply Chain - von Lieferanten ueber Fertigung bis Kundenlieferung. Aggregiert Daten aus SAP und Nicht-SAP-Systemen, erkennt Ausnahmen und Risiken intelligent bevor sie zu Problemen werden, und ermoeglicht orchestrierte Reaktion durch gefuehrte Workflows. Das zentrale Nervensystem Ihrer Supply Chain."}, "pain": {"en": ["No single source of truth for supply chain status - teams check 5-10 systems and still miss issues", "Firefighting mode: problems discovered when customers call to complain, not when they are still preventable", "Cannot quantify the downstream impact of an upstream disruption - 'if this supplier is late, which customer orders are affected?'", "Information trapped in silos: procurement does not see logistics issues, logistics does not see production delays, nobody sees the full picture", "Too many dashboards, too few actionable insights - data overload without intelligence", "No systematic early warning system - risks materialize before anyone notices the signals", "Cross-functional collaboration breaks down during crises - no shared workspace or common data view"], "de": ["Keine Single Source of Truth - Teams pruefen 5-10 Systeme und uebersehen trotzdem Probleme", "Firefighting: Probleme erst entdeckt wenn Kunden sich beschweren, nicht wenn vermeidbar", "Downstream-Impact von Upstream-Disruption nicht quantifizierbar", "Information in Silos: Einkauf sieht nicht Logistik, Logistik nicht Produktion, niemand das Gesamtbild", "Zu viele Dashboards, zu wenig handlungsrelevante Insights - Datenueberlastung", "Kein systematisches Fruehwarnsystem - Risiken materialisieren bevor Signale bemerkt", "Funktionsuebergreifende Kollaboration bricht in Krisen zusammen"]}, "questions": {"en": [{"t": "Visibility gap", "q": "If a major supplier informed you today they cannot deliver next week - how long would it take your team to assess which customer orders are affected and what alternatives exist?"}, {"t": "Detection speed", "q": "How are supply chain exceptions currently detected? Proactive monitoring, or reactive when someone complains or a deadline passes?"}, {"t": "System landscape", "q": "How many different systems contain supply chain relevant data in your organization? SAP, non-SAP, carrier portals, supplier portals, spreadsheets?"}, {"t": "Collaboration", "q": "When a cross-functional supply chain issue occurs - how do procurement, planning, logistics, and customer service coordinate the response?"}, {"t": "Metric alignment", "q": "Does your leadership team have a shared, real-time view of key supply chain metrics (OTIF, inventory, lead times)? Or does every function report different numbers?"}, {"t": "Risk management", "q": "Do you have a systematic way to monitor supply chain risks - geopolitical, weather, supplier financial health, capacity constraints?"}], "de": [{"t": "Sichtbarkeitsluecke", "q": "Wenn Hauptlieferant heute sagt naechste Woche keine Lieferung - wie lange bis Ihr Team weiss welche Kundenauftraege betroffen und welche Alternativen existieren?"}, {"t": "Erkennungsgeschwindigkeit", "q": "Wie werden SC-Ausnahmen erkannt? Proaktives Monitoring oder reaktiv nach Beschwerde/Deadline?"}, {"t": "Systemlandschaft", "q": "Wie viele Systeme enthalten SC-relevante Daten? SAP, Nicht-SAP, Carrier-Portale, Lieferantenportale, Spreadsheets?"}, {"t": "Kollaboration", "q": "Wie koordinieren Einkauf, Planung, Logistik und Kundenservice bei funktionsuebergreifenden SC-Problemen?"}, {"t": "Metrik-Alignment", "q": "Hat Ihre Fuehrung eine geteilte Echtzeit-Sicht auf SC-KPIs (OTIF, Bestand, Lieferzeiten)? Oder berichtet jede Funktion andere Zahlen?"}, {"t": "Risikomanagement", "q": "Systematische SC-Risikoueberwachung? Geopolitik, Wetter, Lieferanten-Finanzlage, Kapazitaet?"}]}, "diff": {"en": ["End-to-end visibility in one platform: supplier performance, production status, inventory levels, logistics tracking, customer delivery - single pane of glass", "Intelligent alerting: ML-powered exception detection that surfaces risks before they become problems - not just threshold alerts but pattern-based prediction", "Impact analysis: when a disruption occurs, automatically calculates downstream effect on customer orders, revenue, and SLA compliance", "Guided resolution: not just alerts but recommended actions and cross-functional collaboration workflows to resolve issues systematically", "Multi-source data: integrates SAP and non-SAP systems, external data (weather, port congestion, news), and supplier/carrier feeds into unified model", "Demand-supply matching: real-time view of demand commitments vs. available supply capacity, highlighting gaps before they impact customers"], "de": ["End-to-End-Sichtbarkeit: Lieferantenperformance, Produktion, Bestand, Logistik, Kundenlieferung - ein Dashboard", "Intelligentes Alerting: ML-Ausnahmeerkennung vor Problementstehung - nicht nur Schwellwerte sondern Mustererkennung", "Impact-Analyse: bei Disruption automatische Berechnung der Auswirkung auf Kundenauftraege und Revenue", "Gefuehrte Loesung: nicht nur Alerts sondern empfohlene Aktionen und Kollaborations-Workflows", "Multi-Source-Daten: SAP und Nicht-SAP, externe Daten, Lieferanten-/Carrier-Feeds", "Demand-Supply-Matching: Echtzeit-Sicht Nachfrage vs. verfuegbare Kapazitaet"]}, "talk": {"en": [{"p": "Open", "l": "Here is what I hear from almost every supply chain leader: 'We have data everywhere, but we cannot see what is happening end-to-end. By the time we find a problem, it is already a crisis.' Does that resonate?"}, {"p": "Pain", "l": "The cost of not seeing problems early is massive - expedited shipments, premium freight, lost sales, customer penalties, and the hidden cost of having your best people in permanent firefighting mode instead of driving improvement."}, {"p": "Vision", "l": "What if you had one platform that constantly monitors your entire supply chain, automatically detects when something is going wrong, tells you which customers and orders are impacted, and guides your team through a structured resolution - before the customer even notices?"}, {"p": "Proof", "l": "[Reference customer] reduced supply chain disruption response time from 3 days to 4 hours. They prevented 2M EUR in premium freight costs in the first year just by catching exceptions early enough to re-plan."}, {"p": "Next Step", "l": "The right starting point is a visibility assessment: we map your current data sources, identify the critical blind spots, and design the alerting rules that would have the highest value. This gives you a concrete picture of what Control Tower would deliver for your specific supply chain."}], "de": [{"p": "Eroeffnung", "l": "Was ich von fast jedem SC-Leader hoere: 'Daten ueberall, aber keine End-to-End-Sicht. Wenn wir ein Problem finden ist es schon eine Krise.' Kommt das vor?"}, {"p": "Schmerz", "l": "Die Kosten fehlender Frueherkennung sind massiv - Expresslieferungen, Premium-Fracht, entgangene Umsaetze, Strafzahlungen, und beste Leute im Dauerfeuerwehrmodus."}, {"p": "Vision", "l": "Eine Plattform die die gesamte SC ueberwacht, automatisch erkennt wenn etwas schiefgeht, zeigt welche Kunden betroffen sind, und das Team durch strukturierte Loesung fuehrt - bevor der Kunde es merkt."}, {"p": "Beweis", "l": "[Referenz] Reaktionszeit von 3 Tagen auf 4 Stunden. 2M EUR Premium-Fracht im ersten Jahr verhindert durch fruehzeitige Ausnahmenerkennung."}, {"p": "Naechster Schritt", "l": "Visibility Assessment: aktuelle Datenquellen abbilden, kritische Blind Spots identifizieren, wertvollste Alerting-Regeln designen."}]}, "comp": {"en": [{"v": "Kinaxis Control Tower", "d": "Kinaxis is strong in planning-side visibility. SAP Control Tower covers the full execution dimension (logistics, WM, carrier data) with native ERP integration. Also connects procurement/Ariba supplier data natively."}, {"v": "o9 Digital Brain", "d": "o9 focuses on planning intelligence. SAP Control Tower provides execution-level monitoring, real-time carrier/supplier feeds, and cross-system data aggregation that o9 does not cover."}, {"v": "Custom BI dashboards (Power BI/Tableau)", "d": "BI dashboards show what happened. Control Tower predicts what will happen, calculates impact, and guides resolution. Static reporting vs. intelligent, actionable monitoring."}, {"v": "E2open / One Network", "d": "Multi-enterprise platforms with network focus. SAP differentiates with depth of ERP integration, intelligent alerting (not just data aggregation), and guided resolution workflows."}], "de": [{"v": "Kinaxis Control Tower", "d": "Kinaxis stark in Planungs-Visibilitaet. SAP deckt volle Execution ab mit nativer ERP-Integration."}, {"v": "o9", "d": "o9 fokussiert auf Planning Intelligence. SAP gibt Execution-Monitoring, Echtzeit-Feeds und Cross-System-Aggregation."}, {"v": "Custom BI (Power BI/Tableau)", "d": "BI zeigt was passiert IST. Control Tower sagt vorher, berechnet Impact und fuehrt Loesung. Statisch vs. intelligent."}, {"v": "E2open / One Network", "d": "Multi-Enterprise-Netzwerke. SAP differenziert mit ERP-Tiefe, intelligentem Alerting und gefuehrten Workflows."}]}, "dont": {"en": ["Do not position as 'just another dashboard' - the value is in intelligent detection and guided resolution, not visualization alone", "Never promise it works without data integration effort - connecting multiple sources takes real project work", "Do not conflate with IBP - Control Tower is about real-time execution monitoring, IBP is about planning. They complement each other", "Avoid overselling AI prediction - be honest about what needs rule-based alerting vs. what ML can predict. Set realistic expectations", "Do not ignore organizational change - having visibility means someone needs to act on it. Define roles and escalation paths."], "de": ["Nicht als 'noch ein Dashboard' positionieren - Wert in intelligenter Erkennung und gefuehrter Loesung", "Nie versprechen dass es ohne Datenintegrationsaufwand funktioniert", "Nicht mit IBP verwechseln - Control Tower ist Echtzeit-Execution-Monitoring, IBP ist Planung", "KI-Vorhersage nicht ueberverkaufen - ehrlich was regelbasiert vs. ML-vorhersagbar", "Organisatorischen Wandel nicht ignorieren - Sichtbarkeit braucht jemanden der handelt"]}, "qual": {"en": ["Complex multi-tier supply chain with frequent disruptions or exceptions", "Multiple systems (ERP, TMS, WMS, supplier portals) without unified view", "Customer SLA pressure with OTIF below target and no early warning", "Recent supply chain crisis that exposed visibility and response gaps", "Executive mandate for supply chain resilience and risk management improvement", "High cost of firefighting: premium freight, expediting, customer penalties", "Planning and execution teams working in silos without shared information"], "de": ["Komplexe Multi-Tier-SC mit haeufigen Disruptionen", "Mehrere Systeme ohne einheitliche Sicht", "OTIF unter Ziel mit Kunden-SLA-Druck ohne Fruehwarnung", "Juengste SC-Krise hat Visibilitaets- und Reaktionsluecken offengelegt", "Executive-Mandat fuer SC-Resilienz und Risikomanagement", "Hohe Firefighting-Kosten: Premium-Fracht, Eilauftraege, Strafzahlungen", "Planung und Execution in Silos ohne geteilte Information"]}, "indDiff": {"en": [{"i": "Automotive", "p": "Multi-tier supplier networks where a tier-3 disruption can stop production lines within hours. Need real-time tier-N visibility and immediate impact assessment.", "f": "Multi-tier supplier monitoring, production impact calculation when supplier alerts fire, alternative source identification, and premium freight cost tracking. Integrates with supplier collaboration networks."}, {"i": "Consumer Products", "p": "Seasonal demand spikes, promotional volume surges, retail delivery window compliance. Need to ensure shelf availability while minimizing expediting costs.", "f": "Demand-supply gap monitoring per retail customer, delivery window compliance tracking, promotional execution monitoring, and automated escalation when service level is at risk."}, {"i": "Life Sciences", "p": "Temperature-sensitive shipments, regulatory compliance for batch traceability, shelf-life constraints. Any logistics deviation can mean product loss.", "f": "Cold chain monitoring integration, batch-level tracking with expiry management, regulatory documentation triggers, and deviation alerting for GxP-relevant shipments."}], "de": [{"i": "Automobil", "p": "Multi-Tier wo Tier-3-Disruption Produktion in Stunden stoppen kann. Echtzeit Tier-N-Sichtbarkeit noetig.", "f": "Multi-Tier-Monitoring, Produktions-Impact-Berechnung, alternative Quellen, Premium-Fracht-Tracking."}, {"i": "Konsumgueter", "p": "Saisonale Spitzen, Promotions, Retail-Zeitfenster. Regalverfuegbarkeit sichern bei minimalen Eilkosten.", "f": "Demand-Supply-Gap pro Retailer, Zeitfenster-Compliance, Promotions-Monitoring, automatische Eskalation."}, {"i": "Life Sciences", "p": "Temperatursensitive Sendungen, regulatorische Chargen-Rueckverfolgung, Haltbarkeitsgrenzen.", "f": "Kuehlketten-Monitoring, Chargen-Tracking mit Ablaufmanagement, Abweichungsalerts fuer GxP-Sendungen."}]}, "inds": ["Automotive", "Consumer Products", "High Tech", "Life Sciences", "Industrial Manufacturing", "Chemicals", "Retail", "Aerospace & Defense"], "obj": {"en": [{"o": "We already have dashboards in Power BI", "r": "Dashboards show history. Control Tower provides predictive alerts, exception management, and recommended actions. It is decision support, not reporting."}, {"o": "Our supply chain is not complex enough", "r": "If you have more than 3 suppliers, 2 plants, and customer commitments, you benefit. Even single disruptions (Suez, COVID) showed that visibility gaps cost millions."}, {"o": "We do not have the data quality for this", "r": "Control Tower can work with available data and improve over time. Start with order/shipment visibility, then add supplier and production. Perfect data is not a prerequisite."}, {"o": "This is just another monitoring tool", "r": "Control Tower goes beyond monitoring: predictive alerts, impact simulation, resolution workflows. It tells you what WILL go wrong and what to DO about it."}, {"o": "Our planners already know when things go wrong", "r": "They know AFTER it happens. Control Tower detects signals 5-15 days earlier. In supply chain, early warning = options. Late warning = firefighting."}], "de": [{"o": "Haben schon Power-BI-Dashboards", "r": "Dashboards zeigen Vergangenheit. Control Tower: predictive Alerts, Aktionsempfehlungen."}, {"o": "Supply Chain nicht komplex genug", "r": "Ab 3 Lieferanten, 2 Werke: bereits Nutzen. Eine Disruption kostet Millionen."}, {"o": "Datenqualitaet nicht gut genug", "r": "Kann mit vorhandenen Daten starten. Perfekte Daten kein Voraussetzung."}, {"o": "Nur ein weiteres Monitoring-Tool", "r": "Geht ueber Monitoring hinaus: predictive Alerts, Simulation, Workflows."}, {"o": "Planer wissen schon wenn etwas schiefgeht", "r": "Sie wissen es NACHHER. Control Tower erkennt 5-15 Tage frueher."}]}, "persona": {"en": [{"role": "VP Supply Chain / CSO", "msg": "Proactive exception management, cross-functional visibility, risk mitigation", "prio": "Primary"}, {"role": "Head of Supply Chain Operations", "msg": "Real-time order/supply status, automated alerts, resolution workflows", "prio": "Primary"}, {"role": "Risk Manager", "msg": "Supply risk monitoring, early warning indicators, scenario simulation", "prio": "Champion"}, {"role": "CEO / Board", "msg": "Supply chain resilience, customer service protection, competitive advantage through agility", "prio": "Influencer"}], "de": [{"role": "VP Supply Chain", "msg": "Proaktives Exception-Management, Sichtbarkeit, Risikominimierung", "prio": "Primaer"}, {"role": "SC-Operations-Leiter", "msg": "Echtzeit-Status, automatische Alerts, Workflows", "prio": "Primaer"}, {"role": "Risikomanager", "msg": "Lieferrisiko-Monitoring, Fruehwarnung, Simulation", "prio": "Champion"}, {"role": "CEO / Vorstand", "msg": "SC-Resilienz, Kundenzufriedenheit, Agilitaet", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Subscription (annual)", "metric": "Users + data sources connected", "range": "150K-400K EUR/year for mid-market, 400K-1M+ for large multi-tier supply chains", "includes": "Control Tower platform, alert management, basic analytics, standard connectors"}, "de": {"model": "Subskription (jaehrlich)", "metric": "Nutzer + angebundene Datenquellen", "range": "150K-400K EUR/Jahr Mittelstand, 400K-1M+ grosse SC", "includes": "Platform, Alert-Management, Analytics, Konnektoren"}}, "crossSell": {"en": [{"trigger": "Need to improve planning based on signals", "solution": "SAP IBP", "why": "Control Tower detects, IBP re-plans. Closed-loop supply chain."}, {"trigger": "Supplier risk a key concern", "solution": "SAP Ariba (Supplier Risk)", "why": "Supplier risk scores feed Control Tower alerts"}, {"trigger": "Logistics visibility needed", "solution": "SAP Transportation Management", "why": "Shipment tracking data feeds Control Tower real-time"}, {"trigger": "Want AI-powered predictions", "solution": "SAP Business AI", "why": "AI enhances prediction accuracy and recommendation quality"}], "de": [{"trigger": "Planung auf Basis von Signalen verbessern", "solution": "SAP IBP", "why": "Control Tower erkennt, IBP plant um."}, {"trigger": "Lieferantenrisiko wichtig", "solution": "SAP Ariba (Supplier Risk)", "why": "Risiko-Scores fuettern Control Tower"}, {"trigger": "Logistik-Sichtbarkeit", "solution": "SAP TM", "why": "Sendungstracking in Echtzeit"}, {"trigger": "KI-gestuetzte Vorhersagen", "solution": "SAP Business AI", "why": "KI verbessert Vorhersagen und Empfehlungen"}]}, "refs": {"en": [{"industry": "Automotive OEM", "country": "Germany", "outcome": "Control Tower across 12 plants + 200 tier-1 suppliers. Detected 340 potential disruptions in year 1, avoided 85% through early action."}, {"industry": "Pharmaceuticals", "country": "Switzerland", "outcome": "Supply visibility for critical APIs. Early warning on supplier delays reduced stock-outs by 70%."}, {"industry": "Industrial Equipment", "country": "Czech Republic", "outcome": "Control Tower for customer order monitoring. On-time delivery improved from 82% to 94% in 9 months."}], "de": [{"industry": "Automotive OEM", "country": "Deutschland", "outcome": "12 Werke + 200 Tier-1-Lieferanten. 340 potenzielle Stoerungen erkannt, 85% vermieden."}, {"industry": "Pharma", "country": "Schweiz", "outcome": "Sichtbarkeit fuer kritische APIs. Fehlbestaende -70%."}, {"industry": "Industrieausruestung", "country": "Tschechien", "outcome": "Kunden-Order-Monitoring. Liefertreue von 82% auf 94% in 9 Monaten."}]}, "roi": {"en": ["70-85% of potential disruptions detected early enough to mitigate", "15-25% improvement in on-time delivery performance", "30-50% reduction in expediting costs (air freight, overtime)", "5-10 days earlier visibility into supply/demand mismatches", "20-30% reduction in safety stock through better visibility"], "de": ["70-85% potenzieller Stoerungen frueh genug erkannt", "15-25% bessere Liefertreue", "30-50% weniger Eilkosten (Luftfracht, Ueberstunden)", "5-10 Tage fruehere Sichtbarkeit", "20-30% weniger Sicherheitsbestand"]}, "meeComp": {"en": [{"competitor": "Coupa Supply Chain (formerly LLamasoft)", "strength": "Good network design and risk scoring", "counter": "SAP CT: operational real-time (not just strategic), native SAP data, alert-to-action workflows."}, {"competitor": "Kinaxis (Command Center)", "strength": "Concurrent planning + visibility combined", "counter": "SAP CT: broader data sources, not planning-dependent, integrates with any execution system."}, {"competitor": "E2open / project44", "strength": "Strong in logistics visibility and tracking", "counter": "SAP CT: end-to-end (not just logistics), planning + production + supply + logistics in one view."}], "de": [{"competitor": "Coupa Supply Chain", "strength": "Netzwerkdesign und Risk Scoring", "counter": "SAP CT: operativ, Echtzeit, native SAP-Daten."}, {"competitor": "Kinaxis", "strength": "Planung + Sichtbarkeit kombiniert", "counter": "SAP CT: breitere Datenquellen, nicht planungsabhaengig."}, {"competitor": "E2open / project44", "strength": "Logistik-Sichtbarkeit", "counter": "SAP CT: End-to-End, nicht nur Logistik."}]}}], "Data & AI": [{"name": "SAP Business Technology Platform (BTP)", "sub": {"en": "The Foundation Layer - Integration, Extension, Data, AI, and Development", "de": "Die Grundlage - Integration, Extension, Daten, KI und Entwicklung"}, "elev": {"en": "SAP BTP is the technology foundation that ties the entire SAP ecosystem together. It provides integration services (connecting SAP-to-SAP and SAP-to-third-party), extensibility (building custom applications and extensions without modifying the core), data management (federated access, data warehousing, analytics), AI/ML capabilities, and a full application development environment. For customers running SAP, BTP is how they connect, extend, and innovate on top of their core systems while keeping them clean and upgradeable. It is not a standalone product decision - it is the enabling platform that unlocks the full potential of every other SAP investment.", "de": "SAP BTP ist die Technologiebasis die das gesamte SAP-Oekosystem verbindet. Integration (SAP-zu-SAP und SAP-zu-Drittanbieter), Erweiterbarkeit (Custom Apps ohne Core-Modifikation), Datenmanagement, KI/ML und volle Entwicklungsumgebung. Fuer SAP-Kunden ist BTP der Weg zu verbinden, erweitern und innovieren - bei sauberem, upgrade-faehigem Core."}, "pain": {"en": ["Integration nightmare: 50+ point-to-point interfaces that break on every upgrade, impossible to maintain, no visibility into data flows", "Need to extend SAP functionality but modifying the core (Z-code) makes upgrades expensive and risky - trapped between custom needs and clean core", "Multiple data copies across systems with no single source of truth - analytics are unreliable because nobody knows which data is correct", "Want to leverage AI/ML but data is scattered across SAP and non-SAP systems with no unified access layer", "Development teams building on non-SAP platforms (AWS/Azure native) creating shadow IT that disconnects from enterprise processes", "Cannot innovate fast enough - building anything on SAP takes months of ABAP development, losing agility to cloud-native competitors", "Middleware spaghetti: multiple integration tools (MuleSoft, Informatica, custom middleware) with overlapping scope and no governance"], "de": ["Integrations-Albtraum: 50+ Point-to-Point-Schnittstellen die bei jedem Upgrade brechen", "SAP erweitern aber Core-Modifikation macht Upgrades teuer - gefangen zwischen Custom und Clean Core", "Mehrere Datenkopien ohne Single Source of Truth - Analytics unzuverlaessig", "KI/ML nutzen aber Daten verstreut ueber SAP und Nicht-SAP ohne einheitlichen Zugang", "Entwicklung auf Nicht-SAP-Plattformen erzeugt Shadow IT", "Innovation zu langsam - alles auf SAP dauert Monate ABAP-Entwicklung", "Middleware-Spaghetti: mehrere Tools mit Ueberschneidungen ohne Governance"]}, "questions": {"en": [{"t": "Integration pain", "q": "How many integration interfaces exist in your landscape today? How often do they break during upgrades, and what is the cost of that maintenance?"}, {"t": "Extension model", "q": "How are custom requirements handled today - core modification (Z-code), BAdIs, or external applications? What is the impact on your upgrade ability?"}, {"t": "Data landscape", "q": "Where does your most critical business data live? Can your analytics teams access it without creating copies, or are there multiple versions of truth?"}, {"t": "AI readiness", "q": "Are there specific business processes where AI/ML could create significant value if you had access to clean, unified data?"}, {"t": "Development capacity", "q": "Do you have development teams today? What do they build on - ABAP, Java, JavaScript? Are they productive or stuck in legacy patterns?"}, {"t": "Platform strategy", "q": "Is there an enterprise architecture strategy for where new applications and integrations should be built? Or is each team choosing their own tools?"}, {"t": "Clean core", "q": "How important is keeping your SAP core clean and upgradeable? Is that a stated architectural principle or something that gets sacrificed for speed?"}], "de": [{"t": "Integration", "q": "Wie viele Integrationsschnittstellen existieren? Wie oft brechen sie bei Upgrades?"}, {"t": "Erweiterungsmodell", "q": "Wie werden Custom-Anforderungen gehandhabt - Core-Modifikation, BAdIs, externe Apps?"}, {"t": "Datenlandschaft", "q": "Wo leben kritische Geschaeftsdaten? Zugang ohne Kopien oder mehrere Versionen der Wahrheit?"}, {"t": "KI-Bereitschaft", "q": "Spezifische Prozesse wo KI/ML signifikanten Wert schaffen koennte bei sauberen Daten?"}, {"t": "Entwicklung", "q": "Entwicklungsteams vorhanden? Worauf bauen sie - ABAP, Java, JS? Produktiv oder in Legacy-Mustern?"}, {"t": "Plattformstrategie", "q": "EA-Strategie wo neue Apps/Integrationen gebaut werden? Oder jedes Team waehlt eigene Tools?"}, {"t": "Clean Core", "q": "Wie wichtig ist sauberer upgrade-faehiger Core? Architekturprinzip oder wird fuer Geschwindigkeit geopfert?"}]}, "diff": {"en": ["One platform for all: integration, extension, data, AI, and development in a unified environment with shared identity, security, and governance", "Pre-built integration content: 2,500+ standard integration flows for SAP-to-SAP connectivity. Not starting from scratch - leveraging decades of SAP integration expertise", "Side-by-side extensibility: build custom apps and extensions that run alongside the core, not inside it. Core stays clean, extensions stay flexible", "SAP HANA Cloud included: in-memory database for high-performance analytics, data warehousing, and application development", "AI/ML services: pre-trained AI models for SAP processes (document extraction, predictive maintenance, demand forecasting) plus custom model training", "Multi-cloud deployment: runs on AWS, Azure, and GCP - aligns with customer's existing cloud strategy", "Low-code/pro-code options: SAP Build for citizen developers, CAP (Cloud Application Programming) for professional developers - covering full skill spectrum"], "de": ["Eine Plattform fuer alles: Integration, Extension, Daten, KI, Entwicklung mit geteilter Identity und Governance", "2500+ Standard-Integrationsflows fuer SAP-zu-SAP. Nicht von Null sondern Jahrzehnte SAP-Integration-Expertise", "Side-by-Side-Erweiterbarkeit: Custom Apps neben Core, nicht darin. Core bleibt sauber", "SAP HANA Cloud inklusive: In-Memory fuer Analytics, Data Warehousing, App-Entwicklung", "KI/ML-Services: vortrainierte Modelle fuer SAP-Prozesse plus Custom-Training", "Multi-Cloud: AWS, Azure, GCP - passt zur Cloud-Strategie", "Low-Code/Pro-Code: SAP Build fuer Citizen Developer, CAP fuer Profis"]}, "talk": {"en": [{"p": "Open", "l": "Every SAP customer I work with faces the same fundamental tension: they need to innovate and extend their systems, but every modification makes the core harder to upgrade. That tension only resolves when you have a platform that lets you build alongside the core rather than inside it."}, {"p": "Pain", "l": "The result of not having this platform is predictable: integration spaghetti that breaks on upgrades, shadow IT springing up on every cloud provider, and custom code in the core that makes every innovation release untouchable. Sound familiar?"}, {"p": "Vision", "l": "BTP resolves this by giving you one place for all integration, all extensions, all data access, and all AI/ML - governed, secure, and cleanly separated from your core. Your S/4HANA stays perpetually upgradeable while your innovation velocity actually increases."}, {"p": "Proof", "l": "[Reference customer] consolidated 12 integration tools into BTP Integration Suite, reduced interface maintenance effort by 60%, and built 3 new customer-facing apps in 4 months using SAP Build - something that would have taken 12 months in ABAP."}, {"p": "Next Step", "l": "The logical starting point depends on your biggest pain: if it is integration, we start with an integration assessment. If it is extension needs, we identify the top 3 use cases and prototype one on BTP in a 4-week sprint. What resonates more?"}], "de": [{"p": "Eroeffnung", "l": "Jeder SAP-Kunde steht vor derselben Spannung: innovieren und erweitern, aber jede Modifikation macht den Core schwerer upgrade-bar. Diese Spannung loest sich nur mit einer Plattform die neben dem Core baut, nicht darin."}, {"p": "Schmerz", "l": "Ohne diese Plattform: Integrations-Spaghetti das bei Upgrades bricht, Shadow IT, Custom Code der Innovation blockiert."}, {"p": "Vision", "l": "BTP: ein Ort fuer Integration, Extensions, Datenzugang und KI - governed, sicher, sauber getrennt. S/4HANA bleibt upgrade-faehig, Innovationsgeschwindigkeit steigt."}, {"p": "Beweis", "l": "[Referenz] 12 Integrationstools in BTP konsolidiert, -60% Wartungsaufwand, 3 neue Apps in 4 Monaten mit SAP Build statt 12 Monate ABAP."}, {"p": "Naechster Schritt", "l": "Startpunkt je nach Pain: Integration-Assessment oder Top-3-Extension-Use-Cases mit 4-Wochen-Prototyp. Was resoniert mehr?"}]}, "comp": {"en": [{"v": "MuleSoft (Salesforce)", "d": "MuleSoft is a strong iPaaS for generic integration. BTP Integration Suite is purpose-built for SAP connectivity with 2,500+ pre-built content packages. For SAP-centric landscapes, BTP delivers faster time-to-integration and lower maintenance."}, {"v": "Microsoft Power Platform", "d": "Power Platform is strong for Microsoft-ecosystem citizen development. BTP provides deeper SAP process integration, enterprise-grade governance, and professional development capabilities (CAP, ABAP Cloud) that Power Platform cannot match for SAP scenarios."}, {"v": "AWS/Azure/GCP native services", "d": "Hyperscaler services are powerful but generic. BTP adds SAP-specific value: pre-built SAP integration content, SAP event mesh, SAP identity propagation, and development models purpose-built for SAP extension. Complementary, not competitive."}, {"v": "Boomi / Informatica", "d": "Generic iPaaS tools that work for SAP but require custom development for every interface. BTP Integration Suite includes pre-built, SAP-maintained integration flows that reduce effort by 70-80% for standard SAP connectivity scenarios."}], "de": [{"v": "MuleSoft", "d": "MuleSoft starkes iPaaS. BTP Integration Suite speziell fuer SAP mit 2500+ vorgefertigten Flows. In SAP-Landschaften schneller und wartungsaermer."}, {"v": "Microsoft Power Platform", "d": "Power Platform gut fuer MS-Oekosystem. BTP bietet tiefere SAP-Integration, Enterprise-Governance und professionelle Entwicklung."}, {"v": "AWS/Azure/GCP", "d": "Maechtig aber generisch. BTP addiert SAP-Spezifisches: vorgefertigte Integration, Event Mesh, Identity Propagation. Komplementaer."}, {"v": "Boomi / Informatica", "d": "Generische iPaaS die Custom-Entwicklung fuer jeden SAP-Interface brauchen. BTP hat vorgefertigte SAP-Flows die 70-80% Aufwand sparen."}]}, "dont": {"en": ["Do not sell BTP as a standalone platform decision - always connect it to the business outcomes it enables (clean core, faster innovation, unified data)", "Never position as competing with hyperscalers - BTP runs ON hyperscalers and complements their native services", "Do not overwhelm with the full BTP portfolio - identify the 1-2 pillars most relevant to the customer's pain and focus there", "Avoid ABAP-only messaging - BTP supports Java, Node.js, Python, and low-code. Meet developers where they are", "Do not underestimate the governance conversation - BTP needs enterprise architecture decisions about what goes where"], "de": ["BTP nicht als isolierte Plattform-Entscheidung verkaufen - immer mit Business Outcomes verbinden", "Nie als Hyperscaler-Konkurrenz positionieren - BTP laeuft AUF Hyperscalern und ergaenzt sie", "Nicht mit vollem BTP-Portfolio ueberwaeltigen - 1-2 relevanteste Saeulen fokussieren", "Nicht nur ABAP - BTP unterstuetzt Java, Node.js, Python, Low-Code", "Governance-Gespraech nicht unterschaetzen - BTP braucht EA-Entscheidungen"]}, "qual": {"en": ["Existing SAP customer with integration challenges or clean core ambition", "Multiple point-to-point interfaces breaking on upgrades", "Custom code in SAP core blocking innovation velocity", "Need for custom applications that extend SAP processes", "Data scattered across systems with no unified access or analytics layer", "Development teams wanting modern tools (cloud-native, low-code) for SAP-connected scenarios", "Digital transformation initiatives requiring rapid prototyping and delivery"], "de": ["SAP-Kunde mit Integrations-Herausforderungen oder Clean-Core-Ambition", "Point-to-Point-Interfaces die bei Upgrades brechen", "Custom Code im Core blockiert Innovation", "Custom-Applications die SAP-Prozesse erweitern sollen", "Verstreute Daten ohne einheitlichen Zugang", "Entwickler wollen moderne Tools fuer SAP-Szenarien", "Digitale Transformation mit schnellem Prototyping"]}, "indDiff": {"en": [{"i": "Manufacturing", "p": "Need to connect shop floor IoT data with ERP, build custom production dashboards, and extend quality processes with ML-based defect detection.", "f": "BTP IoT services for machine connectivity, custom Fiori apps for production visibility, AI/ML services for quality prediction, Integration Suite connecting MES to S/4HANA."}, {"i": "Retail", "p": "Need to build omnichannel experiences, integrate POS systems, connect marketplace platforms, and create customer-facing apps that draw from SAP backend.", "f": "API Management for controlled access, Integration Suite for marketplace/POS connectivity, SAP Build for rapid mobile app development, Launchpad for unified storefront experiences."}, {"i": "Financial Services", "p": "Regulatory reporting extensions, KYC process automation, document AI for forms processing, secure multi-tenant applications for client portals.", "f": "Document AI for automated processing, secure multi-tenant app development, Integration Suite for regulatory data feeds, HANA Cloud for real-time risk analytics."}], "de": [{"i": "Fertigung", "p": "Shopfloor-IoT mit ERP verbinden, Custom-Dashboards, ML-Defekterkennung.", "f": "IoT Services, Custom Fiori Apps, KI/ML fuer Qualitaet, Integration Suite fuer MES-S/4HANA."}, {"i": "Handel", "p": "Omnichannel, POS-Integration, Marktplatz-Anbindung, kundengerichtete Apps.", "f": "API Management, Integration Suite, SAP Build, Launchpad."}, {"i": "Finanzdienstleister", "p": "Regulatorische Extensions, KYC-Automatisierung, Dokumenten-KI, sichere Mandanten-Apps.", "f": "Document AI, Multi-Tenant-Entwicklung, Integration Suite, HANA Cloud fuer Echtzeit-Risiko."}]}, "inds": ["All industries with SAP landscape", "Manufacturing", "Retail", "Financial Services", "Healthcare", "Public Sector", "Utilities", "Technology"], "obj": {"en": [{"o": "We already use AWS/Azure - why add BTP?", "r": "BTP is not competing with hyperscalers. It sits ON TOP of them. BTP provides SAP-specific services: ABAP environment, integration, workflow, SAP data models. It extends SAP, hyperscalers extend everything else."}, {"o": "Too many services - where do we start?", "r": "Start with one use case: extend a Fiori app, build a side-by-side extension, or automate a workflow. BTP is modular - you consume what you need."}, {"o": "We do not have developers for this", "r": "BTP includes low-code tools (SAP Build). Business users can create apps and automations without professional development skills."}, {"o": "BTP is expensive for what it does", "r": "Compare: cost of custom ABAP modification + upgrade impact vs. BTP side-by-side extension that survives upgrades automatically. BTP pays for itself in upgrade savings alone."}, {"o": "Lock-in to SAP technology", "r": "BTP runs on any hyperscaler (AWS, Azure, GCP). Uses open standards (Cloud Foundry, Kubernetes, OData, REST). Your code is portable. Your data stays accessible."}], "de": [{"o": "Nutzen schon AWS/Azure", "r": "BTP konkurriert nicht mit Hyperscalern. Es sitzt darauf. SAP-spezifische Dienste: ABAP, Integration, Workflow."}, {"o": "Zu viele Services - wo anfangen?", "r": "Ein Use Case: Fiori-App erweitern, Extension bauen, Workflow automatisieren."}, {"o": "Keine Entwickler dafuer", "r": "BTP inkl. Low-Code (SAP Build). Business-User erstellen Apps ohne Coding."}, {"o": "BTP zu teuer", "r": "Vergleichen: Custom ABAP + Upgrade-Aufwand vs. BTP-Extension die Upgrades ueberlebt."}, {"o": "Lock-in zu SAP", "r": "Laeuft auf jedem Hyperscaler. Offene Standards: CF, K8s, OData, REST."}]}, "persona": {"en": [{"role": "CIO / CTO", "msg": "Clean core strategy enabler, extension platform, composable architecture, reduce custom code debt", "prio": "Primary"}, {"role": "Head of Development / IT Architect", "msg": "Modern development environment, CI/CD, microservices, side-by-side extensions", "prio": "Primary"}, {"role": "Business Process Owner", "msg": "Low-code app creation, workflow automation, process extensions without IT bottleneck", "prio": "Champion"}, {"role": "CFO", "msg": "Reduce upgrade cost through clean core, faster time-to-value for new capabilities", "prio": "Influencer"}], "de": [{"role": "CIO / CTO", "msg": "Clean-Core-Enabler, Extension-Plattform, Composable Architecture", "prio": "Primaer"}, {"role": "Entwicklungsleiter / IT-Architekt", "msg": "Moderne Entwicklung, CI/CD, Microservices", "prio": "Primaer"}, {"role": "Prozesseigner", "msg": "Low-Code, Workflow-Automation, Extensions ohne IT-Engpass", "prio": "Champion"}, {"role": "CFO", "msg": "Upgrade-Kosten reduzieren, schneller Time-to-Value", "prio": "Beeinflusser"}]}, "commercial": {"en": {"model": "Consumption-based (CPEA credits) or Subscription", "metric": "Cloud credits consumed across services", "range": "Starter from 20K-50K EUR/year, enterprise consumption typically 200K-1M+/year", "includes": "Platform access, selected services (Integration, ABAP, Build, AI), development tools"}, "de": {"model": "Verbrauchsbasiert (CPEA-Credits) oder Subskription", "metric": "Cloud-Credits ueber Services", "range": "Starter ab 20K-50K EUR/Jahr, Enterprise 200K-1M+", "includes": "Plattformzugang, Services, Entwicklungstools"}}, "crossSell": {"en": [{"trigger": "Customer moving to RISE/S/4HANA", "solution": "BTP is included in RISE", "why": "Clean core extensions, custom code migration to side-by-side"}, {"trigger": "PI/PO end of life approaching", "solution": "SAP Integration Suite (on BTP)", "why": "Integration Suite runs on BTP - natural migration path"}, {"trigger": "Want AI capabilities for SAP processes", "solution": "SAP Business AI / Joule", "why": "AI services delivered through BTP"}, {"trigger": "Data democratization needed", "solution": "SAP Datasphere (on BTP)", "why": "Unified data layer across SAP and non-SAP"}], "de": [{"trigger": "RISE/S/4-Migration", "solution": "BTP ist in RISE enthalten", "why": "Clean-Core-Extensions, Side-by-Side"}, {"trigger": "PI/PO End-of-Life", "solution": "SAP Integration Suite", "why": "Laeuft auf BTP - natuerlicher Pfad"}, {"trigger": "KI fuer SAP-Prozesse", "solution": "SAP Business AI / Joule", "why": "KI-Services ueber BTP"}, {"trigger": "Datendemokratisierung", "solution": "SAP Datasphere", "why": "Einheitliche Datenschicht"}]}, "refs": {"en": [{"industry": "Automotive", "country": "Germany", "outcome": "200+ side-by-side extensions migrated from custom ABAP. Upgrade time reduced from 6 months to 2 weeks."}, {"industry": "Utilities", "country": "Austria", "outcome": "BTP workflow automation for meter-to-cash. 15 manual processes automated. 4 FTE redeployed."}, {"industry": "Banking", "country": "Switzerland", "outcome": "BTP integration platform connecting SAP core banking with 30+ fintech APIs. Time-to-market for new integrations: 2 weeks vs. 3 months."}], "de": [{"industry": "Automotive", "country": "Deutschland", "outcome": "200+ Extensions von ABAP auf BTP. Upgrade von 6 Monaten auf 2 Wochen."}, {"industry": "Versorger", "country": "Oesterreich", "outcome": "Workflow-Automation fuer Meter-to-Cash. 15 Prozesse automatisiert, 4 FTE umverteilt."}, {"industry": "Banking", "country": "Schweiz", "outcome": "BTP verbindet Core Banking mit 30+ Fintech-APIs. Time-to-Market: 2 Wochen vs. 3 Monate."}]}, "roi": {"en": ["60-80% reduction in upgrade effort through clean core / side-by-side extensions", "40-60% faster development of new applications (low-code + pro-code)", "30-50% less integration maintenance through managed services", "3-5x faster time-to-market for process extensions", "50% reduction in custom code maintenance cost"], "de": ["60-80% weniger Upgrade-Aufwand durch Clean Core", "40-60% schnellere App-Entwicklung (Low-Code + Pro-Code)", "30-50% weniger Integrations-Wartung", "3-5x schnellerer Time-to-Market", "50% weniger Custom-Code-Wartungskosten"]}, "meeComp": {"en": [{"competitor": "Microsoft Power Platform", "strength": "Strong low-code, tight Office 365 integration, familiar for business users", "counter": "BTP: SAP-native (understands SAP data models, auth, events). Power Platform needs significant integration work to extend SAP meaningfully."}, {"competitor": "Mendix / OutSystems", "strength": "Best-in-class low-code, rapid prototyping", "counter": "BTP (SAP Build): native SAP integration, no middleware for SAP data. Generic low-code platforms create new integration problems."}, {"competitor": "AWS/Azure PaaS natively", "strength": "Broadest service catalog, mature DevOps, cost flexibility", "counter": "BTP: SAP-aware services (ABAP cloud, SAP events, business rules). Building SAP extensions natively on AWS requires deep SAP knowledge your team likely lacks."}], "de": [{"competitor": "Microsoft Power Platform", "strength": "Low-Code, Office-365-Integration", "counter": "BTP: SAP-nativ, versteht SAP-Datenmodelle. Power Platform braucht viel Integration."}, {"competitor": "Mendix / OutSystems", "strength": "Best-in-Class Low-Code", "counter": "BTP (SAP Build): native SAP-Integration ohne Middleware."}, {"competitor": "AWS/Azure PaaS", "strength": "Breitstes Service-Katalog, DevOps", "counter": "BTP: SAP-bewusste Services (ABAP Cloud, Events, Business Rules)."}]}}, {"name": "SAP Datasphere", "sub": {"en": "Business Data Fabric - Unified Access to All Enterprise Data Without Moving It", "de": "Business Data Fabric - Einheitlicher Zugang zu allen Unternehmensdaten ohne Verschiebung"}, "elev": {"en": "SAP Datasphere is a comprehensive data management solution that provides a 'business data fabric' - enabling organizations to access, combine, and analyze data from SAP and non-SAP systems without creating redundant copies. It preserves the business context (semantics, relationships, hierarchies) that makes SAP data uniquely valuable, while offering open integration with any data source, data lake, or analytics tool. For organizations drowning in data but starving for insight, Datasphere is the layer that turns scattered enterprise data into a governed, analytics-ready, AI-ready asset.", "de": "SAP Datasphere ist eine umfassende Datenmanagemenloesung die eine 'Business Data Fabric' bietet - Zugang zu Daten aus SAP und Nicht-SAP ohne redundante Kopien. Bewahrt den Business-Kontext (Semantik, Beziehungen, Hierarchien) der SAP-Daten einzigartig wertvoll macht, mit offener Integration zu jeder Datenquelle und jedem Analytics-Tool."}, "pain": {"en": ["Cannot get a unified view of the business because data is scattered across 20+ systems and every report shows different numbers", "Data teams spend 80% of their time finding, extracting, cleaning, and moving data - only 20% on actual analysis and insight generation", "SAP data loses its business meaning when extracted to generic data lakes - cost center hierarchies, material groups, org structures disappear", "Data governance is non-existent: no one knows who owns what data, where the master is, or whether the numbers are correct", "Self-service analytics failed because business users cannot find or understand the data without IT hand-holding", "AI/ML projects fail at the data preparation stage - models cannot be trained because clean, integrated data does not exist", "Existing data warehouse is a monolith that takes weeks to onboard new sources and cannot handle real-time requirements"], "de": ["Keine einheitliche Geschaeftssicht - Daten ueber 20+ Systeme verstreut, jeder Bericht zeigt andere Zahlen", "Datenteams 80% mit Finden, Extrahieren, Bereinigen, Verschieben - nur 20% echte Analyse", "SAP-Daten verlieren Business-Kontext in generischen Data Lakes", "Data Governance nicht existent: Ownership, Master-Daten, Korrektheit unklar", "Self-Service-Analytics gescheitert weil User Daten nicht finden/verstehen", "KI/ML-Projekte scheitern an Datenvorbereitung - saubere integrierte Daten fehlen", "Monolithisches Data Warehouse - Wochen fuer neue Quellen, kein Echtzeit"]}, "questions": {"en": [{"t": "Data chaos", "q": "How many different systems contain data that your business users need for reporting and analysis? And how long does it currently take to get a new report or data source onboarded?"}, {"t": "Trust in data", "q": "When your leadership team sees a number in a report - do they trust it? Or do they ask 'where does this come from' and 'why is it different from what I saw in another report'?"}, {"t": "SAP data usage", "q": "How is SAP data currently made available for analytics? Direct extraction, data warehouse, replicated tables? Is the business context (hierarchies, semantics) preserved or lost?"}, {"t": "Self-service", "q": "Have you tried self-service analytics? Can business users independently find and use data, or are they still filing IT tickets for every report change?"}, {"t": "AI readiness", "q": "Are you planning or already running AI/ML initiatives? If so, what is the biggest challenge - accessing clean training data or integrating predictions back into processes?"}, {"t": "Data platform strategy", "q": "Is there an existing data platform strategy? Are you invested in a cloud data warehouse (Snowflake, Databricks, BigQuery) or are you still deciding?"}, {"t": "Governance", "q": "Who owns data quality in your organization? Is there a data governance framework, or is it everyone and no one?"}], "de": [{"t": "Datenchaos", "q": "Wie viele Systeme enthalten Daten die Business-User fuer Reporting brauchen? Wie lange dauert Onboarding neuer Quellen?"}, {"t": "Datenvertrauen", "q": "Vertraut Ihre Fuehrung den Zahlen in Berichten? Oder fragen sie 'woher kommt das' und 'warum anders als im anderen Bericht'?"}, {"t": "SAP-Datennutzung", "q": "Wie werden SAP-Daten fuer Analytics bereitgestellt? Extraktion, DWH, Replikation? Business-Kontext erhalten oder verloren?"}, {"t": "Self-Service", "q": "Self-Service-Analytics versucht? Koennen User eigenstaendig Daten finden/nutzen oder IT-Tickets fuer jede Aenderung?"}, {"t": "KI-Bereitschaft", "q": "KI/ML-Initiativen geplant? Groesste Herausforderung: saubere Trainingsdaten oder Integration zurueck in Prozesse?"}, {"t": "Datenstrategie", "q": "Bestehende Datenplattform-Strategie? Investiert in Cloud DWH (Snowflake, Databricks, BigQuery)?"}, {"t": "Governance", "q": "Wer verantwortet Datenqualitaet? Governance-Framework vorhanden?"}]}, "diff": {"en": ["Business semantics preserved: SAP data comes with its full context - hierarchies, authorizations, relationships intact. No meaning lost in extraction", "Data federation: access data where it lives without copying it. Reduce redundancy, improve freshness, lower storage costs", "Open ecosystem: native connectors to Snowflake, Databricks, Google BigQuery, Azure, AWS. Not a walled garden - works with existing investments", "Business content: pre-built analytical models for common SAP scenarios (finance, procurement, supply chain). Not starting from scratch", "Self-service data marketplace: business users browse, discover, and request access to governed data products without IT involvement", "Built-in data quality and governance: lineage tracking, impact analysis, data cataloging, and access governance in one platform", "Real-time capabilities: live data access to operational SAP systems for time-sensitive analytics without ETL lag"], "de": ["Business-Semantik erhalten: SAP-Daten mit vollem Kontext - Hierarchien, Berechtigungen, Beziehungen", "Datenfederation: Zugang ohne Kopieren. Weniger Redundanz, bessere Aktualitaet, niedrigere Speicherkosten", "Offenes Oekosystem: native Konnektoren zu Snowflake, Databricks, BigQuery. Kein Walled Garden", "Business Content: vorgefertigte Analysemodelle fuer SAP-Szenarien", "Self-Service-Datenmarktplatz: User finden und beantragen Zugang ohne IT", "Eingebaute Qualitaet & Governance: Lineage, Impact-Analyse, Katalog, Zugangssteuerung", "Echtzeit: Live-Zugang zu operativen SAP-Systemen ohne ETL-Verzoegerung"]}, "talk": {"en": [{"p": "Open", "l": "Let me ask you this: if your CEO asked tomorrow for a single, trusted view of revenue by customer segment, product line, and region - how long would it take to deliver that? Hours, days, or weeks?"}, {"p": "Pain", "l": "What I hear consistently is that data teams are spending most of their time moving data around rather than analyzing it. And even after all that work, business users still do not trust the numbers because they have seen too many conflicting reports."}, {"p": "Vision", "l": "Datasphere creates a governed data layer where SAP data retains its full business meaning, non-SAP data connects seamlessly, and business users can discover and use data products independently. One trusted source, no copies, always current."}, {"p": "Proof", "l": "[Reference customer] reduced report delivery time from 3 weeks to 2 days, eliminated 70% of their data copies, and enabled self-service analytics for 200+ business users. Their data team now spends 60% of time on insights instead of data wrangling."}, {"p": "Next Step", "l": "The best starting point is a data landscape assessment. We map your current data sources, identify the highest-value analytical use cases, and design the target data architecture. Takes 2-3 weeks and gives you a concrete roadmap."}], "de": [{"p": "Eroeffnung", "l": "Wenn Ihr CEO morgen eine einzige vertrauenswuerdige Sicht auf Revenue nach Segment, Produktlinie und Region will - wie lange bis Lieferung? Stunden, Tage, Wochen?"}, {"p": "Schmerz", "l": "Datenteams verbringen die meiste Zeit mit Datenbewegung statt Analyse. Und Business-User vertrauen den Zahlen trotzdem nicht."}, {"p": "Vision", "l": "Datasphere: governed Data Layer wo SAP-Daten Business-Kontext behalten, Nicht-SAP nahtlos verbindet, User eigenstaendig Datenprodukte entdecken. Eine Quelle, keine Kopien, immer aktuell."}, {"p": "Beweis", "l": "[Referenz] Report-Lieferung von 3 Wochen auf 2 Tage, 70% Datenkopien eliminiert, Self-Service fuer 200+ User. Datenteam 60% auf Insights statt Datenarbeit."}, {"p": "Naechster Schritt", "q": "Data-Landscape-Assessment: Quellen abbilden, Top-Use-Cases identifizieren, Ziel-Architektur designen. 2-3 Wochen fuer konkrete Roadmap."}]}, "comp": {"en": [{"v": "Snowflake", "d": "Snowflake is a powerful cloud data warehouse but generic - no SAP business semantics, no pre-built SAP content, no native SAP connector. Datasphere integrates WITH Snowflake (native federation) while adding the SAP-specific value layer on top."}, {"v": "Databricks", "d": "Databricks excels at data engineering and ML. Datasphere complements it as the business-semantic layer for SAP data. Both can coexist - Datasphere federates into Databricks for advanced ML while providing governed business context."}, {"v": "Microsoft Fabric", "d": "Fabric is Microsoft's unified analytics platform. Datasphere differentiates with deep SAP business content, preserved hierarchies/authorizations, and native SAP data access. For SAP-heavy analytics, Datasphere provides meaning that Fabric cannot."}, {"v": "SAP BW/4HANA (legacy DWH)", "d": "BW/4 is on-premise and monolithic. Datasphere is the cloud-native successor with open architecture, federation c
